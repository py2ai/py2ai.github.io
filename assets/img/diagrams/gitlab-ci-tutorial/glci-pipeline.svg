<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" width="860" height="430" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="430" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">Pipeline: stages -&gt; jobs -&gt; artifacts</text>
<rect x="80" y="80" width="220" height="40" rx="8" fill="#1e40af"/>
<text x="190.0" y="106" text-anchor="middle" class="node-title-w">build</text>
<line x1="300" y1="100" x2="320" y2="100" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="320" y="80" width="220" height="40" rx="8" fill="#2563eb"/>
<text x="430.0" y="106" text-anchor="middle" class="node-title-w">test</text>
<line x1="540" y1="100" x2="560" y2="100" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="560" y="80" width="220" height="40" rx="8" fill="#1e40af"/>
<text x="670.0" y="106" text-anchor="middle" class="node-title-w">deploy</text>
<rect x="100" y="150" width="180" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="190" y="175" text-anchor="middle" class="item">compile</text>
<rect x="100" y="200" width="180" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="190" y="225" text-anchor="middle" class="item">docker build</text>
<rect x="340" y="150" width="180" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="430" y="175" text-anchor="middle" class="item">unit test</text>
<rect x="340" y="200" width="180" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="430" y="225" text-anchor="middle" class="item">lint</text>
<rect x="340" y="250" width="180" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="430" y="275" text-anchor="middle" class="item">integration</text>
<rect x="580" y="150" width="180" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="670" y="175" text-anchor="middle" class="item">staging</text>
<rect x="580" y="200" width="180" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="670" y="225" text-anchor="middle" class="item">prod</text>
<rect x="40" y="320" width="780" height="60" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="346" text-anchor="middle" class="band-label">Jobs in the same stage run in parallel; stages run sequentially.</text>
<text x="430" y="368" text-anchor="middle" class="item-sub">needs: can make a job depend on a job in a different stage (DAG mode).</text>
</svg>
