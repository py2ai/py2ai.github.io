<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" width="860" height="430" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="430" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">Runners: Shared, Specific, Executors</text>
<rect x="40" y="70" width="390" height="170" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="235" y="96" text-anchor="middle" class="band-label">Shared runners</text>
<text x="235" y="124" text-anchor="middle" class="item">GitLab-hosted (SaaS)</text>
<text x="235" y="146" text-anchor="middle" class="item-sub">free tier, shared across projects</text>
<text x="235" y="172" text-anchor="middle" class="item-sub">tags: select by label</text>
<text x="235" y="198" text-anchor="middle" class="item-sub">no setup, limited minutes</text>
<text x="235" y="224" text-anchor="middle" class="item-sub">good for: public/small projects</text>
<rect x="460" y="70" width="390" height="170" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="655" y="96" text-anchor="middle" class="band-label">Specific runners</text>
<text x="655" y="124" text-anchor="middle" class="item">your own machine/VM/k8s</text>
<text x="655" y="146" text-anchor="middle" class="item-sub">dedicated to your project</text>
<text x="655" y="172" text-anchor="middle" class="item-sub">full control, no minute cap</text>
<text x="655" y="198" text-anchor="middle" class="item-sub">maintain + secure yourself</text>
<text x="655" y="224" text-anchor="middle" class="item-sub">good for: private/large projects</text>
<rect x="40" y="256" width="800" height="120" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="282" text-anchor="middle" class="band-label">Executor types (how jobs run)</text>
<rect x="60" y="300" width="170" height="56" rx="8" fill="#2563eb"/>
<text x="145" y="324" text-anchor="middle" class="node-title-w">shell</text>
<text x="145" y="344" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">runs on host directly</text>
<rect x="250" y="300" width="170" height="56" rx="8" fill="#1e40af"/>
<text x="335" y="324" text-anchor="middle" class="node-title-w">docker</text>
<text x="335" y="344" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">in a container (default)</text>
<rect x="440" y="300" width="170" height="56" rx="8" fill="#2563eb"/>
<text x="525" y="324" text-anchor="middle" class="node-title-w">kubernetes</text>
<text x="525" y="344" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">pods in a cluster</text>
<rect x="630" y="300" width="170" height="56" rx="8" fill="#1e40af"/>
<text x="715" y="324" text-anchor="middle" class="node-title-w">ssh</text>
<text x="715" y="344" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">remote machine (legacy)</text>
<rect x="40" y="392" width="780" height="26" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="430" y="410" text-anchor="middle" class="note">Docker executor is the default; use tags to route jobs to the right runner.</text>
</svg>
