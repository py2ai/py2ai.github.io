<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" width="860" height="430" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="430" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">Variables, Protected, Masked, Environments</text>
<rect x="40" y="70" width="780" height="46" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="76" width="170" height="34" rx="8" fill="#1e40af"/>
<text x="139" y="98" text-anchor="middle" class="node-title-w">CI/CD variables</text>
<rect x="240" y="76" width="270" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="375" y="98" text-anchor="middle" class="item">set in UI or .gitlab-ci.yml</text>
<rect x="520" y="76" width="300" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="670" y="98" text-anchor="middle" class="item-sub">available as $VAR in jobs</text>
<rect x="40" y="124" width="780" height="46" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="130" width="170" height="34" rx="8" fill="#2563eb"/>
<text x="139" y="152" text-anchor="middle" class="node-title-w">Protected</text>
<rect x="240" y="130" width="270" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="375" y="152" text-anchor="middle" class="item">only on protected branches/tags</text>
<rect x="520" y="130" width="300" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="670" y="152" text-anchor="middle" class="item-sub">hides secrets from MRs</text>
<rect x="40" y="178" width="780" height="46" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="184" width="170" height="34" rx="8" fill="#1e40af"/>
<text x="139" y="206" text-anchor="middle" class="node-title-w">Masked</text>
<rect x="240" y="184" width="270" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="375" y="206" text-anchor="middle" class="item">hidden in job logs</text>
<rect x="520" y="184" width="300" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="670" y="206" text-anchor="middle" class="item-sub">prevents accidental leak</text>
<rect x="40" y="232" width="780" height="46" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="238" width="170" height="34" rx="8" fill="#2563eb"/>
<text x="139" y="260" text-anchor="middle" class="node-title-w">Environments</text>
<rect x="240" y="238" width="270" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="375" y="260" text-anchor="middle" class="item">staging, production</text>
<rect x="520" y="238" width="300" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="670" y="260" text-anchor="middle" class="item-sub">track deployments + approvals</text>
<rect x="40" y="286" width="780" height="46" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="292" width="170" height="34" rx="8" fill="#1e40af"/>
<text x="139" y="314" text-anchor="middle" class="node-title-w">Review apps</text>
<rect x="240" y="292" width="270" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="375" y="314" text-anchor="middle" class="item">per-MR ephemeral env</text>
<rect x="520" y="292" width="300" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="670" y="314" text-anchor="middle" class="item-sub">test before merge</text>
<rect x="40" y="340" width="780" height="46" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="346" width="170" height="34" rx="8" fill="#2563eb"/>
<text x="139" y="368" text-anchor="middle" class="node-title-w">Files / secrets</text>
<rect x="240" y="346" width="270" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="375" y="368" text-anchor="middle" class="item">file-type vars, HashiCorp Vault</text>
<rect x="520" y="346" width="300" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="670" y="368" text-anchor="middle" class="item-sub">for certs + managed secrets</text>
<rect x="40" y="400" width="780" height="26" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="430" y="418" text-anchor="middle" class="note">Mark secrets as protected + masked; use environments for approval gates on prod.</text>
