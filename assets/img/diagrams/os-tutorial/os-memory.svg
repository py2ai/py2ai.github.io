<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460" width="860" height="460" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="460" fill="#ffffff"/>
<text x="310" y="38" text-anchor="middle" class="title">Virtual Memory: Pages, TLB, Faults</text>
<rect x="80" y="80" width="140" height="50" rx="8" fill="#1e40af"/>
<text x="150" y="112" text-anchor="middle" class="node-title-w">CPU</text>
<line x1="220" y1="105" x2="270" y2="105" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="270" y="80" width="140" height="50" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="340" y="104" text-anchor="middle" class="item">TLB (cache)</text>
<text x="340" y="122" text-anchor="middle" class="item-sub">fast lookup</text>
<line x1="410" y1="95" x2="460" y2="95" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow)"/>
<text x="435" y="86" text-anchor="middle" class="item-sub">hit</text>
<line x1="410" y1="115" x2="460" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<text x="435" y="138" text-anchor="middle" class="item-sub">miss</text>
<rect x="460" y="130" width="160" height="50" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="540" y="154" text-anchor="middle" class="item">Page table (RAM)</text>
<text x="540" y="172" text-anchor="middle" class="item-sub">VPN -&gt; PFN</text>
<line x1="620" y1="155" x2="670" y2="155" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="670" y="130" width="150" height="50" rx="8" fill="#2563eb"/>
<text x="745" y="158" text-anchor="middle" class="node-title-w">Physical frame</text>
<line x1="540" y1="180" x2="540" y2="230" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow)"/>
<text x="555" y="210" text-anchor="start" class="item-sub">page not in RAM</text>
<rect x="440" y="232" width="200" height="46" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="540" y="256" text-anchor="middle" class="item">Page fault -&gt; disk/swap</text>
<text x="540" y="272" text-anchor="middle" class="item-sub">slow (ms)</text>
<line x1="540" y1="278" x2="540" y2="318" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="440" y="320" width="200" height="46" rx="8" fill="#7c2d12"/>
<text x="540" y="350" text-anchor="middle" class="node-title-w">load frame, update table, retry</text>
<rect x="40" y="388" width="780" height="30" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="430" y="408" text-anchor="middle" class="note">Virtual memory gives each process its own address space; demand paging + swap let RAM exceed physical size.</text>
</svg>
