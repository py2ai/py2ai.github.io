<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" width="860" height="440" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="440" fill="#ffffff"/>
<text x="310" y="38" text-anchor="middle" class="title">Concurrency: Threads, Locks, Deadlock</text>
<rect x="40" y="66" width="380" height="150" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="230" y="92" text-anchor="middle" class="band-label">Process vs Thread</text>
<rect x="60" y="108" width="140" height="70" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="130" y="138" text-anchor="middle" class="node-title">Process</text>
<text x="130" y="156" text-anchor="middle" class="item-sub">own memory</text>
<rect x="220" y="108" width="140" height="70" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="290" y="138" text-anchor="middle" class="node-title">Threads</text>
<text x="290" y="156" text-anchor="middle" class="item-sub">shared memory</text>
<text x="230" y="196" text-anchor="middle" class="item-sub">threads = cheap, but share state (races)</text>
<rect x="460" y="66" width="380" height="150" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="650" y="92" text-anchor="middle" class="band-label">Deadlock (4 conditions)</text>
<rect x="480" y="108" width="80" height="70" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="520" y="138" text-anchor="middle" class="item">mutual</text>
<text x="520" y="156" text-anchor="middle" class="item-sub">exclusion</text>
<rect x="568" y="108" width="80" height="70" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="608" y="138" text-anchor="middle" class="item">hold</text>
<text x="608" y="156" text-anchor="middle" class="item-sub">and</text>
<rect x="656" y="108" width="80" height="70" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="696" y="138" text-anchor="middle" class="item">no</text>
<text x="696" y="156" text-anchor="middle" class="item-sub">preemption</text>
<rect x="744" y="108" width="80" height="70" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="784" y="138" text-anchor="middle" class="item">circular</text>
<text x="784" y="156" text-anchor="middle" class="item-sub">wait</text>
<text x="650" y="196" text-anchor="middle" class="item-sub">break any one condition to prevent deadlock</text>
<rect x="40" y="232" width="800" height="160" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="258" text-anchor="middle" class="band-label">Synchronization primitives</text>
<rect x="70" y="278" width="110" height="70" rx="8" fill="#2563eb"/>
<text x="125" y="308" text-anchor="middle" class="node-title-w">mutex</text>
<text x="125" y="328" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">1 at a time</text>
<rect x="195" y="278" width="110" height="70" rx="8" fill="#1e40af"/>
<text x="250" y="308" text-anchor="middle" class="node-title-w">semaphore</text>
<text x="250" y="328" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">N at a time</text>
<rect x="320" y="278" width="110" height="70" rx="8" fill="#2563eb"/>
<text x="375" y="308" text-anchor="middle" class="node-title-w">condition var</text>
<text x="375" y="328" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">wait/signal</text>
<rect x="445" y="278" width="110" height="70" rx="8" fill="#1e40af"/>
<text x="500" y="308" text-anchor="middle" class="node-title-w">read/write lock</text>
<text x="500" y="328" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">many readers</text>
<rect x="570" y="278" width="110" height="70" rx="8" fill="#2563eb"/>
<text x="625" y="308" text-anchor="middle" class="node-title-w">atomic</text>
<text x="625" y="328" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">lock-free op</text>
<rect x="695" y="278" width="110" height="70" rx="8" fill="#1e40af"/>
<text x="750" y="308" text-anchor="middle" class="node-title-w">barrier</text>
<text x="750" y="328" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">all wait</text>
<text x="430" y="372" text-anchor="middle" class="note">Rule: protect shared mutable state; prefer message passing over shared memory.</text>
</svg>
