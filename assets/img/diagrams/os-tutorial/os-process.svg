<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" width="860" height="430" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="430" fill="#ffffff"/>
<text x="290" y="38" text-anchor="middle" class="title">Process States + Context Switch</text>
<rect x="60" y="90" width="120" height="56" rx="28" fill="#1e40af"/>
<text x="120" y="124" text-anchor="middle" class="node-title-w">New</text>
<rect x="210" y="90" width="120" height="56" rx="28" fill="#2563eb"/>
<text x="270" y="124" text-anchor="middle" class="node-title-w">Ready</text>
<rect x="360" y="90" width="120" height="56" rx="28" fill="#9333ea"/>
<text x="420" y="124" text-anchor="middle" class="node-title-w">Running</text>
<rect x="510" y="90" width="120" height="56" rx="28" fill="#0891b2"/>
<text x="570" y="124" text-anchor="middle" class="node-title-w">Waiting</text>
<rect x="660" y="90" width="120" height="56" rx="28" fill="#7c2d12"/>
<text x="720" y="124" text-anchor="middle" class="node-title-w">Terminated</text>
<line x1="180" y1="118" x2="210" y2="118" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<text x="195" y="108" text-anchor="middle" class="item-sub">admit</text>
<line x1="330" y1="118" x2="360" y2="118" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-accent)"/>
<text x="345" y="108" text-anchor="middle" class="item-sub">dispatch</text>
<line x1="480" y1="118" x2="510" y2="118" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<text x="495" y="108" text-anchor="middle" class="item-sub">I/O wait</text>
<line x1="630" y1="118" x2="210" y2="160" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<text x="420" y="168" text-anchor="middle" class="item-sub">I/O done -&gt; ready</text>
<line x1="510" y1="118" x2="360" y2="118" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<text x="435" y="130" text-anchor="middle" class="item-sub">timeout</text>
<line x1="480" y1="150" x2="630" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<text x="555" y="140" text-anchor="middle" class="item-sub">exit</text>
<rect x="40" y="200" width="780" height="180" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="226" text-anchor="middle" class="band-label">Context switch (what the kernel saves per process)</text>
<rect x="70" y="244" width="95" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="117" y="269" text-anchor="middle" class="item">PID</text>
<rect x="175" y="244" width="95" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="222" y="269" text-anchor="middle" class="item">registers</text>
<rect x="280" y="244" width="95" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="327" y="269" text-anchor="middle" class="item">program counter</text>
<rect x="385" y="244" width="95" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="432" y="269" text-anchor="middle" class="item">stack ptr</text>
<rect x="490" y="244" width="95" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="537" y="269" text-anchor="middle" class="item">open files</text>
<rect x="595" y="244" width="95" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="642" y="269" text-anchor="middle" class="item">memory map</text>
<rect x="700" y="244" width="95" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="747" y="269" text-anchor="middle" class="item">scheduling info</text>
<text x="430" y="316" text-anchor="middle" class="note">Switching is pure overhead - keep it rare (batch, time-slice wisely).</text>
<text x="430" y="350" text-anchor="middle" class="item-sub">f() creates a new process image; fork() copies the calling process.</text>
</svg>
