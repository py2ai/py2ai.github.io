<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680" width="960" height="680" style="background:transparent">
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ea580c"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#059669"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <style>
      text { font-family: Inter, system-ui, -apple-system, sans-serif; }
      .title { font-size: 18px; font-weight: 700; fill: #1e293b; }
      .subtitle { font-size: 11px; fill: #64748b; }
      .box-title { font-size: 14px; font-weight: 700; }
      .box-text { font-size: 11px; fill: #475569; }
      .box-detail { font-size: 10px; fill: #64748b; }
      .arrow-label { font-size: 10px; font-weight: 600; }
    </style>
  </defs>
  <text x="480" y="32" text-anchor="middle" class="title">Agent-Browser Architecture</text>
  <text x="480" y="48" text-anchor="middle" class="subtitle">Client-Daemon-CDP Communication Flow</text>
  <rect x="40" y="80" width="200" height="280" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="140" y="104" text-anchor="middle" class="box-title" fill="#2563eb">CLI Client</text>
  <line x1="48" y1="112" x2="232" y2="112" stroke="#2563eb" stroke-width="1" stroke-opacity="0.3"/>
  <text x="140" y="130" text-anchor="middle" class="box-detail">User / AI Agent</text>
  <text x="140" y="144" text-anchor="middle" class="box-detail">sends commands</text>
  <text x="140" y="162" text-anchor="middle" class="box-detail">CLI parses flags</text>
  <text x="140" y="176" text-anchor="middle" class="box-detail">and arguments</text>
  <text x="140" y="194" text-anchor="middle" class="box-detail">Sends commands</text>
  <text x="140" y="208" text-anchor="middle" class="box-detail">via IPC</text>
  <text x="140" y="226" text-anchor="middle" class="box-detail">Unix socket</text>
  <text x="140" y="240" text-anchor="middle" class="box-detail">(macOS/Linux)</text>
  <text x="140" y="258" text-anchor="middle" class="box-detail">Named Pipe</text>
  <text x="140" y="272" text-anchor="middle" class="box-detail">(Windows)</text>
  <rect x="320" y="80" width="280" height="280" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="460" y="104" text-anchor="middle" class="box-title" fill="#059669">Background Daemon</text>
  <line x1="328" y1="112" x2="592" y2="112" stroke="#059669" stroke-width="1" stroke-opacity="0.3"/>
  <text x="460" y="130" text-anchor="middle" class="box-detail">Persistent Rust process</text>
  <text x="460" y="144" text-anchor="middle" class="box-detail">Auto-starts on first command</text>
  <text x="460" y="162" text-anchor="middle" class="box-detail">Manages browser lifecycle</text>
  <text x="460" y="176" text-anchor="middle" class="box-detail">(launch, connect, close)</text>
  <text x="460" y="194" text-anchor="middle" class="box-detail">CDP WebSocket client</text>
  <text x="460" y="208" text-anchor="middle" class="box-detail">communicates with Chrome</text>
  <text x="460" y="226" text-anchor="middle" class="box-detail">Handles sessions, state,</text>
  <text x="460" y="240" text-anchor="middle" class="box-detail">AES-256-GCM encryption</text>
  <text x="460" y="258" text-anchor="middle" class="box-detail">Serves dashboard</text>
  <text x="460" y="272" text-anchor="middle" class="box-detail">on port 4848</text>
  <text x="460" y="290" text-anchor="middle" class="box-detail">Auto-shutdown via</text>
  <text x="460" y="304" text-anchor="middle" class="box-detail">IDLE_TIMEOUT_MS</text>
  <rect x="680" y="80" width="240" height="280" rx="8" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
  <text x="800" y="104" text-anchor="middle" class="box-title" fill="#ea580c">Browser Engine</text>
  <line x1="688" y1="112" x2="912" y2="112" stroke="#ea580c" stroke-width="1" stroke-opacity="0.3"/>
  <text x="800" y="130" text-anchor="middle" class="box-detail">Chrome/Chromium</text>
  <text x="800" y="144" text-anchor="middle" class="box-detail">via CDP WebSocket</text>
  <text x="800" y="158" text-anchor="middle" class="box-detail">(default engine)</text>
  <text x="800" y="176" text-anchor="middle" class="box-detail">Lightpanda</text>
  <text x="800" y="190" text-anchor="middle" class="box-detail">via CDP WebSocket</text>
  <text x="800" y="204" text-anchor="middle" class="box-detail">(--engine lightpanda)</text>
  <text x="800" y="222" text-anchor="middle" class="box-detail">Safari/iOS</text>
  <text x="800" y="236" text-anchor="middle" class="box-detail">via Appium/WebDriver</text>
  <text x="800" y="250" text-anchor="middle" class="box-detail">(-p ios)</text>
  <rect x="40" y="420" width="140" height="80" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="110" y="450" text-anchor="middle" class="box-title" fill="#7c3aed">Browserless</text>
  <text x="110" y="468" text-anchor="middle" class="box-detail">CDP over WebSocket</text>
  <text x="110" y="482" text-anchor="middle" class="box-detail">Remote Browser</text>
  <rect x="200" y="420" width="140" height="80" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="270" y="450" text-anchor="middle" class="box-title" fill="#7c3aed">Browserbase</text>
  <text x="270" y="468" text-anchor="middle" class="box-detail">CDP over WebSocket</text>
  <text x="270" y="482" text-anchor="middle" class="box-detail">Remote Browser</text>
  <rect x="360" y="420" width="140" height="80" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="430" y="450" text-anchor="middle" class="box-title" fill="#7c3aed">Browser Use</text>
  <text x="430" y="468" text-anchor="middle" class="box-detail">CDP over WebSocket</text>
  <text x="430" y="482" text-anchor="middle" class="box-detail">Remote Browser</text>
  <rect x="520" y="420" width="140" height="80" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="590" y="450" text-anchor="middle" class="box-title" fill="#7c3aed">Kernel</text>
  <text x="590" y="468" text-anchor="middle" class="box-detail">CDP over WebSocket</text>
  <text x="590" y="482" text-anchor="middle" class="box-detail">Remote Browser</text>
  <rect x="680" y="420" width="140" height="80" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="750" y="450" text-anchor="middle" class="box-title" fill="#7c3aed">AWS AgentCore</text>
  <text x="750" y="468" text-anchor="middle" class="box-detail">CDP over WebSocket</text>
  <text x="750" y="482" text-anchor="middle" class="box-detail">Remote Browser</text>
  <rect x="40" y="540" width="240" height="100" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="160" y="564" text-anchor="middle" class="box-title" fill="#64748b">Observability Dashboard</text>
  <line x1="48" y1="572" x2="272" y2="572" stroke="#64748b" stroke-width="1" stroke-opacity="0.3"/>
  <text x="160" y="590" text-anchor="middle" class="box-detail">Live viewport, activity feed</text>
  <text x="160" y="604" text-anchor="middle" class="box-detail">Console, network, AI chat</text>
  <text x="160" y="618" text-anchor="middle" class="box-detail">Embedded via rust-embed</text>
  <line x1="240" y1="200" x2="320" y2="200" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="280" y="192" text-anchor="middle" class="arrow-label" fill="#2563eb">IPC</text>
  <line x1="600" y1="200" x2="680" y2="200" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="640" y="192" text-anchor="middle" class="arrow-label" fill="#ea580c">CDP WebSocket</text>
  <line x1="460" y1="360" x2="460" y2="420" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <text x="468" y="390" text-anchor="start" class="arrow-label" fill="#7c3aed">HTTPS</text>
  <line x1="320" y1="360" x2="200" y2="540" stroke="#64748b" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arrow-gray)"/>
  <text x="240" y="450" text-anchor="middle" class="arrow-label" fill="#64748b">HTTP/WS :4848</text>
  <text x="480" y="412" text-anchor="middle" class="subtitle" fill="#7c3aed">Cloud Browser Providers</text>
  <rect x="340" y="540" width="280" height="100" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="480" y="560" text-anchor="middle" class="box-title" fill="#475569">Performance vs Node.js</text>
  <text x="480" y="580" text-anchor="middle" class="box-detail">99x smaller install (7 MB vs 710 MB)</text>
  <text x="480" y="596" text-anchor="middle" class="box-detail">18x less memory (8 MB vs 143 MB)</text>
  <text x="480" y="612" text-anchor="middle" class="box-detail">1.6x faster cold start (617ms vs 1002ms)</text>
  <text x="480" y="628" text-anchor="middle" class="box-detail">100% native Rust, zero Node.js dependency</text>
  <rect x="700" y="540" width="220" height="100" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="810" y="558" text-anchor="middle" class="box-title" fill="#475569">Legend</text>
  <line x1="710" y1="572" x2="740" y2="572" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="748" y="576" class="box-detail">IPC (Data Flow)</text>
  <line x1="710" y1="590" x2="740" y2="590" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="748" y="594" class="box-detail">CDP WebSocket</text>
  <line x1="710" y1="608" x2="740" y2="608" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <text x="748" y="612" class="box-detail">HTTPS (Cloud)</text>
  <line x1="710" y1="626" x2="740" y2="626" stroke="#64748b" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arrow-gray)"/>
  <text x="748" y="630" class="box-detail">HTTP/WS (Dashboard)</text>
</svg>