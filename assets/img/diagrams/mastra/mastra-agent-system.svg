  <line x1="768" y1="504" x2="792" y2="504" stroke="#2563eb" stroke-width="1.5"/>
  <text x="800" y="508" class="legend">Data Flow</text>
  <line x1="768" y1="522" x2="792" y2="522" stroke="#ea580c" stroke-width="1.5"/>
  <text x="800" y="526" class="legend">Control</text>
  <line x1="768" y1="540" x2="792" y2="540" stroke="#059669" stroke-width="1.5"/>
  <text x="800" y="544" class="legend">Memory R/W</text>
  <line x1="768" y1="558" x2="792" y2="558" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="800" y="562" class="legend">Feedback</text>
