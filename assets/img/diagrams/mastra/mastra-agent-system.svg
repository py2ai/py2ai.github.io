  <path d="M460,210 L520,210 L520,90 L576,90" fill="none" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <path d="M460,228 L576,228" fill="none" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="516" y="220" text-anchor="middle" class="label" fill="#059669">read/write</text>
  <path d="M720,216 L744,216 L744,180 L768,180" fill="none" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <path d="M720,228 L752,228 L752,212 L768,212" fill="none" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <path d="M720,240 L760,240 L760,244 L768,244" fill="none" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <path d="M460,248 L520,248 L520,362 L576,362" fill="none" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <path d="M720,352 L744,352 L744,316 L768,316" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <path d="M720,362 L752,362 L752,348 L768,348" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <path d="M720,372 L760,372 L760,380 L768,380" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <path d="M720,380 L744,380 L744,412 L768,412" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <path d="M260,240 L200,240 L200,362 L176,362" fill="none" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <text x="184" y="300" text-anchor="middle" class="label" fill="#7c3aed">output</text>
  <path d="M112,380 L112,432" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <rect x="760" y="480" width="140" height="88" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
