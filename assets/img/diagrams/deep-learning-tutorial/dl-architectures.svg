<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" width="860" height="430" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="430" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">Architectures: CNN, RNN, Transformer</text>
<rect x="40" y="70" width="780" height="70" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="82" width="160" height="46" rx="8" fill="#1e40af"/>
<text x="134" y="104" text-anchor="middle" class="node-title-w">CNN</text>
<text x="134" y="122" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">images</text>
<rect x="230" y="82" width="590" height="46" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="525" y="104" text-anchor="middle" class="item-sub">convolution filters learn spatial patterns (edges -&gt; shapes -&gt; objects); pooling reduces size; used for image classification, detection</text>
<rect x="40" y="150" width="780" height="70" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="162" width="160" height="46" rx="8" fill="#2563eb"/>
<text x="134" y="184" text-anchor="middle" class="node-title-w">RNN / LSTM</text>
<text x="134" y="202" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">sequences</text>
<rect x="230" y="162" width="590" height="46" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="525" y="184" text-anchor="middle" class="item-sub">recurrent connections carry state across time steps; LSTM gates solve vanishing gradient; used for text, time series (legacy)</text>
<rect x="40" y="230" width="780" height="70" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="242" width="160" height="46" rx="8" fill="#1e40af"/>
<text x="134" y="264" text-anchor="middle" class="node-title-w">Transformer</text>
<text x="134" y="282" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">text + more</text>
<rect x="230" y="242" width="590" height="46" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="525" y="264" text-anchor="middle" class="item-sub">self-attention lets each position attend to all others; parallelizable; the architecture behind GPT, BERT, Claude</text>
<rect x="40" y="310" width="780" height="70" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="322" width="160" height="46" rx="8" fill="#2563eb"/>
<text x="134" y="344" text-anchor="middle" class="node-title-w">Diffusion</text>
<text x="134" y="362" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">image gen</text>
<rect x="230" y="322" width="590" height="46" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="525" y="344" text-anchor="middle" class="item-sub">add noise step by step, then learn to reverse it; Stable Diffusion, DALL-E; generates images from text</text>
<rect x="40" y="400" width="780" height="26" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="430" y="418" text-anchor="middle" class="note">Transformers replaced RNNs for text; attention is the key innovation.</text>
</svg>
