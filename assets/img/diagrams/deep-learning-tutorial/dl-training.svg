<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" width="860" height="430" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="430" fill="#ffffff"/>
<text x="320" y="38" text-anchor="middle" class="title">Training: Loss, Gradient Descent, Optimizers</text>
<rect x="40" y="70" width="780" height="46" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="76" width="180" height="34" rx="8" fill="#1e40af"/>
<text x="144" y="98" text-anchor="middle" class="node-title-w">Loss function</text>
<rect x="250" y="76" width="280" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="390" y="98" text-anchor="middle" class="item">MSE (regression), cross-entropy (classification)</text>
<rect x="540" y="76" width="280" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="680" y="98" text-anchor="middle" class="item-sub">measures how wrong the model is</text>
<rect x="40" y="124" width="780" height="46" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="130" width="180" height="34" rx="8" fill="#2563eb"/>
<text x="144" y="152" text-anchor="middle" class="node-title-w">Gradient descent</text>
<rect x="250" y="130" width="280" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="390" y="152" text-anchor="middle" class="item">w -= lr * dLoss/dw</text>
<rect x="540" y="130" width="280" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="680" y="152" text-anchor="middle" class="item-sub">nudge weights to reduce loss</text>
<rect x="40" y="178" width="780" height="46" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="184" width="180" height="34" rx="8" fill="#1e40af"/>
<text x="144" y="206" text-anchor="middle" class="node-title-w">Backpropagation</text>
<rect x="250" y="184" width="280" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="390" y="206" text-anchor="middle" class="item">chain rule, layer by layer</text>
<rect x="540" y="184" width="280" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="680" y="206" text-anchor="middle" class="item-sub">compute all gradients efficiently</text>
<rect x="40" y="232" width="780" height="46" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="238" width="180" height="34" rx="8" fill="#2563eb"/>
<text x="144" y="260" text-anchor="middle" class="node-title-w">Optimizer</text>
<rect x="250" y="238" width="280" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="390" y="260" text-anchor="middle" class="item">SGD, Adam (momentum + adaptive lr)</text>
<rect x="540" y="238" width="280" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="680" y="260" text-anchor="middle" class="item-sub">how big a step, in what direction</text>
<rect x="40" y="286" width="780" height="46" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="292" width="180" height="34" rx="8" fill="#1e40af"/>
<text x="144" y="314" text-anchor="middle" class="node-title-w">Batch + epoch</text>
<rect x="250" y="292" width="280" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="390" y="314" text-anchor="middle" class="item">batch size, epochs, learning rate schedule</text>
<rect x="540" y="292" width="280" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="680" y="314" text-anchor="middle" class="item-sub">the training knobs</text>
<rect x="40" y="340" width="780" height="46" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="346" width="180" height="34" rx="8" fill="#2563eb"/>
<text x="144" y="368" text-anchor="middle" class="node-title-w">Regularization</text>
<rect x="250" y="346" width="280" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="390" y="368" text-anchor="middle" class="item">dropout, L2, early stopping, data aug</text>
<rect x="540" y="346" width="280" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="680" y="368" text-anchor="middle" class="item-sub">prevent overfitting</text>
<rect x="40" y="400" width="780" height="26" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="430" y="418" text-anchor="middle" class="note">Adam is the default optimizer; lr is the single most important hyperparameter to tune.</text>
</svg>
