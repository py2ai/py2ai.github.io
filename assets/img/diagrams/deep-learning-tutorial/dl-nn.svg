<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" width="860" height="430" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="430" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">Neural Network: Neurons, Layers, Forward/Backward</text>
<rect x="40" y="70" width="380" height="160" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="230" y="96" text-anchor="middle" class="band-label">A neuron</text>
<rect x="60" y="116" width="60" height="30" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="90" y="136" text-anchor="middle" class="item">x1</text>
<rect x="60" y="152" width="60" height="30" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="90" y="172" text-anchor="middle" class="item">x2</text>
<line x1="120" y1="131" x2="180" y2="140" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="120" y1="167" x2="180" y2="146" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="180" y="118" width="80" height="50" rx="8" fill="#2563eb"/>
<text x="220" y="140" text-anchor="middle" class="node-title-w">sum + b</text>
<text x="220" y="158" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">w1*x1 + w2*x2</text>
<line x1="260" y1="143" x2="290" y2="143" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="290" y="118" width="80" height="50" rx="8" fill="#1e40af"/>
<text x="330" y="140" text-anchor="middle" class="node-title-w">activation</text>
<text x="330" y="158" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">ReLU / sigmoid</text>
<line x1="370" y1="143" x2="390" y2="143" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="390" y="128" width="30" height="30" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="405" y="148" text-anchor="middle" class="item">y</text>
<rect x="460" y="70" width="380" height="160" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="650" y="96" text-anchor="middle" class="band-label">Layers = stacked neurons</text>
<rect x="500" y="120" width="50" height="100" rx="8" fill="#2563eb"/>
<text x="525" y="172" text-anchor="middle" class="item-sub">input</text>
<rect x="580" y="115" width="50" height="110" rx="8" fill="#1e40af"/>
<text x="605" y="172" text-anchor="middle" class="item-sub">hidden</text>
<rect x="660" y="115" width="50" height="110" rx="8" fill="#2563eb"/>
<text x="685" y="172" text-anchor="middle" class="item-sub">hidden</text>
<rect x="740" y="120" width="50" height="100" rx="8" fill="#1e40af"/>
<text x="765" y="172" text-anchor="middle" class="item-sub">output</text>
<rect x="40" y="246" width="800" height="130" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="272" text-anchor="middle" class="band-label">Forward + Backward pass</text>
<rect x="60" y="288" width="170" height="70" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="145" y="312" text-anchor="middle" class="item">forward: x -&gt; y</text>
<text x="145" y="332" text-anchor="middle" class="item-sub">compute predictions</text>
<line x1="230" y1="323" x2="250" y2="323" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="250" y="288" width="170" height="70" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="335" y="312" text-anchor="middle" class="item">loss</text>
<text x="335" y="332" text-anchor="middle" class="item-sub">compare y to labels</text>
<line x1="420" y1="323" x2="440" y2="323" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="440" y="288" width="170" height="70" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="525" y="312" text-anchor="middle" class="item">backprop</text>
<text x="525" y="332" text-anchor="middle" class="item-sub">gradients per weight</text>
<line x1="610" y1="323" x2="630" y2="323" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="630" y="288" width="170" height="70" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="715" y="312" text-anchor="middle" class="item">update weights</text>
<text x="715" y="332" text-anchor="middle" class="item-sub">w -= lr * grad</text>
</svg>
