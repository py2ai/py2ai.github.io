  <rect x="736" y="632" width="144" height="40" rx="8" fill="#10b981" filter="url(#shadow)"/>
  <text x="808" y="656" text-anchor="middle" class="comp">Result Feedback</text>
  <polygon points="480,688 560,720 480,752 400,720" fill="#f59e0b" filter="url(#shadow)"/>
  <text x="480" y="724" text-anchor="middle" class="comp">Continue?</text>
  <path d="M480,116 L480,152" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <path d="M480,196 L480,232" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <path d="M480,276 L480,312" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <path d="M480,356 L480,392" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <path d="M480,436 L480,472" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <path d="M480,516 L480,552" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <path d="M480,596 L480,632" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <path d="M592,652 L736,652" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <path d="M808,672 L808,720 L560,720" fill="none" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <path d="M400,720 L280,720 L280,254 L368,254" fill="none" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <text x="264" y="500" text-anchor="middle" class="label" fill="#7c3aed">Yes</text>
  <rect x="368" y="776" width="224" height="16" rx="4" fill="#e2e8f0" filter="url(#shadow)"/>
  <text x="480" y="788" text-anchor="middle" class="label">End</text>
  <path d="M480,752 L480,776" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <text x="496" y="768" text-anchor="middle" class="label" fill="#64748b">No</text>
  <circle cx="344" cy="94" r="12" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="344" y="98" text-anchor="middle" class="label">1</text>
  <circle cx="344" cy="174" r="12" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="344" y="178" text-anchor="middle" class="label">2</text>
  <circle cx="344" cy="254" r="12" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="344" y="258" text-anchor="middle" class="label">3</text>
  <circle cx="344" cy="334" r="12" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="344" y="338" text-anchor="middle" class="label">4</text>
  <circle cx="344" cy="414" r="12" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="344" y="418" text-anchor="middle" class="label">5</text>
  <circle cx="344" cy="494" r="12" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="344" y="498" text-anchor="middle" class="label">6</text>
  <circle cx="344" cy="574" r="12" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="344" y="578" text-anchor="middle" class="label">7</text>
  <circle cx="344" cy="654" r="12" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="344" y="658" text-anchor="middle" class="label">8</text>
  <rect x="56" y="740" width="140" height="88" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="126" y="752" text-anchor="middle" class="legend" font-weight="600">Legend</text>
  <line x1="64" y1="764" x2="88" y2="764" stroke="#2563eb" stroke-width="1.5"/>
  <text x="96" y="768" class="legend">Data Flow</text>
  <line x1="64" y1="782" x2="88" y2="782" stroke="#ea580c" stroke-width="1.5"/>
  <text x="96" y="786" class="legend">Control</text>
  <line x1="64" y1="800" x2="88" y2="800" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="96" y="804" class="legend">Feedback Loop</text>
  <line x1="64" y1="818" x2="88" y2="818" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="96" y="822" class="legend">End</text>
</svg>