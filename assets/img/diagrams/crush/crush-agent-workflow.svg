<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 800">
  <style>
    text { font-family: Inter, system-ui, -apple-system, sans-serif; }
    .mono { font-family: JetBrains Mono, Fira Code, monospace; }
    .title { font-size: 17px; font-weight: 700; fill: #1e293b; }
    .comp  { font-size: 12px; font-weight: 600; fill: #ffffff; }
    .comp-d { font-size: 12px; font-weight: 600; fill: #334155; }
    .label { font-size: 10px; fill: #64748b; }
    .anno  { font-size: 9px; fill: #94a3b8; }
    .legend { font-size: 9px; fill: #475569; }
  </style>
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ea580c"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#059669"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7c3aed"/>
    </marker>
    <marker id="arr-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="800" fill="#ffffff"/>
  <text x="480" y="28" text-anchor="middle" class="title">Crush — Agent Workflow</text>
  <rect x="368" y="72" width="224" height="44" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="98" text-anchor="middle" class="comp-d">User Prompt</text>
  <rect x="368" y="152" width="224" height="44" rx="8" fill="#8b5cf6" filter="url(#shadow)"/>
  <text x="480" y="178" text-anchor="middle" class="comp">Context Assembly</text>
  <rect x="368" y="232" width="224" height="44" rx="8" fill="#2563eb" filter="url(#shadow)"/>
  <text x="480" y="258" text-anchor="middle" class="comp">Coordinator</text>
  <rect x="368" y="312" width="224" height="44" rx="8" fill="#6366f1" filter="url(#shadow)"/>
  <text x="480" y="338" text-anchor="middle" class="comp">LLM Call</text>
  <rect x="368" y="392" width="224" height="44" rx="8" fill="#10b981" filter="url(#shadow)"/>
  <text x="480" y="418" text-anchor="middle" class="comp">Response Parse</text>
  <rect x="368" y="472" width="224" height="44" rx="8" fill="#f59e0b" filter="url(#shadow)"/>
  <text x="480" y="498" text-anchor="middle" class="comp">PreToolUse Hook</text>
  <rect x="368" y="552" width="224" height="44" rx="8" fill="#f59e0b" filter="url(#shadow)"/>
  <text x="480" y="578" text-anchor="middle" class="comp">Permission Check</text>
  <rect x="368" y="632" width="224" height="44" rx="8" fill="#ef4444" filter="url(#shadow)"/>
