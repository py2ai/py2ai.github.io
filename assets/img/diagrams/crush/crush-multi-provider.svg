<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600">
  <style>
    text { font-family: Inter, system-ui, -apple-system, sans-serif; }
    .mono { font-family: JetBrains Mono, Fira Code, monospace; }
    .title { font-size: 17px; font-weight: 700; fill: #1e293b; }
    .comp  { font-size: 12px; font-weight: 600; fill: #ffffff; }
    .comp-d { font-size: 12px; font-weight: 600; fill: #334155; }
    .label { font-size: 10px; fill: #64748b; }
    .anno  { font-size: 9px; fill: #94a3b8; }
    .legend { font-size: 9px; fill: #475569; }
  </style>
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ea580c"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#059669"/>
    </marker>
  </defs>
  <rect width="960" height="600" fill="#ffffff"/>
  <text x="480" y="28" text-anchor="middle" class="title">Crush — Multi-Provider Architecture</text>

  <!-- Left column -->
  <rect x="48" y="80" width="112" height="36" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="104" y="102" text-anchor="middle" class="comp-d">User</text>
  <rect x="48" y="140" width="112" height="40" rx="8" fill="#ec4899" filter="url(#shadow)"/>
  <text x="104" y="164" text-anchor="middle" class="comp">Crush TUI</text>

  <!-- Center - Fantasy Provider Abstraction hexagon -->
  <polygon points="240,160 290,136 390,136 440,160 390,184 290,184" fill="#2563eb" filter="url(#shadow)"/>
  <text x="340" y="156" text-anchor="middle" class="comp">Fantasy Provider</text>
  <text x="340" y="170" text-anchor="middle" class="comp">Abstraction</text>

  <!-- Right - LLM Providers dashed box -->
  <rect x="524" y="208" width="376" height="192" rx="8" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="8 4"/>
  <text x="536" y="224" class="anno" fill="#64748b">LLM Providers</text>

  <!-- Row 1 -->
  <rect x="536" y="232" width="112" height="32" rx="6" fill="#8b5cf6" filter="url(#shadow)"/>
  <text x="592" y="252" text-anchor="middle" class="comp">Anthropic</text>
  <rect x="656" y="232" width="112" height="32" rx="6" fill="#10b981" filter="url(#shadow)"/>
  <text x="712" y="252" text-anchor="middle" class="comp">Bedrock</text>
  <rect x="776" y="232" width="112" height="32" rx="6" fill="#0891b2" filter="url(#shadow)"/>
  <text x="832" y="252" text-anchor="middle" class="comp">Vertex</text>

  <!-- Row 2 -->
  <rect x="536" y="272" width="112" height="32" rx="6" fill="#059669" filter="url(#shadow)"/>
  <text x="592" y="292" text-anchor="middle" class="comp">OpenAI</text>
  <rect x="656" y="272" width="112" height="32" rx="6" fill="#f59e0b" filter="url(#shadow)"/>
  <text x="712" y="292" text-anchor="middle" class="comp">DeepSeek</text>
  <rect x="776" y="272" width="112" height="32" rx="6" fill="#ef4444" filter="url(#shadow)"/>
  <text x="832" y="292" text-anchor="middle" class="comp">Groq</text>

  <!-- Row 3 -->
  <rect x="536" y="312" width="112" height="32" rx="6" fill="#ec4899" filter="url(#shadow)"/>
  <text x="592" y="332" text-anchor="middle" class="comp">Cerebras</text>
  <rect x="656" y="312" width="112" height="32" rx="6" fill="#f97316" filter="url(#shadow)"/>
  <text x="712" y="332" text-anchor="middle" class="comp">Ollama</text>
  <rect x="776" y="312" width="112" height="32" rx="6" fill="#6366f1" filter="url(#shadow)"/>
  <text x="832" y="332" text-anchor="middle" class="comp">Gemini</text>

  <!-- Row 4 -->
  <rect x="536" y="352" width="112" height="32" rx="6" fill="#94a3b8" filter="url(#shadow)"/>
  <text x="592" y="372" text-anchor="middle" class="comp">OpenRouter</text>
  <rect x="656" y="352" width="112" height="32" rx="6" fill="#64748b" filter="url(#shadow)"/>
  <text x="712" y="372" text-anchor="middle" class="comp">Vercel</text>
  <rect x="776" y="352" width="112" height="32" rx="6" fill="#475569" filter="url(#shadow)"/>
  <text x="832" y="372" text-anchor="middle" class="comp">HuggingFace</text>

  <!-- Bottom center - Catwalk -->
  <rect x="248" y="440" width="112" height="32" rx="6" fill="#6366f1" filter="url(#shadow)"/>
  <text x="304" y="460" text-anchor="middle" class="comp">Catwalk</text>

  <!-- Arrows -->
  <!-- 1. User → Crush TUI -->
  <path d="M104,116 L104,140" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <!-- 2. Crush TUI → Hexagon -->
  <path d="M160,160 L240,160" fill="none" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <!-- 3. Hexagon → Bus line connection -->
  <path d="M440,160 L480,160 L480,248" fill="none" stroke="#ea580c" stroke-width="1.5"/>
  <!-- 4. Bus line vertical -->
  <line x1="480" y1="248" x2="480" y2="368" stroke="#ea580c" stroke-width="1.5"/>
  <!-- 5. Row 1 arrows from bus line -->
  <path d="M480,248 L536,248" fill="none" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <path d="M480,248 L656,248" fill="none" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <path d="M480,248 L776,248" fill="none" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <!-- 6. Row 2 arrows from bus line -->
  <path d="M480,288 L536,288" fill="none" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <path d="M480,288 L656,288" fill="none" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <path d="M480,288 L776,288" fill="none" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <!-- 7. Row 3 arrows from bus line -->
  <path d="M480,328 L536,328" fill="none" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <path d="M480,328 L656,328" fill="none" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <path d="M480,328 L776,328" fill="none" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <!-- 8. Row 4 arrows from bus line -->
  <path d="M480,368 L536,368" fill="none" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <path d="M480,368 L656,368" fill="none" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <path d="M480,368 L776,368" fill="none" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <!-- 9. Hexagon → Catwalk -->
  <path d="M340,184 L340,400 L304,400 L304,440" fill="none" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Legend -->
  <rect x="48" y="520" width="140" height="70" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="118" y="532" text-anchor="middle" class="legend" font-weight="600">Legend</text>
  <line x1="56" y1="544" x2="80" y2="544" stroke="#2563eb" stroke-width="1.5"/>
  <text x="88" y="548" class="legend">Data Flow</text>
  <line x1="56" y1="562" x2="80" y2="562" stroke="#ea580c" stroke-width="1.5"/>
  <text x="88" y="566" class="legend">Control</text>
  <line x1="56" y1="580" x2="80" y2="580" stroke="#059669" stroke-width="1.5"/>
  <text x="88" y="584" class="legend">Memory Read</text>
</svg>