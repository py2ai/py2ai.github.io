<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" width="860" height="400" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="400" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">Matrix Multiplication + Dimensions</text>
<rect x="140" y="80" width="200" height="50" rx="8" fill="#1e40af"/>
<text x="240" y="110" text-anchor="middle" class="node-title-w">A: (m x n)</text>
<rect x="340" y="80" width="200" height="50" rx="8" fill="#2563eb"/>
<text x="440" y="110" text-anchor="middle" class="node-title-w">B: (n x p)</text>
<line x1="340" y1="105" x2="340" y2="105" stroke="#475569" stroke-width="0" marker-end="url(#arrow)"/>
<text x="340" y="140" text-anchor="middle" class="item-sub">inner dims must match</text>
<line x1="540" y1="105" x2="580" y2="105" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="580" y="80" width="200" height="50" rx="8" fill="#1e40af"/>
<text x="680" y="110" text-anchor="middle" class="node-title-w">C: (m x p)</text>
<rect x="40" y="170" width="800" height="100" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="196" text-anchor="middle" class="band-label">Matrix multiplication = composition of linear maps</text>
<text x="430" y="222" text-anchor="middle" class="item">C[i,j] = sum(A[i,k] * B[k,j]) for k in 1..n</text>
<text x="430" y="244" text-anchor="middle" class="item-sub">applying B then A = A @ B (note order matters!)</text>
<text x="430" y="262" text-anchor="middle" class="item-sub">AB != BA in general (non-commutative)</text>
<rect x="40" y="290" width="800" height="90" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<rect x="60" y="306" width="170" height="56" rx="8" fill="#2563eb"/>
<text x="145" y="330" text-anchor="middle" class="node-title-w">Identity</text>
<text x="145" y="350" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">I: A @ I = A</text>
<rect x="250" y="306" width="170" height="56" rx="8" fill="#1e40af"/>
<text x="335" y="330" text-anchor="middle" class="node-title-w">Transpose</text>
<text x="335" y="350" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">A^T: swap rows/cols</text>
<rect x="440" y="306" width="170" height="56" rx="8" fill="#2563eb"/>
<text x="525" y="330" text-anchor="middle" class="node-title-w">Inverse</text>
<text x="525" y="350" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">A^-1: A @ A^-1 = I</text>
<rect x="630" y="306" width="170" height="56" rx="8" fill="#1e40af"/>
<text x="715" y="330" text-anchor="middle" class="node-title-w">Determinant</text>
<text x="715" y="350" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">det(A): volume scaling</text>
</svg>
