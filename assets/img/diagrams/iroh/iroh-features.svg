<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <!-- Arrow markers -->
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981" />
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#8b5cf6" />
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f8fafc" />

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e293b">Iroh Key Features</text>

  <!-- Central Hub -->
  <circle cx="400" cy="100" r="50" fill="#3b82f6" />
  <text x="400" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Iroh</text>

  <!-- Feature 1: Dial-by-Public-Key -->
  <rect x="50" y="180" width="280" height="140" rx="8" fill="#3b82f6" />
  <text x="190" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">1. Dial-by-Public-Key</text>
  <text x="190" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• Connect using cryptographic identities</text>
  <text x="190" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• No IP address configuration</text>
  <text x="190" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• Strong authentication</text>
  <text x="190" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• Firewall-friendly</text>

  <!-- Feature 2: Automatic Hole Punching -->
  <rect x="370" y="180" width="280" height="140" rx="8" fill="#10b981" />
  <text x="510" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">2. Automatic Hole Punching</text>
  <text x="510" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• Traverses NAT devices</text>
  <text x="510" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• Handles symmetric NATs</text>
  <text x="510" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• Works through firewalls</text>
  <text x="510" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• Robust implementation</text>

  <!-- Feature 3: Relay Fallback -->
  <rect x="690" y="180" width="70" height="140" rx="8" fill="#8b5cf6" />
  <text x="725" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">3.</text>
  <text x="725" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Relay</text>
  <text x="725" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Fallback</text>
  <text x="725" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• Public relay servers</text>
  <text x="725" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• Global deployment</text>

  <!-- Feature 4: Connection Optimization -->
  <rect x="50" y="350" width="280" height="140" rx="8" fill="#f59e0b" />
  <text x="190" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">4. Connection Optimization</text>
  <text x="190" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• Continuous monitoring</text>
  <text x="190" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• Latency measurement</text>
  <text x="190" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• Automatic switching</text>
  <text x="190" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• Connection pooling</text>

  <!-- Feature 5: Protocol Composition -->
  <rect x="370" y="350" width="280" height="140" rx="8" fill="#ec4899" />
  <text x="510" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">5. Protocol Composition</text>
  <text x="510" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• iroh-blobs (transfer)</text>
  <text x="510" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• iroh-gossip (publish-subscribe)</text>
  <text x="510" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• iroh-docs (key-value store)</text>
  <text x="510" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• ALPN-based routing</text>

  <!-- Feature 6: Rust Ecosystem -->
  <rect x="690" y="350" width="70" height="140" rx="8" fill="#06b6d4" />
  <text x="725" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">6.</text>
  <text x="725" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Rust</text>
  <text x="725" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Ecosystem</text>
  <text x="725" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• Async/await</text>
  <text x="725" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• Tokio runtime</text>

  <!-- Arrows from hub to features -->
  <line x1="400" y1="150" x2="190" y2="180" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" />
  <line x1="400" y1="150" x2="510" y2="180" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)" />
  <line x1="400" y1="150" x2="725" y2="180" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow-purple)" />
  <line x1="400" y1="150" x2="190" y2="350" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-orange)" />
  <line x1="400" y1="150" x2="510" y2="350" stroke="#ec4899" stroke-width="2" marker-end="url(#arrow-blue)" />
  <line x1="400" y1="150" x2="725" y2="350" stroke="#06b6d4" stroke-width="2" marker-end="url(#arrow-green)" />

  <!-- Bottom summary -->
  <rect x="50" y="520" width="700" height="60" rx="8" fill="#e2e8f0" />
  <text x="400" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">Simplifies networking by abstracting away IP addresses, NAT traversal, and connection management</text>
  <text x="400" y="565" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Provides reliable, secure, and performant connections with minimal code</text>
</svg>
