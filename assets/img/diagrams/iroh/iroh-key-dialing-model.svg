<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <!-- Arrow markers -->
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981" />
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#8b5cf6" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#f8fafc" />

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e293b">Dial-by-Public-Key Model</text>

  <!-- Traditional Networking -->
  <rect x="50" y="70" width="320" height="380" rx="8" fill="#ef4444" />
  <text x="210" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Traditional Networking</text>
  <text x="210" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">IP Address + Port</text>

  <!-- Endpoint A -->
  <rect x="80" y="150" width="260" height="50" rx="4" fill="#dc2626" />
  <text x="210" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">Endpoint A</text>
  <text x="210" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">192.168.1.100:8080</text>

  <!-- Endpoint B -->
  <rect x="80" y="220" width="260" height="50" rx="4" fill="#dc2626" />
  <text x="210" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">Endpoint B</text>
  <text x="210" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">192.168.1.101:8080</text>

  <!-- NAT/Firewall -->
  <rect x="80" y="290" width="260" height="40" rx="4" fill="#b91c1c" />
  <text x="210" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">NAT / Firewall</text>

  <!-- Problems -->
  <rect x="80" y="340" width="260" height="100" rx="4" fill="#991b1b" />
  <text x="210" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• IP addresses change</text>
  <text x="210" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• NAT traversal required</text>
  <text x="210" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• Firewall configuration</text>
  <text x="210" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• Security vulnerabilities</text>

  <!-- Iroh Networking -->
  <rect x="430" y="70" width="320" height="380" rx="8" fill="#10b981" />
  <text x="590" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Iroh Networking</text>
  <text x="590" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Dial-by-Public-Key</text>

  <!-- Endpoint A with Public Key -->
  <rect x="460" y="150" width="260" height="50" rx="4" fill="#059669" />
  <text x="590" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">Endpoint A</text>
  <text x="590" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Public Key: 0x7f3a...</text>

  <!-- Endpoint B with Public Key -->
  <rect x="460" y="220" width="260" height="50" rx="4" fill="#059669" />
  <text x="590" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">Endpoint B</text>
  <text x="590" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Public Key: 0x8b2c...</text>

  <!-- Iroh Core -->
  <rect x="460" y="290" width="260" height="40" rx="4" fill="#047857" />
  <text x="590" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Iroh Core (Hole Punching + Relay)</text>

  <!-- Benefits -->
  <rect x="460" y="340" width="260" height="100" rx="4" fill="#065f46" />
  <text x="590" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• No IP configuration needed</text>
  <text x="590" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• Automatic NAT traversal</text>
  <text x="590" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• Firewall-friendly</text>
  <text x="590" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• Strong authentication</text>

  <!-- Connection arrows -->
  <line x1="340" y1="175" x2="460" y2="175" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" />
  <line x1="340" y1="245" x2="460" y2="245" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" />

  <!-- Comparison arrows -->
  <line x1="210" y1="400" x2="590" y2="400" stroke="#64748b" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow-green)" />
  <text x="400" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Iroh simplifies networking</text>

  <!-- API Example -->
  <rect x="50" y="470" width="700" height="20" rx="4" fill="#e2e8f0" />
  <text x="400" y="485" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">API: endpoint.connect(remote_key, ALPN)</text>
</svg>
