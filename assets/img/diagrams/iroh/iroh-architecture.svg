<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981" />
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#8b5cf6" />
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f8fafc" />

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e293b">Iroh Architecture</text>

  <!-- Application Layer -->
  <rect x="50" y="80" width="700" height="60" rx="8" fill="#3b82f6" />
  <text x="400" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Application Layer</text>

  <!-- Protocol Layer -->
  <rect x="50" y="170" width="700" height="60" rx="8" fill="#8b5cf6" />
  <text x="400" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Protocol Layer</text>

  <!-- Connection Layer -->
  <rect x="50" y="260" width="700" height="60" rx="8" fill="#10b981" />
  <text x="400" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Connection Layer</text>

  <!-- Transport Layer -->
  <rect x="50" y="350" width="700" height="60" rx="8" fill="#f59e0b" />
  <text x="400" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Transport Layer (QUIC)</text>

  <!-- Core Components -->
  <rect x="50" y="440" width="320" height="120" rx="8" fill="#64748b" />
  <text x="210" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Core Components</text>
  <text x="210" y="495" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">• iroh (core library)</text>
  <text x="210" y="515" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">• iroh-relay (relay server)</text>
  <text x="210" y="535" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">• iroh-base (common types)</text>

  <!-- Protocol Crates -->
  <rect x="400" y="440" width="350" height="120" rx="8" fill="#64748b" />
  <text x="575" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Protocol Crates</text>
  <text x="575" y="495" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">• iroh-blobs (content-addressed transfer)</text>
  <text x="575" y="515" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">• iroh-gossip (publish-subscribe)</text>
  <text x="575" y="535" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">• iroh-docs (key-value store)</text>

  <!-- External Services -->
  <rect x="50" y="580" width="700" height="20" rx="4" fill="#94a3b8" />
  <text x="400" y="595" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">External Services: dns.iroh.link, perf.iroh.computer</text>

  <!-- Arrows showing flow -->
  <line x1="400" y1="140" x2="400" y2="170" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="400" y1="230" x2="400" y2="260" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="400" y1="320" x2="400" y2="350" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="400" y1="410" x2="400" y2="440" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Cross-layer arrows -->
  <line x1="210" y1="560" x2="575" y2="560" stroke="#64748b" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)" />
  <text x="392" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Protocol Composition</text>
</svg>
