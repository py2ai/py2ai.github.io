<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <!-- Arrow markers -->
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981" />
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#8b5cf6" />
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f8fafc" />

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e293b">Iroh Technology Stack & Ecosystem</text>

  <!-- Core Crates -->
  <rect x="50" y="70" width="320" height="180" rx="8" fill="#3b82f6" />
  <text x="210" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Core Crates</text>
  <text x="210" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">• iroh</text>
  <text x="210" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">  - Core library</text>
  <text x="210" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">  - Endpoint management</text>
  <text x="210" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">  - Connection handling</text>
  <text x="210" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">• iroh-relay</text>
  <text x="210" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">  - Relay server/client</text>
  <text x="210" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">  - Access control modes</text>

  <!-- Protocol Crates -->
  <rect x="430" y="70" width="320" height="180" rx="8" fill="#10b981" />
  <text x="590" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Protocol Crates</text>
  <text x="590" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">• iroh-blobs</text>
  <text x="590" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">  - BLAKE3 hashing</text>
  <text x="590" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">  - Content-addressed transfer</text>
  <text x="590" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">  - Scales to terabytes</text>
  <text x="590" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">• iroh-gossip</text>
  <text x="590" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">  - Publish-subscribe</text>
  <text x="590" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">  - Scales to thousands</text>
  <text x="590" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">  - Efficient algorithms</text>

  <!-- Infrastructure -->
  <rect x="50" y="280" width="320" height="180" rx="8" fill="#8b5cf6" />
  <text x="210" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Infrastructure</text>
  <text x="210" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">• iroh-dns-server</text>
  <text x="210" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">  - DNS-over-HTTPS/TCP</text>
  <text x="210" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">  - Pkarr relay</text>
  <text x="210" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">  - Endpoint ID resolution</text>
  <text x="210" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">• iroh-docs</text>
  <text x="210" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">  - Documentation site</text>
  <text x="210" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">  - User guides</text>
  <text x="210" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">  - API reference</text>

  <!-- Dependencies -->
  <rect x="430" y="280" width="320" height="180" rx="8" fill="#f59e0b" />
  <text x="590" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Dependencies</text>
  <text x="590" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">• QUIC Protocol</text>
  <text x="590" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">  - https://en.wikipedia.org/wiki/QUIC</text>
  <text x="590" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">• BLAKE3</text>
  <text x="590" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">  - https://github.com/BLAKE3-team/BLAKE3</text>
  <text x="590" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">• noq</text>
  <text x="590" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">  - Rust QUIC implementation</text>
  <text x="590" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">• Tokio</text>
  <text x="590" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">  - Async runtime</text>

  <!-- External Services -->
  <rect x="50" y="480" width="320" height="100" rx="8" fill="#06b6d4" />
  <text x="210" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">External Services</text>
  <text x="210" y="535" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• dns.iroh.link</text>
  <text x="210" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• perf.iroh.computer</text>

  <!-- FFI -->
  <rect x="430" y="480" width="320" height="100" rx="8" fill="#ec4899" />
  <text x="590" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">FFI Bindings</text>
  <text x="590" y="535" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• iroh-ffi</text>
  <text x="590" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">  - Python, JavaScript, C bindings</text>

  <!-- Arrows showing relationships -->
  <line x1="210" y1="250" x2="210" y2="280" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" />
  <line x1="590" y1="250" x2="590" y2="280" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)" />
  <line x1="210" y1="450" x2="210" y2="480" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow-purple)" />
  <line x1="590" y1="450" x2="590" y2="480" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-orange)" />
  <line x1="210" y1="580" x2="590" y2="580" stroke="#64748b" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow-blue)" />
  <text x="400" y="575" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Composable ecosystem</text>

  <!-- Bottom note -->
  <rect x="50" y="590" width="700" height="10" rx="4" fill="#e2e8f0" />
</svg>
