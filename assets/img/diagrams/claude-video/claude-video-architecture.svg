<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ea580c"/>
    </marker>
    <style>
      .box { fill:#ffffff; stroke:#334155; stroke-width:1.5; }
      .proc { fill:#eff6ff; stroke:#2563eb; stroke-width:1.5; rx:10; ry:10; }
      .ext { fill:#fff7ed; stroke:#ea580c; stroke-width:1.5; rx:10; ry:10; }
      .ai { fill:#f0fdf4; stroke:#16a34a; stroke-width:1.5; rx:10; ry:10; }
      .title { font-size:20px; font-weight:700; fill:#0f172a; }
      .sub { font-size:12px; fill:#475569; }
      .lbl { font-size:13px; font-weight:600; fill:#0f172a; }
      .flow { stroke:#2563eb; stroke-width:2; fill:none; }
      .ok { stroke:#16a34a; stroke-width:2; fill:none; }
      .proc-line { stroke:#ea580c; stroke-width:2; fill:none; }
    </style>
  </defs>

  <rect width="1100" height="620" fill="#ffffff"/>

  <text x="550" y="34" text-anchor="middle" class="title">Claude Video — System Architecture</text>
  <text x="550" y="54" text-anchor="middle" class="sub">Give Claude Code the ability to watch and understand any video</text>

  <!-- User / Claude Code -->
  <rect x="40" y="100" width="180" height="90" class="box" rx="10" ry="10"/>
  <text x="130" y="135" text-anchor="middle" class="lbl">Claude Code</text>
  <text x="130" y="155" text-anchor="middle" class="sub">/watch command</text>
  <text x="130" y="173" text-anchor="middle" class="sub">Agent host</text>

  <!-- SKILL.md orchestrator -->
  <rect x="290" y="100" width="200" height="90" class="proc"/>
  <text x="390" y="135" text-anchor="middle" class="lbl">SKILL.md + watch.py</text>
  <text x="390" y="155" text-anchor="middle" class="sub">Orchestrator</text>
  <text x="390" y="173" text-anchor="middle" class="sub">setup.py preflight</text>

  <!-- Download -->
  <rect x="560" y="100" width="200" height="90" class="ext"/>
  <text x="660" y="135" text-anchor="middle" class="lbl">download.py</text>
  <text x="660" y="155" text-anchor="middle" class="sub">yt-dlp wrapper</text>
  <text x="660" y="173" text-anchor="middle" class="sub">URL or local path</text>

  <!-- Frames -->
  <rect x="830" y="100" width="200" height="90" class="ext"/>
  <text x="930" y="135" text-anchor="middle" class="lbl">frames.py</text>
  <text x="930" y="155" text-anchor="middle" class="sub">ffmpeg extraction</text>
  <text x="930" y="173" text-anchor="middle" class="sub">scene / keyframe / dedup</text>

  <!-- Transcribe -->
  <rect x="560" y="250" width="200" height="90" class="ext"/>
  <text x="660" y="285" text-anchor="middle" class="lbl">transcribe.py</text>
  <text x="660" y="305" text-anchor="middle" class="sub">VTT captions parse</text>
  <text x="660" y="323" text-anchor="middle" class="sub">+ dedupe</text>

  <!-- Whisper -->
  <rect x="830" y="250" width="200" height="90" class="ext"/>
  <text x="930" y="285" text-anchor="middle" class="lbl">whisper.py</text>
  <text x="930" y="305" text-anchor="middle" class="sub">Groq whisper-large-v3</text>
  <text x="930" y="323" text-anchor="middle" class="sub">OpenAI whisper-1 fallback</text>

  <!-- Context assembly -->
  <rect x="290" y="250" width="200" height="90" class="proc"/>
  <text x="390" y="285" text-anchor="middle" class="lbl">Context Assembly</text>
  <text x="390" y="305" text-anchor="middle" class="sub">JPEG frames (t=MM:SS)</text>
  <text x="390" y="323" text-anchor="middle" class="sub">+ timestamped transcript</text>

  <!-- Claude Read -->
  <rect x="40" y="250" width="180" height="90" class="ai"/>
  <text x="130" y="285" text-anchor="middle" class="lbl">Claude Read</text>
  <text x="130" y="305" text-anchor="middle" class="sub">parallel image reads</text>
  <text x="130" y="323" text-anchor="middle" class="sub">multimodal context</text>

  <!-- Response -->
  <rect x="290" y="400" width="200" height="90" class="ai"/>
  <text x="390" y="435" text-anchor="middle" class="lbl">Claude Answers</text>
  <text x="390" y="455" text-anchor="middle" class="sub">grounded in frames</text>
  <text x="390" y="473" text-anchor="middle" class="sub">+ transcript + timestamps</text>

  <!-- Cleanup -->
  <rect x="560" y="400" width="200" height="90" class="box" rx="10" ry="10"/>
  <text x="660" y="435" text-anchor="middle" class="lbl">Cleanup</text>
  <text x="660" y="455" text-anchor="middle" class="sub">rm -rf work dir</text>
  <text x="660" y="473" text-anchor="middle" class="sub">(if no follow-ups)</text>

  <!-- Arrows: top row -->
  <line x1="220" y1="145" x2="285" y2="145" class="flow" marker-end="url(#arrowBlue)"/>
  <line x1="490" y1="145" x2="555" y2="145" class="flow" marker-end="url(#arrowBlue)"/>
  <line x1="760" y1="145" x2="825" y2="145" class="flow" marker-end="url(#arrowBlue)"/>

  <!-- download -> transcribe -->
  <line x1="660" y1="190" x2="660" y2="245" class="proc-line" marker-end="url(#arrowOrange)"/>
  <!-- frames -> context -->
  <line x1="830" y1="160" x2="495" y2="270" class="proc-line" marker-end="url(#arrowOrange)"/>
  <!-- transcribe -> whisper (fallback) -->
  <line x1="760" y1="295" x2="825" y2="295" class="proc-line" marker-end="url(#arrowOrange)"/>
  <!-- whisper -> context -->
  <line x1="830" y1="310" x2="495" y2="310" class="proc-line" marker-end="url(#arrowOrange)"/>
  <!-- transcribe -> context -->
  <line x1="555" y1="295" x2="495" y2="295" class="flow" marker-end="url(#arrowBlue)"/>
  <!-- context -> Claude Read -->
  <line x1="285" y1="295" x2="225" y2="295" class="flow" marker-end="url(#arrowBlue)"/>
  <!-- Claude Read -> Response -->
  <line x1="130" y1="340" x2="130" y2="380" class="ok"/>
  <line x1="130" y1="380" x2="390" y2="380" class="ok"/>
  <line x1="390" y1="380" x2="390" y2="395" class="ok" marker-end="url(#arrowGreen)"/>
  <!-- Response -> Cleanup -->
  <line x1="490" y1="445" x2="555" y2="445" class="ok" marker-end="url(#arrowGreen)"/>

  <!-- Legend -->
  <g transform="translate(40,540)">
    <text x="0" y="0" class="sub" font-weight="700">Legend:</text>
    <line x1="70" y1="-4" x2="110" y2="-4" class="flow" marker-end="url(#arrowBlue)"/>
    <text x="118" y="0" class="sub">data flow</text>
    <line x1="200" y1="-4" x2="240" y2="-4" class="proc-line" marker-end="url(#arrowOrange)"/>
    <text x="248" y="0" class="sub">processing</text>
    <line x1="330" y1="-4" x2="370" y2="-4" class="ok" marker-end="url(#arrowGreen)"/>
    <text x="378" y="0" class="sub">success / output</text>
  </g>
</svg>