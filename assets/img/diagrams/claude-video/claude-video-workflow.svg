<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ea580c"/>
    </marker>
    <style>
      .step { fill:#eff6ff; stroke:#2563eb; stroke-width:1.5; rx:12; ry:12; }
      .dec { fill:#fefce8; stroke:#ca8a04; stroke-width:1.5; }
      .out { fill:#f0fdf4; stroke:#16a34a; stroke-width:1.5; rx:12; ry:12; }
      .title { font-size:20px; font-weight:700; fill:#0f172a; }
      .sub { font-size:12px; fill:#475569; }
      .lbl { font-size:13px; font-weight:600; fill:#0f172a; }
      .flow { stroke:#2563eb; stroke-width:2; fill:none; }
      .ok { stroke:#16a34a; stroke-width:2; fill:none; }
      .proc-line { stroke:#ea580c; stroke-width:2; fill:none; }
      .yn { font-size:11px; font-weight:700; fill:#475569; }
    </style>
  </defs>

  <rect width="1100" height="720" fill="#ffffff"/>

  <text x="550" y="34" text-anchor="middle" class="title">Claude Video — The /watch Workflow</text>
  <text x="550" y="54" text-anchor="middle" class="sub">From a URL or local path to grounded video understanding</text>

  <!-- Step 1 -->
  <rect x="430" y="80" width="240" height="60" class="step"/>
  <text x="550" y="105" text-anchor="middle" class="lbl">1. URL or local path + question</text>
  <text x="550" y="125" text-anchor="middle" class="sub">/watch <source> [question]</text>

  <!-- Step 2 -->
  <rect x="430" y="170" width="240" height="60" class="step"/>
  <text x="550" y="195" text-anchor="middle" class="lbl">2. Setup preflight (setup.py)</text>
  <text x="550" y="215" text-anchor="middle" class="sub">ffmpeg / yt-dlp / Whisper key check</text>

  <!-- Decision: captions available? -->
  <polygon points="550,260 690,320 550,380 410,320" class="dec"/>
  <text x="550" y="316" text-anchor="middle" class="lbl">Native captions</text>
  <text x="550" y="334" text-anchor="middle" class="lbl">available?</text>

  <!-- Yes branch: captions -->
  <rect x="120" y="290" width="220" height="60" class="out"/>
  <text x="230" y="315" text-anchor="middle" class="lbl">3a. Pull captions (free)</text>
  <text x="230" y="335" text-anchor="middle" class="sub">yt-dlp VTT, no download</text>

  <!-- No branch: download + whisper -->
  <rect x="760" y="290" width="220" height="60" class="step"/>
  <text x="870" y="315" text-anchor="middle" class="lbl">3b. Download video</text>
  <text x="870" y="335" text-anchor="middle" class="sub">yt-dlp (only what's needed)</text>

  <rect x="760" y="380" width="220" height="60" class="step"/>
  <text x="870" y="405" text-anchor="middle" class="lbl">4. Extract audio + frames</text>
  <text x="870" y="425" text-anchor="middle" class="sub">ffmpeg: mono 16kHz mp3 + JPEGs</text>

  <rect x="760" y="470" width="220" height="60" class="step"/>
  <text x="870" y="495" text-anchor="middle" class="lbl">5. Whisper transcription</text>
  <text x="870" y="515" text-anchor="middle" class="sub">Groq / OpenAI fallback</text>

  <!-- Step 6: frame extraction (also from captions path) -->
  <rect x="430" y="470" width="240" height="60" class="step"/>
  <text x="550" y="495" text-anchor="middle" class="lbl">6. Frame extraction + dedup</text>
  <text x="550" y="515" text-anchor="middle" class="sub">scene / keyframe / uniform + delta</text>

  <!-- Step 7: context assembly -->
  <rect x="430" y="560" width="240" height="60" class="step"/>
  <text x="550" y="585" text-anchor="middle" class="lbl">7. Context assembly</text>
  <text x="550" y="605" text-anchor="middle" class="sub">frames (t=MM:SS) + transcript</text>

  <!-- Step 8: Claude reads + answers -->
  <rect x="430" y="650" width="240" height="50" class="out"/>
  <text x="550" y="680" text-anchor="middle" class="lbl">8. Claude Reads frames → answers</text>

  <!-- Arrows -->
  <line x1="550" y1="140" x2="550" y2="165" class="flow" marker-end="url(#arrowBlue)"/>
  <line x1="550" y1="230" x2="550" y2="258" class="flow" marker-end="url(#arrowBlue)"/>

  <!-- decision branches -->
  <line x1="410" y1="320" x2="345" y2="320" class="ok" marker-end="url(#arrowGreen)"/>
  <text x="375" y="312" text-anchor="middle" class="yn">yes</text>
  <line x1="690" y1="320" x2="755" y2="320" class="proc-line" marker-end="url(#arrowOrange)"/>
  <text x="720" y="312" text-anchor="middle" class="yn">no</text>

  <!-- captions -> frame extraction -->
  <line x1="230" y1="350" x2="230" y2="500" class="ok"/>
  <line x1="230" y1="500" x2="425" y2="500" class="ok" marker-end="url(#arrowGreen)"/>

  <!-- download -> extract -> whisper -->
  <line x1="870" y1="350" x2="870" y2="375" class="proc-line" marker-end="url(#arrowOrange)"/>
  <line x1="870" y1="440" x2="870" y2="465" class="proc-line" marker-end="url(#arrowOrange)"/>
  <!-- whisper -> context -->
  <line x1="870" y1="530" x2="870" y2="590" class="proc-line"/>
  <line x1="870" y1="590" x2="675" y2="590" class="proc-line" marker-end="url(#arrowOrange)"/>

  <!-- frame extraction -> context -->
  <line x1="550" y1="530" x2="550" y2="555" class="flow" marker-end="url(#arrowBlue)"/>
  <!-- context -> answer -->
  <line x1="550" y1="620" x2="550" y2="645" class="ok" marker-end="url(#arrowGreen)"/>

  <!-- Legend -->
  <g transform="translate(40,690)">
    <text x="0" y="0" class="sub" font-weight="700">Legend:</text>
    <line x1="70" y1="-4" x2="110" y2="-4" class="flow" marker-end="url(#arrowBlue)"/>
    <text x="118" y="0" class="sub">data flow</text>
    <line x1="200" y1="-4" x2="240" y2="-4" class="proc-line" marker-end="url(#arrowOrange)"/>
    <text x="248" y="0" class="sub">processing</text>
    <line x1="330" y1="-4" x2="370" y2="-4" class="ok" marker-end="url(#arrowGreen)"/>
    <text x="378" y="0" class="sub">success / output</text>
  </g>
</svg>