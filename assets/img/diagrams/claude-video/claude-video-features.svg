<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 640" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <style>
      .card { fill:#ffffff; stroke:#334155; stroke-width:1.5; rx:12; ry:12; }
      .icon { font-size:26px; font-weight:700; }
      .title { font-size:20px; font-weight:700; fill:#0f172a; }
      .sub { font-size:12px; fill:#475569; }
      .lbl { font-size:14px; font-weight:700; fill:#0f172a; }
      .desc { font-size:11px; fill:#475569; }
      .accent1 { fill:#eff6ff; stroke:#2563eb; }
      .accent2 { fill:#fff7ed; stroke:#ea580c; }
      .accent3 { fill:#f0fdf4; stroke:#16a34a; }
      .accent4 { fill:#faf5ff; stroke:#9333ea; }
      .accent5 { fill:#fefce8; stroke:#ca8a04; }
      .accent6 { fill:#ecfeff; stroke:#0891b2; }
    </style>
  </defs>

  <rect width="1100" height="640" fill="#ffffff"/>

  <text x="550" y="34" text-anchor="middle" class="title">Claude Video — Key Features</text>
  <text x="550" y="54" text-anchor="middle" class="sub">Six capabilities that give Claude true video understanding</text>

  <!-- Card 1: Video Download -->
  <rect x="40" y="90" width="320" height="160" class="card accent1"/>
  <text x="60" y="125" class="icon">⬇</text>
  <text x="100" y="125" class="lbl">Video Download</text>
  <text x="60" y="150" class="desc">yt-dlp integration supports YouTube, Vimeo,</text>
  <text x="60" y="166" class="desc">TikTok, X, Loom, Twitch and 100s more sites.</text>
  <text x="60" y="186" class="desc">Local files (.mp4, .mov, .mkv, .webm) too.</text>
  <text x="60" y="206" class="desc">Downloads only what the run needs —</text>
  <text x="60" y="222" class="desc">captions-only mode skips the video entirely.</text>

  <!-- Card 2: Frame Extraction -->
  <rect x="390" y="90" width="320" height="160" class="card accent2"/>
  <text x="410" y="125" class="icon">🖼</text>
  <text x="450" y="125" class="lbl">Frame Extraction</text>
  <text x="410" y="150" class="desc">ffmpeg extracts scene-aware, keyframe, or</text>
  <text x="410" y="166" class="desc">uniform-sampled JPEGs at 512px wide.</text>
  <text x="410" y="186" class="desc">Auto-fps budgets frames by duration; cap</text>
  <text x="410" y="202" class="desc">at 2 fps. Delta-dedup drops near-duplicate</text>
  <text x="410" y="218" class="desc">frames so tokens go to distinct content.</text>

  <!-- Card 3: Audio Transcription -->
  <rect x="740" y="90" width="320" height="160" class="card accent3"/>
  <text x="760" y="125" class="icon">🎙</text>
  <text x="800" y="125" class="lbl">Audio Transcription</text>
  <text x="760" y="150" class="desc">Native captions pulled free via yt-dlp first.</text>
  <text x="760" y="166" class="desc">Whisper fallback: Groq whisper-large-v3</text>
  <text x="760" y="186" class="desc">(preferred) or OpenAI whisper-1. Mono 16kHz</text>
  <text x="760" y="202" class="desc">64kbps audio (~480 kB/min), chunked for</text>
  <text x="760" y="218" class="desc">long videos. Timestamped, deduped output.</text>

  <!-- Card 4: Claude Integration -->
  <rect x="40" y="280" width="320" height="160" class="card accent4"/>
  <text x="60" y="315" class="icon">🤖</text>
  <text x="100" y="315" class="lbl">Claude Integration</text>
  <text x="60" y="340" class="desc">Frames + transcript handed to Claude, which</text>
  <text x="60" y="356" class="desc">Reads each JPEG as an image in parallel.</text>
  <text x="60" y="376" class="desc">Answers grounded in what's on screen and</text>
  <text x="60" y="392" class="desc">in the audio — not "based on the title."</text>
  <text x="60" y="412" class="desc">Works as a Claude Code plugin, Codex,</text>
  <text x="60" y="428" class="desc">Cursor, Copilot, Gemini CLI, +50 hosts.</text>

  <!-- Card 5: Multi-format Support -->
  <rect x="390" y="280" width="320" height="160" class="card accent5"/>
  <text x="410" y="315" class="icon">🎬</text>
  <text x="450" y="315" class="lbl">Multi-format Support</text>
  <text x="410" y="340" class="desc">Anything yt-dlp supports: YouTube, Vimeo,</text>
  <text x="410" y="356" class="desc">TikTok, X, Instagram, Twitch, Loom, and</text>
  <text x="410" y="376" class="desc">hundreds more. Local containers: MP4,</text>
  <text x="410" y="392" class="desc">MOV, MKV, WebM. Detail modes scale</text>
  <text x="410" y="412" class="desc">from transcript-only to uncapped scene</text>
  <text x="410" y="428" class="desc">frames (token-burner) for max fidelity.</text>

  <!-- Card 6: Timestamp Referencing -->
  <rect x="740" y="280" width="320" height="160" class="card accent6"/>
  <text x="760" y="315" class="icon">⏱</text>
  <text x="800" y="315" class="lbl">Timestamp Referencing</text>
  <text x="760" y="340" class="desc">Every frame carries a t=MM:SS marker</text>
  <text x="760" y="356" class="desc">aligned to the transcript. --start/--end</text>
  <text x="760" y="376" class="desc">focuses on a section with denser budgets.</text>
  <text x="760" y="392" class="desc">--timestamps T1,T2 grabs frames at exact</text>
  <text x="760" y="412" class="desc">moments the presenter flags ("look here"),</text>
  <text x="760" y="428" class="desc">so deictic cues are never missed.</text>

  <!-- Bottom strip: detail modes -->
  <rect x="40" y="470" width="1020" height="130" class="card" fill="#f8fafc" stroke="#334155"/>
  <text x="60" y="500" class="lbl">Detail modes — the fidelity / speed dial</text>
  <g font-size="12px" fill="#475569">
    <text x="60" y="525">transcript</text>
    <text x="60" y="543" font-size="11px">no frames, captions only — cheapest</text>
    <text x="290" y="525">efficient</text>
    <text x="290" y="543" font-size="11px">fast keyframes, cap 50 — ~0.5s</text>
    <text x="520" y="525">balanced (default)</text>
    <text x="520" y="543" font-size="11px">scene-aware, cap 100</text>
    <text x="780" y="525">token-burner</text>
    <text x="780" y="543" font-size="11px">scene-aware, uncapped — max fidelity</text>
  </g>
  <text x="60" y="575" class="sub">Universal 2 fps cap · frame budget scales inversely with duration · best accuracy under 10 minutes</text>
</svg>