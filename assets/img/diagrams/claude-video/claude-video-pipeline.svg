<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ea580c"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
    <style>
      .stage { fill:#eff6ff; stroke:#2563eb; stroke-width:1.5; rx:10; ry:10; }
      .tool { fill:#fff7ed; stroke:#ea580c; stroke-width:1.5; rx:10; ry:10; }
      .out { fill:#f0fdf4; stroke:#16a34a; stroke-width:1.5; rx:10; ry:10; }
      .title { font-size:20px; font-weight:700; fill:#0f172a; }
      .sub { font-size:12px; fill:#475569; }
      .lbl { font-size:13px; font-weight:600; fill:#0f172a; }
      .flow { stroke:#2563eb; stroke-width:2; fill:none; }
      .proc-line { stroke:#ea580c; stroke-width:2; fill:none; }
      .ok { stroke:#16a34a; stroke-width:2; fill:none; }
    </style>
  </defs>

  <rect width="1100" height="620" fill="#ffffff"/>

  <text x="550" y="34" text-anchor="middle" class="title">Claude Video — Processing Pipeline</text>
  <text x="550" y="54" text-anchor="middle" class="sub">Video URL → download → frames → transcription → context → Claude analysis → output</text>

  <!-- Stage 1: Input -->
  <rect x="30" y="90" width="150" height="80" class="stage"/>
  <text x="105" y="120" text-anchor="middle" class="lbl">Video URL</text>
  <text x="105" y="140" text-anchor="middle" class="sub">or local path</text>
  <text x="105" y="158" text-anchor="middle" class="sub">+ question</text>

  <!-- Stage 2: yt-dlp -->
  <rect x="210" y="90" width="170" height="80" class="tool"/>
  <text x="295" y="118" text-anchor="middle" class="lbl">yt-dlp Download</text>
  <text x="295" y="138" text-anchor="middle" class="sub">captions-first check</text>
  <text x="295" y="156" text-anchor="middle" class="sub">video only if needed</text>

  <!-- Stage 3: ffmpeg frames (top branch) -->
  <rect x="410" y="40" width="180" height="80" class="tool"/>
  <text x="500" y="68" text-anchor="middle" class="lbl">ffmpeg Frames</text>
  <text x="500" y="88" text-anchor="middle" class="sub">scene / keyframe / uniform</text>
  <text x="500" y="106" text-anchor="middle" class="sub">512px JPEGs, dedup</text>

  <!-- Stage 3b: ffmpeg audio (bottom branch) -->
  <rect x="410" y="140" width="180" height="80" class="tool"/>
  <text x="500" y="168" text-anchor="middle" class="lbl">ffmpeg Audio</text>
  <text x="500" y="188" text-anchor="middle" class="sub">mono 16kHz 64kbps</text>
  <text x="500" y="206" text-anchor="middle" class="sub">~480 kB/min mp3</text>

  <!-- Stage 4: Whisper -->
  <rect x="620" y="140" width="170" height="80" class="tool"/>
  <text x="705" y="168" text-anchor="middle" class="lbl">Whisper API</text>
  <text x="705" y="188" text-anchor="middle" class="sub">Groq large-v3 / OpenAI</text>
  <text x="705" y="206" text-anchor="middle" class="sub">chunked for long audio</text>

  <!-- Stage 5: Context assembly -->
  <rect x="620" y="40" width="170" height="80" class="stage"/>
  <text x="705" y="68" text-anchor="middle" class="lbl">Context Assembly</text>
  <text x="705" y="88" text-anchor="middle" class="sub">frames (t=MM:SS)</text>
  <text x="705" y="106" text-anchor="middle" class="sub">+ timestamped transcript</text>

  <!-- Stage 6: Claude analysis -->
  <rect x="820" y="90" width="170" height="80" class="out"/>
  <text x="905" y="118" text-anchor="middle" class="lbl">Claude Analysis</text>
  <text x="905" y="138" text-anchor="middle" class="sub">parallel Read of frames</text>
  <text x="905" y="156" text-anchor="middle" class="sub">multimodal reasoning</text>

  <!-- Stage 7: Output -->
  <rect x="820" y="220" width="170" height="80" class="out"/>
  <text x="905" y="248" text-anchor="middle" class="lbl">Output</text>
  <text x="905" y="268" text-anchor="middle" class="sub">summary / answer</text>
  <text x="905" y="286" text-anchor="middle" class="sub">with timestamp citations</text>

  <!-- Cleanup -->
  <rect x="620" y="320" width="170" height="60" class="stage"/>
  <text x="705" y="345" text-anchor="middle" class="lbl">Cleanup</text>
  <text x="705" y="365" text-anchor="middle" class="sub">rm -rf work dir</text>

  <!-- Arrows main flow -->
  <line x1="180" y1="130" x2="205" y2="130" class="flow" marker-end="url(#arrowBlue)"/>
  <line x1="380" y1="120" x2="405" y2="80" class="proc-line" marker-end="url(#arrowOrange)"/>
  <line x1="380" y1="140" x2="405" y2="180" class="proc-line" marker-end="url(#arrowOrange)"/>

  <!-- frames -> context -->
  <line x1="590" y1="80" x2="615" y2="80" class="flow" marker-end="url(#arrowBlue)"/>
  <!-- audio -> whisper -->
  <line x1="590" y1="180" x2="615" y2="180" class="proc-line" marker-end="url(#arrowOrange)"/>
  <!-- whisper -> context -->
  <line x1="705" y1="220" x2="705" y2="125" class="proc-line" marker-end="url(#arrowOrange)"/>

  <!-- context -> claude -->
  <line x1="790" y1="80" x2="815" y2="120" class="flow" marker-end="url(#arrowBlue)"/>
  <!-- claude -> output -->
  <line x1="905" y1="170" x2="905" y2="215" class="ok" marker-end="url(#arrowGreen)"/>
  <!-- output -> cleanup -->
  <line x1="820" y1="260" x2="795" y2="320" class="ok" marker-end="url(#arrowGreen)"/>

  <!-- Parallel processing note -->
  <rect x="410" y="240" width="380" height="60" class="stage" fill="#fefce8" stroke="#ca8a04"/>
  <text x="600" y="265" text-anchor="middle" class="lbl">Parallel processing</text>
  <text x="600" y="285" text-anchor="middle" class="sub">frame extraction + audio extraction run concurrently; Claude Reads all frames in one message</text>

  <!-- Legend -->
  <g transform="translate(30,420)">
    <text x="0" y="0" class="sub" font-weight="700">Legend:</text>
    <line x1="70" y1="-4" x2="110" y2="-4" class="flow" marker-end="url(#arrowBlue)"/>
    <text x="118" y="0" class="sub">data flow</text>
    <line x1="200" y1="-4" x2="240" y2="-4" class="proc-line" marker-end="url(#arrowOrange)"/>
    <text x="248" y="0" class="sub">processing</text>
    <line x1="330" y1="-4" x2="370" y2="-4" class="ok" marker-end="url(#arrowGreen)"/>
    <text x="378" y="0" class="sub">success / output</text>
  </g>

  <!-- Stage labels -->
  <text x="105" y="200" text-anchor="middle" class="sub" font-weight="700">1. Input</text>
  <text x="295" y="200" text-anchor="middle" class="sub" font-weight="700">2. Download</text>
  <text x="500" y="240" text-anchor="middle" class="sub" font-weight="700">3. Extract (parallel)</text>
  <text x="705" y="240" text-anchor="middle" class="sub" font-weight="700" opacity="0">.</text>
  <text x="705" y="410" text-anchor="middle" class="sub" font-weight="700">5. Transcribe</text>
  <text x="905" y="200" text-anchor="middle" class="sub" font-weight="700">6. Analyze</text>
  <text x="905" y="320" text-anchor="middle" class="sub" font-weight="700">7. Output</text>
</svg>