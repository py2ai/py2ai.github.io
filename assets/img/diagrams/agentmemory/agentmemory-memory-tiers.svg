<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="auto" viewBox="0 0 960 620">
  <defs>
    <marker id="arr" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="workGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="episGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <linearGradient id="semGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="procGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <filter id="sh" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="620" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">agentmemory — 4-Tier Memory Consolidation</text>
  <text x="480" y="58" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Inspired by how human brains process memory during sleep</text>

  <!-- Tier 1: Working Memory -->
  <g filter="url(#sh)">
    <rect x="30" y="80" width="900" height="110" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <rect x="30" y="80" width="8" height="110" rx="4" fill="url(#workGrad)"/>
    <text x="60" y="108" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#fbbf24">Working Memory</text>
    <text x="260" y="108" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">— "Short-term memory" — Raw observations from tool use</text>

    <rect x="60" y="120" width="160" height="55" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
    <text x="140" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#fbbf24">PostToolUse</text>
    <text x="140" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">File reads, writes, commands</text>

    <rect x="240" y="120" width="160" height="55" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
    <text x="320" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#fbbf24">UserPromptSubmit</text>
    <text x="320" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">User intent & context</text>

    <rect x="420" y="120" width="160" height="55" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
    <text x="500" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#fbbf24">PreToolUse</text>
    <text x="500" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">File access patterns</text>

    <rect x="600" y="120" width="160" height="55" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
    <text x="680" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#fbbf24">Error Context</text>
    <text x="680" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">PostToolUseFailure</text>

    <rect x="780" y="120" width="130" height="55" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
    <text x="845" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#fbbf24">SHA-256</text>
    <text x="845" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">5-min dedup window</text>
  </g>

  <!-- Arrow down -->
  <line x1="480" y1="190" x2="480" y2="210" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="510" y="205" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">LLM compress</text>

  <!-- Tier 2: Episodic Memory -->
  <g filter="url(#sh)">
    <rect x="30" y="215" width="900" height="110" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <rect x="30" y="215" width="8" height="110" rx="4" fill="url(#episGrad)"/>
    <text x="60" y="243" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#60a5fa">Episodic Memory</text>
    <text x="280" y="243" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">— "What happened" — Compressed session summaries</text>

    <rect x="60" y="258" width="200" height="55" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
    <text x="160" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#60a5fa">Session Summaries</text>
    <text x="160" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">Stop/SessionEnd hook fires</text>

    <rect x="280" y="258" width="200" height="55" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
    <text x="380" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#60a5fa">Structured Facts</text>
    <text x="380" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">Concepts + narrative extraction</text>

    <rect x="500" y="258" width="200" height="55" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
    <text x="600" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#60a5fa">Privacy Filtered</text>
    <text x="600" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">API keys & secrets stripped</text>

    <rect x="720" y="258" width="190" height="55" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
    <text x="815" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#60a5fa">Citation Provenance</text>
    <text x="815" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">Trace back to source observations</text>
  </g>

  <!-- Arrow down -->
  <line x1="480" y1="325" x2="480" y2="345" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="510" y="340" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">extract patterns</text>

  <!-- Tier 3: Semantic Memory -->
  <g filter="url(#sh)">
    <rect x="30" y="350" width="900" height="110" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="30" y="350" width="8" height="110" rx="4" fill="url(#semGrad)"/>
    <text x="60" y="378" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#a78bfa">Semantic Memory</text>
    <text x="280" y="378" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">— "What I know" — Extracted facts and patterns</text>

    <rect x="60" y="393" width="170" height="55" rx="6" fill="#0f172a" stroke="#8b5cf6" stroke-width="1"/>
    <text x="145" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#a78bfa">BM25 Index</text>
    <text x="145" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">Stemmed keyword matching</text>

    <rect x="250" y="393" width="170" height="55" rx="6" fill="#0f172a" stroke="#8b5cf6" stroke-width="1"/>
    <text x="335" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#a78bfa">Vector Store</text>
    <text x="335" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">Cosine similarity search</text>

    <rect x="440" y="393" width="170" height="55" rx="6" fill="#0f172a" stroke="#8b5cf6" stroke-width="1"/>
    <text x="525" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#a78bfa">Knowledge Graph</text>
    <text x="525" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">Entity extraction + BFS</text>

    <rect x="630" y="393" width="170" height="55" rx="6" fill="#0f172a" stroke="#8b5cf6" stroke-width="1"/>
    <text x="715" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#a78bfa">Decay & Strengthen</text>
    <text x="715" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">Ebbinghaus curve forgetting</text>

    <rect x="820" y="393" width="90" height="55" rx="6" fill="#0f172a" stroke="#8b5cf6" stroke-width="1"/>
    <text x="865" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#a78bfa">SQLite</text>
    <text x="865" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">Zero deps</text>
  </g>

  <!-- Arrow down -->
  <line x1="480" y1="460" x2="480" y2="480" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="510" y="475" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">crystallize habits</text>

  <!-- Tier 4: Procedural Memory -->
  <g filter="url(#sh)">
    <rect x="30" y="485" width="900" height="110" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <rect x="30" y="485" width="8" height="110" rx="4" fill="url(#procGrad)"/>
    <text x="60" y="513" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#34d399">Procedural Memory</text>
    <text x="290" y="513" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">— "How to do it" — Workflows and decision patterns</text>

    <rect x="60" y="528" width="160" height="55" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="1"/>
    <text x="140" y="550" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#34d399">Routines</text>
    <text x="140" y="570" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">Workflow templates</text>

    <rect x="240" y="528" width="160" height="55" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="1"/>
    <text x="320" y="550" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#34d399">Actions</text>
    <text x="320" y="570" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">Work items + dependencies</text>

    <rect x="420" y="528" width="160" height="55" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="1"/>
    <text x="500" y="550" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#34d399">Leases</text>
    <text x="500" y="570" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">Multi-agent coordination</text>

    <rect x="600" y="528" width="160" height="55" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="1"/>
    <text x="680" y="550" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#34d399">Signals</text>
    <text x="680" y="570" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">Inter-agent messaging</text>

    <rect x="780" y="528" width="130" height="55" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="1"/>
    <text x="845" y="550" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#34d399">Sentinels</text>
    <text x="845" y="570" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">Event-driven watchers</text>
  </g>
</svg>