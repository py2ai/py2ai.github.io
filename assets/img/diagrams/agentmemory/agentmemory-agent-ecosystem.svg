<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="auto" viewBox="0 0 960 680">
  <defs>
    <marker id="arr2" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <filter id="sh2" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="680" rx="12" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">agentmemory — Multi-Agent Ecosystem</text>
  <text x="480" y="58" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">One memory server, shared across all your coding agents</text>

  <!-- Central Hub -->
  <g filter="url(#sh2)">
    <rect x="340" y="260" width="280" height="160" rx="16" fill="url(#coreGrad)" stroke="#a78bfa" stroke-width="2"/>
    <text x="480" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#fff">agentmemory</text>
    <text x="480" y="322" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ddd6fe">Memory Server + MCP</text>
    <line x1="370" y1="335" x2="590" y2="335" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="480" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#c4b5fd">51 MCP Tools</text>
    <text x="480" y="372" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#c4b5fd">12 Auto Hooks</text>
    <text x="480" y="389" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#c4b5fd">4 Skills (/recall /remember /session-history /forget)</text>
    <text x="480" y="408" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#c4b5fd">REST API :3111 · Viewer :3113</text>
  </g>

  <!-- Agent cards - Row 1 (top) -->
  <!-- Claude Code -->
  <g filter="url(#sh2)">
    <rect x="30" y="80" width="130" height="70" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="95" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#fbbf24">Claude Code</text>
    <text x="95" y="126" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">12 hooks + MCP + skills</text>
    <text x="95" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">Plugin marketplace</text>
  </g>

  <!-- Codex CLI -->
  <g filter="url(#sh2)">
    <rect x="180" y="80" width="130" height="70" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
    <text x="245" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#34d399">Codex CLI</text>
    <text x="245" y="126" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">6 hooks + MCP + skills</text>
    <text x="245" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">Plugin marketplace</text>
  </g>

  <!-- Cursor -->
  <g filter="url(#sh2)">
    <rect x="330" y="80" width="130" height="70" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="395" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#60a5fa">Cursor</text>
    <text x="395" y="126" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">MCP server</text>
    <text x="395" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">~/.cursor/mcp.json</text>
  </g>

  <!-- Gemini CLI -->
  <g filter="url(#sh2)">
    <rect x="480" y="80" width="130" height="70" rx="8" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="545" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#22d3ee">Gemini CLI</text>
    <text x="545" y="126" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">MCP server</text>
    <text x="545" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">gemini mcp add</text>
  </g>

  <!-- OpenClaw -->
  <g filter="url(#sh2)">
    <rect x="630" y="80" width="130" height="70" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
    <text x="695" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#f87171">OpenClaw</text>
    <text x="695" y="126" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">MCP + plugin</text>
    <text x="695" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">Memory slot integration</text>
  </g>

  <!-- Hermes -->
  <g filter="url(#sh2)">
    <rect x="780" y="80" width="130" height="70" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="1.5"/>
    <text x="845" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#fb923c">Hermes</text>
    <text x="845" y="126" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">MCP + plugin</text>
    <text x="845" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">6-hook provider</text>
  </g>

  <!-- Agent cards - Row 2 (bottom) -->
  <!-- Cline -->
  <g filter="url(#sh2)">
    <rect x="30" y="470" width="130" height="70" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
    <text x="95" y="498" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#c084fc">Cline</text>
    <text x="95" y="516" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">MCP server</text>
    <text x="95" y="530" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">Settings UI config</text>
  </g>

  <!-- Windsurf -->
  <g filter="url(#sh2)">
    <rect x="180" y="470" width="130" height="70" rx="8" fill="#1e293b" stroke="#14b8a6" stroke-width="1.5"/>
    <text x="245" y="498" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#2dd4bf">Windsurf</text>
    <text x="245" y="516" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">MCP server</text>
    <text x="245" y="530" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">mcp_config.json</text>
  </g>

  <!-- Roo Code -->
  <g filter="url(#sh2)">
    <rect x="330" y="470" width="130" height="70" rx="8" fill="#1e293b" stroke="#ec4899" stroke-width="1.5"/>
    <text x="395" y="498" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#f472b6">Roo Code</text>
    <text x="395" y="516" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">MCP server</text>
    <text x="395" y="530" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">Settings UI config</text>
  </g>

  <!-- Claude Desktop -->
  <g filter="url(#sh2)">
    <rect x="480" y="470" width="130" height="70" rx="8" fill="#1e293b" stroke="#d97706" stroke-width="1.5"/>
    <text x="545" y="498" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#fbbf24">Claude Desktop</text>
    <text x="545" y="516" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">MCP server</text>
    <text x="545" y="530" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">claude_desktop_config.json</text>
  </g>

  <!-- Aider -->
  <g filter="url(#sh2)">
    <rect x="630" y="470" width="130" height="70" rx="8" fill="#1e293b" stroke="#84cc16" stroke-width="1.5"/>
    <text x="695" y="498" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#a3e635">Aider</text>
    <text x="695" y="516" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">REST API</text>
    <text x="695" y="530" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">curl :3111 endpoints</text>
  </g>

  <!-- Any Agent -->
  <g filter="url(#sh2)">
    <rect x="780" y="470" width="130" height="70" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="845" y="498" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#94a3b8">Any Agent</text>
    <text x="845" y="516" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">REST API / MCP</text>
    <text x="845" y="530" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">104 endpoints</text>
  </g>

  <!-- Connection lines from agents to hub -->
  <!-- Top row connections -->
  <line x1="95" y1="150" x2="380" y2="260" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  <line x1="245" y1="150" x2="420" y2="260" stroke="#10b981" stroke-width="1.5" opacity="0.6"/>
  <line x1="395" y1="150" x2="460" y2="260" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  <line x1="545" y1="150" x2="510" y2="260" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
  <line x1="695" y1="150" x2="560" y2="260" stroke="#ef4444" stroke-width="1.5" opacity="0.6"/>
  <line x1="845" y1="150" x2="600" y2="260" stroke="#f97316" stroke-width="1.5" opacity="0.6"/>

  <!-- Bottom row connections -->
  <line x1="95" y1="470" x2="380" y2="420" stroke="#a855f7" stroke-width="1.5" opacity="0.6"/>
  <line x1="245" y1="470" x2="420" y2="420" stroke="#14b8a6" stroke-width="1.5" opacity="0.6"/>
  <line x1="395" y1="470" x2="460" y2="420" stroke="#ec4899" stroke-width="1.5" opacity="0.6"/>
  <line x1="545" y1="470" x2="510" y2="420" stroke="#d97706" stroke-width="1.5" opacity="0.6"/>
  <line x1="695" y1="470" x2="560" y2="420" stroke="#84cc16" stroke-width="1.5" opacity="0.6"/>
  <line x1="845" y1="470" x2="600" y2="420" stroke="#64748b" stroke-width="1.5" opacity="0.6" stroke-dasharray="4,2"/>

  <!-- Protocol labels -->
  <rect x="310" y="220" width="80" height="22" rx="11" fill="#7c3aed"/>
  <text x="350" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#fff">Hooks</text>

  <rect x="440" y="220" width="80" height="22" rx="11" fill="#2563eb"/>
  <text x="480" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#fff">MCP</text>

  <rect x="570" y="220" width="80" height="22" rx="11" fill="#059669"/>
  <text x="610" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#fff">REST</text>

  <!-- Bottom info bar -->
  <rect x="30" y="570" width="900" height="90" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="480" y="595" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e2e8f0">How It Works: One Command Setup</text>

  <g>
    <rect x="60" y="610" width="260" height="38" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
    <text x="190" y="628" text-anchor="middle" font-family="monospace" font-size="11" fill="#60a5fa">npx @agentmemory/agentmemory</text>
    <text x="190" y="643" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Start memory server</text>
  </g>
  <g>
    <rect x="350" y="610" width="260" height="38" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="1"/>
    <text x="480" y="628" text-anchor="middle" font-family="monospace" font-size="11" fill="#34d399">mcpServers: { agentmemory: ... }</text>
    <text x="480" y="643" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Add to any agent config</text>
  </g>
  <g>
    <rect x="640" y="610" width="260" height="38" rx="6" fill="#0f172a" stroke="#8b5cf6" stroke-width="1"/>
    <text x="770" y="628" text-anchor="middle" font-family="monospace" font-size="11" fill="#a78bfa">curl localhost:3111/health</text>
    <text x="770" y="643" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Verify it's running</text>
  </g>
</svg>