<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" width="860" height="440" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
  .axis { stroke: #475569; stroke-width: 1; }
  .axlabel { font-size: 11px; fill: #475569; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="440" fill="#ffffff"/>
<text x="330" y="38" text-anchor="middle" class="title">Algorithm Families</text>
<rect x="40" y="68" width="185" height="110" rx="8" fill="#2563eb"/>
<text x="132.5" y="92" text-anchor="middle" class="node-title-w">Sorting</text>
<text x="132.5" y="112" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">quicksort O(n log n)</text>
<text x="132.5" y="127" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">mergesort O(n log n)</text>
<text x="132.5" y="142" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">heapsort, counting sort</text>
<text x="132.5" y="164" text-anchor="middle" font-size="10" fill="#e0e7ff" font-family="inherit">~O(n log n)</text>
<rect x="237" y="68" width="185" height="110" rx="8" fill="#1e40af"/>
<text x="329.5" y="92" text-anchor="middle" class="node-title-w">Searching</text>
<text x="329.5" y="112" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">binary search O(log n)</text>
<text x="329.5" y="127" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">BFS / DFS O(V+E)</text>
<text x="329.5" y="142" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">two pointers O(n)</text>
<text x="329.5" y="164" text-anchor="middle" font-size="10" fill="#e0e7ff" font-family="inherit">~O(log n) / O(V+E)</text>
<rect x="434" y="68" width="185" height="110" rx="8" fill="#2563eb"/>
<text x="526.5" y="92" text-anchor="middle" class="node-title-w">Graph</text>
<text x="526.5" y="112" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">Dijkstra, A*, topo sort</text>
<text x="526.5" y="127" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">union-find, MST (Kruskal/Prim)</text>
<text x="526.5" y="164" text-anchor="middle" font-size="10" fill="#e0e7ff" font-family="inherit">~O(E log V)</text>
<rect x="631" y="68" width="185" height="110" rx="8" fill="#1e40af"/>
<text x="723.5" y="92" text-anchor="middle" class="node-title-w">Dynamic Prog</text>
<text x="723.5" y="112" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">memoization + tabulation</text>
<text x="723.5" y="127" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">knapsack, LCS, edit dist</text>
<text x="723.5" y="142" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">overlapping subproblems</text>
<text x="723.5" y="164" text-anchor="middle" font-size="10" fill="#e0e7ff" font-family="inherit">~O(n*m) typ.</text>
<rect x="40" y="192" width="185" height="110" rx="8" fill="#1e40af"/>
<text x="132.5" y="216" text-anchor="middle" class="node-title-w">Greedy</text>
<text x="132.5" y="236" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">local optimum each step</text>
<text x="132.5" y="251" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">activity selection, Huffman</text>
<text x="132.5" y="266" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">works if optimal substructure</text>
<text x="132.5" y="288" text-anchor="middle" font-size="10" fill="#e0e7ff" font-family="inherit">~varies</text>
<rect x="237" y="192" width="185" height="110" rx="8" fill="#2563eb"/>
<text x="329.5" y="216" text-anchor="middle" class="node-title-w">Divide &amp; Conquer</text>
<text x="329.5" y="236" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">split, solve, combine</text>
<text x="329.5" y="251" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">quicksort, mergesort</text>
<text x="329.5" y="266" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">binary search</text>
<text x="329.5" y="288" text-anchor="middle" font-size="10" fill="#e0e7ff" font-family="inherit">~O(n log n)</text>
<rect x="434" y="192" width="185" height="110" rx="8" fill="#1e40af"/>
<text x="526.5" y="216" text-anchor="middle" class="node-title-w">Backtracking</text>
<text x="526.5" y="236" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">explore + undo</text>
<text x="526.5" y="251" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">N-queens, permutations</text>
<text x="526.5" y="266" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">with pruning</text>
<text x="526.5" y="288" text-anchor="middle" font-size="10" fill="#e0e7ff" font-family="inherit">~O(b^d) worst</text>
</svg>
