<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 470" width="860" height="470" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
  .axis { stroke: #475569; stroke-width: 1; }
  .axlabel { font-size: 11px; fill: #475569; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="470" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">Data Structures + Access Costs</text>
<rect x="40" y="70" width="780" height="46" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="76" width="200" height="34" rx="8" fill="#2563eb"/>
<text x="154" y="98" text-anchor="middle" class="node-title-w">Array</text>
<rect x="274" y="76" width="260" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="404" y="98" text-anchor="middle" class="item">O(1) access</text>
<rect x="548" y="76" width="260" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="678" y="98" text-anchor="middle" class="item">O(n) insert/delete</text>
<rect x="40" y="124" width="780" height="46" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="130" width="200" height="34" rx="8" fill="#1e40af"/>
<text x="154" y="152" text-anchor="middle" class="node-title-w">Linked list</text>
<rect x="274" y="130" width="260" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="404" y="152" text-anchor="middle" class="item">O(n) access</text>
<rect x="548" y="130" width="260" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="678" y="152" text-anchor="middle" class="item">O(1) insert (given node)</text>
<rect x="40" y="178" width="780" height="46" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="184" width="200" height="34" rx="8" fill="#2563eb"/>
<text x="154" y="206" text-anchor="middle" class="node-title-w">Hash map</text>
<rect x="274" y="184" width="260" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="404" y="206" text-anchor="middle" class="item">O(1) avg lookup</text>
<rect x="548" y="184" width="260" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="678" y="206" text-anchor="middle" class="item">O(1) avg insert</text>
<rect x="40" y="232" width="780" height="46" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="238" width="200" height="34" rx="8" fill="#1e40af"/>
<text x="154" y="260" text-anchor="middle" class="node-title-w">Binary search tree</text>
<rect x="274" y="238" width="260" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="404" y="260" text-anchor="middle" class="item">O(log n) balanced</text>
<rect x="548" y="238" width="260" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="678" y="260" text-anchor="middle" class="item">O(log n) insert</text>
<rect x="40" y="286" width="780" height="46" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="292" width="200" height="34" rx="8" fill="#2563eb"/>
<text x="154" y="314" text-anchor="middle" class="node-title-w">Heap</text>
<rect x="274" y="292" width="260" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="404" y="314" text-anchor="middle" class="item">O(1) peek min/max</text>
<rect x="548" y="292" width="260" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="678" y="314" text-anchor="middle" class="item">O(log n) push/pop</text>
<rect x="40" y="340" width="780" height="46" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="346" width="200" height="34" rx="8" fill="#1e40af"/>
<text x="154" y="368" text-anchor="middle" class="node-title-w">Queue / Stack</text>
<rect x="274" y="346" width="260" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="404" y="368" text-anchor="middle" class="item">O(1) enqueue/push</text>
<rect x="548" y="346" width="260" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="678" y="368" text-anchor="middle" class="item">O(1) dequeue/pop</text>
<rect x="40" y="394" width="780" height="46" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="400" width="200" height="34" rx="8" fill="#2563eb"/>
<text x="154" y="422" text-anchor="middle" class="node-title-w">Trie</text>
<rect x="274" y="400" width="260" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="404" y="422" text-anchor="middle" class="item">O(L) word lookup</text>
<rect x="548" y="400" width="260" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="678" y="422" text-anchor="middle" class="item">O(L) insert (L=word len)</text>
<text x="154" y="64" text-anchor="middle" class="band-label">Structure</text>
<text x="404" y="64" text-anchor="middle" class="band-label">Access / lookup</text>
<text x="678" y="64" text-anchor="middle" class="band-label">Insert / delete</text>
</svg>
