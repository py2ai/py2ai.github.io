<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" width="860" height="420" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
  .axis { stroke: #475569; stroke-width: 1; }
  .axlabel { font-size: 11px; fill: #475569; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="420" fill="#ffffff"/>
<text x="310" y="38" text-anchor="middle" class="title">Big-O Complexity Growth</text>
<line x1="70" y1="360" x2="70" y2="70" class="axis"/>
<line x1="70" y1="360" x2="810" y2="360" class="axis"/>
<text x="62" y="72" text-anchor="end" class="axlabel">operations</text>
<text x="50" y="364" text-anchor="end" class="axlabel">O</text>
<text x="815" y="378" text-anchor="start" class="axlabel">input size n</text>
<path d="M 70,300 L 810,300" fill="none" stroke="#16a34a" stroke-width="2.5"/>
<text x="804" y="294" text-anchor="end" font-size="12" font-weight="700" fill="#16a34a">O(1)</text>
<path d="M 70,330 L 250,300 L 450,280 L 810,250" fill="none" stroke="#2563eb" stroke-width="2.5"/>
<text x="804" y="244" text-anchor="end" font-size="12" font-weight="700" fill="#2563eb">O(log n)</text>
<path d="M 70,340 L 810,150" fill="none" stroke="#2563eb" stroke-width="2.5"/>
<text x="804" y="144" text-anchor="end" font-size="12" font-weight="700" fill="#2563eb">O(n)</text>
<path d="M 70,345 L 300,300 L 550,230 L 810,170" fill="none" stroke="#1e40af" stroke-width="2.5"/>
<text x="804" y="164" text-anchor="end" font-size="12" font-weight="700" fill="#1e40af">O(n log n)</text>
<path d="M 70,350 L 300,330 L 550,240 L 810,110" fill="none" stroke="#9333ea" stroke-width="2.5"/>
<text x="804" y="104" text-anchor="end" font-size="12" font-weight="700" fill="#9333ea">O(n^2)</text>
<path d="M 70,352 L 400,340 L 600,260 L 750,140 L 810,80" fill="none" stroke="#dc2626" stroke-width="2.5"/>
<text x="804" y="74" text-anchor="end" font-size="12" font-weight="700" fill="#dc2626">O(2^n)</text>
<path d="M 70,354 L 500,345 L 680,300 L 770,180 L 810,75" fill="none" stroke="#7c2d12" stroke-width="2.5"/>
<text x="804" y="69" text-anchor="end" font-size="12" font-weight="700" fill="#7c2d12">O(n!)</text>
<rect x="40" y="388" width="780" height="26" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="430" y="406" text-anchor="middle" class="note">Faster (green) to slower (red): pick the lowest complexity that fits the constraint.</text>
</svg>
