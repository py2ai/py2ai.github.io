<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="dp-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="dp-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#16a34a"/>
    </marker>
    <marker id="dp-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#ea580c"/>
    </marker>
  </defs>

  <rect width="960" height="640" fill="#ffffff"/>

  <text x="480" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">OfficeCLI — Document Processing Pipeline</text>
  <text x="480" y="56" text-anchor="middle" font-size="13" fill="#64748b">Input → Parse → AI Analysis → Modify → Generate Output</text>

  <!-- Input files -->
  <text x="120" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Input</text>
  <rect x="50" y="110" width="140" height="50" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="120" y="132" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">report.docx</text>
  <text x="120" y="148" text-anchor="middle" font-size="10" fill="#1e40af">Word document</text>

  <rect x="50" y="175" width="140" height="50" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="120" y="197" text-anchor="middle" font-size="12" font-weight="600" fill="#14532d">budget.xlsx</text>
  <text x="120" y="213" text-anchor="middle" font-size="10" fill="#166534">Excel spreadsheet</text>

  <rect x="50" y="240" width="140" height="50" rx="8" fill="#fef3c7" stroke="#d97706"/>
  <text x="120" y="262" text-anchor="middle" font-size="12" font-weight="600" fill="#78350f">deck.pptx</text>
  <text x="120" y="278" text-anchor="middle" font-size="10" fill="#92400e">PowerPoint deck</text>

  <rect x="50" y="305" width="140" height="50" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="120" y="327" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">template.*</text>
  <text x="120" y="343" text-anchor="middle" font-size="10" fill="#64748b">+ JSON data</text>

  <!-- Arrows to Parse -->
  <line x1="190" y1="135" x2="250" y2="220" stroke="#2563eb" stroke-width="2" marker-end="url(#dp-blue)"/>
  <line x1="190" y1="200" x2="250" y2="225" stroke="#2563eb" stroke-width="2" marker-end="url(#dp-blue)"/>
  <line x1="190" y1="265" x2="250" y2="235" stroke="#2563eb" stroke-width="2" marker-end="url(#dp-blue)"/>
  <line x1="190" y1="330" x2="250" y2="245" stroke="#2563eb" stroke-width="2" marker-end="url(#dp-blue)"/>

  <!-- Parse -->
  <rect x="250" y="180" width="170" height="100" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="335" y="208" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Parse</text>
  <text x="335" y="228" text-anchor="middle" font-size="11" fill="#1e40af">OOXML → DOM tree</text>
  <text x="335" y="246" text-anchor="middle" font-size="11" fill="#1e40af">Path-based addressing</text>
  <text x="335" y="264" text-anchor="middle" font-size="10" fill="#1d4ed8">/slide[1]/shape[2]</text>

  <line x1="420" y1="230" x2="480" y2="230" stroke="#ea580c" stroke-width="2" marker-end="url(#dp-orange)"/>

  <!-- AI Agent Analysis (diamond) -->
  <polygon points="565,150 650,230 565,310 480,230" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="565" y="222" text-anchor="middle" font-size="13" font-weight="700" fill="#4c1d95">AI Agent</text>
  <text x="565" y="240" text-anchor="middle" font-size="13" font-weight="700" fill="#4c1d95">Analysis</text>
  <text x="565" y="258" text-anchor="middle" font-size="10" fill="#6d28d9">view / get / query</text>

  <!-- Branch: read-only vs modify -->
  <line x1="565" y1="150" x2="565" y2="110" stroke="#16a34a" stroke-width="2" marker-end="url(#dp-green)"/>
  <text x="575" y="130" font-size="10" fill="#16a34a">read</text>

  <line x1="650" y1="230" x2="710" y2="230" stroke="#ea580c" stroke-width="2" marker-end="url(#dp-orange)"/>
  <text x="670" y="222" font-size="10" fill="#ea580c">modify</text>

  <!-- Read output (top) -->
  <rect x="475" y="70" width="180" height="60" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="565" y="94" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">Structured Output</text>
  <text x="565" y="112" text-anchor="middle" font-size="11" fill="#166534">JSON / text / outline</text>
  <text x="565" y="126" text-anchor="middle" font-size="10" fill="#15803d">HTML / PNG screenshot</text>

  <!-- Modify -->
  <rect x="710" y="180" width="180" height="100" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="800" y="208" text-anchor="middle" font-size="14" font-weight="700" fill="#78350f">Modify</text>
  <text x="800" y="228" text-anchor="middle" font-size="11" fill="#92400e">add / set / remove / move</text>
  <text x="800" y="246" text-anchor="middle" font-size="11" fill="#92400e">batch / merge / raw-set</text>
  <text x="800" y="264" text-anchor="middle" font-size="10" fill="#b45309">Resident mode in-memory</text>

  <!-- Validate decision -->
  <line x1="800" y1="280" x2="800" y2="320" stroke="#2563eb" stroke-width="2" marker-end="url(#dp-blue)"/>
  <polygon points="800,320 870,360 800,400 730,360" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="800" y="356" text-anchor="middle" font-size="12" font-weight="700" fill="#713f12">Validate</text>
  <text x="800" y="372" text-anchor="middle" font-size="10" fill="#854d0e">+ view issues</text>

  <!-- Pass -->
  <line x1="800" y1="400" x2="800" y2="440" stroke="#16a34a" stroke-width="2" marker-end="url(#dp-green)"/>
  <text x="810" y="425" font-size="10" fill="#16a34a">pass</text>

  <!-- Fail loop back to AI analysis -->
  <path d="M 730 360 C 600 360, 565 330, 565 310" fill="none" stroke="#ea580c" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#dp-orange)"/>
  <text x="620" y="395" font-size="10" fill="#ea580c" font-style="italic">fail → self-heal</text>

  <!-- Generate Output -->
  <rect x="690" y="440" width="220" height="80" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="800" y="468" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">Generate Output</text>
  <text x="800" y="488" text-anchor="middle" font-size="11" fill="#166534">Flush to disk · save / close</text>
  <text x="800" y="506" text-anchor="middle" font-size="10" fill="#15803d">.docx / .xlsx / .pptx delivered</text>

  <!-- Output formats -->
  <line x1="690" y1="480" x2="630" y2="480" stroke="#16a34a" stroke-width="2" marker-end="url(#dp-green)"/>

  <rect x="430" y="450" width="200" height="60" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="530" y="474" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">Delivered Artifacts</text>
  <text x="530" y="492" text-anchor="middle" font-size="10" fill="#64748b">Reports · dashboards · decks</text>
  <text x="530" y="506" text-anchor="middle" font-size="10" fill="#64748b">HTML preview · PNG screenshots</text>

  <!-- Bottom: pipeline summary -->
  <rect x="40" y="540" width="880" height="80" rx="10" fill="#0f172a"/>
  <text x="480" y="566" text-anchor="middle" font-size="13" font-weight="700" fill="#e2e8f0">Pipeline: Input File → Parse (OOXML→DOM) → AI Agent Analysis → Modify (L1/L2/L3) → Validate → Generate Output</text>
  <text x="480" y="588" text-anchor="middle" font-size="11" fill="#94a3b8">Self-healing loop: validate fails → agent reads error code + suggestion → self-corrects → retries — no human intervention</text>
  <text x="480" y="608" text-anchor="middle" font-size="11" fill="#94a3b8">Render → look → fix: built-in HTML/PNG engine lets agents SEE output and correct layout issues in CI / Docker / headless</text>
</svg>