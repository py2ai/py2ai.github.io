<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="fg-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/><stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <linearGradient id="fg-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/><stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
    <linearGradient id="fg-orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/><stop offset="100%" stop-color="#fcd34d"/>
    </linearGradient>
    <linearGradient id="fg-purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <linearGradient id="fg-pink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce7f3"/><stop offset="100%" stop-color="#f9a8d4"/>
    </linearGradient>
    <linearGradient id="fg-cyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cffafe"/><stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
  </defs>

  <rect width="960" height="620" fill="#ffffff"/>

  <text x="480" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">OfficeCLI — Key Features</text>
  <text x="480" y="58" text-anchor="middle" font-size="13" fill="#64748b">The first Office suite purpose-built for AI agents</text>

  <!-- Row 1 -->
  <!-- Word Automation -->
  <rect x="40" y="90" width="280" height="150" rx="12" fill="url(#fg-blue)" stroke="#2563eb" stroke-width="2"/>
  <text x="180" y="120" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">Word Automation</text>
  <text x="60" y="146" font-size="11" fill="#1e40af">• Paragraphs, runs, tables, styles</text>
  <text x="60" y="166" font-size="11" fill="#1e40af">• Headers / footers / TOC / bookmarks</text>
  <text x="60" y="186" font-size="11" fill="#1e40af">• Equations (LaTeX) · images · charts</text>
  <text x="60" y="206" font-size="11" fill="#1e40af">• i18n & RTL (per-script fonts)</text>
  <text x="60" y="226" font-size="11" fill="#1e40af">• Mermaid → native editable diagrams</text>

  <!-- Excel Automation -->
  <rect x="340" y="90" width="280" height="150" rx="12" fill="url(#fg-green)" stroke="#16a34a" stroke-width="2"/>
  <text x="480" y="120" text-anchor="middle" font-size="15" font-weight="700" fill="#14532d">Excel Automation</text>
  <text x="360" y="146" font-size="11" fill="#166534">• 350+ formulas auto-evaluated</text>
  <text x="360" y="166" font-size="11" fill="#166534">• Pivot tables (one command)</text>
  <text x="360" y="186" font-size="11" fill="#166534">• Charts · conditional formatting</text>
  <text x="360" y="206" font-size="11" fill="#166534">• Sort · slicers · data validation</text>
  <text x="360" y="226" font-size="11" fill="#166534">• Spilling arrays · XLOOKUP · bonds</text>

  <!-- PowerPoint Automation -->
  <rect x="640" y="90" width="280" height="150" rx="12" fill="url(#fg-orange)" stroke="#d97706" stroke-width="2"/>
  <text x="780" y="120" text-anchor="middle" font-size="15" font-weight="700" fill="#78350f">PowerPoint Automation</text>
  <text x="660" y="146" font-size="11" fill="#92400e">• Slides · shapes · text · tables</text>
  <text x="660" y="166" font-size="11" fill="#92400e">• 15+ animation presets · morph</text>
  <text x="660" y="186" font-size="11" fill="#92400e">• 3D models (.glb) · video / audio</text>
  <text x="660" y="206" font-size="11" fill="#92400e">• Themes · slide masters · connectors</text>
  <text x="660" y="226" font-size="11" fill="#92400e">• Live preview (watch mode)</text>

  <!-- Row 2 -->
  <!-- AI Agent Integration -->
  <rect x="40" y="270" width="280" height="150" rx="12" fill="url(#fg-purple)" stroke="#7c3aed" stroke-width="2"/>
  <text x="180" y="300" text-anchor="middle" font-size="15" font-weight="700" fill="#4c1d95">AI Agent Integration</text>
  <text x="60" y="326" font-size="11" fill="#5b21b6">• Built-in MCP server (JSON-RPC)</text>
  <text x="60" y="346" font-size="11" fill="#5b21b6">• Auto-detects Claude / Cursor / Copilot</text>
  <text x="60" y="366" font-size="11" fill="#5b21b6">• SKILL.md auto-installed</text>
  <text x="60" y="386" font-size="11" fill="#5b21b6">• Deterministic JSON output (--json)</text>
  <text x="60" y="406" font-size="11" fill="#5b21b6">• Self-healing error codes + suggestions</text>

  <!-- Single Binary -->
  <rect x="340" y="270" width="280" height="150" rx="12" fill="url(#fg-cyan)" stroke="#0891b2" stroke-width="2"/>
  <text x="480" y="300" text-anchor="middle" font-size="15" font-weight="700" fill="#164e63">Single Binary</text>
  <text x="360" y="326" font-size="11" fill="#0e7490">• .NET runtime embedded</text>
  <text x="360" y="346" font-size="11" fill="#0e7490">• No dependencies · no runtime</text>
  <text x="360" y="366" font-size="11" fill="#0e7490">• macOS / Linux / Windows / ARM</text>
  <text x="360" y="386" font-size="11" fill="#0e7490">• brew · npm · curl · PowerShell</text>
  <text x="360" y="406" font-size="11" fill="#0e7490">• Headless / CI / Docker ready</text>

  <!-- No Office Installation -->
  <rect x="640" y="270" width="280" height="150" rx="12" fill="url(#fg-pink)" stroke="#db2777" stroke-width="2"/>
  <text x="780" y="300" text-anchor="middle" font-size="15" font-weight="700" fill="#831843">No Office Installation</text>
  <text x="660" y="326" font-size="11" fill="#9d174d">• From-scratch OOXML engine</text>
  <text x="660" y="346" font-size="11" fill="#9d174d">• Built-in HTML/PNG rendering</text>
  <text x="660" y="366" font-size="11" fill="#9d174d">• Formula & pivot engine onboard</text>
  <text x="660" y="386" font-size="11" fill="#9d174d">• No COM interop · no license</text>
  <text x="660" y="406" font-size="11" fill="#9d174d">• Works on servers with no display</text>

  <!-- Row 3: advanced capabilities -->
  <text x="480" y="460" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Advanced Capabilities</text>

  <rect x="40" y="480" width="200" height="110" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="140" y="506" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Template Merge</text>
  <text x="140" y="528" text-anchor="middle" font-size="10" fill="#64748b">Design once, fill N times</text>
  <text x="140" y="546" text-anchor="middle" font-size="10" fill="#64748b">{{key}} → JSON data</text>
  <text x="140" y="572" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">Zero token cost at fill time</text>

  <rect x="260" y="480" width="200" height="110" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="360" y="506" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Round-trip Dump</text>
  <text x="360" y="528" text-anchor="middle" font-size="10" fill="#64748b">docx/xlsx/pptx → batch JSON</text>
  <text x="360" y="546" text-anchor="middle" font-size="10" fill="#64748b">Any subtree replayable</text>
  <text x="360" y="572" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">Learn from existing docs</text>

  <rect x="480" y="480" width="200" height="110" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="580" y="506" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Resident Mode</text>
  <text x="580" y="528" text-anchor="middle" font-size="10" fill="#64748b">In-memory named pipes</text>
  <text x="580" y="546" text-anchor="middle" font-size="10" fill="#64748b">Near-zero latency</text>
  <text x="580" y="572" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">Auto-flush on idle</text>

  <rect x="700" y="480" width="220" height="110" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="810" y="506" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Three-Layer Access</text>
  <text x="810" y="528" text-anchor="middle" font-size="10" fill="#64748b">L1 Read → L2 DOM → L3 XML</text>
  <text x="810" y="546" text-anchor="middle" font-size="10" fill="#64748b">Progressive complexity</text>
  <text x="810" y="572" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">Minimizes token usage</text>
</svg>