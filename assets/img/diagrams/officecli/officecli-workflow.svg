<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="aw-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="aw-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#16a34a"/>
    </marker>
    <marker id="aw-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#ea580c"/>
    </marker>
  </defs>

  <rect width="960" height="640" fill="#ffffff"/>

  <text x="480" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">OfficeCLI — AI Agent Document Workflow</text>
  <text x="480" y="56" text-anchor="middle" font-size="13" fill="#64748b">How AI agents interact with Word, Excel, and PowerPoint documents</text>

  <!-- Step 1: Agent Request -->
  <rect x="40" y="90" width="160" height="70" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="120" y="118" text-anchor="middle" font-size="13" font-weight="700" fill="#4c1d95">1. Agent Request</text>
  <text x="120" y="138" text-anchor="middle" font-size="11" fill="#5b21b6">Natural-language task</text>
  <text x="120" y="152" text-anchor="middle" font-size="10" fill="#6d28d9">"Create a Q4 report deck"</text>

  <line x1="200" y1="125" x2="250" y2="125" stroke="#ea580c" stroke-width="2" marker-end="url(#aw-orange)"/>

  <!-- Step 2: CLI Command -->
  <rect x="250" y="90" width="170" height="70" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="335" y="118" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">2. CLI Command</text>
  <text x="335" y="138" text-anchor="middle" font-size="11" fill="#1e40af">officecli add / set</text>
  <text x="335" y="152" text-anchor="middle" font-size="10" fill="#1d4ed8">--json --prop ...</text>

  <line x1="420" y1="125" x2="470" y2="125" stroke="#2563eb" stroke-width="2" marker-end="url(#aw-blue)"/>

  <!-- Step 3: Document Parse -->
  <rect x="470" y="90" width="170" height="70" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="555" y="118" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">3. Document Parse</text>
  <text x="555" y="138" text-anchor="middle" font-size="11" fill="#1e40af">OOXML → DOM tree</text>
  <text x="555" y="152" text-anchor="middle" font-size="10" fill="#1d4ed8">Path-based addressing</text>

  <line x1="640" y1="125" x2="690" y2="125" stroke="#2563eb" stroke-width="2" marker-end="url(#aw-blue)"/>

  <!-- Step 4: Operation -->
  <rect x="690" y="90" width="170" height="70" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="775" y="118" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">4. Operation</text>
  <text x="775" y="138" text-anchor="middle" font-size="11" fill="#92400e">read / edit / automate</text>
  <text x="775" y="152" text-anchor="middle" font-size="10" fill="#b45309">L1 → L2 → L3</text>

  <line x1="775" y1="160" x2="775" y2="210" stroke="#2563eb" stroke-width="2" marker-end="url(#aw-blue)"/>

  <!-- Step 5: Render & Verify -->
  <rect x="690" y="210" width="170" height="70" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="775" y="238" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">5. Render & Verify</text>
  <text x="775" y="258" text-anchor="middle" font-size="11" fill="#92400e">view html / screenshot</text>
  <text x="775" y="272" text-anchor="middle" font-size="10" fill="#b45309">validate / view issues</text>

  <line x1="690" y1="245" x2="640" y2="245" stroke="#2563eb" stroke-width="2" marker-end="url(#aw-blue)"/>

  <!-- Step 6: Result Return -->
  <rect x="470" y="210" width="170" height="70" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="555" y="238" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">6. Result Return</text>
  <text x="555" y="258" text-anchor="middle" font-size="11" fill="#166534">Structured JSON</text>
  <text x="555" y="272" text-anchor="middle" font-size="10" fill="#15803d">success / path / error</text>

  <line x1="470" y1="245" x2="420" y2="245" stroke="#16a34a" stroke-width="2" marker-end="url(#aw-green)"/>

  <!-- Step 7: Agent Acts -->
  <rect x="250" y="210" width="170" height="70" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="335" y="238" text-anchor="middle" font-size="13" font-weight="700" fill="#4c1d95">7. Agent Acts</text>
  <text x="335" y="258" text-anchor="middle" font-size="11" fill="#5b21b6">Self-healing loop</text>
  <text x="335" y="272" text-anchor="middle" font-size="10" fill="#6d28d9">fix → retry → deliver</text>

  <!-- Feedback loop arrow -->
  <path d="M 335 280 Q 335 300 335 300" fill="none"/>
  <path d="M 335 280 C 335 310, 120 310, 120 160" fill="none" stroke="#ea580c" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#aw-orange)"/>
  <text x="180" y="320" font-size="10" fill="#ea580c" font-style="italic">feedback loop</text>

  <!-- Document type swimlanes -->
  <text x="480" y="360" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Per-Document-Type Operations</text>

  <!-- Word lane -->
  <rect x="40" y="380" width="280" height="230" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <rect x="40" y="380" width="280" height="34" rx="10" fill="#2563eb"/>
  <text x="180" y="402" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Word (.docx)</text>
  <text x="56" y="430" font-size="11" fill="#334155">• add paragraph / run / table</text>
  <text x="56" y="450" font-size="11" fill="#334155">• set style, font, color, RTL</text>
  <text x="56" y="470" font-size="11" fill="#334155">• headers / footers / TOC</text>
  <text x="56" y="490" font-size="11" fill="#334155">• equations (LaTeX) · images</text>
  <text x="56" y="510" font-size="11" fill="#334155">• mermaid → native diagrams</text>
  <text x="56" y="530" font-size="11" fill="#334155">• merge {{key}} templates</text>
  <text x="56" y="550" font-size="11" fill="#334155">• dump → replayable batch JSON</text>
  <text x="56" y="580" font-size="10" fill="#64748b" font-style="italic">i18n · RTL · bookmarks · comments</text>

  <!-- Excel lane -->
  <rect x="340" y="380" width="280" height="230" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <rect x="340" y="380" width="280" height="34" rx="10" fill="#16a34a"/>
  <text x="480" y="402" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Excel (.xlsx)</text>
  <text x="356" y="430" font-size="11" fill="#334155">• set cell value / formula</text>
  <text x="356" y="450" font-size="11" fill="#334155">• 350+ functions auto-evaluated</text>
  <text x="356" y="470" font-size="11" fill="#334155">• pivot tables (one command)</text>
  <text x="356" y="490" font-size="11" fill="#334155">• charts · conditional formatting</text>
  <text x="356" y="510" font-size="11" fill="#334155">• sort · filter · slicers</text>
  <text x="356" y="530" font-size="11" fill="#334155">• named ranges · validation</text>
  <text x="356" y="550" font-size="11" fill="#334155">• CSV import · sparklines</text>
  <text x="356" y="580" font-size="10" fill="#64748b" font-style="italic">spilling arrays · XLOOKUP · bonds</text>

  <!-- PowerPoint lane -->
  <rect x="640" y="380" width="280" height="230" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <rect x="640" y="380" width="280" height="34" rx="10" fill="#d97706"/>
  <text x="780" y="402" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">PowerPoint (.pptx)</text>
  <text x="656" y="430" font-size="11" fill="#334155">• add slide / shape / text</text>
  <text x="656" y="450" font-size="11" fill="#334155">• animations (15+ presets)</text>
  <text x="656" y="470" font-size="11" fill="#334155">• transitions · morph</text>
  <text x="656" y="490" font-size="11" fill="#334155">• charts · tables · connectors</text>
  <text x="656" y="510" font-size="11" fill="#334155">• 3D models (.glb) · video</text>
  <text x="656" y="530" font-size="11" fill="#334155">• themes · slide masters</text>
  <text x="656" y="550" font-size="11" fill="#334155">• live preview (watch mode)</text>
  <text x="656" y="580" font-size="10" fill="#64748b" font-style="italic">mermaid · equations · hyperlinks</text>
</svg>