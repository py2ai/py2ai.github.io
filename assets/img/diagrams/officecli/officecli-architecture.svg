<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#ea580c"/>
    </marker>
    <linearGradient id="grad-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/><stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <linearGradient id="grad-purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <linearGradient id="grad-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/><stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
  </defs>

  <rect width="960" height="620" fill="#ffffff"/>

  <text x="480" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">OfficeCLI — System Architecture</text>
  <text x="480" y="58" text-anchor="middle" font-size="13" fill="#64748b">Single binary · No Office installation · AI-agent-native design</text>

  <!-- AI Agent Layer -->
  <rect x="40" y="90" width="880" height="110" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-dasharray="5,3"/>
  <text x="60" y="112" font-size="12" font-weight="600" fill="#475569">AI AGENT LAYER</text>

  <rect x="70" y="124" width="150" height="60" rx="8" fill="url(#grad-purple)" stroke="#7c3aed"/>
  <text x="145" y="150" text-anchor="middle" font-size="13" font-weight="600" fill="#4c1d95">Claude Code</text>
  <text x="145" y="168" text-anchor="middle" font-size="11" fill="#5b21b6">MCP / CLI</text>

  <rect x="250" y="124" width="150" height="60" rx="8" fill="url(#grad-purple)" stroke="#7c3aed"/>
  <text x="325" y="150" text-anchor="middle" font-size="13" font-weight="600" fill="#4c1d95">Codex / Cursor</text>
  <text x="325" y="168" text-anchor="middle" font-size="11" fill="#5b21b6">Skill file</text>

  <rect x="430" y="124" width="150" height="60" rx="8" fill="url(#grad-purple)" stroke="#7c3aed"/>
  <text x="505" y="150" text-anchor="middle" font-size="13" font-weight="600" fill="#4c1d95">GitHub Copilot</text>
  <text x="505" y="168" text-anchor="middle" font-size="11" fill="#5b21b6">Auto-detected</text>

  <rect x="610" y="124" width="150" height="60" rx="8" fill="url(#grad-purple)" stroke="#7c3aed"/>
  <text x="685" y="150" text-anchor="middle" font-size="13" font-weight="600" fill="#4c1d95">Windsurf / VS Code</text>
  <text x="685" y="168" text-anchor="middle" font-size="11" fill="#5b21b6">MCP server</text>

  <rect x="800" y="124" width="100" height="60" rx="8" fill="url(#grad-purple)" stroke="#7c3aed"/>
  <text x="850" y="150" text-anchor="middle" font-size="13" font-weight="600" fill="#4c1d95">Any LLM</text>
  <text x="850" y="168" text-anchor="middle" font-size="11" fill="#5b21b6">CLI + JSON</text>

  <!-- Arrows from agents to OfficeCLI -->
  <line x1="145" y1="184" x2="145" y2="230" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <line x1="325" y1="184" x2="325" y2="230" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <line x1="505" y1="184" x2="505" y2="230" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <line x1="685" y1="184" x2="685" y2="230" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <line x1="850" y1="184" x2="850" y2="230" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- OfficeCLI Binary -->
  <rect x="120" y="240" width="720" height="120" rx="12" fill="url(#grad-blue)" stroke="#2563eb" stroke-width="2"/>
  <text x="480" y="268" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a8a">OfficeCLI — Single Self-Contained Binary</text>
  <text x="480" y="288" text-anchor="middle" font-size="12" fill="#1e40af">.NET runtime embedded · Apache 2.0 · Cross-platform (macOS / Linux / Windows)</text>

  <rect x="150" y="302" width="130" height="44" rx="6" fill="#ffffff" stroke="#2563eb"/>
  <text x="215" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">CLI Interface</text>
  <text x="215" y="336" text-anchor="middle" font-size="10" fill="#1e40af">add / set / get / view</text>

  <rect x="300" y="302" width="130" height="44" rx="6" fill="#ffffff" stroke="#2563eb"/>
  <text x="365" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">MCP Server</text>
  <text x="365" y="336" text-anchor="middle" font-size="10" fill="#1e40af">JSON-RPC tools</text>

  <rect x="450" y="302" width="130" height="44" rx="6" fill="#ffffff" stroke="#2563eb"/>
  <text x="515" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">Resident Mode</text>
  <text x="515" y="336" text-anchor="middle" font-size="10" fill="#1e40af">Named pipes</text>

  <rect x="600" y="302" width="130" height="44" rx="6" fill="#ffffff" stroke="#2563eb"/>
  <text x="665" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">Batch / Merge</text>
  <text x="665" y="336" text-anchor="middle" font-size="10" fill="#1e40af">Template fill</text>

  <!-- Arrows to Document Engine -->
  <line x1="480" y1="360" x2="480" y2="400" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Document Engine -->
  <rect x="120" y="410" width="720" height="80" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="480" y="438" text-anchor="middle" font-size="16" font-weight="700" fill="#78350f">Built-in Document Engine (no Office required)</text>
  <text x="480" y="458" text-anchor="middle" font-size="12" fill="#92400e">HTML/PNG rendering · 350+ Excel formulas · Pivot tables · OOXML parse/write · Mermaid diagrams</text>
  <text x="480" y="476" text-anchor="middle" font-size="11" fill="#92400e">Three-layer: L1 Read → L2 DOM → L3 Raw XML</text>

  <!-- Arrows to document files -->
  <line x1="240" y1="490" x2="240" y2="530" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="480" y1="490" x2="480" y2="530" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="720" y1="490" x2="720" y2="530" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Document files -->
  <rect x="150" y="540" width="180" height="60" rx="8" fill="url(#grad-green)" stroke="#16a34a"/>
  <text x="240" y="566" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">Word (.docx)</text>
  <text x="240" y="584" text-anchor="middle" font-size="11" fill="#166534">Read · Modify · Create</text>

  <rect x="390" y="540" width="180" height="60" rx="8" fill="url(#grad-green)" stroke="#16a34a"/>
  <text x="480" y="566" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">Excel (.xlsx)</text>
  <text x="480" y="584" text-anchor="middle" font-size="11" fill="#166534">Read · Modify · Create</text>

  <rect x="630" y="540" width="180" height="60" rx="8" fill="url(#grad-green)" stroke="#16a34a"/>
  <text x="720" y="566" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">PowerPoint (.pptx)</text>
  <text x="720" y="584" text-anchor="middle" font-size="11" fill="#166534">Read · Modify · Create</text>

  <!-- Legend -->
  <rect x="40" y="540" width="90" height="60" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
  <line x1="50" y1="556" x2="70" y2="556" stroke="#ea580c" stroke-width="2"/>
  <text x="74" y="560" font-size="9" fill="#475569">AI request</text>
  <line x1="50" y1="572" x2="70" y2="572" stroke="#2563eb" stroke-width="2"/>
  <text x="74" y="576" font-size="9" fill="#475569">Internal</text>
  <line x1="50" y1="588" x2="70" y2="588" stroke="#16a34a" stroke-width="2"/>
  <text x="74" y="592" font-size="9" fill="#475569">Output</text>
</svg>