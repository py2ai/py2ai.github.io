    <stop offset="0%" style="stop-color:#3178c6;stop-opacity:1"/>
    <stop offset="100%" style="stop-color:#00add8;stop-opacity:1"/>
  </linearGradient>
  <linearGradient id="goGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#00add8;stop-opacity:1"/>
    <stop offset="100%" style="stop-color:#0097a7;stop-opacity:1"/>
  </linearGradient>
  <linearGradient id="msGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#0078d4;stop-opacity:1"/>
    <stop offset="100%" style="stop-color:#106ebe;stop-opacity:1"/>
  </linearGradient>
</defs>
<rect width="900" height="600" fill="#f8f9fa"/>
<text x="450" y="38" text-anchor="middle" class="title">TypeScript 7 (Go) Architecture</text>
<text x="450" y="58" text-anchor="middle" class="subtitle">Native Go port of the TypeScript compiler pipeline</text>
