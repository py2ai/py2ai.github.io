135" x2="720" y2="135" stroke="#dadce0" stroke-width="2"/><polygon points="716,131 720,135 716,139" fill="#dadce0"/><rect x="720" y="100" width="110" height="70" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="2" filter="url(#shadow)"/><text x="775" y="130" text-anchor="middle" class="value">Emitter</text><text x="775" y="150" text-anchor="middle" class="label">Stage 5</text><rect x="220" y="210" width="110" height="50" rx="8" fill="#34a853" filter="url(#shadow)"/><text x="275" y="232" text-anchor="middle" class="box-text">JS Output</text><text x="275" y="248" text-anchor="middle" class="box-subtext">.js files</text><rect x="345" y="210" width="110" height="50" rx="8" fill="#34a853" filter="url(#shadow)"/><text x="400" y="232" text-anchor="middle" class="box-text">Declarations</text><text x="400" y="248" text-anchor="middle" class="box-subtext">.d.ts files</text><rect x="470" y="210" width="110" height="50" rx="8" fill="#34a853" filter="url(#shadow)"/><text x="525" y="232" text-anchor="middle" class="box-text">Source Maps</text><text x="525" y="248" text-anchor="middle" class="box-subtext">.js.map files</text><rect x="620" y="90" width="250" height="170" rx="12" fill="#0078d4" filter="url(#shadow)"/><text x="745" y="115" text-anchor="middle" class="box-text">Language Service (LSP)</text><rect x="640" y="135" width="72" height="24" rx="4" fill="rgba(255,255,255,0.2)" filter="url(#shadow)"/><text x="676" y="151" text-anchor="middle" class="box-subtext">Completions</text><rect x="720" y="135" width="72" height="24" rx="4" fill="rgba(255,255,255,0.2)" filter="url(#shadow)"/><text x="756" y="151" text-anchor="middle" class="box-subtext">Diagnostics</text><rect x="800" y="135" width="72" height="24" rx="4" fill="rgba(255,255,255,0.2)" filter="url(#shadow)"/><text x="836" y="151" text-anchor="middle" class="box-subtext">Hover Info</text><rect x="640" y="165" width="72" height="24" rx="4" fill="rgba(255,255,255,0.2)" filter="url(#shadow)"/><text x="676" y="181" text-anchor="middle" class="box-subtext">Go to Def</text><rect x="720" y="165" width="72" height="24" rx="4" fill="rgba(255,255,255,0.2)" filter="url(#shadow)"/><text x="756" y="181" text-anchor="middle" class="box-subtext">References</text><rect x="800" y="165" width="72" height="24" rx="4" fill="rgba(255,255,255,0.2)" filter="url(#shadow)"/><text x="836" y="181" text-anchor="middle" class="box-subtext">Rename</text><rect x="30" y="300" width="840" height="120" rx="12" fill="#ffffff" filter="url(#shadow)"/><text x="450" y="325" text-anchor="middle" class="value">Performance Advantages of Go Native Port</text><text x="80" y="362" text-anchor="start" class="label">Cold Start</text><rect x="200" y="350" width="255" height="18" rx="3" fill="#ea4335" opacity="0.3"/><text x="460" y="364" text-anchor="start" class="label">TS: 85%</text><rect x="380" y="350" width="105" height="18" rx="3" fill="#34a853" opacity="0.7"/><text x="490" y="364" text-anchor="start" class="label">Go: 35%</text><text x="80" y="390" text-anchor="start" class="label">Type Check</text><rect x="200" y="378" width="270" height="18" rx="3" fill="#ea4335" opacity="0.3"/><text x="475" y="392" text-anchor="start" class="label">TS: 90%</text><rect x="380" y="378" width="90" height="18" rx="3" fill="#34a853" opacity="0.7"/><text x="475" y="392" text-anchor="start" class="label">Go: 30%</text><text x="80" y="418" text-anchor="start" class="label">Memory</text><rect x="200" y="406" width="210" height="18" rx="3" fill="#ea4335" opacity="0.3"/><text x="415" y="420" text-anchor="start" class="label">TS: 70%</text><rect x="380" y="406" width="120" height="18" rx="3" fill="#34a853" opacity="0.7"/><text x="505" y="420" text-anchor="start" class="label">Go: 40%</text><text x="80" y="446" text-anchor="start" class="label">Build</text><rect x="200" y="434" width="240" height="18" rx="3" fill="#ea4335" opacity="0.3"/><text x="445" y="448" text-anchor="start" class="label">TS: 80%</text><rect x="380" y="434" width="75" height="18" rx="3" fill="#34a853" opacity="0.7"/><text x="460" y="448" text-anchor="start" class="label">Go: 25%</text><rect x="700" y="350" width="12" height="12" rx="2" fill="#ea4335" opacity="0.3"/><text x="720" y="361" text-anchor="start" class="label">TypeScript (Node.js)</text><rect x="700" y="370" width="12" height="12" rx="2" fill="#34a853" opacity="0.7"/><text x="720" y="381" text-anchor="start" class="label">TypeScript 7 (Go)</text><rect x="30" y="440" width="840" height="60" rx="12" fill="url(#tsGrad)" filter="url(#shadow)"/><text x="450" y="465" text-anchor="middle" class="box-text">Key Insight: Go's native compilation provides 5-10x faster cold starts</text><text x="450" y="485" text-anchor="middle" class="box-subtext">and significantly lower memory usage compared to the Node.js-based TypeScript compiler</text><text x="450" y="530" text-anchor="middle" class="label">github.com/microsoft/typescript-go  |  25K+ stars  |  Go Language</text></svg>