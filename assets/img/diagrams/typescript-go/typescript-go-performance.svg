<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
<defs>
  <style>
    text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    .title { font-size: 24px; font-weight: 700; fill: #202124; }
    .subtitle { font-size: 14px; fill: #5f6368; }
    .box-text { font-size: 13px; fill: #ffffff; font-weight: 600; }
    .box-subtext { font-size: 11px; fill: rgba(255,255,255,0.85); }
    .label { font-size: 12px; fill: #5f6368; }
    .value { font-size: 18px; font-weight: 700; fill: #202124; }
    .arrow-text { font-size: 11px; fill: #5f6368; }
  </style>
  <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
  </filter>
  <linearGradient id="tsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#3178c6;stop-opacity:1"/>
    <stop offset="100%" style="stop-color:#00add8;stop-opacity:1"/>
  </linearGradient>
  <linearGradient id="goGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#00add8;stop-opacity:1"/>
    <stop offset="100%" style="stop-color:#0097a7;stop-opacity:1"/>
  </linearGradient>
  <linearGradient id="msGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#0078d4;stop-opacity:1"/>
    <stop offset="100%" style="stop-color:#106ebe;stop-opacity:1"/>
  </linearGradient>
</defs>
<rect width="900" height="600" fill="#f8f9fa"/>
<text x="450" y="38" text-anchor="middle" class="title">TypeScript 7 Performance Advantages</text>
<text x="450" y="58" text-anchor="middle" class="subtitle">Go native compilation vs Node.js-based TypeScript compiler</text>
<rect x="30" y="75" width="840" height="80" rx="12" fill="#ffffff" filter="url(#shadow)"/><text x="450" y="100" text-anchor="middle" class="value">Why Go? Native Performance for TypeScript</text><text x="450" y="120" text-anchor="middle" class="label">The Go port eliminates the Node.js runtime overhead, providing faster compilation</text><text x="450" y="138" text-anchor="middle" class="label">and lower memory usage while maintaining full type-checking compatibility</text><rect x="30" y="175" width="400" height="200" rx="12" fill="#ffffff" filter="url(#shadow)"/><rect x="30" y="175" width="400" height="40" rx="12" fill="#3178c6"/><rect x="30" y="200" width="400" height="15" fill="#3178c6"/><text x="230" y="200" text-anchor="middle" class="box-text">TypeScript 6.x (Node.js)</text><text x="50" y="230" text-anchor="start" class="label">Runtime</text><text x="160" y="230" text-anchor="start" class="label">Node.js V8 engine</text><text x="50" y="258" text-anchor="start" class="label">Startup</text><text x="160" y="258" text-anchor="start" class="label">Slow (V8 warmup needed)</text><text x="50" y="286" text-anchor="start" class="label">Memory</text><text x="160" y="286" text-anchor="start" class="label">High (V8 heap overhead)</text><text x="50" y="314" text-anchor="start" class="label">Parallelism</text><text x="160" y="314" text-anchor="start" class="label">Limited (single-threaded event loop)</text><text x="50" y="342" text-anchor="start" class="label">Binary</text><text x="160" y="342" text-anchor="start" class="label">Requires Node.js installation</text><rect x="470" y="175" width="400" height="200" rx="12" fill="#ffffff" filter="url(#shadow)"/><rect x="470" y="175" width="400" height="40" rx="12" fill="#00add8"/><rect x="470" y="200" width="400" height="15" fill="#00add8"/><text x="670" y="200" text-anchor="middle" class="box-text">TypeScript 7 (Go Native)</text><text x="490" y="230" text-anchor="start" class="label">Runtime</text><text x="600" y="230" text-anchor="start" class="label">Native binary (no runtime)</text><text x="490" y="258" text-anchor="start" class="label">Startup</text><text x="600" y="258" text-anchor="start" class="label">Fast (compiled binary)</text><text x="490" y="286" text-anchor="start" class="label">Memory</text><text x="600" y="286" text-anchor="start" class="label">Low (no GC heap overhead)</text><text x="490" y="314" text-anchor="start" class="label">Parallelism</text><text x="600" y="314" text-anchor="start" class="label">Full (goroutines for concurrency)</text><text x="490" y="342" text-anchor="start" class="label">Binary</text><text x="600" y="342" text-anchor="start" class="label">Single static binary, no deps</text><rect x="30" y="395" width="840" height="55" rx="12" fill="url(#goGrad)" filter="url(#shadow)"/><text x="450" y="418" text-anchor="middle" class="box-text">Key Benefits: 5-10x faster cold starts | 3-5x lower memory | Single binary deployment</text><text x="450" y="438" text-anchor="middle" class="box-subtext">Full type-checking compatibility with TypeScript 6.0 | Same errors, locations, and messages</text><rect x="30" y="465" width="270" height="110" rx="12" fill="#ffffff" filter="url(#shadow)"/><rect x="30" y="465" width="270" height="35" rx="12" fill="#1a73e8"/><rect x="30" y="488" width="270" height="12" fill="#1a73e8"/><text x="165" y="488" text-anchor="middle" class="box-text">CI/CD Pipelines</text><text x="165" y="515" text-anchor="middle" class="label">Faster builds mean</text><text x="165" y="533" text-anchor="middle" class="label">shorter feedback loops</text><text x="165" y="551" text-anchor="middle" class="label">and faster deployments</text><rect x="315" y="465" width="270" height="110" rx="12" fill="#ffffff" filter="url(#shadow)"/><rect x="315" y="465" width="270" height="35" rx="12" fill="#34a853"/><rect x="315" y="488" width="270" height="12" fill="#34a853"/><text x="450" y="488" text-anchor="middle" class="box-text">IDE Integration</text><text x="450" y="515" text-anchor="middle" class="label">LSP server provides</text><text x="450" y="533" text-anchor="middle" class="label">real-time diagnostics</text><text x="450" y="551" text-anchor="middle" class="label">and completions</text><rect x="600" y="465" width="270" height="110" rx="12" fill="#ffffff" filter="url(#shadow)"/><rect x="600" y="465" width="270" height="35" rx="12" fill="#ff6d01"/><rect x="600" y="488" width="270" height="12" fill="#ff6d01"/><text x="735" y="488" text-anchor="middle" class="box-text">Large Codebases</text><text x="735" y="515" text-anchor="middle" class="label">Scales efficiently</text><text x="735" y="533" text-anchor="middle" class="label">with parallel type</text><text x="735" y="551" text-anchor="middle" class="label">checking via goroutines</text></svg>