<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
<defs>
  <style>
    text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    .title { font-size: 24px; font-weight: 700; fill: #202124; }
    .subtitle { font-size: 14px; fill: #5f6368; }
    .box-text { font-size: 13px; fill: #ffffff; font-weight: 600; }
    .box-subtext { font-size: 11px; fill: rgba(255,255,255,0.85); }
    .label { font-size: 12px; fill: #5f6368; }
    .value { font-size: 18px; font-weight: 700; fill: #202124; }
    .arrow-text { font-size: 11px; fill: #5f6368; }
  </style>
  <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
  </filter>
  <linearGradient id="tsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#3178c6;stop-opacity:1"/>
    <stop offset="100%" style="stop-color:#00add8;stop-opacity:1"/>
  </linearGradient>
  <linearGradient id="goGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#00add8;stop-opacity:1"/>
    <stop offset="100%" style="stop-color:#0097a7;stop-opacity:1"/>
  </linearGradient>
  <linearGradient id="msGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#0078d4;stop-opacity:1"/>
    <stop offset="100%" style="stop-color:#106ebe;stop-opacity:1"/>
  </linearGradient>
</defs>
<rect width="900" height="600" fill="#f8f9fa"/>
<text x="450" y="38" text-anchor="middle" class="title">TypeScript 7 Ecosystem Integration</text>
<text x="450" y="58" text-anchor="middle" class="subtitle">How the Go native port fits into the developer workflow</text>
<circle cx="450" cy="280" r="80" fill="url(#tsGrad)" filter="url(#shadow)"/><text x="450" y="265" text-anchor="middle" class="box-text">TypeScript 7</text><text x="450" y="290" text-anchor="middle" class="box-subtext">(tsgo)</text><text x="450" y="310" text-anchor="middle" class="box-subtext">Go Native</text><line x1="450" y1="280" x2="150" y2="120" stroke="#dadce0" stroke-width="2" stroke-dasharray="5,5"/><rect x="80" y="85" width="140" height="70" rx="10" fill="#34a853" filter="url(#shadow)"/><text x="150" y="105" text-anchor="middle" class="box-text">VS Code</text><text x="150" y="130" text-anchor="middle" class="box-subtext">Extension</text><text x="150" y="144" text-anchor="middle" class="box-subtext">Available</text><line x1="450" y1="280" x2="750" y2="120" stroke="#dadce0" stroke-width="2" stroke-dasharray="5,5"/><rect x="680" y="85" width="140" height="70" rx="10" fill="#ea4335" filter="url(#shadow)"/><text x="750" y="105" text-anchor="middle" class="box-text">npm</text><text x="750" y="130" text-anchor="middle" class="box-subtext">@typescript/</text><text x="750" y="144" text-anchor="middle" class="box-subtext">native-preview</text><line x1="450" y1="280" x2="150" y2="440" stroke="#dadce0" stroke-width="2" stroke-dasharray="5,5"/><rect x="80" y="405" width="140" height="70" rx="10" fill="#fbbc04" filter="url(#shadow)"/><text x="150" y="425" text-anchor="middle" class="box-text">Build Tools</text><text x="150" y="450" text-anchor="middle" class="box-subtext">Webpack, Vite</text><text x="150" y="464" text-anchor="middle" class="box-subtext">esbuild, etc.</text><line x1="450" y1="280" x2="750" y2="440" stroke="#dadce0" stroke-width="2" stroke-dasharray="5,5"/><rect x="680" y="405" width="140" height="70" rx="10" fill="#ff6d01" filter="url(#shadow)"/><text x="750" y="425" text-anchor="middle" class="box-text">CI/CD</text><text x="750" y="450" text-anchor="middle" class="box-subtext">GitHub Actions</text><text x="750" y="464" text-anchor="middle" class="box-subtext">Faster builds</text><line x1="450" y1="280" x2="450" y2="520" stroke="#dadce0" stroke-width="2" stroke-dasharray="5,5"/><rect x="380" y="485" width="140" height="70" rx="10" fill="#1a73e8" filter="url(#shadow)"/><text x="450" y="505" text-anchor="middle" class="box-text">Existing TS</text><text x="450" y="523" text-anchor="middle" class="box-text">Projects</text><text x="450" y="530" text-anchor="middle" class="box-subtext">Drop-in</text><text x="450" y="544" text-anchor="middle" class="box-subtext">replacement</text><line x1="450" y1="280" x2="450" y2="80" stroke="#dadce0" stroke-width="2" stroke-dasharray="5,5"/><rect x="380" y="45" width="140" height="70" rx="10" fill="#3178c6" filter="url(#shadow)"/><text x="450" y="65" text-anchor="middle" class="box-text">TypeScript</text><text x="450" y="83" text-anchor="middle" class="box-text">Ecosystem</text><text x="450" y="90" text-anchor="middle" class="box-subtext">Full compatibility</text><text x="450" y="104" text-anchor="middle" class="box-subtext">with TS 6.0</text><rect x="30" y="555" width="840" height="35" rx="8" fill="#202124" filter="url(#shadow)"/><text x="450" y="577" text-anchor="middle" class="box-subtext">Install: npm install @typescript/native-preview  |  VS Code: set js/ts.experimental.useTsgo: true</text></svg>