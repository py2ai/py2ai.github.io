<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" width="860" height="440" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
  .mono { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 12px; fill: #0f172a; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="440" fill="#ffffff"/>
<text x="320" y="38" text-anchor="middle" class="title">State: The Source of Truth + Backends</text>
<rect x="40" y="70" width="390" height="150" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="235" y="96" text-anchor="middle" class="band-label">Local state (DON'T in prod)</text>
<text x="235" y="124" text-anchor="middle" class="item">terraform.tfstate (in cwd)</text>
<text x="235" y="146" text-anchor="middle" class="item-sub">lost if laptop dies</text>
<text x="235" y="168" text-anchor="middle" class="item-sub">no locking -&gt; race conditions</text>
<text x="235" y="190" text-anchor="middle" class="item-sub">gitignore it (has secrets!)</text>
<rect x="460" y="70" width="390" height="150" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="655" y="96" text-anchor="middle" class="band-label">Remote backend (DO this)</text>
<text x="655" y="124" text-anchor="middle" class="item">S3 + DynamoDB, GCS, Az blob</text>
<text x="655" y="146" text-anchor="middle" class="item-sub">shared, durable, encrypted</text>
<text x="655" y="168" text-anchor="middle" class="item-sub">locking prevents concurrent apply</text>
<text x="655" y="190" text-anchor="middle" class="item-sub">versioned + auditable</text>
<rect x="40" y="240" width="390" height="150" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="235" y="266" text-anchor="middle" class="band-label">State &lt;-&gt; Real world</text>
<rect x="60" y="284" width="150" height="40" rx="8" fill="#1e40af"/>
<text x="135" y="310" text-anchor="middle" class="node-title-w">state file</text>
<rect x="220" y="284" width="180" height="40" rx="8" fill="#2563eb"/>
<text x="310" y="310" text-anchor="middle" class="node-title-w">real cloud resources</text>
<line x1="210" y1="304" x2="220" y2="304" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-accent)"/>
<line x1="220" y1="320" x2="210" y2="320" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<text x="235" y="356" text-anchor="middle" class="item-sub">plan diffs the two; apply reconciles</text>
<rect x="460" y="240" width="390" height="150" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="655" y="266" text-anchor="middle" class="band-label">Drift + import</text>
<text x="655" y="294" text-anchor="middle" class="item">drift: real world changed outside TF</text>
<text x="655" y="316" text-anchor="middle" class="item-sub">terraform refresh / plan detects it</text>
<text x="655" y="348" text-anchor="middle" class="item-sub">terraform import: adopt existing resource</text>
<text x="655" y="370" text-anchor="middle" class="item-sub">into state without recreating</text>
</svg>
