<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" width="860" height="440" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
  .mono { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 12px; fill: #0f172a; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="440" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">Modules: Variables, Outputs, Composition</text>
<rect x="330" y="70" width="200" height="46" rx="8" fill="#1e40af"/>
<text x="430" y="100" text-anchor="middle" class="node-title-w">root module</text>
<line x1="380" y1="116" x2="250" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="430" y1="116" x2="430" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="480" y1="116" x2="610" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="160" y="152" width="180" height="46" rx="8" fill="#2563eb"/>
<text x="250" y="182" text-anchor="middle" class="node-title-w">module: vpc</text>
<rect x="340" y="152" width="180" height="46" rx="8" fill="#1e40af"/>
<text x="430" y="182" text-anchor="middle" class="node-title-w">module: db</text>
<rect x="520" y="152" width="180" height="46" rx="8" fill="#2563eb"/>
<text x="610" y="182" text-anchor="middle" class="node-title-w">module: app</text>
<rect x="40" y="216" width="780" height="150" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="242" text-anchor="middle" class="band-label">Inputs flow in, outputs flow out</text>
<rect x="60" y="260" width="250" height="90" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="185" y="284" text-anchor="middle" class="item">variables.tf (inputs)</text>
<text x="185" y="304" text-anchor="middle" class="item-sub">variable "name" { type, default }</text>
<text x="185" y="326" text-anchor="middle" class="item-sub">module: name = value</text>
<rect x="325" y="260" width="250" height="90" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="450" y="284" text-anchor="middle" class="item">main.tf (resources)</text>
<text x="450" y="304" text-anchor="middle" class="item-sub">resource, data, provider</text>
<text x="450" y="326" text-anchor="middle" class="item-sub">the actual infra</text>
<rect x="590" y="260" width="250" height="90" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="715" y="284" text-anchor="middle" class="item">outputs.tf (exports)</text>
<text x="715" y="304" text-anchor="middle" class="item-sub">output "vpc_id" { value }</text>
<text x="715" y="326" text-anchor="middle" class="item-sub">root reads via module.x.y</text>
<rect x="40" y="378" width="780" height="30" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="430" y="398" text-anchor="middle" class="note">Compose: root calls modules; pass outputs as inputs between them. Reuse via the Terraform Registry.</text>
</svg>
