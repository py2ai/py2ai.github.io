<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" width="860" height="360" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
  .mono { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 12px; fill: #0f172a; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="360" fill="#ffffff"/>
<text x="320" y="38" text-anchor="middle" class="title">Terraform Workflow: init -&gt; plan -&gt; apply -&gt; destroy</text>
<rect x="50" y="90" width="190" height="150" rx="8" fill="#1e40af"/>
<text x="145.0" y="118" text-anchor="middle" class="node-title-w">1. init</text>
<text x="145.0" y="144" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">download providers</text>
<text x="145.0" y="162" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">init backend</text>
<text x="145.0" y="190" text-anchor="middle" font-size="10" fill="#e0e7ff" font-family="inherit">terraform init</text>
<line x1="240" y1="165" x2="258" y2="165" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="258" y="90" width="190" height="150" rx="8" fill="#2563eb"/>
<text x="353.0" y="118" text-anchor="middle" class="node-title-w">2. plan</text>
<text x="353.0" y="144" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">preview changes</text>
<text x="353.0" y="162" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">(+ / - / no-op)</text>
<text x="353.0" y="190" text-anchor="middle" font-size="10" fill="#e0e7ff" font-family="inherit">terraform plan</text>
<line x1="448" y1="165" x2="466" y2="165" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="466" y="90" width="190" height="150" rx="8" fill="#1e40af"/>
<text x="561.0" y="118" text-anchor="middle" class="node-title-w">3. apply</text>
<text x="561.0" y="144" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">create/update/destroy</text>
<text x="561.0" y="162" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">resources</text>
<text x="561.0" y="190" text-anchor="middle" font-size="10" fill="#e0e7ff" font-family="inherit">terraform apply</text>
<line x1="656" y1="165" x2="674" y2="165" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="674" y="90" width="190" height="150" rx="8" fill="#2563eb"/>
<text x="769.0" y="118" text-anchor="middle" class="node-title-w">4. destroy</text>
<text x="769.0" y="144" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">tear it all down</text>
<text x="769.0" y="162" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit"></text>
<text x="769.0" y="190" text-anchor="middle" font-size="10" fill="#e0e7ff" font-family="inherit">terraform destroy</text>
<rect x="40" y="260" width="780" height="40" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="430" y="282" text-anchor="middle" class="note">plan is the dry run; review it before apply. State is the source of truth, not your head.</text>
</svg>
