<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" width="960" height="720" style="background:transparent">
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#059669"/>
    </marker>
    <style>
      text { font-family: Inter, system-ui, -apple-system, sans-serif; }
      .title { font-size: 18px; font-weight: 700; fill: #1e293b; }
      .subtitle { font-size: 11px; fill: #64748b; }
      .box-title { font-size: 14px; font-weight: 700; }
      .box-text { font-size: 11px; fill: #475569; }
      .box-detail { font-size: 10px; fill: #64748b; }
      .env-var { font-size: 9px; fill: #7c3aed; font-family: JetBrains Mono, Fira Code, monospace; }
    </style>
  </defs>
  <text x="480" y="32" text-anchor="middle" class="title">Agent-Browser Provider Ecosystem</text>
  <text x="480" y="48" text-anchor="middle" class="subtitle">8 Browser Providers Behind a Single CLI Interface</text>
  <rect x="280" y="64" width="400" height="56" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="480" y="88" text-anchor="middle" class="box-title" fill="#2563eb">agent-browser CLI</text>
  <text x="480" y="106" text-anchor="middle" class="box-detail">150+ commands, single unified interface</text>
  <line x1="480" y1="120" x2="480" y2="144" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="496" y="136" text-anchor="start" class="box-detail" fill="#2563eb">flags: --engine, -p</text>
  <rect x="160" y="152" width="640" height="56" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="480" y="176" text-anchor="middle" class="box-title" fill="#059669">Provider Abstraction Layer</text>
  <text x="480" y="194" text-anchor="middle" class="box-detail">cli/src/native/providers.rs -- session creation, CDP connection, credential resolution</text>
  <line x1="320" y1="208" x2="320" y2="232" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="336" y="224" text-anchor="start" class="box-detail" fill="#059669">local</text>
  <line x1="640" y1="208" x2="640" y2="232" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="656" y="224" text-anchor="start" class="box-detail" fill="#7c3aed">cloud</text>
  <text x="240" y="236" text-anchor="middle" style="font-size:13px;font-weight:700;fill:#0d9488;font-family:Inter,system-ui,sans-serif">Local Browser Engines</text>
  <rect x="40" y="248" width="200" height="100" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="140" y="270" text-anchor="middle" class="box-title" fill="#2563eb">Chrome/Chromium</text>
  <text x="140" y="288" text-anchor="middle" class="box-detail">Default engine</text>
  <text x="140" y="304" text-anchor="middle" class="box-detail">CDP WebSocket</text>
  <text x="140" y="320" text-anchor="middle" class="box-detail">Auto-downloaded via</text>
  <text x="140" y="332" text-anchor="middle" class="box-detail">Chrome for Testing</text>
  <rect x="260" y="248" width="200" height="100" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="360" y="270" text-anchor="middle" class="box-title" fill="#059669">Lightpanda</text>
  <text x="360" y="288" text-anchor="middle" class="box-detail">Alternative engine</text>
  <text x="360" y="304" text-anchor="middle" class="box-detail">CDP WebSocket</text>
  <text x="360" y="320" text-anchor="middle" class="env-var">--engine lightpanda</text>
  <rect x="40" y="360" width="420" height="80" rx="8" fill="#ccfbf1" stroke="#0d9488" stroke-width="2"/>
  <text x="250" y="382" text-anchor="middle" class="box-title" fill="#0d9488">Safari / iOS</text>
  <text x="250" y="400" text-anchor="middle" class="box-detail">Appium/WebDriver integration</text>
  <text x="250" y="416" text-anchor="middle" class="box-detail">iOS Simulator + Mobile Safari</text>
  <text x="250" y="430" text-anchor="middle" class="env-var">-p ios</text>
  <text x="720" y="236" text-anchor="middle" style="font-size:13px;font-weight:700;fill:#7c3aed;font-family:Inter,system-ui,sans-serif">Cloud Browser Providers</text>
  <rect x="500" y="248" width="200" height="72" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="600" y="268" text-anchor="middle" class="box-title" fill="#7c3aed">Browserless</text>
  <text x="600" y="286" text-anchor="middle" class="box-detail">Headless Chrome in cloud</text>
  <text x="600" y="302" text-anchor="middle" class="env-var">BROWSERLESS_API_KEY</text>
  <rect x="720" y="248" width="200" height="72" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="820" y="268" text-anchor="middle" class="box-title" fill="#7c3aed">Browserbase</text>
  <text x="820" y="286" text-anchor="middle" class="box-detail">Production browser infra</text>
  <text x="820" y="302" text-anchor="middle" class="env-var">BROWSERBASE_API_KEY</text>
  <rect x="500" y="332" width="200" height="72" rx="8" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
  <text x="600" y="352" text-anchor="middle" class="box-title" fill="#ea580c">Browser Use</text>
  <text x="600" y="370" text-anchor="middle" class="box-detail">AI-optimized sessions</text>
  <text x="600" y="386" text-anchor="middle" class="env-var">BROWSER_USE_API_KEY</text>
  <rect x="720" y="332" width="200" height="72" rx="8" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
  <text x="820" y="352" text-anchor="middle" class="box-title" fill="#ea580c">Kernel</text>
  <text x="820" y="370" text-anchor="middle" class="box-detail">Stealth mode browsing</text>
  <text x="820" y="386" text-anchor="middle" class="env-var">KERNEL_API_KEY</text>
  <rect x="500" y="416" width="420" height="72" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="710" y="436" text-anchor="middle" class="box-title" fill="#7c3aed">AWS AgentCore</text>
  <text x="710" y="454" text-anchor="middle" class="box-detail">Enterprise browser infrastructure with SigV4 authentication</text>
  <text x="710" y="470" text-anchor="middle" class="env-var">AGENTCORE_REGION (default: us-east-1)</text>
  <rect x="40" y="508" width="880" height="80" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="480" y="526" text-anchor="middle" style="font-size:12px;font-weight:600;fill:#475569;font-family:Inter,system-ui,sans-serif">Usage Examples</text>
  <text x="240" y="546" text-anchor="middle" style="font-size:10px;fill:#2563eb;font-family:JetBrains Mono,Fira Code,monospace">agent-browser open example.com</text>
  <text x="240" y="560" text-anchor="middle" style="font-size:9px;fill:#64748b;font-family:Inter,system-ui,sans-serif">(default: Chrome local)</text>
  <text x="480" y="546" text-anchor="middle" style="font-size:10px;fill:#059669;font-family:JetBrains Mono,Fira Code,monospace">agent-browser --engine lightpanda open ...</text>
  <text x="480" y="560" text-anchor="middle" style="font-size:9px;fill:#64748b;font-family:Inter,system-ui,sans-serif">(alternative local engine)</text>
  <text x="720" y="546" text-anchor="middle" style="font-size:10px;fill:#7c3aed;font-family:JetBrains Mono,Fira Code,monospace">agent-browser -p browserless open ...</text>
  <text x="720" y="560" text-anchor="middle" style="font-size:9px;fill:#64748b;font-family:Inter,system-ui,sans-serif">(cloud provider)</text>
  <text x="480" y="578" text-anchor="middle" style="font-size:9px;fill:#94a3b8;font-family:Inter,system-ui,sans-serif">Same 150+ commands work identically across all providers</text>
</svg>