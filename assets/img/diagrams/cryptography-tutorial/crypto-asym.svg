<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" width="860" height="430" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="430" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">Asymmetric: Public + Private Keys</text>
<rect x="120" y="80" width="180" height="50" rx="8" fill="#1e40af"/>
<text x="210" y="110" text-anchor="middle" class="node-title-w">public key</text>
<text x="210" y="128" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">share freely</text>
<rect x="320" y="80" width="180" height="50" rx="8" fill="#2563eb"/>
<text x="410" y="110" text-anchor="middle" class="node-title-w">private key</text>
<text x="410" y="128" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">keep secret forever</text>
<rect x="40" y="160" width="390" height="150" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="235" y="186" text-anchor="middle" class="band-label">Encrypt with public key</text>
<text x="235" y="212" text-anchor="middle" class="item">anyone can encrypt</text>
<text x="235" y="230" text-anchor="middle" class="item-sub">only the private key can decrypt</text>
<text x="235" y="258" text-anchor="middle" class="item-sub">used for: secure messaging, key exchange</text>
<text x="235" y="286" text-anchor="middle" class="item-sub">algorithms: RSA-2048+, ECC (X25519, P-256)</text>
<rect x="450" y="160" width="390" height="150" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="645" y="186" text-anchor="middle" class="band-label">Sign with private key</text>
<text x="645" y="212" text-anchor="middle" class="item">only you can sign</text>
<text x="645" y="230" text-anchor="middle" class="item-sub">anyone can verify with public</text>
<text x="645" y="258" text-anchor="middle" class="item-sub">used for: digital signatures, auth</text>
<text x="645" y="286" text-anchor="middle" class="item-sub">algorithms: RSA-PSS, Ed25519, ECDSA</text>
<rect x="40" y="326" width="800" height="60" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="350" text-anchor="middle" class="band-label">Key exchange (DH/ECDH): two parties derive a shared secret over an insecure channel, without ever sending it.</text>
<text x="430" y="372" text-anchor="middle" class="item-sub">ECDH on curve X25519 is the modern standard; used by TLS, SSH, Signal.</text>
</svg>
