<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" width="860" height="420" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="420" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">Symmetric Encryption: One Shared Key</text>
<rect x="60" y="80" width="120" height="50" rx="8" fill="#1e40af"/>
<text x="120" y="110" text-anchor="middle" class="node-title-w">plaintext</text>
<line x1="180" y1="105" x2="220" y2="105" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="220" y="80" width="140" height="50" rx="8" fill="#2563eb"/>
<text x="290" y="110" text-anchor="middle" class="node-title-w">AES-256-GCM</text>
<text x="290" y="128" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">encrypt(key, iv)</text>
<line x1="360" y1="105" x2="400" y2="105" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="400" y="80" width="120" height="50" rx="8" fill="#1e40af"/>
<text x="460" y="110" text-anchor="middle" class="node-title-w">ciphertext</text>
<line x1="520" y1="105" x2="560" y2="105" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="560" y="80" width="140" height="50" rx="8" fill="#2563eb"/>
<text x="630" y="110" text-anchor="middle" class="node-title-w">AES-256-GCM</text>
<text x="630" y="128" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">decrypt(key, iv)</text>
<line x1="700" y1="105" x2="740" y2="105" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="740" y="80" width="100" height="50" rx="8" fill="#16a34a"/>
<text x="790" y="110" text-anchor="middle" class="node-title-w">plain</text>
<rect x="40" y="160" width="780" height="80" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="186" text-anchor="middle" class="band-label">The key problem</text>
<text x="430" y="212" text-anchor="middle" class="item-sub">both sides need the same key; how do they share it securely? -&gt; asymmetric (Stage 2)</text>
<text x="430" y="232" text-anchor="middle" class="item-sub">or: pre-shared (PSK), or derive via key exchange (DH/ECDH)</text>
<rect x="40" y="256" width="780" height="100" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="282" text-anchor="middle" class="band-label">Modes of operation</text>
<rect x="60" y="298" width="170" height="44" rx="8" fill="#2563eb"/>
<text x="145" y="318" text-anchor="middle" class="node-title-w">GCM</text>
<text x="145" y="338" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">auth + enc (best)</text>
<rect x="250" y="298" width="170" height="44" rx="8" fill="#1e40af"/>
<text x="335" y="318" text-anchor="middle" class="node-title-w">CBC</text>
<text x="335" y="338" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">enc only, needs MAC</text>
<rect x="440" y="298" width="170" height="44" rx="8" fill="#2563eb"/>
<text x="525" y="318" text-anchor="middle" class="node-title-w">CTR</text>
<text x="525" y="338" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">stream-like</text>
<rect x="630" y="298" width="170" height="44" rx="8" fill="#1e40af"/>
<text x="715" y="318" text-anchor="middle" class="node-title-w">ChaCha20-Poly1305</text>
<text x="715" y="338" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">alt AEAD</text>
<rect x="40" y="370" width="780" height="30" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="430" y="390" text-anchor="middle" class="note">Always use an AEAD mode (GCM or ChaCha20-Poly1305) - it authenticates AND encrypts.</text>
</svg>
