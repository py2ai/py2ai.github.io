<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" width="860" height="440" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="440" fill="#ffffff"/>
<text x="320" y="38" text-anchor="middle" class="title">Protocols: TLS, HTTPS, SSH, PKI</text>
<rect x="40" y="70" width="780" height="70" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="84" width="200" height="42" rx="8" fill="#2563eb"/>
<text x="154" y="110" text-anchor="middle" class="node-title-w">TLS 1.3</text>
<rect x="274" y="84" width="120" height="42" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="334" y="103" text-anchor="middle" class="item">handshake</text>
<text x="334" y="118" text-anchor="middle" class="item-sub">ECDHE key exchange</text>
<rect x="404" y="84" width="120" height="42" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="464" y="103" text-anchor="middle" class="item">certificates</text>
<text x="464" y="118" text-anchor="middle" class="item-sub">prove server identity</text>
<rect x="534" y="84" width="120" height="42" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="594" y="103" text-anchor="middle" class="item">AEAD</text>
<text x="594" y="118" text-anchor="middle" class="item-sub">encrypt + auth channel</text>
<rect x="664" y="84" width="120" height="42" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="724" y="103" text-anchor="middle" class="item">HTTPS</text>
<text x="724" y="118" text-anchor="middle" class="item-sub">TLS over HTTP</text>
<rect x="40" y="150" width="780" height="70" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="164" width="200" height="42" rx="8" fill="#1e40af"/>
<text x="154" y="190" text-anchor="middle" class="node-title-w">SSH</text>
<rect x="274" y="164" width="120" height="42" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="334" y="183" text-anchor="middle" class="item">host keys</text>
<text x="334" y="198" text-anchor="middle" class="item-sub">prove server identity</text>
<rect x="404" y="164" width="120" height="42" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="464" y="183" text-anchor="middle" class="item">key exchange</text>
<text x="464" y="198" text-anchor="middle" class="item-sub">curve25519-sha256</text>
<rect x="534" y="164" width="120" height="42" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="594" y="183" text-anchor="middle" class="item">user auth</text>
<text x="594" y="198" text-anchor="middle" class="item-sub">public key, not password</text>
<rect x="664" y="164" width="120" height="42" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="724" y="183" text-anchor="middle" class="item">known_hosts</text>
<text x="724" y="198" text-anchor="middle" class="item-sub">TOFU model</text>
<rect x="40" y="230" width="780" height="70" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="244" width="200" height="42" rx="8" fill="#2563eb"/>
<text x="154" y="270" text-anchor="middle" class="node-title-w">PKI</text>
<rect x="274" y="244" width="120" height="42" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="334" y="263" text-anchor="middle" class="item">CA</text>
<text x="334" y="278" text-anchor="middle" class="item-sub">certificate authority</text>
<rect x="404" y="244" width="120" height="42" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="464" y="263" text-anchor="middle" class="item">cert chain</text>
<text x="464" y="278" text-anchor="middle" class="item-sub">root -&gt; intermediate -&gt; leaf</text>
<rect x="534" y="244" width="120" height="42" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="594" y="263" text-anchor="middle" class="item">X.509</text>
<text x="594" y="278" text-anchor="middle" class="item-sub">certificate format</text>
<rect x="664" y="244" width="120" height="42" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="724" y="263" text-anchor="middle" class="item">revocation</text>
<text x="724" y="278" text-anchor="middle" class="item-sub">CRL / OCSP</text>
<rect x="40" y="310" width="780" height="70" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="324" width="200" height="42" rx="8" fill="#1e40af"/>
<text x="154" y="350" text-anchor="middle" class="node-title-w">Applied</text>
<rect x="274" y="324" width="120" height="42" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="334" y="343" text-anchor="middle" class="item">JWT</text>
<text x="334" y="358" text-anchor="middle" class="item-sub">signed tokens</text>
<rect x="404" y="324" width="120" height="42" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="464" y="343" text-anchor="middle" class="item">OAuth 2.1</text>
<text x="464" y="358" text-anchor="middle" class="item-sub">delegated auth</text>
<rect x="534" y="324" width="120" height="42" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="594" y="343" text-anchor="middle" class="item">E2E encryption</text>
<text x="594" y="358" text-anchor="middle" class="item-sub">Signal protocol</text>
<rect x="664" y="324" width="120" height="42" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="724" y="343" text-anchor="middle" class="item">zero-knowledge</text>
<text x="724" y="358" text-anchor="middle" class="item-sub">prove without revealing</text>
</svg>
