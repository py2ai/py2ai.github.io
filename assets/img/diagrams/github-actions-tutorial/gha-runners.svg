<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" width="860" height="440" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
  .mono { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 11px; fill: #0f172a; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="440" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">Runners, Matrix, Cache, Artifacts</text>
<rect x="40" y="70" width="390" height="170" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="235" y="96" text-anchor="middle" class="band-label">GitHub-hosted</text>
<text x="235" y="124" text-anchor="middle" class="item">ubuntu/windows/macos-latest</text>
<text x="235" y="146" text-anchor="middle" class="item-sub">ephemeral, managed, free tier</text>
<text x="235" y="180" text-anchor="middle" class="item-sub">runs-on: ubuntu-latest</text>
<text x="235" y="210" text-anchor="middle" class="item-sub">no setup, limited customization</text>
<rect x="460" y="70" width="390" height="170" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="655" y="96" text-anchor="middle" class="band-label">Self-hosted</text>
<text x="655" y="124" text-anchor="middle" class="item">your machine / VM / k8s</text>
<text x="655" y="146" text-anchor="middle" class="item-sub">persistent, full control</text>
<text x="655" y="180" text-anchor="middle" class="item-sub">runs-on: self-hosted</text>
<text x="655" y="210" text-anchor="middle" class="item-sub">maintain + secure it yourself</text>
<rect x="40" y="254" width="780" height="90" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="280" text-anchor="middle" class="band-label">Matrix: test across combinations</text>
<rect x="60" y="296" width="740" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="430" y="322" text-anchor="middle" class="mono">strategy.matrix: os [ubuntu, windows, macos] x node [18, 20, 22] -&gt; 9 jobs</text>
<rect x="40" y="356" width="780" height="60" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="376" text-anchor="middle" class="band-label">Cache + Artifacts</text>
<text x="430" y="398" text-anchor="middle" class="item-sub">actions/cache for deps; upload-artifact/download-artifact to pass build outputs between jobs</text>
</svg>
