<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460" width="860" height="460" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
  .mono { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 11px; fill: #0f172a; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="460" fill="#ffffff"/>
<text x="280" y="38" text-anchor="middle" class="title">Workflow -&gt; Job -&gt; Step -&gt; Action/Run</text>
<rect x="300" y="70" width="260" height="46" rx="8" fill="#1e40af"/>
<text x="430" y="100" text-anchor="middle" class="node-title-w">workflow (.yml)</text>
<text x="430" y="118" text-anchor="middle" class="item-sub">on: [push]</text>
<line x1="430" y1="128" x2="430" y2="148" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="300" y="150" width="260" height="46" rx="8" fill="#2563eb"/>
<text x="430" y="180" text-anchor="middle" class="node-title-w">job: build</text>
<text x="430" y="198" text-anchor="middle" class="item-sub">runs-on: ubuntu-latest</text>
<line x1="430" y1="206" x2="430" y2="226" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="40" y="228" width="780" height="180" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="252" text-anchor="middle" class="band-label">steps:</text>
<rect x="70" y="262" width="135" height="56" rx="8" fill="#1e40af"/>
<text x="137" y="286" text-anchor="middle" class="node-title-w">checkout</text>
<text x="137" y="306" text-anchor="middle" font-size="8" fill="#e0e7ff" font-family="inherit">uses: actions/checkout@v4</text>
<line x1="205" y1="290" x2="218" y2="290" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="218" y="262" width="135" height="56" rx="8" fill="#2563eb"/>
<text x="285" y="286" text-anchor="middle" class="node-title-w">setup-node</text>
<text x="285" y="306" text-anchor="middle" font-size="8" fill="#e0e7ff" font-family="inherit">uses: actions/setup-node@v4</text>
<line x1="353" y1="290" x2="366" y2="290" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="366" y="262" width="135" height="56" rx="8" fill="#1e40af"/>
<text x="433" y="286" text-anchor="middle" class="node-title-w">install</text>
<text x="433" y="306" text-anchor="middle" font-size="8" fill="#e0e7ff" font-family="inherit">run: npm ci</text>
<line x1="501" y1="290" x2="514" y2="290" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="514" y="262" width="135" height="56" rx="8" fill="#2563eb"/>
<text x="581" y="286" text-anchor="middle" class="node-title-w">test</text>
<text x="581" y="306" text-anchor="middle" font-size="8" fill="#e0e7ff" font-family="inherit">run: npm test</text>
<line x1="649" y1="290" x2="662" y2="290" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="662" y="262" width="135" height="56" rx="8" fill="#1e40af"/>
<text x="729" y="286" text-anchor="middle" class="node-title-w">build</text>
<text x="729" y="306" text-anchor="middle" font-size="8" fill="#e0e7ff" font-family="inherit">run: npm run build</text>
<text x="430" y="360" text-anchor="middle" class="item-sub">each step = an action (uses:) or a shell command (run:)</text>
<rect x="40" y="420" width="780" height="30" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="430" y="440" text-anchor="middle" class="note">One workflow -&gt; N jobs (parallel by default); each job -&gt; ordered steps.</text>
</svg>
