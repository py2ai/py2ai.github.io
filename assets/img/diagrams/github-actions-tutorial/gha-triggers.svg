<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" width="860" height="440" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
  .mono { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 11px; fill: #0f172a; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="440" fill="#ffffff"/>
<text x="320" y="38" text-anchor="middle" class="title">Triggers (the 'on:' field)</text>
<rect x="40" y="68" width="190" height="84" rx="8" fill="#2563eb"/>
<text x="135.0" y="92" text-anchor="middle" class="node-title-w">push</text>
<text x="135.0" y="112" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">on push to branches/tags</text>
<text x="135.0" y="130" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">run on every push</text>
<rect x="242" y="68" width="190" height="84" rx="8" fill="#1e40af"/>
<text x="337.0" y="92" text-anchor="middle" class="node-title-w">pull_request</text>
<text x="337.0" y="112" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">on PR open/sync/close</text>
<text x="337.0" y="130" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">gate merges</text>
<rect x="444" y="68" width="190" height="84" rx="8" fill="#2563eb"/>
<text x="539.0" y="92" text-anchor="middle" class="node-title-w">schedule</text>
<text x="539.0" y="112" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">cron: '0 2 * * *'</text>
<text x="539.0" y="130" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">nightly jobs</text>
<rect x="646" y="68" width="190" height="84" rx="8" fill="#1e40af"/>
<text x="741.0" y="92" text-anchor="middle" class="node-title-w">workflow_dispatch</text>
<text x="741.0" y="112" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">manual button in UI</text>
<text x="741.0" y="130" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">run on demand</text>
<rect x="40" y="166" width="190" height="84" rx="8" fill="#1e40af"/>
<text x="135.0" y="190" text-anchor="middle" class="node-title-w">release</text>
<text x="135.0" y="210" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">on release published</text>
<text x="135.0" y="228" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">ship artifacts</text>
<rect x="242" y="166" width="190" height="84" rx="8" fill="#2563eb"/>
<text x="337.0" y="190" text-anchor="middle" class="node-title-w">repository_dispatch</text>
<text x="337.0" y="210" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">external webhook</text>
<text x="337.0" y="228" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">trigger from outside</text>
<rect x="444" y="166" width="190" height="84" rx="8" fill="#1e40af"/>
<text x="539.0" y="190" text-anchor="middle" class="node-title-w">paths / paths-ignore</text>
<text x="539.0" y="210" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">only if changed files match</text>
<text x="539.0" y="228" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">skip unrelated</text>
<rect x="646" y="166" width="190" height="84" rx="8" fill="#2563eb"/>
<text x="741.0" y="190" text-anchor="middle" class="node-title-w">workflow_run</text>
<text x="741.0" y="210" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">after another workflow</text>
<text x="741.0" y="228" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">chained pipelines</text>
</svg>
