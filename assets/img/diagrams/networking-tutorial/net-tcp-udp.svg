<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" width="860" height="420" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="420" fill="#ffffff"/>
<text x="330" y="38" text-anchor="middle" class="title">TCP 3-Way Handshake + UDP</text>
<rect x="40" y="66" width="400" height="300" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="240" y="88" text-anchor="middle" class="band-label">TCP connection setup</text>
<text x="120" y="120" text-anchor="middle" class="node-title">Client</text>
<text x="360" y="120" text-anchor="middle" class="node-title">Server</text>
<line x1="130" y1="150" x2="350" y2="185" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-accent)"/>
<text x="240" y="148" text-anchor="middle" class="item">SYN</text>
<line x1="350" y1="210" x2="130" y2="245" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-accent)"/>
<text x="240" y="208" text-anchor="middle" class="item">SYN-ACK</text>
<line x1="130" y1="270" x2="350" y2="305" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-accent)"/>
<text x="240" y="268" text-anchor="middle" class="item">ACK</text>
<text x="240" y="330" text-anchor="middle" class="item-sub">connected - reliable, ordered, flow-controlled</text>
<rect x="460" y="66" width="380" height="300" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="650" y="88" text-anchor="middle" class="band-label">UDP (fire-and-forget)</text>
<text x="540" y="120" text-anchor="middle" class="node-title">Sender</text>
<text x="760" y="120" text-anchor="middle" class="node-title">Receiver</text>
<line x1="550" y1="150" x2="750" y2="185" stroke="#9333ea" stroke-width="2" marker-end="url(#arrow)"/>
<text x="650" y="148" text-anchor="middle" class="item">datagram</text>
<text x="650" y="210" text-anchor="middle" class="item-sub">no handshake</text>
<text x="650" y="232" text-anchor="middle" class="item-sub">no delivery guarantee</text>
<text x="650" y="254" text-anchor="middle" class="item-sub">no ordering</text>
<text x="650" y="290" text-anchor="middle" class="item-sub">use: DNS, video, gaming, QUIC</text>
</svg>
