<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" width="860" height="420" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="420" fill="#ffffff"/>
<text x="280" y="38" text-anchor="middle" class="title">HTTPS Request Lifecycle</text>
<rect x="40" y="70" width="780" height="44" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="76" width="200" height="32" rx="8" fill="#2563eb"/>
<text x="154" y="96" text-anchor="middle" class="node-title-w">1. DNS lookup</text>
<rect x="274" y="76" width="320" height="32" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="434" y="96" text-anchor="middle" class="item">pyshine.com -&gt; 185.199.108.153</text>
<rect x="610" y="76" width="200" height="32" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="710" y="96" text-anchor="middle" class="item-sub">UDP/TCP 53</text>
<line x1="430" y1="114" x2="430" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="40" y="122" width="780" height="44" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="128" width="200" height="32" rx="8" fill="#1e40af"/>
<text x="154" y="148" text-anchor="middle" class="node-title-w">2. TCP handshake</text>
<rect x="274" y="128" width="320" height="32" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="434" y="148" text-anchor="middle" class="item">SYN / SYN-ACK / ACK to :443</text>
<rect x="610" y="128" width="200" height="32" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="710" y="148" text-anchor="middle" class="item-sub">transport</text>
<line x1="430" y1="166" x2="430" y2="172" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="40" y="174" width="780" height="44" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="180" width="200" height="32" rx="8" fill="#2563eb"/>
<text x="154" y="200" text-anchor="middle" class="node-title-w">3. TLS handshake</text>
<rect x="274" y="180" width="320" height="32" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="434" y="200" text-anchor="middle" class="item">ClientHello, certs, key exchange</text>
<rect x="610" y="180" width="200" height="32" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="710" y="200" text-anchor="middle" class="item-sub">crypto</text>
<line x1="430" y1="218" x2="430" y2="224" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="40" y="226" width="780" height="44" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="232" width="200" height="32" rx="8" fill="#1e40af"/>
<text x="154" y="252" text-anchor="middle" class="node-title-w">4. HTTP request</text>
<rect x="274" y="232" width="320" height="32" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="434" y="252" text-anchor="middle" class="item">GET / HTTP/2 Host: pyshine.com</text>
<rect x="610" y="232" width="200" height="32" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="710" y="252" text-anchor="middle" class="item-sub">application</text>
<line x1="430" y1="270" x2="430" y2="276" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="40" y="278" width="780" height="44" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="284" width="200" height="32" rx="8" fill="#2563eb"/>
<text x="154" y="304" text-anchor="middle" class="node-title-w">5. Server response</text>
<rect x="274" y="284" width="320" height="32" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="434" y="304" text-anchor="middle" class="item">200 OK, headers, body</text>
<rect x="610" y="284" width="200" height="32" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="710" y="304" text-anchor="middle" class="item-sub">application</text>
<line x1="430" y1="322" x2="430" y2="328" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="40" y="330" width="780" height="44" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="336" width="200" height="32" rx="8" fill="#1e40af"/>
<text x="154" y="356" text-anchor="middle" class="node-title-w">6. Render / use</text>
<rect x="274" y="336" width="320" height="32" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="434" y="356" text-anchor="middle" class="item">client parses + displays</text>
<rect x="610" y="336" width="200" height="32" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="710" y="356" text-anchor="middle" class="item-sub">client</text>
</svg>
