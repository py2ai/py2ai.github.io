<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1000" height="620" fill="#ffffff"/>

  <text x="500" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Strix — Key Features</text>
  <text x="500" y="62" text-anchor="middle" font-size="13" fill="#64748b">AI-powered penetration testing capabilities</text>

  <!-- 6 feature cards in 2x3 grid -->

  <!-- Card 1: Agentic Tools -->
  <rect x="60" y="90" width="280" height="150" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <circle cx="100" cy="130" r="18" fill="#2563eb"/>
  <text x="100" y="135" text-anchor="middle" font-size="16" fill="#ffffff" font-weight="700">1</text>
  <text x="130" y="135" font-size="15" font-weight="700" fill="#1e3a8a">Agentic Tools</text>
  <text x="80" y="165" font-size="12" fill="#3730a3">HTTP interception (Caido), browser</text>
  <text x="80" y="183" font-size="12" fill="#3730a3">exploitation (Playwright), shell</text>
  <text x="80" y="201" font-size="12" fill="#3730a3">execution, custom exploit runtime,</text>
  <text x="80" y="219" font-size="12" fill="#3730a3">recon & OSINT capabilities.</text>

  <!-- Card 2: Vulnerability Scanner -->
  <rect x="360" y="90" width="280" height="150" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <circle cx="400" cy="130" r="18" fill="#dc2626"/>
  <text x="400" y="135" text-anchor="middle" font-size="16" fill="#ffffff" font-weight="700">2</text>
  <text x="430" y="135" font-size="15" font-weight="700" fill="#7f1d1d">Vulnerability Scanner</text>
  <text x="380" y="165" font-size="12" fill="#991b1b">OWASP Top 10 coverage: broken</text>
  <text x="380" y="183" font-size="12" fill="#991b1b">access control, injection, SSRF,</text>
  <text x="380" y="201" font-size="12" fill="#991b1b">XSS, business logic, auth/session,</text>
  <text x="380" y="219" font-size="12" fill="#991b1b">API security, cloud/infra issues.</text>

  <!-- Card 3: Multi-Agent Orchestration -->
  <rect x="660" y="90" width="280" height="150" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <circle cx="700" cy="130" r="18" fill="#16a34a"/>
  <text x="700" y="135" text-anchor="middle" font-size="16" fill="#ffffff" font-weight="700">3</text>
  <text x="730" y="135" font-size="15" font-weight="700" fill="#14532d">Multi-Agent Orchestration</text>
  <text x="680" y="165" font-size="12" fill="#166534">Distributed pentesting, parallel</text>
  <text x="680" y="183" font-size="12" fill="#166534">execution, dynamic coordination</text>
  <text x="680" y="201" font-size="12" fill="#166534">between recon, exploit & post-</text>
  <text x="680" y="219" font-size="12" fill="#166534">exploitation agents.</text>

  <!-- Card 4: CI/CD Integration -->
  <rect x="60" y="270" width="280" height="150" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <circle cx="100" cy="310" r="18" fill="#7c3aed"/>
  <text x="100" y="315" text-anchor="middle" font-size="16" fill="#ffffff" font-weight="700">4</text>
  <text x="130" y="315" font-size="15" font-weight="700" fill="#5b21b6">CI/CD Integration</text>
  <text x="80" y="345" font-size="12" fill="#4c1d95">GitHub Actions workflow, PR</text>
  <text x="80" y="363" font-size="12" fill="#4c1d95">scanning, automated security</text>
  <text x="80" y="381" font-size="12" fill="#4c1d95">gates, shift-left DevSecOps</text>
  <text x="80" y="399" font-size="12" fill="#4c1d95">pipeline integration.</text>

  <!-- Card 5: Auto-Fix -->
  <rect x="360" y="270" width="280" height="150" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <circle cx="400" cy="310" r="18" fill="#059669"/>
  <text x="400" y="315" text-anchor="middle" font-size="16" fill="#ffffff" font-weight="700">5</text>
  <text x="430" y="315" font-size="15" font-weight="700" fill="#065f46">Auto-Fix</text>
  <text x="380" y="345" font-size="12" fill="#065f46">Automated remediation patch</text>
  <text x="380" y="363" font-size="12" fill="#065f46">generation with developer-first</text>
  <text x="380" y="381" font-size="12" fill="#065f46">guidance and actionable fix</text>
  <text x="380" y="399" font-size="12" fill="#065f46">recommendations.</text>

  <!-- Card 6: Compliance Reports -->
  <rect x="660" y="270" width="280" height="150" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <circle cx="700" cy="310" r="18" fill="#0284c7"/>
  <text x="700" y="315" text-anchor="middle" font-size="16" fill="#ffffff" font-weight="700">6</text>
  <text x="730" y="315" font-size="15" font-weight="700" fill="#075985">Compliance Reports</text>
  <text x="680" y="345" font-size="12" fill="#0369a1">SOC 2, ISO 27001, PCI DSS</text>
  <text x="680" y="363" font-size="12" fill="#0369a1">ready reports with evidence,</text>
  <text x="680" y="381" font-size="12" fill="#0369a1">CVSS scoring and audit-ready</text>
  <text x="680" y="399" font-size="12" fill="#0369a1">documentation.</text>

  <!-- Bottom highlight bar -->
  <rect x="60" y="450" width="880" height="120" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="500" y="478" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Built on Industry-Leading Open Source</text>

  <rect x="110" y="496" width="130" height="34" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="175" y="518" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">LiteLLM</text>

  <rect x="260" y="496" width="130" height="34" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="325" y="518" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">Caido</text>

  <rect x="410" y="496" width="130" height="34" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="475" y="518" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">Nuclei</text>

  <rect x="560" y="496" width="130" height="34" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="625" y="518" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">Playwright</text>

  <rect x="710" y="496" width="130" height="34" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="775" y="518" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">Textual</text>

  <text x="500" y="556" text-anchor="middle" font-size="12" fill="#64748b">Apache 2.0 License · Python-based · 37,984 ⭐</text>
</svg>