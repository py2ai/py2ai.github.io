<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1000" height="720" fill="#ffffff"/>

  <!-- Title -->
  <text x="500" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Strix — System Architecture</text>
  <text x="500" y="58" text-anchor="middle" font-size="13" fill="#64748b">AI-Powered Penetration Testing Platform</text>

  <!-- CLI Interface -->
  <rect x="370" y="80" width="260" height="50" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="500" y="110" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a8a">CLI / TUI Interface (Textual)</text>

  <!-- arrow down -->
  <line x1="500" y1="130" x2="500" y2="160" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Core Orchestrator -->
  <rect x="330" y="160" width="340" height="56" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="500" y="184" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">Core Orchestrator</text>
  <text x="500" y="204" text-anchor="middle" font-size="11" fill="#3730a3">Task planning · Agent coordination · State management</text>

  <!-- arrow down to agents -->
  <line x1="500" y1="216" x2="500" y2="246" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Multi-Agent System container -->
  <rect x="60" y="246" width="560" height="150" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="340" y="268" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">Multi-Agent System</text>

  <!-- Recon Agent -->
  <rect x="80" y="280" width="150" height="50" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="155" y="300" text-anchor="middle" font-size="12" font-weight="600" fill="#14532d">Recon Agent</text>
  <text x="155" y="316" text-anchor="middle" font-size="10" fill="#166534">OSINT · Discovery</text>

  <!-- Exploit Agent -->
  <rect x="250" y="280" width="150" height="50" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="325" y="300" text-anchor="middle" font-size="12" font-weight="600" fill="#14532d">Exploit Agent</text>
  <text x="325" y="316" text-anchor="middle" font-size="10" fill="#166534">PoC Validation</text>

  <!-- Post-Exploit Agent -->
  <rect x="420" y="280" width="170" height="50" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="505" y="300" text-anchor="middle" font-size="12" font-weight="600" fill="#14532d">Post-Exploit Agent</text>
  <text x="505" y="316" text-anchor="middle" font-size="10" fill="#166534">Impact · Lateral</text>

  <!-- Agent collaboration arrows -->
  <line x1="230" y1="305" x2="250" y2="305" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="400" y1="305" x2="420" y2="305" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Skills layer -->
  <rect x="80" y="340" width="510" height="44" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="335" y="368" text-anchor="middle" font-size="12" font-weight="600" fill="#713f12">Pentesting Skills / Capabilities Library</text>

  <!-- arrow from agents to tools -->
  <line x1="500" y1="396" x2="500" y2="426" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Tools layer -->
  <rect x="60" y="426" width="560" height="110" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="340" y="448" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">Offensive Security Toolkit</text>

  <rect x="80" y="460" width="120" height="40" rx="5" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="140" y="485" text-anchor="middle" font-size="11" font-weight="600" fill="#7f1d1d">HTTP Proxy (Caido)</text>

  <rect x="215" y="460" width="120" height="40" rx="5" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="275" y="485" text-anchor="middle" font-size="11" font-weight="600" fill="#7f1d1d">Browser (Playwright)</text>

  <rect x="350" y="460" width="120" height="40" rx="5" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="410" y="485" text-anchor="middle" font-size="11" font-weight="600" fill="#7f1d1d">Shell Execution</text>

  <rect x="485" y="460" width="120" height="40" rx="5" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="545" y="485" text-anchor="middle" font-size="11" font-weight="600" fill="#7f1d1d">Recon / OSINT</text>

  <!-- LLM Providers (right side) -->
  <rect x="680" y="160" width="280" height="200" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="820" y="182" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">LLM Providers (LiteLLM)</text>

  <rect x="700" y="196" width="240" height="30" rx="5" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="820" y="216" text-anchor="middle" font-size="11" fill="#4c1d95">OpenAI GPT-5.4</text>

  <rect x="700" y="232" width="240" height="30" rx="5" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="820" y="252" text-anchor="middle" font-size="11" fill="#4c1d95">Anthropic Claude Sonnet 4.6</text>

  <rect x="700" y="268" width="240" height="30" rx="5" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="820" y="288" text-anchor="middle" font-size="11" fill="#4c1d95">Google Gemini 3 Pro</text>

  <rect x="700" y="304" width="240" height="30" rx="5" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="820" y="324" text-anchor="middle" font-size="11" fill="#4c1d95">Vertex AI · Bedrock · Azure</text>

  <rect x="700" y="340" width="240" height="30" rx="5" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="820" y="360" text-anchor="middle" font-size="11" fill="#4c1d95">Local Models (Ollama / vLLM)</text>

  <!-- LLM to orchestrator arrow -->
  <line x1="680" y1="188" x2="670" y2="188" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <text x="675" y="178" text-anchor="middle" font-size="9" fill="#7c3aed">inference</text>

  <!-- Docker Sandbox -->
  <rect x="60" y="560" width="300" height="60" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="210" y="585" text-anchor="middle" font-size="14" font-weight="700" fill="#075985">Docker Sandbox Runtime</text>
  <text x="210" y="605" text-anchor="middle" font-size="11" fill="#0369a1">Isolated execution environment</text>

  <!-- Report Engine -->
  <rect x="400" y="560" width="300" height="60" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="550" y="585" text-anchor="middle" font-size="14" font-weight="700" fill="#075985">Report Engine</text>
  <text x="550" y="605" text-anchor="middle" font-size="11" fill="#0369a1">SOC 2 · ISO 27001 · PCI DSS</text>

  <!-- arrows from tools to sandbox and report -->
  <line x1="210" y1="536" x2="210" y2="560" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="550" y1="536" x2="550" y2="560" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Config / Telemetry (right bottom) -->
  <rect x="740" y="560" width="220" height="60" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="850" y="585" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Config & Telemetry</text>
  <text x="850" y="605" text-anchor="middle" font-size="11" fill="#475569">Settings · Logging · Metrics</text>

  <line x1="820" y1="360" x2="850" y2="560" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-gray)"/>

  <!-- Legend -->
  <rect x="60" y="660" width="880" height="44" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="80" y1="678" x2="110" y2="678" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="118" y="682" font-size="11" fill="#334155">Data Flow</text>
  <line x1="210" y1="678" x2="240" y2="678" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="248" y="682" font-size="11" fill="#334155">Agent Collaboration / Success</text>
  <line x1="470" y1="678" x2="500" y2="678" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <text x="508" y="682" font-size="11" fill="#334155">Support / Telemetry</text>
  <rect x="640" y="672" width="14" height="14" rx="3" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="662" y="682" font-size="11" fill="#334155">Offensive Tools</text>
  <rect x="770" y="672" width="14" height="14" rx="3" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="792" y="682" font-size="11" fill="#334155">LLM Layer</text>
</svg>