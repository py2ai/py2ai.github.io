  <text x="108" y="272" text-anchor="middle" class="comp">Parser</text>
  <rect x="240" y="248" width="104" height="40" rx="8" fill="#10b981" filter="url(#shadow)"/>
  <text x="292" y="272" text-anchor="middle" class="comp">Fetcher</text>
