  <path d="M476,288 L476,320 L284,320 L284,352" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <path d="M376,366 L600,366" fill="none" stroke="#059669" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arr-green)"/>
  <text x="488" y="360" text-anchor="middle" class="label" fill="#059669">persist</text>
  <path d="M600,382 L376,382" fill="none" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="488" y="396" text-anchor="middle" class="label" fill="#059669">retrieve</text>
  <path d="M284,396 L284,432 L480,432 L480,456" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <path d="M668,288 L668,432 L480,432" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
