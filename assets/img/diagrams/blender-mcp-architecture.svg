<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600">
  <!-- Background -->
  <rect width="900" height="600" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#333333">BlenderMCP Architecture</text>
  
  <!-- Claude AI Box -->
  <rect x="50" y="100" width="200" height="150" rx="10" fill="#4a90d9" stroke="#6bb3f0" stroke-width="2"/>
  <text x="150" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">Claude AI</text>
  <text x="150" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">Natural Language</text>
  <text x="150" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">Understanding</text>
  <text x="150" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">Context Awareness</text>
  <text x="150" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">Tool Orchestration</text>
  
  <!-- MCP Server Box -->
  <rect x="350" y="100" width="200" height="150" rx="10" fill="#e94560" stroke="#ff6b8a" stroke-width="2"/>
  <text x="450" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">MCP Server</text>
  <text x="450" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">Protocol Handler</text>
  <text x="450" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">Tool Registry</text>
  <text x="450" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">Command Router</text>
  <text x="450" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">JSON Protocol</text>
  
  <!-- Blender Addon Box -->
  <rect x="650" y="100" width="200" height="150" rx="10" fill="#f39c12" stroke="#f5b041" stroke-width="2"/>
  <text x="750" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">Blender Addon</text>
  <text x="750" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">Socket Server</text>
  <text x="750" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">Command Executor</text>
  <text x="750" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">Python API</text>
  <text x="750" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">Scene Manager</text>
  
  <!-- Arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555555"/>
    </marker>
  </defs>
  
  <!-- Claude to MCP -->
  <line x1="250" y1="175" x2="340" y2="175" stroke="#555555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="295" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666666">MCP Protocol</text>
  
  <!-- MCP to Blender -->
  <line x1="550" y1="175" x2="640" y2="175" stroke="#555555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="595" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666666">TCP Socket</text>
  
  <!-- Integration Boxes -->
  <rect x="50" y="320" width="180" height="100" rx="8" fill="#27ae60" stroke="#2ecc71" stroke-width="2"/>
  <text x="140" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Poly Haven</text>
  <text x="140" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">HDRIs</text>
  <text x="140" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Textures, Models</text>
  
  <rect x="250" y="320" width="180" height="100" rx="8" fill="#8e44ad" stroke="#9b59b6" stroke-width="2"/>
  <text x="340" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Hyper3D Rodin</text>
  <text x="340" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">AI 3D Generation</text>
  <text x="340" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Text-to-3D</text>
  
  <rect x="450" y="320" width="180" height="100" rx="8" fill="#3498db" stroke="#5dade2" stroke-width="2"/>
  <text x="540" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Sketchfab</text>
  <text x="540" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Model Search</text>
  <text x="540" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Download & Import</text>
  
  <rect x="650" y="320" width="180" height="100" rx="8" fill="#e74c3c" stroke="#ec7063" stroke-width="2"/>
  <text x="740" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Hunyuan3D</text>
  <text x="740" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Text/Image to 3D</text>
  <text x="740" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Built-in Materials</text>
  
  <!-- Connection lines to integrations -->
  <line x1="750" y1="260" x2="750" y2="310" stroke="#555555" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="540" y1="260" x2="540" y2="310" stroke="#555555" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="340" y1="260" x2="340" y2="310" stroke="#555555" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="140" y1="260" x2="140" y2="310" stroke="#555555" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Blender 3D Box -->
  <rect x="300" y="480" width="300" height="100" rx="10" fill="#f97316" stroke="#fb923c" stroke-width="2"/>
  <text x="450" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">Blender 3D</text>
  <text x="450" y="550" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">3D Modeling, Rendering, Animation</text>
  
  <!-- Arrow from Addon to Blender -->
  <line x1="750" y1="260" x2="600" y2="480" stroke="#555555" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Legend -->
  <text x="450" y="580" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888888">BlenderMCP: AI-Powered 3D Content Creation</text>
</svg>