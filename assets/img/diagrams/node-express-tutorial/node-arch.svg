<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" width="860" height="430" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="430" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">Node.js Architecture</text>
<rect x="330" y="70" width="200" height="46" rx="8" fill="#1e40af"/>
<text x="430" y="100" text-anchor="middle" class="node-title-w">V8 (JS engine)</text>
<rect x="330" y="130" width="200" height="46" rx="8" fill="#2563eb"/>
<text x="430" y="160" text-anchor="middle" class="node-title-w">Node bindings (C++)</text>
<rect x="330" y="190" width="200" height="46" rx="8" fill="#1e40af"/>
<text x="430" y="220" text-anchor="middle" class="node-title-w">libuv: event loop + thread pool</text>
<line x1="430" y1="236" x2="430" y2="256" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="40" y="258" width="400" height="130" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="240" y="282" text-anchor="middle" class="band-label">Event loop (1 thread)</text>
<rect x="60" y="294" width="360" height="14" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="245" y="305" text-anchor="middle" class="item-sub">timers</text>
<rect x="60" y="310" width="360" height="14" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="245" y="321" text-anchor="middle" class="item-sub">pending callbacks</text>
<rect x="60" y="326" width="360" height="14" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="245" y="337" text-anchor="middle" class="item-sub">poll (I/O)</text>
<rect x="60" y="342" width="360" height="14" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="245" y="353" text-anchor="middle" class="item-sub">check / setImmediate</text>
<rect x="60" y="358" width="360" height="14" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="245" y="369" text-anchor="middle" class="item-sub">close callbacks</text>
<rect x="460" y="258" width="380" height="130" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="650" y="282" text-anchor="middle" class="band-label">Thread pool (libuv, 4 threads)</text>
<rect x="480" y="294" width="340" height="14" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="650" y="305" text-anchor="middle" class="item-sub">fs (file I/O)</text>
<rect x="480" y="310" width="340" height="14" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="650" y="321" text-anchor="middle" class="item-sub">crypto.pbkdf2</text>
<rect x="480" y="326" width="340" height="14" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="650" y="337" text-anchor="middle" class="item-sub">DNS lookup</text>
<rect x="480" y="342" width="340" height="14" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="650" y="353" text-anchor="middle" class="item-sub">compress</text>
<line x1="240" y1="390" x2="650" y2="390" stroke="#2563eb" stroke-width="1" marker-end="url(#arrow-accent)"/>
<text x="445" y="382" text-anchor="middle" class="item-sub">offload blocking work</text>
<rect x="40" y="398" width="800" height="26" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="430" y="416" text-anchor="middle" class="note">Non-blocking I/O on one thread; heavy CPU work goes to the libuv thread pool.</text>
</svg>
