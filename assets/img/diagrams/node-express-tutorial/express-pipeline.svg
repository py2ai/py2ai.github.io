<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" width="860" height="440" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="440" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">Express: Request -&gt; Middleware -&gt; Route -&gt; Response</text>
<rect x="60" y="90" width="140" height="50" rx="8" fill="#1e40af"/>
<text x="130" y="120" text-anchor="middle" class="node-title-w">Request</text>
<line x1="200" y1="115" x2="240" y2="115" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-accent)"/>
<rect x="240" y="90" width="120" height="50" rx="8" fill="#2563eb"/>
<text x="300" y="120" text-anchor="middle" class="node-title-w">logger</text>
<line x1="360" y1="115" x2="380" y2="115" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<text x="300" y="160" text-anchor="item-sub" class="11">next()</text>
<rect x="380" y="90" width="120" height="50" rx="8" fill="#1e40af"/>
<text x="440" y="120" text-anchor="middle" class="node-title-w">cors</text>
<line x1="500" y1="115" x2="520" y2="115" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<text x="440" y="160" text-anchor="item-sub" class="11">next()</text>
<rect x="520" y="90" width="120" height="50" rx="8" fill="#2563eb"/>
<text x="580" y="120" text-anchor="middle" class="node-title-w">auth</text>
<line x1="640" y1="115" x2="660" y2="115" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<text x="580" y="160" text-anchor="item-sub" class="11">next()</text>
<rect x="660" y="90" width="120" height="50" rx="8" fill="#1e40af"/>
<text x="720" y="120" text-anchor="middle" class="node-title-w">parser</text>
<line x1="780" y1="115" x2="800" y2="115" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<text x="720" y="160" text-anchor="item-sub" class="11">next()</text>
<rect x="800" y="90" width="160" height="50" rx="8" fill="#1e40af"/>
<text x="880" y="120" text-anchor="middle" class="node-title-w">route handler</text>
<line x1="960" y1="115" x2="980" y2="115" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-accent)"/>
<rect x="980" y="90" width="140" height="50" rx="8" fill="#2563eb"/>
<text x="1050" y="120" text-anchor="middle" class="node-title-w">Response</text>
<line x1="430" y1="140" x2="430" y2="200" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow)"/>
<text x="445" y="172" text-anchor="start" class="item-sub">err -&gt;</text>
<rect x="330" y="210" width="200" height="50" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="430" y="232" text-anchor="middle" class="item">error-handling middleware</text>
<text x="430" y="250" text-anchor="middle" class="item-sub">(err, req, res, next)</text>
<line x1="430" y1="260" x2="430" y2="300" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-accent)"/>
<text x="445" y="282" text-anchor="start" class="item-sub">res.status(500)</text>
<rect x="40" y="340" width="780" height="40" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="430" y="362" text-anchor="middle" class="note">Middleware run in order; next() passes control; one handler sends the response.</text>
</svg>
