<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" width="860" height="400" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="400" fill="#ffffff"/>
<text x="320" y="38" text-anchor="middle" class="title">Modules: CommonJS vs ESM + npm</text>
<rect x="40" y="70" width="380" height="160" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="230" y="96" text-anchor="middle" class="band-label">CommonJS (legacy)</text>
<rect x="60" y="112" width="340" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="230" y="130" text-anchor="middle" class="item">const fs = require("fs")</text>
<text x="230" y="146" text-anchor="middle" class="item-sub">module.exports = { add }</text>
<text x="230" y="180" text-anchor="middle" class="item-sub">.cjs / package.json "commonjs"</text>
<text x="230" y="200" text-anchor="middle" class="item-sub">synchronous, runtime resolve</text>
<text x="230" y="220" text-anchor="middle" class="item-sub">__dirname, __dirname available</text>
<rect x="460" y="70" width="380" height="160" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="650" y="96" text-anchor="middle" class="band-label">ES Modules (modern)</text>
<rect x="480" y="112" width="340" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="650" y="130" text-anchor="middle" class="item">import fs from "fs"</text>
<text x="650" y="146" text-anchor="middle" class="item-sub">export function add() {}</text>
<text x="650" y="180" text-anchor="middle" class="item-sub">.mjs / package.json "type":"module"</text>
<text x="650" y="200" text-anchor="middle" class="item-sub">static, hoisted, tree-shakable</text>
<text x="650" y="220" text-anchor="middle" class="item-sub">top-level await available</text>
<rect x="40" y="246" width="780" height="130" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="272" text-anchor="middle" class="band-label">npm + package.json</text>
<rect x="60" y="288" width="115" height="70" rx="8" fill="#2563eb"/>
<text x="117" y="314" text-anchor="middle" class="node-title-w">dependencies</text>
<text x="117" y="334" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">runtime deps</text>
<rect x="185" y="288" width="115" height="70" rx="8" fill="#1e40af"/>
<text x="242" y="314" text-anchor="middle" class="node-title-w">devDependencies</text>
<text x="242" y="334" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">build/test only</text>
<rect x="310" y="288" width="115" height="70" rx="8" fill="#2563eb"/>
<text x="367" y="314" text-anchor="middle" class="node-title-w">scripts</text>
<text x="367" y="334" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">npm run ...</text>
<rect x="435" y="288" width="115" height="70" rx="8" fill="#1e40af"/>
<text x="492" y="314" text-anchor="middle" class="node-title-w">engines</text>
<text x="492" y="334" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">node version</text>
<rect x="560" y="288" width="115" height="70" rx="8" fill="#2563eb"/>
<text x="617" y="314" text-anchor="middle" class="node-title-w">type</text>
<text x="617" y="334" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">module/commonjs</text>
<rect x="685" y="288" width="115" height="70" rx="8" fill="#1e40af"/>
<text x="742" y="314" text-anchor="middle" class="node-title-w">package-lock</text>
<text x="742" y="334" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">lockfile</text>
</svg>
