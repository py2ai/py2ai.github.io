<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 470" width="860" height="470" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .mono { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 12px; font-weight: 600; fill: #0f172a; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="470" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">Kubernetes Cluster Architecture</text>
<rect x="40" y="66" width="780" height="150" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="58" y="88" text-anchor="middle" class="band-label">CONTROL PLANE (master)</text>
<rect x="60" y="104" width="140" height="52" rx="8" fill="#1e40af"/>
<text x="130.0" y="128" text-anchor="middle" class="node-title-w">API server</text>
<text x="130.0" y="145" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">kube-apiserver</text>
<rect x="214" y="104" width="140" height="52" rx="8" fill="#1e40af"/>
<text x="284.0" y="128" text-anchor="middle" class="node-title-w">etcd</text>
<text x="284.0" y="145" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">key-value store</text>
<rect x="368" y="104" width="140" height="52" rx="8" fill="#1e40af"/>
<text x="438.0" y="128" text-anchor="middle" class="node-title-w">Scheduler</text>
<text x="438.0" y="145" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">kube-scheduler</text>
<rect x="522" y="104" width="140" height="52" rx="8" fill="#1e40af"/>
<text x="592.0" y="128" text-anchor="middle" class="node-title-w">Controller mgr</text>
<text x="592.0" y="145" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">kube-controller-mgr</text>
<rect x="676" y="104" width="140" height="52" rx="8" fill="#1e40af"/>
<text x="746.0" y="128" text-anchor="middle" class="node-title-w">Cloud ctrller</text>
<text x="746.0" y="145" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">node/pod lifecycle</text>
<line x1="430" y1="218" x2="430" y2="248" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<text x="445" y="238" text-anchor="start" class="item-sub">manages</text>
<rect x="40" y="252" width="780" height="150" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="58" y="274" text-anchor="middle" class="band-label">WORKER NODES (data plane)</text>
<rect x="60" y="290" width="240" height="100" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="180.0" y="312" text-anchor="middle" class="node-title">Worker node 1</text>
<rect x="74" y="326" width="100" height="50" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
<text x="124" y="346" text-anchor="middle" class="item">kubelet</text>
<text x="124" y="362" text-anchor="middle" class="item-sub">+ kube-proxy</text>
<rect x="186" y="326" width="100" height="50" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
<text x="236" y="346" text-anchor="middle" class="item">container</text>
<text x="236" y="362" text-anchor="middle" class="item-sub">runtime</text>
<rect x="314" y="290" width="240" height="100" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="434.0" y="312" text-anchor="middle" class="node-title">Worker node 2</text>
<rect x="328" y="326" width="100" height="50" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
<text x="378" y="346" text-anchor="middle" class="item">kubelet</text>
<text x="378" y="362" text-anchor="middle" class="item-sub">+ kube-proxy</text>
<rect x="440" y="326" width="100" height="50" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
<text x="490" y="346" text-anchor="middle" class="item">container</text>
<text x="490" y="362" text-anchor="middle" class="item-sub">runtime</text>
<rect x="568" y="290" width="240" height="100" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="688.0" y="312" text-anchor="middle" class="node-title">Worker node 3</text>
<rect x="582" y="326" width="100" height="50" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
<text x="632" y="346" text-anchor="middle" class="item">kubelet</text>
<text x="632" y="362" text-anchor="middle" class="item-sub">+ kube-proxy</text>
<rect x="694" y="326" width="100" height="50" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
<text x="744" y="346" text-anchor="middle" class="item">container</text>
<text x="744" y="362" text-anchor="middle" class="item-sub">runtime</text>
<line x1="430" y1="404" x2="430" y2="430" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="40" y="432" width="780" height="30" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="430" y="452" text-anchor="middle" class="note">Pods run inside containers on worker nodes; the control plane schedules and reconciles them.</text>
</svg>
