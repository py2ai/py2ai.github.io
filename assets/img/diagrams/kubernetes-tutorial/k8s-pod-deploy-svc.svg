<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" width="860" height="420" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .mono { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 12px; font-weight: 600; fill: #0f172a; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="420" fill="#ffffff"/>
<text x="240" y="38" text-anchor="middle" class="title">Pod, ReplicaSet, Deployment, Service</text>
<rect x="330" y="66" width="200" height="50" rx="8" fill="#1e40af"/>
<text x="430" y="96" text-anchor="middle" class="node-title-w">Deployment</text>
<line x1="430" y1="116" x2="430" y2="138" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-accent)"/>
<text x="445" y="130" text-anchor="start" class="item-sub">manages</text>
<rect x="330" y="140" width="200" height="50" rx="8" fill="#2563eb"/>
<text x="430" y="170" text-anchor="middle" class="node-title-w">ReplicaSet (replicas: 3)</text>
<line x1="430" y1="190" x2="290" y2="240" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-accent)"/>
<line x1="430" y1="190" x2="440" y2="240" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-accent)"/>
<line x1="430" y1="190" x2="590" y2="240" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-accent)"/>
<rect x="230" y="240" width="120" height="70" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="290" y="266" text-anchor="middle" class="node-title">Pod</text>
<text x="290" y="286" text-anchor="middle" class="item-sub">container(s)</text>
<rect x="380" y="240" width="120" height="70" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="440" y="266" text-anchor="middle" class="node-title">Pod</text>
<text x="440" y="286" text-anchor="middle" class="item-sub">container(s)</text>
<rect x="530" y="240" width="120" height="70" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="590" y="266" text-anchor="middle" class="node-title">Pod</text>
<text x="590" y="286" text-anchor="middle" class="item-sub">container(s)</text>
<line x1="430" y1="312" x2="430" y2="338" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<text x="445" y="330" text-anchor="start" class="item-sub">selects via labels</text>
<rect x="310" y="340" width="240" height="56" rx="8" fill="#1e40af"/>
<text x="430" y="366" text-anchor="middle" class="node-title-w">Service (ClusterIP / NodePort / LB)</text>
<text x="430" y="384" text-anchor="middle" class="stage-sub">stable IP + DNS, load-balances across Pods</text>
</svg>
