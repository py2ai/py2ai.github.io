<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" width="860" height="430" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .mono { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 12px; font-weight: 600; fill: #0f172a; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="430" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">Kubernetes Core Objects</text>
<rect x="40" y="70" width="180" height="64" rx="8" fill="#2563eb"/>
<text x="130.0" y="96" text-anchor="middle" class="node-title-w">ConfigMap</text>
<text x="130.0" y="114" text-anchor="middle" class="stage-sub">non-sensitive config</text>
<text x="130.0" y="128" text-anchor="middle" class="stage-sub">env vars, volumes</text>
<rect x="236" y="70" width="180" height="64" rx="8" fill="#1e40af"/>
<text x="326.0" y="96" text-anchor="middle" class="node-title-w">Secret</text>
<text x="326.0" y="114" text-anchor="middle" class="stage-sub">sensitive data</text>
<text x="326.0" y="128" text-anchor="middle" class="stage-sub">base64, mounted / env</text>
<rect x="432" y="70" width="180" height="64" rx="8" fill="#2563eb"/>
<text x="522.0" y="96" text-anchor="middle" class="node-title-w">Ingress</text>
<text x="522.0" y="114" text-anchor="middle" class="stage-sub">HTTP(S) routing</text>
<text x="522.0" y="128" text-anchor="middle" class="stage-sub">host + path -> Service</text>
<rect x="628" y="70" width="180" height="64" rx="8" fill="#1e40af"/>
<text x="718.0" y="96" text-anchor="middle" class="node-title-w">Volume / PV / PVC</text>
<text x="718.0" y="114" text-anchor="middle" class="stage-sub">persistent storage</text>
<text x="718.0" y="128" text-anchor="middle" class="stage-sub">claim bound to PV</text>
<rect x="40" y="148" width="180" height="64" rx="8" fill="#1e40af"/>
<text x="130.0" y="174" text-anchor="middle" class="node-title-w">Job / CronJob</text>
<text x="130.0" y="192" text-anchor="middle" class="stage-sub">run-to-completion</text>
<text x="130.0" y="206" text-anchor="middle" class="stage-sub">scheduled batch</text>
<rect x="236" y="148" width="180" height="64" rx="8" fill="#2563eb"/>
<text x="326.0" y="174" text-anchor="middle" class="node-title-w">StatefulSet</text>
<text x="326.0" y="192" text-anchor="middle" class="stage-sub">ordered, stable Pods</text>
<text x="326.0" y="206" text-anchor="middle" class="stage-sub">databases, identity</text>
<rect x="432" y="148" width="180" height="64" rx="8" fill="#1e40af"/>
<text x="522.0" y="174" text-anchor="middle" class="node-title-w">DaemonSet</text>
<text x="522.0" y="192" text-anchor="middle" class="stage-sub">one Pod per node</text>
<text x="522.0" y="206" text-anchor="middle" class="stage-sub">logs, monitoring agent</text>
<rect x="628" y="148" width="180" height="64" rx="8" fill="#2563eb"/>
<text x="718.0" y="174" text-anchor="middle" class="node-title-w">HPA / VPA</text>
<text x="718.0" y="192" text-anchor="middle" class="stage-sub">auto-scale</text>
<text x="718.0" y="206" text-anchor="middle" class="stage-sub">CPU/mem or custom</text>
<rect x="40" y="226" width="180" height="64" rx="8" fill="#2563eb"/>
<text x="130.0" y="252" text-anchor="middle" class="node-title-w">Namespace</text>
<text x="130.0" y="270" text-anchor="middle" class="stage-sub">logical partition</text>
<text x="130.0" y="284" text-anchor="middle" class="stage-sub">RBAC + quota scope</text>
<rect x="236" y="226" width="180" height="64" rx="8" fill="#1e40af"/>
<text x="326.0" y="252" text-anchor="middle" class="node-title-w">ServiceAccount</text>
<text x="326.0" y="270" text-anchor="middle" class="stage-sub">pod identity</text>
<text x="326.0" y="284" text-anchor="middle" class="stage-sub">for API access + RBAC</text>
</svg>
