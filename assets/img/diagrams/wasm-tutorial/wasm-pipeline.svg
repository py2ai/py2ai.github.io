<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" width="860" height="380" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="380" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">Source -&gt; Compiler -&gt; .wasm -&gt; Runtime</text>
<rect x="30" y="90" width="200" height="120" rx="8" fill="#1e40af"/>
<text x="130.0" y="120" text-anchor="middle" class="node-title-w">Source</text>
<text x="130.0" y="148" text-anchor="middle" font-size="10" fill="#e0e7ff" font-family="inherit">Rust / C++ / Go / AssemblyScript</text>
<line x1="230" y1="150" x2="242" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="242" y="90" width="200" height="120" rx="8" fill="#2563eb"/>
<text x="342.0" y="120" text-anchor="middle" class="node-title-w">Compiler</text>
<text x="342.0" y="148" text-anchor="middle" font-size="10" fill="#e0e7ff" font-family="inherit">rustc --target=wasm32 / emscripten / tinygo</text>
<line x1="442" y1="150" x2="454" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="454" y="90" width="200" height="120" rx="8" fill="#1e40af"/>
<text x="554.0" y="120" text-anchor="middle" class="node-title-w">.wasm</text>
<text x="554.0" y="148" text-anchor="middle" font-size="10" fill="#e0e7ff" font-family="inherit">portable binary module</text>
<line x1="654" y1="150" x2="666" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="666" y="90" width="200" height="120" rx="8" fill="#2563eb"/>
<text x="766.0" y="120" text-anchor="middle" class="node-title-w">Runtime</text>
<text x="766.0" y="148" text-anchor="middle" font-size="10" fill="#e0e7ff" font-family="inherit">browser / Wasmtime / Wasmer / Node</text>
<rect x="40" y="236" width="780" height="60" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="262" text-anchor="middle" class="band-label">one binary, every OS/arch with a runtime; sandboxed; near-native speed</text>
<text x="430" y="286" text-anchor="middle" class="item-sub">compile once (to wasm32), run in browsers + servers + edge + embedded</text>
</svg>
