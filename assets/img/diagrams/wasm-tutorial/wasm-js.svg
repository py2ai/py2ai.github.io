<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" width="860" height="430" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="430" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">JS Host: Instantiate, Imports, Exports, Memory</text>
<rect x="80" y="80" width="160" height="60" rx="8" fill="#1e40af"/>
<text x="160" y="108" text-anchor="middle" class="node-title-w">JS host</text>
<text x="160" y="126" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">WebAssembly API</text>
<line x1="240" y1="110" x2="300" y2="110" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="300" y="80" width="160" height="60" rx="8" fill="#2563eb"/>
<text x="380" y="108" text-anchor="middle" class="node-title-w">.wasm</text>
<text x="380" y="126" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">instantiate(bytes, imports)</text>
<line x1="460" y1="110" x2="520" y2="110" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<text x="490" y="102" text-anchor="middle" class="item-sub">exports</text>
<rect x="520" y="80" width="260" height="60" rx="8" fill="#1e40af"/>
<text x="650" y="108" text-anchor="middle" class="node-title-w">wasm exports</text>
<text x="650" y="126" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">instance.exports.add(a,b)</text>
<line x1="380" y1="140" x2="380" y2="180" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-accent)"/>
<text x="395" y="165" text-anchor="start" class="item-sub">imports: host fns</text>
<rect x="220" y="180" width="320" height="50" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="380" y="200" text-anchor="middle" class="item">log(msg), fetch(url), random()</text>
<text x="380" y="218" text-anchor="middle" class="item-sub">host-provided funcs the wasm calls</text>
<rect x="40" y="250" width="780" height="130" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="276" text-anchor="middle" class="band-label">Shared linear memory</text>
<rect x="80" y="292" width="160" height="70" rx="8" fill="#2563eb"/>
<text x="160" y="318" text-anchor="middle" class="node-title-w">JS</text>
<text x="160" y="338" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">new Uint8Array(mem.buffer)</text>
<line x1="240" y1="327" x2="300" y2="327" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="300" y1="327" x2="240" y2="327" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="300" y="292" width="160" height="70" rx="8" fill="#1e40af"/>
<text x="380" y="318" text-anchor="middle" class="node-title-w">linear memory</text>
<text x="380" y="338" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">one byte array, both sides</text>
<line x1="460" y1="327" x2="520" y2="327" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="520" y1="327" x2="460" y2="327" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="520" y="292" width="160" height="70" rx="8" fill="#2563eb"/>
<text x="600" y="318" text-anchor="middle" class="node-title-w">wasm</text>
<text x="600" y="338" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">i32.load / i32.store</text>
</svg>
