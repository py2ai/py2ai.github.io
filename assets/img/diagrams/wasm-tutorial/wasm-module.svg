<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" width="860" height="430" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="430" fill="#ffffff"/>
<text x="320" y="38" text-anchor="middle" class="title">Wasm Module Structure</text>
<rect x="330" y="70" width="200" height="46" rx="8" fill="#1e40af"/>
<text x="430" y="100" text-anchor="middle" class="node-title-w">.wasm module</text>
<line x1="430" y1="116" x2="430" y2="136" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="40" y="150" width="190" height="80" rx="8" fill="#1e40af"/>
<text x="135.0" y="176" text-anchor="middle" class="node-title-w">type section</text>
<text x="135.0" y="198" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">function signatures (params/results)</text>
<rect x="242" y="150" width="190" height="80" rx="8" fill="#1e40af"/>
<text x="337.0" y="176" text-anchor="middle" class="node-title-w">function section</text>
<text x="337.0" y="198" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">function bodies (bytecode)</text>
<rect x="444" y="150" width="190" height="80" rx="8" fill="#1e40af"/>
<text x="539.0" y="176" text-anchor="middle" class="node-title-w">import section</text>
<text x="539.0" y="198" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">external funcs/memory/tables the module needs</text>
<rect x="646" y="150" width="190" height="80" rx="8" fill="#1e40af"/>
<text x="741.0" y="176" text-anchor="middle" class="node-title-w">export section</text>
<text x="741.0" y="198" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">funcs the host can call</text>
<rect x="40" y="244" width="190" height="80" rx="8" fill="#1e40af"/>
<text x="135.0" y="270" text-anchor="middle" class="node-title-w">memory section</text>
<text x="135.0" y="292" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">linear memory (byte array)</text>
<rect x="242" y="244" width="190" height="80" rx="8" fill="#1e40af"/>
<text x="337.0" y="270" text-anchor="middle" class="node-title-w">table section</text>
<text x="337.0" y="292" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">function pointers (indirect calls)</text>
<rect x="444" y="244" width="190" height="80" rx="8" fill="#1e40af"/>
<text x="539.0" y="270" text-anchor="middle" class="node-title-w">global section</text>
<text x="539.0" y="292" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">module-global mutable values</text>
<rect x="646" y="244" width="190" height="80" rx="8" fill="#1e40af"/>
<text x="741.0" y="270" text-anchor="middle" class="node-title-w">start section</text>
<text x="741.0" y="292" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">a function to run on instantiate</text>
<rect x="40" y="360" width="780" height="30" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="430" y="380" text-anchor="middle" class="note">A module = typed functions + linear memory + imports/exports; validated before running.</text>
</svg>
