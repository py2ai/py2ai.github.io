<svg xmlns="http://www.w3.org/2000/svg" width="960" height="720" viewBox="0 0 960 720" bgcolor="transparent">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="inputGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#c23152;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="gpuGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#533483;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#3a1f5e;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="outputGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#c23152;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="platformGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a936f;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#155d47;stop-opacity:0.9" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowWhite" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8899aa" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a936f" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="720" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <rect x="0" y="0" width="960" height="52" fill="url(#headerGrad)" rx="8"/>
  <rect x="0" y="40" width="960" height="12" fill="url(#headerGrad)"/>
  <text x="480" y="34" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="bold">Brush Architecture: 3D Reconstruction for All</text>

  <!-- INPUT LAYER -->
  <rect x="30" y="72" width="900" height="100" rx="8" fill="#fff5f5" stroke="#e94560" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="94" text-anchor="middle" fill="#c23152" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold">INPUT DATA FORMATS</text>

  <!-- COLMAP -->
  <rect x="55" y="104" width="170" height="52" rx="6" fill="url(#inputGrad)" filter="url(#shadow)"/>
  <text x="140" y="126" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold">COLMAP Dataset</text>
  <text x="140" y="144" text-anchor="middle" fill="#ffccd5" font-family="Segoe UI, Arial, sans-serif" font-size="10">Sparse/Dense Reconstruction</text>

  <!-- Nerfstudio -->
  <rect x="250" y="104" width="170" height="52" rx="6" fill="url(#inputGrad)" filter="url(#shadow)"/>
  <text x="335" y="126" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold">Nerfstudio Format</text>
  <text x="335" y="144" text-anchor="middle" fill="#ffccd5" font-family="Segoe UI, Arial, sans-serif" font-size="10">Transforms JSON + Images</text>

  <!-- PLY Files -->
  <rect x="445" y="104" width="170" height="52" rx="6" fill="url(#inputGrad)" filter="url(#shadow)"/>
  <text x="530" y="126" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold">PLY / Compressed PLY</text>
  <text x="530" y="144" text-anchor="middle" fill="#ffccd5" font-family="Segoe UI, Arial, sans-serif" font-size="10">SuperSplat &amp; Delta Frames</text>

  <!-- Masks -->
  <rect x="640" y="104" width="170" height="52" rx="6" fill="url(#inputGrad)" filter="url(#shadow)"/>
  <text x="725" y="126" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold">Masks &amp; Transparency</text>
  <text x="725" y="144" text-anchor="middle" fill="#ffccd5" font-family="Segoe UI, Arial, sans-serif" font-size="10">Alpha Channels + Mask Folders</text>

  <!-- Arrow from input to core -->
  <line x1="480" y1="172" x2="480" y2="198" stroke="#8899aa" stroke-width="2" marker-end="url(#arrowWhite)"/>

  <!-- CORE CRATES LAYER -->
  <rect x="30" y="200" width="900" height="170" rx="8" fill="#f0f4ff" stroke="#0f3460" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="222" text-anchor="middle" fill="#0f3460" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold">CORE RUST CRATES</text>

  <!-- brush-dataset -->
  <rect x="50" y="234" width="165" height="60" rx="6" fill="url(#coreGrad)" filter="url(#shadow)"/>
  <text x="132" y="258" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold">brush-dataset</text>
  <text x="132" y="276" text-anchor="middle" fill="#a8c7f2" font-family="Segoe UI, Arial, sans-serif" font-size="9">Scene Loading &amp; Batching</text>

  <!-- brush-render -->
  <rect x="230" y="234" width="165" height="60" rx="6" fill="url(#coreGrad)" filter="url(#shadow)"/>
  <text x="312" y="258" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold">brush-render</text>
  <text x="312" y="276" text-anchor="middle" fill="#a8c7f2" font-family="Segoe UI, Arial, sans-serif" font-size="9">Gaussian Splat Rendering</text>

  <!-- brush-train -->
  <rect x="410" y="234" width="165" height="60" rx="6" fill="url(#coreGrad)" filter="url(#shadow)"/>
  <text x="492" y="258" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold">brush-train</text>
  <text x="492" y="276" text-anchor="middle" fill="#a8c7f2" font-family="Segoe UI, Arial, sans-serif" font-size="9">MCMC Training + AdamScaled</text>

  <!-- brush-render-bwd -->
  <rect x="590" y="234" width="165" height="60" rx="6" fill="url(#coreGrad)" filter="url(#shadow)"/>
  <text x="672" y="258" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold">brush-render-bwd</text>
  <text x="672" y="276" text-anchor="middle" fill="#a8c7f2" font-family="Segoe UI, Arial, sans-serif" font-size="9">Backward Pass / Autodiff</text>

  <!-- brush-loss -->
  <rect x="770" y="234" width="140" height="60" rx="6" fill="url(#coreGrad)" filter="url(#shadow)"/>
  <text x="840" y="258" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold">brush-loss</text>
  <text x="840" y="276" text-anchor="middle" fill="#a8c7f2" font-family="Segoe UI, Arial, sans-serif" font-size="9">SSIM + LPIPS + L1</text>

  <!-- Supporting crates row -->
  <rect x="50" y="306" width="120" height="48" rx="6" fill="#1e3a5f" filter="url(#shadow)"/>
  <text x="110" y="326" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold">brush-sort</text>
  <text x="110" y="342" text-anchor="middle" fill="#a8c7f2" font-family="Segoe UI, Arial, sans-serif" font-size="9">GPU Radix Sort</text>

  <rect x="185" y="306" width="120" height="48" rx="6" fill="#1e3a5f" filter="url(#shadow)"/>
  <text x="245" y="326" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold">brush-prefix-sum</text>
  <text x="245" y="342" text-anchor="middle" fill="#a8c7f2" font-family="Segoe UI, Arial, sans-serif" font-size="9">Parallel Prefix Sum</text>

  <rect x="320" y="306" width="120" height="48" rx="6" fill="#1e3a5f" filter="url(#shadow)"/>
  <text x="380" y="326" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold">brush-vfs</text>
  <text x="380" y="342" text-anchor="middle" fill="#a8c7f2" font-family="Segoe UI, Arial, sans-serif" font-size="9">Virtual File System</text>

  <rect x="455" y="306" width="120" height="48" rx="6" fill="#1e3a5f" filter="url(#shadow)"/>
  <text x="515" y="326" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold">brush-serde</text>
  <text x="515" y="342" text-anchor="middle" fill="#a8c7f2" font-family="Segoe UI, Arial, sans-serif" font-size="9">Serialization Layer</text>

  <rect x="590" y="306" width="120" height="48" rx="6" fill="#1e3a5f" filter="url(#shadow)"/>
  <text x="650" y="326" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold">colmap-reader</text>
  <text x="650" y="342" text-anchor="middle" fill="#a8c7f2" font-family="Segoe UI, Arial, sans-serif" font-size="9">COLMAP Parser</text>

  <rect x="725" y="306" width="120" height="48" rx="6" fill="#1e3a5f" filter="url(#shadow)"/>
  <text x="785" y="326" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold">lpips</text>
  <text x="785" y="342" text-anchor="middle" fill="#a8c7f2" font-family="Segoe UI, Arial, sans-serif" font-size="9">Perceptual Similarity</text>

  <!-- Arrow from core to GPU -->
  <line x1="480" y1="370" x2="480" y2="398" stroke="#8899aa" stroke-width="2" marker-end="url(#arrowWhite)"/>

  <!-- GPU COMPUTE LAYER -->
  <rect x="30" y="400" width="900" height="90" rx="8" fill="#f5f0ff" stroke="#533483" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="422" text-anchor="middle" fill="#533483" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold">GPU COMPUTE BACKEND (via Burn Framework)</text>

  <rect x="55" y="434" width="200" height="44" rx="6" fill="url(#gpuGrad)" filter="url(#shadow)"/>
  <text x="155" y="454" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold">Burn + CubeCL</text>
  <text x="155" y="468" text-anchor="middle" fill="#d4b8f0" font-family="Segoe UI, Arial, sans-serif" font-size="9">Autodiff + JIT Compute Kernels</text>

  <rect x="275" y="434" width="200" height="44" rx="6" fill="url(#gpuGrad)" filter="url(#shadow)"/>
  <text x="375" y="454" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold">WebGPU / wgpu</text>
  <text x="375" y="468" text-anchor="middle" fill="#d4b8f0" font-family="Segoe UI, Arial, sans-serif" font-size="9">Cross-Platform GPU Abstraction</text>

  <rect x="495" y="434" width="200" height="44" rx="6" fill="url(#gpuGrad)" filter="url(#shadow)"/>
  <text x="595" y="454" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold">Custom GPU Kernels</text>
  <text x="595" y="468" text-anchor="middle" fill="#d4b8f0" font-family="Segoe UI, Arial, sans-serif" font-size="9">Radix Sort + Prefix Sum + Rasterizer</text>

  <rect x="715" y="434" width="190" height="44" rx="6" fill="url(#gpuGrad)" filter="url(#shadow)"/>
  <text x="810" y="454" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold">Forked wgpu + CubeCL</text>
  <text x="810" y="468" text-anchor="middle" fill="#d4b8f0" font-family="Segoe UI, Arial, sans-serif" font-size="9">Subgroup Ops + JS Interop</text>

  <!-- Arrow from GPU to output -->
  <line x1="480" y1="490" x2="480" y2="518" stroke="#8899aa" stroke-width="2" marker-end="url(#arrowWhite)"/>

  <!-- OUTPUT / APPS LAYER -->
  <rect x="30" y="520" width="440" height="90" rx="8" fill="#fff5f5" stroke="#e94560" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="250" y="542" text-anchor="middle" fill="#c23152" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold">APPLICATIONS</text>

  <rect x="50" y="554" width="120" height="44" rx="6" fill="url(#outputGrad)" filter="url(#shadow)"/>
  <text x="110" y="574" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold">brush-app</text>
  <text x="110" y="588" text-anchor="middle" fill="#ffccd5" font-family="Segoe UI, Arial, sans-serif" font-size="9">egui Desktop UI</text>

  <rect x="185" y="554" width="120" height="44" rx="6" fill="url(#outputGrad)" filter="url(#shadow)"/>
  <text x="245" y="574" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold">brush-cli</text>
  <text x="245" y="588" text-anchor="middle" fill="#ffccd5" font-family="Segoe UI, Arial, sans-serif" font-size="9">Command Line Tool</text>

  <rect x="320" y="554" width="130" height="44" rx="6" fill="url(#outputGrad)" filter="url(#shadow)"/>
  <text x="385" y="574" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold">brush-js</text>
  <text x="385" y="588" text-anchor="middle" fill="#ffccd5" font-family="Segoe UI, Arial, sans-serif" font-size="9">WASM + NPM Package</text>

  <!-- PLATFORM LAYER -->
  <rect x="490" y="520" width="440" height="90" rx="8" fill="#f0fff4" stroke="#1a936f" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="710" y="542" text-anchor="middle" fill="#155d47" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold">PLATFORMS</text>

  <rect x="505" y="554" width="95" height="44" rx="6" fill="url(#platformGrad)" filter="url(#shadow)"/>
  <text x="552" y="574" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold">Windows</text>
  <text x="552" y="588" text-anchor="middle" fill="#b8e6d0" font-family="Segoe UI, Arial, sans-serif" font-size="9">NVIDIA / AMD</text>

  <rect x="610" y="554" width="95" height="44" rx="6" fill="url(#platformGrad)" filter="url(#shadow)"/>
  <text x="657" y="574" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold">macOS</text>
  <text x="657" y="588" text-anchor="middle" fill="#b8e6d0" font-family="Segoe UI, Arial, sans-serif" font-size="9">Metal / Apple</text>

  <rect x="715" y="554" width="95" height="44" rx="6" fill="url(#platformGrad)" filter="url(#shadow)"/>
  <text x="762" y="574" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold">Linux</text>
  <text x="762" y="588" text-anchor="middle" fill="#b8e6d0" font-family="Segoe UI, Arial, sans-serif" font-size="9">NVIDIA / AMD</text>

  <rect x="820" y="554" width="95" height="44" rx="6" fill="url(#platformGrad)" filter="url(#shadow)"/>
  <text x="867" y="574" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold">Web / Mobile</text>
  <text x="867" y="588" text-anchor="middle" fill="#b8e6d0" font-family="Segoe UI, Arial, sans-serif" font-size="9">WASM / Android</text>

  <!-- Bottom info bar -->
  <rect x="30" y="630" width="900" height="70" rx="8" fill="#1a1a2e" filter="url(#shadow)"/>
  <text x="480" y="656" text-anchor="middle" fill="#e94560" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold">Key Design Principles</text>
  <text x="160" y="680" text-anchor="middle" fill="#a8c7f2" font-family="Segoe UI, Arial, sans-serif" font-size="11">Zero CUDA Dependency</text>
  <text x="380" y="680" text-anchor="middle" fill="#a8c7f2" font-family="Segoe UI, Arial, sans-serif" font-size="11">WebGPU-Native Compute</text>
  <text x="580" y="680" text-anchor="middle" fill="#a8c7f2" font-family="Segoe UI, Arial, sans-serif" font-size="11">Single Binary Deployment</text>
  <text x="790" y="680" text-anchor="middle" fill="#a8c7f2" font-family="Segoe UI, Arial, sans-serif" font-size="11">Real-Time Interactive Training</text>
</svg>