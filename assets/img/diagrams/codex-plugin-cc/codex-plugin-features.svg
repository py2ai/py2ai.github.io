<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect width="960" height="640" fill="#ffffff"/>

  <text x="480" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Codex Plugin for Claude Code — Key Features</text>
  <text x="480" y="58" text-anchor="middle" font-size="13" fill="#64748b">Six capability pillars that bridge two AI coding assistants</text>

  <!-- Central hub -->
  <circle cx="480" cy="340" r="70" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
  <text x="480" y="334" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Codex</text>
  <text x="480" y="354" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Plugin</text>

  <!-- Feature 1: Code Review (top-left) -->
  <rect x="60" y="100" width="220" height="110" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="170" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">Code Review</text>
  <text x="170" y="150" text-anchor="middle" font-size="11" fill="#334155">/codex:review</text>
  <text x="170" y="170" text-anchor="middle" font-size="11" fill="#475569">Read-only diff analysis</text>
  <text x="170" y="188" text-anchor="middle" font-size="11" fill="#475569">Branch comparison (--base)</text>
  <text x="170" y="206" text-anchor="middle" font-size="11" fill="#475569">Background mode supported</text>
  <line x1="280" y1="210" x2="420" y2="300" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Feature 2: Adversarial Review (top-center) -->
  <rect x="370" y="100" width="220" height="110" rx="12" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text x="480" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#713f12">Adversarial Review</text>
  <text x="480" y="150" text-anchor="middle" font-size="11" fill="#334155">/codex:adversarial-review</text>
  <text x="480" y="170" text-anchor="middle" font-size="11" fill="#475569">Challenges design decisions</text>
  <text x="480" y="188" text-anchor="middle" font-size="11" fill="#475569">Steerable focus text</text>
  <text x="480" y="206" text-anchor="middle" font-size="11" fill="#475569">Pressure-tests assumptions</text>
  <line x1="480" y1="210" x2="480" y2="265" stroke="#ca8a04" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Feature 3: Task Delegation (top-right) -->
  <rect x="680" y="100" width="220" height="110" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="790" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#9a3412">Task Delegation</text>
  <text x="790" y="150" text-anchor="middle" font-size="11" fill="#334155">/codex:rescue</text>
  <text x="790" y="170" text-anchor="middle" font-size="11" fill="#475569">Bug investigation & fixes</text>
  <text x="790" y="188" text-anchor="middle" font-size="11" fill="#475569">--resume / --fresh</text>
  <text x="790" y="206" text-anchor="middle" font-size="11" fill="#475569">Subagent handoff</text>
  <line x1="680" y1="210" x2="540" y2="300" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Feature 4: Multi-Model Support (bottom-left) -->
  <rect x="60" y="470" width="220" height="110" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="170" y="498" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Multi-Model Support</text>
  <text x="170" y="520" text-anchor="middle" font-size="11" fill="#334155">--model flag</text>
  <text x="170" y="540" text-anchor="middle" font-size="11" fill="#475569">GPT-5.4, GPT-5.4-mini</text>
  <text x="170" y="558" text-anchor="middle" font-size="11" fill="#475569">gpt-5.3-codex-spark</text>
  <text x="170" y="576" text-anchor="middle" font-size="11" fill="#475569">Ollama / LM Studio</text>
  <line x1="280" y1="470" x2="420" y2="380" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Feature 5: Session Transfer (bottom-center) -->
  <rect x="370" y="470" width="220" height="110" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="480" y="498" text-anchor="middle" font-size="14" font-weight="700" fill="#5b21b6">Session Transfer</text>
  <text x="480" y="520" text-anchor="middle" font-size="11" fill="#334155">/codex:transfer</text>
  <text x="480" y="540" text-anchor="middle" font-size="11" fill="#475569">Claude → Codex context</text>
  <text x="480" y="558" text-anchor="middle" font-size="11" fill="#475569">codex resume <session-id></text>
  <text x="480" y="576" text-anchor="middle" font-size="11" fill="#475569">External agent import</text>
  <line x1="480" y1="470" x2="480" y2="415" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Feature 6: Review Gate & Job Control (bottom-right) -->
  <rect x="680" y="470" width="220" height="110" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="790" y="498" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">Review Gate & Jobs</text>
  <text x="790" y="520" text-anchor="middle" font-size="11" fill="#334155">Stop hook auto-review</text>
  <text x="790" y="540" text-anchor="middle" font-size="11" fill="#475569">/codex:status, /codex:cancel</text>
  <text x="790" y="558" text-anchor="middle" font-size="11" fill="#475569">/codex:result retrieval</text>
  <text x="790" y="576" text-anchor="middle" font-size="11" fill="#475569">Background job tracking</text>
  <line x1="680" y1="470" x2="540" y2="380" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Legend -->
  <rect x="60" y="600" width="840" height="28" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="80" y="619" font-size="11" fill="#334155">Each feature is exposed as a slash command in Claude Code and delegates to the Codex App Server via JSON-RPC.</text>
</svg>