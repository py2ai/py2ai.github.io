  <circle cx="840" cy="460" r="3" fill="#dc2626"/>
  <text x="856" y="464" font-size="12" fill="#334155">Async task execution</text>
  <circle cx="840" cy="492" r="3" fill="#dc2626"/>
  <text x="856" y="496" font-size="12" fill="#334155">/codex:status tracking</text>
  <circle cx="840" cy="524" r="3" fill="#dc2626"/>
  <text x="856" y="528" font-size="12" fill="#334155">/codex:result retrieval</text>
  <circle cx="840" cy="556" r="3" fill="#dc2626"/>
  <text x="856" y="560" font-size="12" fill="#334155">/codex:cancel control</text>
  <rect x="48" y="672" width="1104" height="32" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="600" y="693" text-anchor="middle" font-size="11" fill="#64748b">Each feature is exposed as a slash command in Claude Code and delegates to the Codex App Server via JSON-RPC.</text>
