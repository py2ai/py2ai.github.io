  <text x="492" y="396" font-size="16" font-weight="700" fill="#5b21b6">Session Transfer</text>
  <text x="492" y="416" font-size="11" fill="#334155" font-family="JetBrains Mono, Fira Code, monospace">/codex:transfer</text>
