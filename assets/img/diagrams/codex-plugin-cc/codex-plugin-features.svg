  <circle cx="844" cy="400" r="20" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="844" y="406" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">6</text>
  <text x="876" y="396" font-size="16" font-weight="700" fill="#991b1b">Background Jobs</text>
  <text x="876" y="416" font-size="11" fill="#334155" font-family="JetBrains Mono, Fira Code, monospace">--background flag</text>
