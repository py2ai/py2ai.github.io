<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ea580c"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="960" height="620" fill="#ffffff"/>

  <!-- Title -->
  <text x="480" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Codex Plugin for Claude Code — System Architecture</text>
  <text x="480" y="56" text-anchor="middle" font-size="13" fill="#64748b">How Claude Code delegates work to OpenAI Codex via the App Server bridge</text>

  <!-- Layer 1: Claude Code (left) -->
  <rect x="40" y="100" width="200" height="120" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="140" y="128" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">Claude Code</text>
  <text x="140" y="150" text-anchor="middle" font-size="12" fill="#334155">Slash Commands</text>
  <text x="140" y="170" text-anchor="middle" font-size="11" fill="#475569">/codex:review</text>
  <text x="140" y="188" text-anchor="middle" font-size="11" fill="#475569">/codex:rescue</text>
  <text x="140" y="206" text-anchor="middle" font-size="11" fill="#475569">/codex:transfer</text>

  <!-- Layer 2: Plugin Bridge (center-left) -->
  <rect x="300" y="90" width="220" height="140" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="410" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#9a3412">Plugin Bridge</text>
  <text x="410" y="140" text-anchor="middle" font-size="12" fill="#334155">codex-companion.mjs</text>
  <rect x="320" y="152" width="180" height="28" rx="6" fill="#fed7aa" stroke="#ea580c" stroke-width="1"/>
  <text x="410" y="170" text-anchor="middle" font-size="11" fill="#7c2d12">Command Router</text>
  <rect x="320" y="186" width="180" height="28" rx="6" fill="#fed7aa" stroke="#ea580c" stroke-width="1"/>
  <text x="410" y="204" text-anchor="middle" font-size="11" fill="#7c2d12">Hooks (Session/Stop)</text>

  <!-- Layer 3: App Server Client (center-right) -->
  <rect x="580" y="90" width="200" height="140" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="680" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#14532d">App Server Client</text>
  <text x="680" y="140" text-anchor="middle" font-size="12" fill="#334155">JSON-RPC over stdio/socket</text>
  <rect x="600" y="152" width="160" height="28" rx="6" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="680" y="170" text-anchor="middle" font-size="11" fill="#14532d">Broker (shared)</text>
  <rect x="600" y="186" width="160" height="28" rx="6" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="680" y="204" text-anchor="middle" font-size="11" fill="#14532d">Direct Spawn</text>

  <!-- Layer 4: Codex CLI / App Server (right) -->
  <rect x="820" y="100" width="120" height="120" rx="10" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
  <text x="880" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">Codex CLI</text>
  <text x="880" y="150" text-anchor="middle" font-size="11" fill="#475569">codex</text>
  <text x="880" y="168" text-anchor="middle" font-size="11" fill="#475569">app-server</text>
  <text x="880" y="190" text-anchor="middle" font-size="11" fill="#475569">Local auth</text>
  <text x="880" y="208" text-anchor="middle" font-size="11" fill="#475569">config.toml</text>

  <!-- Arrows: Claude Code -> Plugin Bridge -->
  <line x1="240" y1="160" x2="295" y2="160" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="268" y="152" text-anchor="middle" font-size="10" fill="#2563eb">slash cmd</text>

  <!-- Plugin Bridge -> App Server Client -->
  <line x1="520" y1="160" x2="575" y2="160" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="548" y="152" text-anchor="middle" font-size="10" fill="#ea580c">route</text>

  <!-- App Server Client -> Codex CLI -->
  <line x1="780" y1="160" x2="815" y2="160" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="798" y="152" text-anchor="middle" font-size="10" fill="#16a34a">JSON-RPC</text>

  <!-- Bottom: Response flow -->
  <line x1="880" y1="220" x2="880" y2="280" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-gray)"/>
  <text x="880" y="260" text-anchor="middle" font-size="10" fill="#64748b">turn results</text>

  <!-- Bottom row: State & Job Management -->
  <rect x="300" y="290" width="220" height="100" rx="10" fill="#fafafa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="410" y="316" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">State & Job Control</text>
  <text x="410" y="338" text-anchor="middle" font-size="11" fill="#475569">tracked-jobs.mjs</text>
  <text x="410" y="356" text-anchor="middle" font-size="11" fill="#475569">state.mjs (broker.json)</text>
  <text x="410" y="374" text-anchor="middle" font-size="11" fill="#475569">workspace.mjs</text>

  <line x1="410" y1="230" x2="410" y2="285" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-gray)"/>

  <!-- Bottom row: OpenAI API -->
  <rect x="580" y="290" width="200" height="100" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="680" y="316" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">OpenAI / Provider API</text>
  <text x="680" y="338" text-anchor="middle" font-size="11" fill="#334155">GPT-5.4, GPT-5.4-mini</text>
  <text x="680" y="356" text-anchor="middle" font-size="11" fill="#334155">gpt-5.3-codex-spark</text>
  <text x="680" y="374" text-anchor="middle" font-size="11" fill="#334155">Ollama / LM Studio</text>

  <line x1="880" y1="280" x2="785" y2="320" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="840" y="295" text-anchor="middle" font-size="10" fill="#2563eb">model call</text>

  <!-- Bottom row: User Workspace -->
  <rect x="40" y="290" width="200" height="100" rx="10" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/>
  <text x="140" y="316" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">User Workspace</text>
  <text x="140" y="338" text-anchor="middle" font-size="11" fill="#475569">Git repository</text>
  <text x="140" y="356" text-anchor="middle" font-size="11" fill="#475569">Uncommitted changes</text>
  <text x="140" y="374" text-anchor="middle" font-size="11" fill="#475569">Branch diff</text>

  <line x1="140" y1="220" x2="140" y2="285" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-gray)"/>
  <text x="155" y="255" text-anchor="start" font-size="10" fill="#64748b">reads diff</text>

  <!-- Legend -->
  <rect x="40" y="430" width="880" height="160" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="60" y="456" font-size="13" font-weight="700" fill="#0f172a">Legend</text>

  <line x1="60" y1="478" x2="100" y2="478" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="110" y="482" font-size="11" fill="#334155">Data flow / request</text>

  <line x1="260" y1="478" x2="300" y2="478" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="310" y="482" font-size="11" fill="#334155">Success / connection</text>

  <line x1="470" y1="478" x2="510" y2="478" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="520" y="482" font-size="11" fill="#334155">Routing / delegation</text>

  <line x1="680" y1="478" x2="720" y2="478" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-gray)"/>
  <text x="730" y="482" font-size="11" fill="#334155">Response / async</text>

  <rect x="60" y="500" width="16" height="16" rx="3" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="84" y="513" font-size="11" fill="#334155">Component (Claude / API)</text>

  <rect x="260" y="500" width="16" height="16" rx="3" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="284" y="513" font-size="11" fill="#334155">Process / bridge</text>

  <rect x="440" y="500" width="16" height="16" rx="3" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="464" y="513" font-size="11" fill="#334155">Client / transport</text>

  <rect x="620" y="500" width="16" height="16" rx="3" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/>
  <text x="644" y="513" font-size="11" fill="#334155">External / local resource</text>

  <text x="60" y="548" font-size="11" fill="#64748b">The plugin wraps the Codex App Server (JSON-RPC). A shared broker process avoids repeated cold starts;</text>
  <text x="60" y="566" font-size="11" fill="#64748b">if the broker is busy or unavailable, the client falls back to spawning a direct codex app-server child process.</text>
</svg>