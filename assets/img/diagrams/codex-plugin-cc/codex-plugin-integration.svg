  <line x1="872" y1="732" x2="912" y2="732" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrow-red)"/>
  <text x="920" y="736" font-size="11" fill="#334155">Automation</text>
