<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ea580c"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="960" height="640" fill="#ffffff"/>

  <text x="480" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Codex Plugin — Integration Ecosystem</text>
  <text x="480" y="58" text-anchor="middle" font-size="13" fill="#64748b">How the plugin connects Claude Code, Codex, and the broader developer toolchain</text>

  <!-- Center: Plugin Core -->
  <rect x="360" y="270" width="240" height="100" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="2.5"/>
  <text x="480" y="300" text-anchor="middle" font-size="16" font-weight="700" fill="#9a3412">Codex Plugin Core</text>
  <text x="480" y="322" text-anchor="middle" font-size="12" fill="#334155">codex-companion.mjs</text>
  <text x="480" y="342" text-anchor="middle" font-size="11" fill="#475569">App Server Client + Broker</text>
  <text x="480" y="360" text-anchor="middle" font-size="11" fill="#475569">Hooks, Commands, Skills</text>

  <!-- Top: Claude Code -->
  <rect x="370" y="90" width="220" height="80" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="480" y="120" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">Claude Code</text>
  <text x="480" y="142" text-anchor="middle" font-size="11" fill="#334155">Slash commands, subagents</text>
  <text x="480" y="160" text-anchor="middle" font-size="11" fill="#475569">Session transcripts</text>
  <line x1="480" y1="170" x2="480" y2="265" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Left: Codex CLI / App Server -->
  <rect x="40" y="270" width="200" height="100" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="140" y="300" text-anchor="middle" font-size="15" font-weight="700" fill="#14532d">Codex CLI</text>
  <text x="140" y="322" text-anchor="middle" font-size="11" fill="#334155">codex app-server</text>
  <text x="140" y="340" text-anchor="middle" font-size="11" fill="#475569">Local auth (ChatGPT/API)</text>
  <text x="140" y="358" text-anchor="middle" font-size="11" fill="#475569">config.toml</text>
  <line x1="240" y1="320" x2="355" y2="320" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Right: OpenAI / Model Providers -->
  <rect x="720" y="270" width="200" height="100" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="820" y="300" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">Model Providers</text>
  <text x="820" y="322" text-anchor="middle" font-size="11" fill="#334155">OpenAI API</text>
  <text x="820" y="340" text-anchor="middle" font-size="11" fill="#475569">Ollama, LM Studio</text>
  <text x="820" y="358" text-anchor="middle" font-size="11" fill="#475569">Custom base URL</text>
  <line x1="600" y1="320" x2="715" y2="320" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Bottom-left: Git / Workspace -->
  <rect x="40" y="470" width="200" height="90" rx="12" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
  <text x="140" y="498" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">Git Workspace</text>
  <text x="140" y="520" text-anchor="middle" font-size="11" fill="#475569">Uncommitted diff</text>
  <text x="140" y="538" text-anchor="middle" font-size="11" fill="#475569">Branch comparison</text>
  <text x="140" y="556" text-anchor="middle" font-size="11" fill="#475569">File changes tracking</text>
  <line x1="140" y1="465" x2="140" y2="375" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-gray)"/>

  <!-- Bottom-center: IDEs / Editors -->
  <rect x="370" y="470" width="220" height="90" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="480" y="498" text-anchor="middle" font-size="14" font-weight="700" fill="#5b21b6">IDEs & Editors</text>
  <text x="480" y="520" text-anchor="middle" font-size="11" fill="#475569">VS Code, Neovim, JetBrains</text>
  <text x="480" y="538" text-anchor="middle" font-size="11" fill="#475569">Terminal / TUI</text>
  <text x="480" y="556" text-anchor="middle" font-size="11" fill="#475569">Codex App & TUI resume</text>
  <line x1="480" y1="465" x2="480" y2="375" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-gray)"/>

  <!-- Bottom-right: CI/CD & Automation -->
  <rect x="720" y="470" width="200" height="90" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="820" y="498" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">CI/CD & Automation</text>
  <text x="820" y="520" text-anchor="middle" font-size="11" fill="#475569">GitHub Actions</text>
  <text x="820" y="538" text-anchor="middle" font-size="11" fill="#475569">Pre-merge review gate</text>
  <text x="820" y="556" text-anchor="middle" font-size="11" fill="#475569">Automated adversarial checks</text>
  <line x1="820" y1="465" x2="820" y2="375" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-gray)"/>

  <!-- Legend -->
  <rect x="40" y="580" width="880" height="44" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="60" y1="602" x2="100" y2="602" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="108" y="606" font-size="11" fill="#334155">Request / data</text>
  <line x1="220" y1="602" x2="260" y2="602" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="268" y="606" font-size="11" fill="#334155">Connection</text>
  <line x1="370" y1="602" x2="410" y2="602" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-gray)"/>
  <text x="418" y="606" font-size="11" fill="#334155">Context / workspace</text>
  <line x1="560" y1="602" x2="600" y2="602" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-gray)"/>
  <text x="608" y="606" font-size="11" fill="#334155">IDE integration</text>
  <line x1="730" y1="602" x2="770" y2="602" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-gray)"/>
  <text x="778" y="606" font-size="11" fill="#334155">Automation</text>
</svg>