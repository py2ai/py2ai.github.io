<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ea580c"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="960" height="680" fill="#ffffff"/>

  <text x="480" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Codex Plugin — Request Workflow</text>
  <text x="480" y="56" text-anchor="middle" font-size="13" fill="#64748b">How a coding request flows from Claude Code through the plugin to Codex and back</text>

  <!-- Step 1: User Request -->
  <rect x="60" y="90" width="200" height="70" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="160" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">1. User Request</text>
  <text x="160" y="140" text-anchor="middle" font-size="11" fill="#334155">/codex:review or /codex:rescue</text>

  <!-- Step 2: Plugin Intercepts -->
  <rect x="340" y="90" width="200" height="70" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="440" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#9a3412">2. Plugin Intercepts</text>
  <text x="440" y="140" text-anchor="middle" font-size="11" fill="#334155">Command router parses flags</text>

  <!-- Step 3: Connect App Server -->
  <rect x="620" y="90" width="200" height="70" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="720" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">3. Connect App Server</text>
  <text x="720" y="140" text-anchor="middle" font-size="11" fill="#334155">Broker or direct spawn</text>

  <!-- Arrows row 1 -->
  <line x1="260" y1="125" x2="335" y2="125" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="540" y1="125" x2="615" y2="125" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- Step 4: Start/Resume Thread -->
  <rect x="620" y="200" width="200" height="70" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="720" y="228" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">4. Start / Resume Thread</text>
  <text x="720" y="250" text-anchor="middle" font-size="11" fill="#334155">thread/start or thread/resume</text>

  <line x1="720" y1="160" x2="720" y2="195" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Step 5: Submit Turn / Review -->
  <rect x="340" y="200" width="200" height="70" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="440" y="228" text-anchor="middle" font-size="14" font-weight="700" fill="#9a3412">5. Submit Turn</text>
  <text x="440" y="250" text-anchor="middle" font-size="11" fill="#334155">turn/start or review/start</text>

  <line x1="615" y1="235" x2="545" y2="235" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- Step 6: Codex Processes (model call) -->
  <rect x="60" y="200" width="200" height="70" rx="10" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
  <text x="160" y="228" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">6. Codex Processes</text>
  <text x="160" y="250" text-anchor="middle" font-size="11" fill="#475569">Model reasoning + tools</text>

  <line x1="335" y1="235" x2="265" y2="235" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Step 7: Stream Notifications -->
  <rect x="60" y="310" width="200" height="70" rx="10" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
  <text x="160" y="338" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">7. Stream Notifications</text>
  <text x="160" y="360" text-anchor="middle" font-size="11" fill="#475569">item/started, item/completed</text>

  <line x1="160" y1="270" x2="160" y2="305" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-orange)"/>

  <!-- Step 8: Capture Turn State -->
  <rect x="340" y="310" width="200" height="70" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="440" y="338" text-anchor="middle" font-size="14" font-weight="700" fill="#9a3412">8. Capture Turn State</text>
  <text x="440" y="360" text-anchor="middle" font-size="11" fill="#334155">Messages, file changes, reasoning</text>

  <line x1="260" y1="345" x2="335" y2="345" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- Decision: Background? -->
  <polygon points="720,310 820,345 720,380 620,345" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text x="720" y="342" text-anchor="middle" font-size="12" font-weight="700" fill="#713f12">Background?</text>
  <text x="720" y="358" text-anchor="middle" font-size="10" fill="#92400e">--background flag</text>

  <line x1="540" y1="345" x2="615" y2="345" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- Step 9a: Track Job (background) -->
  <rect x="620" y="420" width="200" height="70" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="720" y="448" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">9a. Track Background Job</text>
  <text x="720" y="470" text-anchor="middle" font-size="11" fill="#334155">/codex:status, /codex:result</text>

  <line x1="720" y1="380" x2="720" y2="415" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="735" y="400" font-size="10" fill="#2563eb">Yes</text>

  <!-- Step 9b: Return Inline (foreground) -->
  <rect x="340" y="420" width="200" height="70" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="440" y="448" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">9b. Return Inline</text>
  <text x="440" y="470" text-anchor="middle" font-size="11" fill="#334155">Review text / final answer</text>

  <line x1="620" y1="380" x2="480" y2="415" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="560" y="395" font-size="10" fill="#16a34a">No</text>

  <!-- Step 10: Output to Claude Code -->
  <rect x="340" y="530" width="280" height="70" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="480" y="558" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">10. Output to Claude Code</text>
  <text x="480" y="580" text-anchor="middle" font-size="11" fill="#334155">Rendered review / task result in session</text>

  <line x1="440" y1="490" x2="460" y2="525" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="720" y1="490" x2="540" y2="525" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Legend -->
  <rect x="60" y="620" width="840" height="44" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="80" y1="642" x2="120" y2="642" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="128" y="646" font-size="11" fill="#334155">Request flow</text>
  <line x1="240" y1="642" x2="280" y2="642" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="288" y="646" font-size="11" fill="#334155">Routing</text>
  <line x1="360" y1="642" x2="400" y2="642" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="408" y="646" font-size="11" fill="#334155">Success / return</text>
  <line x1="530" y1="642" x2="570" y2="642" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-orange)"/>
  <text x="578" y="646" font-size="11" fill="#334155">Async stream</text>
  <polygon points="700,636 720,646 700,656 680,646" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="730" y="646" font-size="11" fill="#334155">Decision</text>
</svg>