<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 912.4 320" width="912.4" height="320" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .stage-label { font-size: 15px; font-weight: 700; fill: #1e40af; }
  .node-title { font-size: 15px; font-weight: 700; fill: #0f172a; }
  .node-sub { font-size: 12px; font-weight: 400; fill: #475569; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 12px; font-weight: 400; fill: #475569; }
  .badge { font-size: 11px; font-weight: 700; }
  .grp-label { font-size: 12px; font-weight: 600; fill: #475569; letter-spacing:0.4px; }
  .mono { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 13px; font-weight: 600; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="912.4" height="320" fill="#ffffff"/>
<text x="251.6" y="40" class="title">The HTTP Request / Response Cycle</text>
<rect x="40.0" y="120" width="155.6" height="64" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
<text x="117.8" y="146" text-anchor="middle" class="node-title">Client</text>
<text x="117.8" y="166" text-anchor="middle" class="node-sub">(app / browser)</text>
<rect x="265.6" y="120" width="155.6" height="64" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="343.40000000000003" y="146" text-anchor="middle" class="node-title">Request</text>
<text x="343.40000000000003" y="166" text-anchor="middle" class="node-sub">method + path</text>
<text x="343.40000000000003" y="180" text-anchor="middle" class="node-sub">+ headers + body</text>
<rect x="491.2" y="120" width="155.6" height="64" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
<text x="569.0" y="146" text-anchor="middle" class="node-title">Server (API)</text>
<text x="569.0" y="166" text-anchor="middle" class="node-sub">(resource handler)</text>
<rect x="716.8" y="120" width="155.6" height="64" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="794.5999999999999" y="146" text-anchor="middle" class="node-title">Response</text>
<text x="794.5999999999999" y="166" text-anchor="middle" class="node-sub">status + headers</text>
<text x="794.5999999999999" y="180" text-anchor="middle" class="node-sub">+ body</text>
<line x1="199.6" y1="152.0" x2="259.6" y2="152.0" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<text x="230.60000000000002" y="142.0" text-anchor="middle" class="node-sub">send</text>
<line x1="425.20000000000005" y1="152.0" x2="485.2" y2="152.0" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-accent)"/>
<text x="456.20000000000005" y="142.0" text-anchor="middle" class="node-sub">process</text>
<line x1="650.8" y1="152.0" x2="710.8" y2="152.0" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<text x="681.8" y="142.0" text-anchor="middle" class="node-sub">return</text>
<path d="M 794.5999999999999 184 L 794.5999999999999 232 L 117.8 232 L 117.8 190" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
<text x="456.19999999999993" y="222" text-anchor="middle" class="grp-label">response returns to client</text>
<rect x="40" y="262" width="832.4" height="34" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="186.2" y="284" class="item-sub">stateless: every request carries all context it needs (headers, auth, body)</text>
</svg>
