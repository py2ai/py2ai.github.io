<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 444" width="720" height="444" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .stage-label { font-size: 15px; font-weight: 700; fill: #1e40af; }
  .node-title { font-size: 15px; font-weight: 700; fill: #0f172a; }
  .node-sub { font-size: 12px; font-weight: 400; fill: #475569; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 12px; font-weight: 400; fill: #475569; }
  .badge { font-size: 11px; font-weight: 700; }
  .grp-label { font-size: 12px; font-weight: 600; fill: #475569; letter-spacing:0.4px; }
  .mono { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 13px; font-weight: 600; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="720" height="444" fill="#ffffff"/>
<text x="211.2" y="38" class="title">HTTP Status Code Classes</text>
<rect x="40" y="68" width="70" height="56" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="75.0" y="101.0" text-anchor="middle" class="node-title" fill="#2563eb">1xx</text>
<rect x="124" y="68" width="556" height="56" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="142" y="92" class="node-title">Informational</text>
<text x="142" y="112" class="node-sub">100 Continue, 101 Switching Protocols</text>
<rect x="40" y="138" width="70" height="56" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="75.0" y="171.0" text-anchor="middle" class="node-title" fill="#16a34a">2xx</text>
<rect x="124" y="138" width="556" height="56" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="142" y="162" class="node-title">Success</text>
<text x="142" y="182" class="node-sub">200 OK, 201 Created, 204 No Content</text>
<rect x="40" y="208" width="70" height="56" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="75.0" y="241.0" text-anchor="middle" class="node-title" fill="#2563eb">3xx</text>
<rect x="124" y="208" width="556" height="56" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="142" y="232" class="node-title">Redirection</text>
<text x="142" y="252" class="node-sub">301 Moved, 304 Not Modified</text>
<rect x="40" y="278" width="70" height="56" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
<text x="75.0" y="311.0" text-anchor="middle" class="node-title" fill="#d97706">4xx</text>
<rect x="124" y="278" width="556" height="56" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="142" y="302" class="node-title">Client Error</text>
<text x="142" y="322" class="node-sub">400 Bad Request, 401, 403, 404, 422, 429</text>
<rect x="40" y="348" width="70" height="56" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
<text x="75.0" y="381.0" text-anchor="middle" class="node-title" fill="#dc2626">5xx</text>
<rect x="124" y="348" width="556" height="56" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="142" y="372" class="node-title">Server Error</text>
<text x="142" y="392" class="node-sub">500 Internal, 502 Bad Gateway, 503 Unavailable</text>
</svg>
