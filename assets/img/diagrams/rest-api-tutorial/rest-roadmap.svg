<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 634" width="760" height="634" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .stage-label { font-size: 15px; font-weight: 700; fill: #1e40af; }
  .node-title { font-size: 15px; font-weight: 700; fill: #0f172a; }
  .node-sub { font-size: 12px; font-weight: 400; fill: #475569; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 12px; font-weight: 400; fill: #475569; }
  .badge { font-size: 11px; font-weight: 700; }
  .grp-label { font-size: 12px; font-weight: 600; fill: #475569; letter-spacing:0.4px; }
  .mono { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 13px; font-weight: 600; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="760" height="634" fill="#ffffff"/>
<text x="181.6" y="34" class="title">HTTP / REST API Learning Roadmap</text>
<rect x="24" y="56" width="8" height="86" rx="4" fill="#2563eb"/>
<rect x="46" y="56" width="690" height="86" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="64" y="82" class="stage-label">Stage 1  HTTP Fundamentals</text>
<text x="64" y="106" class="item">TCP, request/response   headers, body, methods   URLs, ports, HTTPS</text>
<line x1="28.0" y1="144" x2="28.0" y2="164" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="24" y="168" width="8" height="86" rx="4" fill="#2563eb"/>
<rect x="46" y="168" width="690" height="86" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="64" y="194" class="stage-label">Stage 2  REST Principles</text>
<text x="64" y="218" class="item">Resources &amp; URIs   statelessness, uniform interface   naming, resource modeling</text>
<line x1="28.0" y1="256" x2="28.0" y2="276" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="24" y="280" width="8" height="86" rx="4" fill="#2563eb"/>
<rect x="46" y="280" width="690" height="86" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="64" y="306" class="stage-label">Stage 3  Methods + CRUD</text>
<text x="64" y="330" class="item">GET/POST/PUT/PATCH/DELETE   idempotency &amp; safety   safe vs unsafe methods</text>
<line x1="28.0" y1="368" x2="28.0" y2="388" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="24" y="392" width="8" height="86" rx="4" fill="#2563eb"/>
<rect x="46" y="392" width="690" height="86" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="64" y="418" class="stage-label">Stage 4  Status + Errors</text>
<text x="64" y="442" class="item">2xx/3xx/4xx/5xx classes   problem+json, error bodies   idempotency keys</text>
<line x1="28.0" y1="480" x2="28.0" y2="500" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="24" y="504" width="8" height="86" rx="4" fill="#2563eb"/>
<rect x="46" y="504" width="690" height="86" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="64" y="530" class="stage-label">Stage 5  Production</text>
<text x="64" y="554" class="item">auth, rate limiting, versioning   pagination, caching, ETags   OpenAPI, observability</text>
</svg>
