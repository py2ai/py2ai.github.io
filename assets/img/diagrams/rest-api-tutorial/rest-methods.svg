<text x="636.0" y="228.0" text-anchor="middle" class="badge" fill="#d97706">No</text>
<rect x="40" y="246" width="636" height="44" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="50" y="255" width="66" height="26" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
<text x="83.0" y="272.0" text-anchor="middle" class="badge" fill="#2563eb">PATCH</text>
<text x="142" y="272.0" class="mono" fill="#0f172a">/users/:id</text>
<text x="342" y="272.0" class="item">Update (partial)</text>
<rect x="518.0" y="257" width="36" height="22" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
<text x="536.0" y="272.0" text-anchor="middle" class="badge" fill="#d97706">No</text>
<rect x="618.0" y="257" width="36" height="22" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
<text x="636.0" y="272.0" text-anchor="middle" class="badge" fill="#d97706">No</text>
<rect x="40" y="290" width="636" height="44" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
<rect x="50" y="299" width="66" height="26" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
<text x="83.0" y="316.0" text-anchor="middle" class="badge" fill="#dc2626">DELETE</text>
<text x="142" y="316.0" class="mono" fill="#0f172a">/users/:id</text>
<text x="342" y="316.0" class="item">Delete</text>
<rect x="518.0" y="301" width="36" height="22" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
<text x="536.0" y="316.0" text-anchor="middle" class="badge" fill="#16a34a">Yes</text>
<rect x="618.0" y="301" width="36" height="22" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
<text x="636.0" y="316.0" text-anchor="middle" class="badge" fill="#d97706">No</text>
<text x="40" y="348" class="item-sub">Idempotent = repeating the call gives the same result.   Safe = no server state change (cacheable).</text>
</svg>
