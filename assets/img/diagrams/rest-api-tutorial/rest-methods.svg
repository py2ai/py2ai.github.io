<text x="536.0" y="140.0" text-anchor="middle" class="badge" fill="#d97706">No</text>
<rect x="618.0" y="125" width="36" height="22" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
<text x="636.0" y="140.0" text-anchor="middle" class="badge" fill="#d97706">No</text>
<rect x="40" y="158" width="636" height="44" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="50" y="167" width="66" height="26" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
<text x="83.0" y="184.0" text-anchor="middle" class="badge" fill="#16a34a">GET</text>
<text x="142" y="184.0" class="mono" fill="#0f172a">/users/:id</text>
<text x="342" y="184.0" class="item">Read</text>
<rect x="518.0" y="169" width="36" height="22" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
<text x="536.0" y="184.0" text-anchor="middle" class="badge" fill="#16a34a">Yes</text>
<rect x="618.0" y="169" width="36" height="22" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
<text x="636.0" y="184.0" text-anchor="middle" class="badge" fill="#16a34a">Yes</text>
<rect x="40" y="202" width="636" height="44" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
<rect x="50" y="211" width="66" height="26" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
<text x="83.0" y="228.0" text-anchor="middle" class="badge" fill="#2563eb">PUT</text>
<text x="142" y="228.0" class="mono" fill="#0f172a">/users/:id</text>
<text x="342" y="228.0" class="item">Update (replace)</text>
