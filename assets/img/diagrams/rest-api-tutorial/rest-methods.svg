<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 716 374" width="716" height="374" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .stage-label { font-size: 15px; font-weight: 700; fill: #1e40af; }
  .node-title { font-size: 15px; font-weight: 700; fill: #0f172a; }
  .node-sub { font-size: 12px; font-weight: 400; fill: #475569; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 12px; font-weight: 400; fill: #475569; }
  .badge { font-size: 11px; font-weight: 700; }
  .grp-label { font-size: 12px; font-weight: 600; fill: #475569; letter-spacing:0.4px; }
  .mono { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 13px; font-weight: 600; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="716" height="374" fill="#ffffff"/>
<text x="141.0" y="38" class="title">HTTP Methods Map to CRUD Operations</text>
<rect x="40" y="70" width="636" height="44" rx="8" fill="#1e40af"/>
<text x="83.0" y="97.0" text-anchor="middle" class="node-title" fill="#ffffff">Method</text>
<text x="226.0" y="97.0" text-anchor="middle" class="node-title" fill="#ffffff">Example path</text>
<text x="401.0" y="97.0" text-anchor="middle" class="node-title" fill="#ffffff">Operation</text>
<text x="536.0" y="97.0" text-anchor="middle" class="node-title" fill="#ffffff">Idempotent?</text>
<text x="636.0" y="97.0" text-anchor="middle" class="node-title" fill="#ffffff">Safe?</text>
<rect x="40" y="114" width="636" height="44" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
<rect x="50" y="123" width="66" height="26" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
<text x="83.0" y="140.0" text-anchor="middle" class="badge" fill="#d97706">POST</text>
<text x="142" y="140.0" class="mono" fill="#0f172a">/users</text>
<text x="342" y="140.0" class="item">Create</text>
