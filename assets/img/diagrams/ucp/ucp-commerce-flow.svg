<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 800" font-family="Inter, system-ui, -apple-system, sans-serif">
<defs>
<filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
<marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#2563eb"/></marker>
<marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#059669"/></marker>
<marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#7c3aed"/></marker>
<marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#ea580c"/></marker>
<marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#64748b"/></marker>
</defs>
<rect width="960" height="800" fill="#ffffff"/>
<text x="480" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">UCP Commerce Flow: Discovery to Transaction</text>
<text x="480" y="56" text-anchor="middle" font-size="12" fill="#475569">The complete lifecycle from capability discovery to order completion</text>
<rect x="24" y="100" width="120" height="48" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="84" y="120" text-anchor="middle" font-size="9" font-weight="700" fill="#94a3b8">PHASE 1</text>
<text x="84" y="136" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Discovery</text>
<rect x="24" y="280" width="120" height="48" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="84" y="300" text-anchor="middle" font-size="9" font-weight="700" fill="#94a3b8">PHASE 2</text>
<text x="84" y="316" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Negotiation</text>
<rect x="24" y="460" width="120" height="48" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="84" y="480" text-anchor="middle" font-size="9" font-weight="700" fill="#94a3b8">PHASE 3</text>
<text x="84" y="496" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Checkout</text>
<rect x="24" y="640" width="120" height="48" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="84" y="660" text-anchor="middle" font-size="9" font-weight="700" fill="#94a3b8">PHASE 4</text>
<text x="84" y="676" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Payment</text>
<rect x="200" y="88" width="160" height="56" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
<text x="280" y="110" text-anchor="middle" font-size="12" font-weight="700" fill="#2563eb">Platform</text>
<text x="280" y="128" text-anchor="middle" font-size="9" fill="#475569">Fetches /.well-known/ucp</text>
<line x1="368" y1="116" x2="560" y2="116" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
<text x="464" y="110" text-anchor="middle" font-size="9" font-weight="600" fill="#2563eb">GET /.well-known/ucp</text>
<rect x="568" y="88" width="160" height="56" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
<text x="648" y="110" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">Business</text>
<text x="648" y="128" text-anchor="middle" font-size="9" fill="#475569">Returns UCP Profile</text>
<rect x="760" y="80" width="176" height="72" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="848" y="96" text-anchor="middle" font-size="9" font-weight="700" fill="#1e293b">Profile Contains:</text>
<text x="776" y="112" font-size="8" fill="#475569">- version</text>
<text x="776" y="124" font-size="8" fill="#475569">- services (REST, MCP, A2A)</text>
<text x="776" y="136" font-size="8" fill="#475569">- capabilities (checkout, order)</text>
<text x="776" y="148" font-size="8" fill="#475569">- payment_handlers</text>
<text x="776" y="160" font-size="8" fill="#475569">- signing_keys</text>
<rect x="200" y="268" width="528" height="72" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)"/>
<text x="464" y="288" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">Capability Intersection Algorithm</text>
<rect x="216" y="298" width="120" height="32" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
<text x="276" y="312" text-anchor="middle" font-size="9" font-weight="700" fill="#3b82f6">1. Compute</text>
<text x="276" y="324" text-anchor="middle" font-size="7" fill="#475569">Match capability names between platform and business</text>
<rect x="344" y="298" width="120" height="32" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
<text x="404" y="312" text-anchor="middle" font-size="9" font-weight="700" fill="#3b82f6">2. Select Version</text>
<text x="404" y="324" text-anchor="middle" font-size="7" fill="#475569">Choose highest mutually supported version</text>
<rect x="472" y="298" width="120" height="32" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
<text x="532" y="312" text-anchor="middle" font-size="9" font-weight="700" fill="#3b82f6">3. Prune Orphans</text>
<text x="532" y="324" text-anchor="middle" font-size="7" fill="#475569">Remove extensions without parent capabilities</text>
<rect x="600" y="298" width="120" height="32" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
<text x="660" y="312" text-anchor="middle" font-size="9" font-weight="700" fill="#3b82f6">4. Repeat</text>
<text x="660" y="324" text-anchor="middle" font-size="7" fill="#475569">Continue pruning until stable</text>
<rect x="200" y="448" width="160" height="56" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
<text x="280" y="470" text-anchor="middle" font-size="12" font-weight="700" fill="#2563eb">Platform</text>
<text x="280" y="488" text-anchor="middle" font-size="9" fill="#475569">Create checkout session</text>
<line x1="368" y1="476" x2="560" y2="476" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
<text x="464" y="470" text-anchor="middle" font-size="9" font-weight="600" fill="#2563eb">POST /checkout-sessions</text>
<rect x="568" y="448" width="160" height="56" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
<text x="648" y="470" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">Business</text>
<text x="648" y="488" text-anchor="middle" font-size="9" fill="#475569">Returns checkout + handlers</text>
<rect x="760" y="440" width="176" height="72" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="848" y="456" text-anchor="middle" font-size="9" font-weight="700" fill="#1e293b">Response Includes:</text>
<text x="776" y="472" font-size="8" fill="#475569">- ucp.capabilities (active)</text>
<text x="776" y="484" font-size="8" fill="#475569">- ucp.payment_handlers</text>
<text x="776" y="496" font-size="8" fill="#475569">- line_items, totals</text>
<text x="776" y="508" font-size="8" fill="#475569">- available_instruments</text>
<rect x="152" y="628" width="144" height="56" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
<text x="224" y="646" text-anchor="middle" font-size="10" font-weight="700" fill="#059669">1. Negotiation</text>
<text x="224" y="662" text-anchor="middle" font-size="8" fill="#475569">Business advertises</text>
<text x="224" y="674" text-anchor="middle" font-size="8" fill="#475569">payment handlers</text>
<line x1="304" y1="656" x2="392" y2="656" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
<rect x="400" y="628" width="144" height="56" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
<text x="472" y="646" text-anchor="middle" font-size="10" font-weight="700" fill="#7c3aed">2. Acquisition</text>
<text x="472" y="662" text-anchor="middle" font-size="8" fill="#475569">Platform executes</text>
<text x="472" y="674" text-anchor="middle" font-size="8" fill="#475569">handler logic with CP</text>
<line x1="552" y1="656" x2="640" y2="656" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)"/>
<rect x="648" y="628" width="144" height="56" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow)"/>
<text x="720" y="646" text-anchor="middle" font-size="10" font-weight="700" fill="#ea580c">3. Completion</text>
<text x="720" y="662" text-anchor="middle" font-size="8" fill="#475569">Platform submits</text>
<text x="720" y="674" text-anchor="middle" font-size="8" fill="#475569">opaque token to business</text>
<rect x="24" y="752" width="912" height="40" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<line x1="40" y1="772" x2="64" y2="772" stroke="#2563eb" stroke-width="2"/>
<text x="70" y="776" font-size="10" fill="#475569">Request / Data Flow</text>
<line x1="200" y1="772" x2="224" y2="772" stroke="#059669" stroke-width="2"/>
<text x="230" y="776" font-size="10" fill="#475569">Business Response</text>
<line x1="360" y1="772" x2="384" y2="772" stroke="#7c3aed" stroke-width="2"/>
<text x="390" y="776" font-size="10" fill="#475569">Credential Exchange</text>
<line x1="540" y1="772" x2="564" y2="772" stroke="#ea580c" stroke-width="2"/>
<text x="570" y="776" font-size="10" fill="#475569">Payment Processing</text>
<line x1="720" y1="772" x2="744" y2="772" stroke="#64748b" stroke-width="2"/>
<text x="750" y="776" font-size="10" fill="#475569">Async / Webhooks</text>
</svg>