<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680" font-family="Inter, system-ui, -apple-system, sans-serif">
<defs>
<filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
<marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#2563eb"/></marker>
<marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#059669"/></marker>
<marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#7c3aed"/></marker>
<marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#ea580c"/></marker>
<marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#64748b"/></marker>
</defs>
<rect width="960" height="680" fill="#ffffff"/>
<text x="480" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">UCP Architecture: Four Primary Actors</text>
<text x="480" y="60" text-anchor="middle" font-size="12" fill="#475569">How platforms, businesses, credential providers, and PSPs interact</text>
<rect x="64" y="96" width="360" height="200" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
<rect x="64" y="96" width="360" height="32" rx="8" fill="#2563eb"/>
<rect x="64" y="120" width="360" height="8" fill="#2563eb"/>
<text x="244" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Platform (Application / Agent)</text>
<text x="80" y="148" font-size="11" font-weight="600" fill="#1e293b">AI Shopping Assistants, Super Apps,</text>
<text x="80" y="164" font-size="11" font-weight="600" fill="#1e293b">Search Engines, Mobile Apps</text>
<text x="80" y="180" font-size="10" font-weight="400" fill="#1e293b"></text>
<text x="80" y="196" font-size="10" font-weight="400" fill="#1e293b">Discovers business capabilities via profiles</text>
<text x="80" y="212" font-size="10" font-weight="400" fill="#1e293b">Initiates checkout sessions</text>
<text x="80" y="228" font-size="10" font-weight="400" fill="#1e293b">Presents UI / conversational interface</text>
<rect x="536" y="96" width="360" height="200" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
<rect x="536" y="96" width="360" height="32" rx="8" fill="#059669"/>
<rect x="536" y="120" width="360" height="8" fill="#059669"/>
<text x="716" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Business (Merchant of Record)</text>
<text x="552" y="148" font-size="11" font-weight="600" fill="#1e293b">Retailers, Airlines, Hotel Chains,</text>
<text x="552" y="164" font-size="11" font-weight="600" fill="#1e293b">Service Providers</text>
<text x="552" y="180" font-size="10" font-weight="400" fill="#1e293b"></text>
<text x="552" y="196" font-size="10" font-weight="400" fill="#1e293b">Exposes commerce capabilities (inventory, pricing)</text>
<text x="552" y="212" font-size="10" font-weight="400" fill="#1e293b">Fulfills orders, processes payments</text>
<text x="552" y="228" font-size="10" font-weight="400" fill="#1e293b">Publishes profile at /.well-known/ucp</text>
<rect x="64" y="400" width="360" height="200" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
<rect x="64" y="400" width="360" height="32" rx="8" fill="#7c3aed"/>
<rect x="64" y="424" width="360" height="8" fill="#7c3aed"/>
<text x="244" y="422" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Credential Provider (CP)</text>
<text x="80" y="452" font-size="11" font-weight="600" fill="#1e293b">Digital Wallets (Google Wallet, Apple Pay),</text>
<text x="80" y="468" font-size="11" font-weight="600" fill="#1e293b">Identity Providers</text>
<text x="80" y="484" font-size="10" font-weight="400" fill="#1e293b"></text>
<text x="80" y="500" font-size="10" font-weight="400" fill="#1e293b">Authenticates users securely</text>
<text x="80" y="516" font-size="10" font-weight="400" fill="#1e293b">Issues payment tokens (keeps raw data off platform)</text>
<text x="80" y="532" font-size="10" font-weight="400" fill="#1e293b">Holds PII to minimize compliance scope</text>
<rect x="536" y="400" width="360" height="200" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow)"/>
<rect x="536" y="400" width="360" height="32" rx="8" fill="#ea580c"/>
<rect x="536" y="424" width="360" height="8" fill="#ea580c"/>
<text x="716" y="422" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Payment Service Provider (PSP)</text>
<text x="552" y="452" font-size="11" font-weight="600" fill="#1e293b">Stripe, Adyen, PayPal, Braintree,</text>
<text x="552" y="468" font-size="11" font-weight="600" fill="#1e293b">Chase Paymentech</text>
<text x="552" y="484" font-size="10" font-weight="400" fill="#1e293b"></text>
<text x="552" y="500" font-size="10" font-weight="400" fill="#1e293b">Authorizes and captures transactions</text>
<text x="552" y="516" font-size="10" font-weight="400" fill="#1e293b">Handles settlements with card networks</text>
<text x="552" y="532" font-size="10" font-weight="400" fill="#1e293b">Processes tokens from Credential Providers</text>
<line x1="432" y1="196" x2="528" y2="196" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
<line x1="528" y1="208" x2="432" y2="208" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
<text x="480" y="192" text-anchor="middle" font-size="9" font-weight="600" fill="#2563eb">Discovery / Negotiation</text>
<text x="480" y="220" text-anchor="middle" font-size="9" font-weight="600" fill="#059669">Capabilities / Responses</text>
<line x1="200" y1="304" x2="200" y2="392" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)"/>
<line x1="216" y1="392" x2="216" y2="304" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
<text x="208" y="348" text-anchor="end" font-size="9" font-weight="600" fill="#7c3aed">Tokenizes</text>
<text x="208" y="364" text-anchor="end" font-size="9" font-weight="600" fill="#2563eb">Receives token</text>
<line x1="680" y1="304" x2="680" y2="392" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
<line x1="696" y1="392" x2="696" y2="304" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
<text x="688" y="348" text-anchor="start" font-size="9" font-weight="600" fill="#059669">Sends payment</text>
<text x="688" y="364" text-anchor="start" font-size="9" font-weight="600" fill="#ea580c">Settlement</text>
<line x1="432" y1="440" x2="528" y2="256" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrow-purple)"/>
<text x="460" y="390" text-anchor="middle" font-size="9" font-weight="600" fill="#7c3aed">Payment tokens / credentials</text>
<line x1="384" y1="304" x2="576" y2="288" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow-gray)"/>
<text x="460" y="340" text-anchor="middle" font-size="9" font-weight="600" fill="#64748b">Checkout / Order webhooks</text>
<rect x="64" y="632" width="832" height="40" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<line x1="80" y1="652" x2="104" y2="652" stroke="#2563eb" stroke-width="2"/>
<text x="110" y="656" font-size="10" fill="#475569">Data Flow</text>
<line x1="200" y1="652" x2="224" y2="652" stroke="#059669" stroke-width="2"/>
<text x="230" y="656" font-size="10" fill="#475569">Business Response</text>
<line x1="360" y1="652" x2="384" y2="652" stroke="#7c3aed" stroke-width="2"/>
<text x="390" y="656" font-size="10" fill="#475569">Credential Exchange</text>
<line x1="560" y1="652" x2="584" y2="652" stroke="#ea580c" stroke-width="2"/>
<text x="590" y="656" font-size="10" fill="#475569">Payment Processing</text>
<line x1="740" y1="652" x2="764" y2="652" stroke="#64748b" stroke-width="2"/>
<text x="770" y="656" font-size="10" fill="#475569">Async / Webhooks</text>
</svg>