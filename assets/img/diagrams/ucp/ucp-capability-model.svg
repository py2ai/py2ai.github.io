<text x="320" y="610" font-size="9" fill="#94a3b8">|</text>
<text x="340" y="610" font-size="9" fill="#475569">com.example.payments.installments</text>
<text x="96" y="624" font-size="8" fill="#94a3b8">Authority: ucp.dev (official)  |  Authority: example.com (vendor)  |  No central registry needed</text>
