<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" bgcolor="transparent">
  <defs>
    <linearGradient id="featHeader" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="step1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#c23152;stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="step2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#0a2540;stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="step3Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#533483;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#3a1f5e;stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="step4Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a936f;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#155d47;stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="featGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d4059;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#1b2838;stop-opacity:0.95" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <marker id="arrowDown" markerWidth="10" markerHeight="7" refX="5" refY="7" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="#8899aa" />
    </marker>
    <marker id="arrowRight" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8899aa" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="720" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <rect x="0" y="0" width="960" height="52" fill="url(#featHeader)" rx="8"/>
  <rect x="0" y="40" width="960" height="12" fill="url(#featHeader)"/>
  <text x="480" y="34" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="bold">Brush: Gaussian Splatting Reconstruction Pipeline</text>

  <!-- STEP 1: Data Input -->
  <rect x="30" y="68" width="440" height="130" rx="8" fill="#fff5f5" stroke="#e94560" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="68" width="440" height="28" rx="8" fill="url(#step1Grad)"/>
  <rect x="30" y="82" width="440" height="14" fill="url(#step1Grad)"/>
  <text x="250" y="88" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold">STEP 1: Data Input & Loading</text>

  <text x="50" y="118" fill="#333" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold">COLMAP Sparse/Dense</text>
  <text x="50" y="134" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Camera poses, point clouds, images</text>

  <text x="250" y="118" fill="#333" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold">Nerfstudio Format</text>
  <text x="250" y="134" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">transforms.json + image folders</text>

  <text x="50" y="158" fill="#333" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold">PLY Point Clouds</text>
  <text x="250" y="158" fill="#333" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold">Masks & Transparency</text>

  <text x="50" y="178" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">init.ply auto-detected for initialization</text>
  <text x="250" y="178" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Alpha channels force splat transparency</text>

  <!-- STEP 2: Training -->
  <rect x="490" y="68" width="440" height="130" rx="8" fill="#f0f4ff" stroke="#0f3460" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="490" y="68" width="440" height="28" rx="8" fill="url(#step2Grad)"/>
  <rect x="490" y="82" width="440" height="14" fill="url(#step2Grad)"/>
  <text x="710" y="88" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold">STEP 2: MCMC Training Loop</text>

  <text x="510" y="118" fill="#333" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold">Splat Initialization</text>
  <text x="510" y="134" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">KNN-based or from point cloud</text>

  <text x="710" y="118" fill="#333" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold">MCMC-like Optimization</text>
  <text x="710" y="134" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Auto-grow + explore + prune splats</text>

  <text x="510" y="158" fill="#333" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold">AdamScaled Optimizer</text>
  <text x="710" y="158" fill="#333" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold">Exponential LR Scheduling</text>

  <text x="510" y="178" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Custom adaptive learning rates</text>
  <text x="710" y="178" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Decay for means, scales, opacity</text>

  <!-- Arrow from step 1 to step 2 -->
  <line x1="470" y1="133" x2="490" y2="133" stroke="#8899aa" stroke-width="2" marker-end="url(#arrowRight)"/>

  <!-- Arrow from step 2 down to step 3 -->
  <line x1="710" y1="198" x2="710" y2="218" stroke="#8899aa" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- STEP 3: Rendering -->
  <rect x="490" y="220" width="440" height="130" rx="8" fill="#f5f0ff" stroke="#533483" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="490" y="220" width="440" height="28" rx="8" fill="url(#step3Grad)"/>
  <rect x="490" y="234" width="440" height="14" fill="url(#step3Grad)"/>
  <text x="710" y="240" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold">STEP 3: GPU Rendering Pipeline</text>

  <text x="510" y="270" fill="#333" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold">Project Gaussians</text>
  <text x="510" y="286" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">3D-to-2D projection + visibility culling</text>

  <text x="710" y="270" fill="#333" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold">Tile-Based Rasterization</text>
  <text x="710" y="286" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">GPU radix sort + prefix sum + tile offset</text>

  <text x="510" y="310" fill="#333" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold">Spherical Harmonics</text>
  <text x="710" y="310" fill="#333" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold">Alpha Blending</text>

  <text x="510" y="328" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">View-dependent color up to SH degree 3</text>
  <text x="710" y="328" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Front-to-back compositing</text>

  <text x="610" y="346" fill="#533483" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="bold">Backward pass: autodiff gradients via Burn</text>

  <!-- Arrow from step 3 to step 4 -->
  <line x1="490" y1="285" x2="470" y2="285" stroke="#8899aa" stroke-width="2" marker-end="url(#arrowRight)" transform="rotate(180, 480, 285)"/>

  <!-- STEP 4: Output -->
  <rect x="30" y="220" width="440" height="130" rx="8" fill="#f0fff4" stroke="#1a936f" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="220" width="440" height="28" rx="8" fill="url(#step4Grad)"/>
  <rect x="30" y="234" width="440" height="14" fill="url(#step4Grad)"/>
  <text x="250" y="240" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold">STEP 4: Output & Export</text>

  <text x="50" y="270" fill="#333" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold">PLY Export</text>
  <text x="50" y="286" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Standard & compressed PLY formats</text>

  <text x="250" y="270" fill="#333" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold">Real-Time Viewer</text>
  <text x="250" y="286" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Interactive egui-based 3D viewer</text>

  <text x="50" y="310" fill="#333" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold">Web Deployment</text>
  <text x="250" y="310" fill="#333" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold">Rerun Visualization</text>

  <text x="50" y="328" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">WASM + Next.js for browser apps</text>
  <text x="250" y="328" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Training dynamics & debug views</text>

  <text x="150" y="346" fill="#1a936f" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="bold">Stream from URL: ?url= parameter for web</text>

  <!-- FEATURES SECTION -->
  <rect x="30" y="370" width="900" height="330" rx="8" fill="#ffffff" stroke="#2d4059" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="370" width="900" height="28" rx="8" fill="url(#featGrad)"/>
  <rect x="30" y="384" width="900" height="14" fill="url(#featGrad)"/>
  <text x="480" y="390" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold">KEY FEATURES & CAPABILITIES</text>

  <!-- Feature cards row 1 -->
  <rect x="50" y="410" width="200" height="80" rx="6" fill="#f0f4ff" stroke="#0f3460" stroke-width="1"/>
  <text x="150" y="432" text-anchor="middle" fill="#0f3460" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold">Cross-Platform</text>
  <text x="150" y="450" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Windows, macOS, Linux,</text>
  <text x="150" y="466" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Android, Web (WASM)</text>
  <text x="150" y="482" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">NVIDIA / AMD / Intel GPUs</text>

  <rect x="270" y="410" width="200" height="80" rx="6" fill="#fff5f5" stroke="#e94560" stroke-width="1"/>
  <text x="370" y="432" text-anchor="middle" fill="#c23152" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold">Zero CUDA Dependency</text>
  <text x="370" y="450" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Built on Burn + WebGPU</text>
  <text x="370" y="466" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Single binary, no setup</text>
  <text x="370" y="482" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Faster than gsplat benchmarks</text>

  <rect x="490" y="410" width="200" height="80" rx="6" fill="#f5f0ff" stroke="#533483" stroke-width="1"/>
  <text x="590" y="432" text-anchor="middle" fill="#533483" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold">MCMC Training</text>
  <text x="590" y="450" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Auto-growing splats</text>
  <text x="590" y="466" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Scene exploration + pruning</text>
  <text x="590" y="482" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Higher PSNR than gsplat</text>

  <rect x="710" y="410" width="200" height="80" rx="6" fill="#f0fff4" stroke="#1a936f" stroke-width="1"/>
  <text x="810" y="432" text-anchor="middle" fill="#155d47" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold">Interactive Training</text>
  <text x="810" y="450" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Live viewer during training</text>
  <text x="810" y="466" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Compare input vs. output</text>
  <text x="810" y="482" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Orbit, FPS, flythrough controls</text>

  <!-- Feature cards row 2 -->
  <rect x="50" y="505" width="200" height="80" rx="6" fill="#f0fff4" stroke="#1a936f" stroke-width="1"/>
  <text x="150" y="527" text-anchor="middle" fill="#155d47" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold">Web Demo</text>
  <text x="150" y="545" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Chrome/Edge WebGPU</text>
  <text x="150" y="561" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Train & view in browser</text>
  <text x="150" y="577" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Stream splats via URL</text>

  <rect x="270" y="505" width="200" height="80" rx="6" fill="#f0f4ff" stroke="#0f3460" stroke-width="1"/>
  <text x="370" y="527" text-anchor="middle" fill="#0f3460" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold">Loss Functions</text>
  <text x="370" y="545" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">L1 + SSIM (separable conv)</text>
  <text x="370" y="561" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">LPIPS perceptual loss</text>
  <text x="370" y="577" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Alpha / mask loss weighting</text>

  <rect x="490" y="505" width="200" height="80" rx="6" fill="#fff5f5" stroke="#e94560" stroke-width="1"/>
  <text x="590" y="527" text-anchor="middle" fill="#c23152" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold">Dynamic Splats</text>
  <text x="590" y="545" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Sequence playback (zip/PLY)</text>
  <text x="590" y="561" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Delta frame animations</text>
  <text x="590" y="577" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Cat4D / Cap4D support</text>

  <rect x="710" y="505" width="200" height="80" rx="6" fill="#f5f0ff" stroke="#533483" stroke-width="1"/>
  <text x="810" y="527" text-anchor="middle" fill="#533483" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold">Scalable Data</text>
  <text x="810" y="545" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Datasets larger than RAM</text>
  <text x="810" y="561" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Instant training start</text>
  <text x="810" y="577" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Streaming data loader</text>

  <!-- Feature cards row 3 -->
  <rect x="50" y="600" width="200" height="80" rx="6" fill="#f5f0ff" stroke="#533483" stroke-width="1"/>
  <text x="150" y="622" text-anchor="middle" fill="#533483" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold">CLI Interface</text>
  <text x="150" y="640" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Full training from command line</text>
  <text x="150" y="656" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">--with-viewer for debugging</text>
  <text x="150" y="672" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">--export-every for checkpoints</text>

  <rect x="270" y="600" width="200" height="80" rx="6" fill="#f0fff4" stroke="#1a936f" stroke-width="1"/>
  <text x="370" y="622" text-anchor="middle" fill="#155d47" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold">Android Support</text>
  <text x="370" y="640" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Native ARM64 builds</text>
  <text x="370" y="656" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">cargo-ndk cross-compilation</text>
  <text x="370" y="672" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Touch controls for mobile</text>

  <rect x="490" y="600" width="200" height="80" rx="6" fill="#fff5f5" stroke="#e94560" stroke-width="1"/>
  <text x="590" y="622" text-anchor="middle" fill="#c23152" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold">Rerun Integration</text>
  <text x="590" y="640" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Visualize training dynamics</text>
  <text x="590" y="656" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Memory usage tracking</text>
  <text x="590" y="672" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Blueprint configuration</text>

  <rect x="710" y="600" width="200" height="80" rx="6" fill="#f0f4ff" stroke="#0f3460" stroke-width="1"/>
  <text x="810" y="622" text-anchor="middle" fill="#0f3460" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold">NPM Package</text>
  <text x="810" y="640" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">brush-js WASM module</text>
  <text x="810" y="656" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">JavaScript interop API</text>
  <text x="810" y="672" text-anchor="middle" fill="#555" font-family="Segoe UI, Arial, sans-serif" font-size="10">Next.js integration ready</text>
</svg>