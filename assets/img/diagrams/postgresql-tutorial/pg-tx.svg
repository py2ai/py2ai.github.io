<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" width="860" height="440" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="440" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">MVCC, Isolation, VACUUM, Locks</text>
<rect x="40" y="70" width="390" height="180" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="235" y="96" text-anchor="middle" class="band-label">MVCC (multi-version)</text>
<text x="235" y="124" text-anchor="middle" class="item">each transaction sees a snapshot;</text>
<text x="235" y="142" text-anchor="middle" class="item">updates create a new row version,</text>
<text x="235" y="160" text-anchor="middle" class="item">old version kept for in-flight txns.</text>
<text x="235" y="196" text-anchor="middle" class="item-sub">writes don't block reads;</text>
<text x="235" y="214" text-anchor="middle" class="item-sub">reads don't block writes.</text>
<text x="235" y="232" text-anchor="middle" class="item-sub">dead tuples -&gt; VACUUM reclaims.</text>
<rect x="450" y="70" width="390" height="180" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="645" y="96" text-anchor="middle" class="band-label">Isolation levels</text>
<rect x="470" y="118" width="80" height="60" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="510" y="144" text-anchor="middle" class="item-sub">Read Committed</text>
<text x="510" y="162" text-anchor="middle" class="item-sub">default</text>
<rect x="558" y="118" width="80" height="60" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="598" y="144" text-anchor="middle" class="item-sub">Repeatable Read</text>
<text x="598" y="162" text-anchor="middle" class="item-sub">snapshot per txn</text>
<rect x="646" y="118" width="80" height="60" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="686" y="144" text-anchor="middle" class="item-sub">Serializable</text>
<text x="686" y="162" text-anchor="middle" class="item-sub">no anomalies; SSI</text>
<rect x="734" y="118" width="80" height="60" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="774" y="144" text-anchor="middle" class="item-sub">Serializable +</text>
<text x="774" y="162" text-anchor="middle" class="item-sub">2PL fallback</text>
<text x="645" y="210" text-anchor="middle" class="item-sub">higher isolation = more locks + overhead</text>
<text x="645" y="228" text-anchor="middle" class="item-sub">pick the weakest your app tolerates</text>
<rect x="40" y="266" width="800" height="140" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="292" text-anchor="middle" class="band-label">VACUUM + Locks</text>
<rect x="60" y="306" width="170" height="44" rx="8" fill="#2563eb"/>
<text x="145" y="326" text-anchor="middle" class="node-title-w">autovacuum</text>
<text x="145" y="344" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">runs automatically</text>
<rect x="250" y="306" width="170" height="44" rx="8" fill="#1e40af"/>
<text x="335" y="326" text-anchor="middle" class="node-title-w">VACUUM</text>
<text x="335" y="344" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">reclaim space, no rewrite</text>
<rect x="440" y="306" width="170" height="44" rx="8" fill="#2563eb"/>
<text x="525" y="326" text-anchor="middle" class="node-title-w">VACUUM FULL</text>
<text x="525" y="344" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">reclaims + rewrites (locks!)</text>
<rect x="630" y="306" width="170" height="44" rx="8" fill="#1e40af"/>
<text x="715" y="326" text-anchor="middle" class="node-title-w">ANALYZE</text>
<text x="715" y="344" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">update planner stats</text>
<text x="430" y="372" text-anchor="middle" class="item-sub">row-level locks (FOR UPDATE), table locks, advisory locks; bloat -&gt; tune autovacuum.</text>
<text x="430" y="392" text-anchor="middle" class="note">Run VACUUM ANALYZE regularly; never VACUUM FULL in production peak.</text>
</svg>
