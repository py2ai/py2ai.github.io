<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" width="860" height="440" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="440" fill="#ffffff"/>
<text x="290" y="38" text-anchor="middle" class="title">PostgreSQL Server Architecture</text>
<rect x="40" y="80" width="120" height="50" rx="8" fill="#1e40af"/>
<text x="100" y="110" text-anchor="middle" class="node-title-w">Client</text>
<line x1="160" y1="105" x2="210" y2="105" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="210" y="80" width="140" height="50" rx="8" fill="#2563eb"/>
<text x="280" y="110" text-anchor="middle" class="node-title-w">postmaster</text>
<line x1="350" y1="105" x2="400" y2="105" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<text x="375" y="97" text-anchor="middle" class="item-sub">fork</text>
<rect x="400" y="70" width="440" height="330" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="620" y="96" text-anchor="middle" class="band-label">Backend (per connection)</text>
<rect x="420" y="110" width="160" height="40" rx="8" fill="#1e40af"/>
<text x="500" y="136" text-anchor="middle" class="node-title-w">query process or</text>
<rect x="660" y="110" width="160" height="40" rx="8" fill="#2563eb"/>
<text x="740" y="136" text-anchor="middle" class="node-title-w">executor</text>
<line x1="580" y1="130" x2="660" y2="130" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="420" y="170" width="380" height="120" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="610" y="194" text-anchor="middle" class="band-label">Shared memory</text>
<rect x="440" y="208" width="110" height="66" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="495" y="236" text-anchor="middle" class="item">shared</text>
<text x="495" y="252" text-anchor="middle" class="item-sub">buffers</text>
<rect x="560" y="208" width="110" height="66" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="615" y="236" text-anchor="middle" class="item">WAL</text>
<text x="615" y="252" text-anchor="middle" class="item-sub">buffers</text>
<rect x="680" y="208" width="110" height="66" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="735" y="236" text-anchor="middle" class="item">caches</text>
<text x="735" y="252" text-anchor="middle" class="item-sub">catalog etc</text>
<rect x="420" y="300" width="380" height="80" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="610" y="324" text-anchor="middle" class="band-label">Background workers</text>
<rect x="430" y="336" width="80" height="34" rx="8" fill="#2563eb"/>
<text x="470" y="358" text-anchor="middle" class="node-title-w">checkpointer</text>
<rect x="518" y="336" width="80" height="34" rx="8" fill="#1e40af"/>
<text x="558" y="358" text-anchor="middle" class="node-title-w">WAL writer</text>
<rect x="606" y="336" width="80" height="34" rx="8" fill="#2563eb"/>
<text x="646" y="358" text-anchor="middle" class="node-title-w">autovacuum</text>
<rect x="694" y="336" width="80" height="34" rx="8" fill="#1e40af"/>
<text x="734" y="358" text-anchor="middle" class="node-title-w">stats collector</text>
<rect x="40" y="360" width="360" height="40" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="220" y="382" text-anchor="middle" class="note">One OS process per connection; shared buffers + WAL are the core.</text>
</svg>
