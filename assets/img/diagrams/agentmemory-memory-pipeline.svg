<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="auto" viewBox="0 0 960 580">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="hookGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="processGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="storeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="searchGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="580" rx="12" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1e293b">agentmemory — Memory Pipeline Architecture</text>
  <text x="480" y="58" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">How observations become searchable, persistent memory</text>

  <!-- Phase Labels -->
  <text x="80" y="88" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#d97706" letter-spacing="1.5">CAPTURE</text>
  <text x="310" y="88" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#2563eb" letter-spacing="1.5">PROCESS</text>
  <text x="570" y="88" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#7c3aed" letter-spacing="1.5">STORE</text>
  <text x="810" y="88" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#059669" letter-spacing="1.5">RETRIEVE</text>

  <!-- Phase separator lines -->
  <line x1="195" y1="78" x2="195" y2="540" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="440" y1="78" x2="440" y2="540" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="690" y1="78" x2="690" y2="540" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- CAPTURE Phase: Hooks -->
  <g filter="url(#shadow)">
    <rect x="20" y="105" width="120" height="50" rx="8" fill="url(#hookGrad)"/>
    <text x="80" y="127" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#fff">SessionStart</text>
    <text x="80" y="143" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#fef3c7">Load profile</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="20" y="170" width="120" height="50" rx="8" fill="url(#hookGrad)"/>
    <text x="80" y="192" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#fff">PostToolUse</text>
    <text x="80" y="208" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#fef3c7">Capture output</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="20" y="235" width="120" height="50" rx="8" fill="url(#hookGrad)"/>
    <text x="80" y="257" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#fff">UserPrompt</text>
    <text x="80" y="273" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#fef3c7">Capture intent</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="20" y="300" width="120" height="50" rx="8" fill="url(#hookGrad)"/>
    <text x="80" y="322" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#fff">PreCompact</text>
    <text x="80" y="338" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#fef3c7">Re-inject memory</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="20" y="365" width="120" height="50" rx="8" fill="url(#hookGrad)"/>
    <text x="80" y="387" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#fff">Stop / End</text>
    <text x="80" y="403" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#fef3c7">Summarize session</text>
  </g>

  <!-- 12 hooks badge -->
  <rect x="35" y="430" width="90" height="24" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="80" y="446" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e">12 Hooks</text>

  <!-- Arrows from hooks to process -->
  <line x1="140" y1="130" x2="205" y2="180" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="140" y1="195" x2="205" y2="210" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="140" y1="260" x2="205" y2="250" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="140" y1="325" x2="205" y2="300" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="140" y1="390" x2="205" y2="350" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PROCESS Phase -->
  <g filter="url(#shadow)">
    <rect x="210" y="110" width="220" height="55" rx="8" fill="url(#processGrad)"/>
    <text x="320" y="133" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fff">SHA-256 Dedup</text>
    <text x="320" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#bfdbfe">5-min window deduplication</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="210" y="180" width="220" height="55" rx="8" fill="url(#processGrad)"/>
    <text x="320" y="203" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fff">Privacy Filter</text>
    <text x="320" y="222" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#bfdbfe">Strip API keys, secrets, <private> tags</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="210" y="250" width="220" height="55" rx="8" fill="url(#processGrad)"/>
    <text x="320" y="273" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fff">LLM Compression</text>
    <text x="320" y="292" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#bfdbfe">Facts + concepts + narrative</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="210" y="320" width="220" height="55" rx="8" fill="url(#processGrad)"/>
    <text x="320" y="343" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fff">Vector Embedding</text>
    <text x="320" y="362" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#bfdbfe">6 providers + local (all-MiniLM-L6-v2)</text>
  </g>

  <!-- Process arrows -->
  <line x1="320" y1="165" x2="320" y2="180" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="320" y1="235" x2="320" y2="250" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="320" y1="305" x2="320" y2="320" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Arrow from process to store -->
  <line x1="430" y1="270" x2="455" y2="220" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="430" y1="300" x2="455" y2="310" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="430" y1="350" x2="455" y2="400" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STORE Phase -->
  <g filter="url(#shadow)">
    <rect x="450" y="110" width="230" height="55" rx="8" fill="url(#storeGrad)"/>
    <text x="565" y="133" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fff">BM25 Index</text>
    <text x="565" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ddd6fe">Stemmed keyword matching + synonyms</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="450" y="180" width="230" height="55" rx="8" fill="url(#storeGrad)"/>
    <text x="565" y="203" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fff">Vector Store</text>
    <text x="565" y="222" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ddd6fe">Cosine similarity embeddings</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="450" y="250" width="230" height="55" rx="8" fill="url(#storeGrad)"/>
    <text x="565" y="273" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fff">Knowledge Graph</text>
    <text x="565" y="292" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ddd6fe">Entity extraction + BFS traversal</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="450" y="320" width="230" height="55" rx="8" fill="url(#storeGrad)"/>
    <text x="565" y="343" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fff">SQLite Storage</text>
    <text x="565" y="362" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ddd6fe">Zero external DB dependencies</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="450" y="390" width="230" height="55" rx="8" fill="url(#storeGrad)"/>
    <text x="565" y="413" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fff">4-Tier Consolidation</text>
    <text x="565" y="432" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ddd6fe">Working → Episodic → Semantic → Procedural</text>
  </g>

  <!-- Arrow from store to retrieve -->
  <line x1="680" y1="200" x2="700" y2="200" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="680" y1="280" x2="700" y2="280" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="680" y1="350" x2="700" y2="350" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- RETRIEVE Phase -->
  <g filter="url(#shadow)">
    <rect x="705" y="110" width="230" height="70" rx="8" fill="url(#searchGrad)"/>
    <text x="820" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#fff">Hybrid Search</text>
    <text x="820" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#a7f3d0">BM25 + Vector + Graph</text>
    <text x="820" y="172" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#a7f3d0">RRF Fusion (k=60)</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="705" y="200" width="230" height="55" rx="8" fill="url(#searchGrad)"/>
    <text x="820" y="223" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fff">Token Budget</text>
    <text x="820" y="242" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#a7f3d0">~1,900 tokens/session (92% less)</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="705" y="275" width="230" height="55" rx="8" fill="url(#searchGrad)"/>
    <text x="820" y="298" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fff">Context Injection</text>
    <text x="820" y="317" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#a7f3d0">Auto-inject into conversation</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="705" y="350" width="230" height="55" rx="8" fill="url(#searchGrad)"/>
    <text x="820" y="373" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fff">51 MCP Tools</text>
    <text x="820" y="392" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#a7f3d0">recall, save, search, governance...</text>
  </g>

  <!-- Retrieve arrows -->
  <line x1="820" y1="180" x2="820" y2="200" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="820" y1="255" x2="820" y2="275" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="820" y1="330" x2="820" y2="350" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Stats bar at bottom -->
  <rect x="20" y="470" width="920" height="90" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="480" y="495" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Key Metrics</text>

  <!-- Stats -->
  <g>
    <rect x="50" y="510" width="130" height="38" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
    <text x="115" y="528" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#2563eb">95.2%</text>
    <text x="115" y="543" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Retrieval R@5</text>
  </g>
  <g>
    <rect x="200" y="510" width="130" height="38" rx="6" fill="#ffffff" stroke="#10b981" stroke-width="1"/>
    <text x="265" y="528" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#059669">92%</text>
    <text x="265" y="543" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Fewer Tokens</text>
  </g>
  <g>
    <rect x="350" y="510" width="130" height="38" rx="6" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
    <text x="415" y="528" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#d97706">51</text>
    <text x="415" y="543" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">MCP Tools</text>
  </g>
  <g>
    <rect x="500" y="510" width="130" height="38" rx="6" fill="#ffffff" stroke="#8b5cf6" stroke-width="1"/>
    <text x="565" y="528" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#7c3aed">12</text>
    <text x="565" y="543" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Auto Hooks</text>
  </g>
  <g>
    <rect x="650" y="510" width="130" height="38" rx="6" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
    <text x="715" y="528" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#dc2626">0</text>
    <text x="715" y="543" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">External DBs</text>
  </g>
  <g>
    <rect x="800" y="510" width="130" height="38" rx="6" fill="#ffffff" stroke="#06b6d4" stroke-width="1"/>
    <text x="865" y="528" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#0891b2">827</text>
    <text x="865" y="543" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Tests Passing</text>
  </g>
</svg>