<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" width="860" height="430" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="430" fill="#ffffff"/>
<text x="280" y="38" text-anchor="middle" class="title">Inverted Index: How Search Engines Work</text>
<rect x="40" y="70" width="300" height="280" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="190" y="96" text-anchor="middle" class="band-label">Documents</text>
<rect x="60" y="110" width="260" height="56" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="190" y="134" text-anchor="middle" class="item">Doc 1</text>
<text x="190" y="152" text-anchor="middle" class="item-sub">the red fox jumps</text>
<rect x="60" y="180" width="260" height="56" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="190" y="204" text-anchor="middle" class="item">Doc 2</text>
<text x="190" y="222" text-anchor="middle" class="item-sub">the fox is red</text>
<rect x="60" y="250" width="260" height="56" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="190" y="274" text-anchor="middle" class="item">Doc 3</text>
<text x="190" y="292" text-anchor="middle" class="item-sub">a quick brown fox</text>
<line x1="340" y1="210" x2="380" y2="210" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<text x="360" y="202" text-anchor="middle" class="item-sub">analyze</text>
<rect x="400" y="70" width="440" height="280" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="620" y="96" text-anchor="middle" class="band-label">Inverted Index</text>
<rect x="420" y="110" width="400" height="30" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="480" y="130" text-anchor="middle" class="item">fox</text>
<text x="700" y="130" text-anchor="middle" class="item-sub">[1,2,3]</text>
<rect x="420" y="148" width="400" height="30" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="480" y="168" text-anchor="middle" class="item">red</text>
<text x="700" y="168" text-anchor="middle" class="item-sub">[1,2]</text>
<rect x="420" y="186" width="400" height="30" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="480" y="206" text-anchor="middle" class="item">the</text>
<text x="700" y="206" text-anchor="middle" class="item-sub">[1,2]</text>
<rect x="420" y="224" width="400" height="30" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="480" y="244" text-anchor="middle" class="item">jumps</text>
<text x="700" y="244" text-anchor="middle" class="item-sub">[1]</text>
<rect x="420" y="262" width="400" height="30" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="480" y="282" text-anchor="middle" class="item">quick</text>
<text x="700" y="282" text-anchor="middle" class="item-sub">[3]</text>
<rect x="420" y="300" width="400" height="30" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="480" y="320" text-anchor="middle" class="item">brown</text>
<text x="700" y="320" text-anchor="middle" class="item-sub">[3]</text>
<rect x="40" y="370" width="800" height="30" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="430" y="390" text-anchor="middle" class="note">Search 'fox' -&gt; look up term -&gt; get doc IDs [1,2,3] -&gt; rank by relevance score.</text>
</svg>
