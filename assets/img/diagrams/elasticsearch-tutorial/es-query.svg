<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" width="860" height="430" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="430" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">Query DSL: bool, match, filter, aggs</text>
<rect x="300" y="70" width="260" height="46" rx="8" fill="#1e40af"/>
<text x="430" y="100" text-anchor="middle" class="node-title-w">bool query</text>
<line x1="370" y1="116" x2="200" y2="140" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="400" y1="116" x2="300" y2="140" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="460" y1="116" x2="560" y2="140" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="490" y1="116" x2="700" y2="140" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="60" y="142" width="180" height="70" rx="8" fill="#2563eb"/>
<text x="150" y="166" text-anchor="middle" class="node-title-w">must</text>
<text x="150" y="188" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">match: contributes to score</text>
<rect x="260" y="142" width="180" height="70" rx="8" fill="#1e40af"/>
<text x="350" y="166" text-anchor="middle" class="node-title-w">should</text>
<text x="350" y="188" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">OR: boosts score</text>
<rect x="460" y="142" width="180" height="70" rx="8" fill="#2563eb"/>
<text x="550" y="166" text-anchor="middle" class="node-title-w">filter</text>
<text x="550" y="188" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">yes/no, no score, cached</text>
<rect x="660" y="142" width="180" height="70" rx="8" fill="#1e40af"/>
<text x="750" y="166" text-anchor="middle" class="node-title-w">must_not</text>
<text x="750" y="188" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">exclude</text>
<rect x="40" y="230" width="800" height="130" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="256" text-anchor="middle" class="band-label">Aggregations (analytics)</text>
<rect x="60" y="274" width="170" height="60" rx="8" fill="#2563eb"/>
<text x="145" y="300" text-anchor="middle" class="node-title-w">terms agg</text>
<text x="145" y="320" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">group by field + count</text>
<rect x="250" y="274" width="170" height="60" rx="8" fill="#1e40af"/>
<text x="335" y="300" text-anchor="middle" class="node-title-w">avg/sum</text>
<text x="335" y="320" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">numeric metrics</text>
<rect x="440" y="274" width="170" height="60" rx="8" fill="#2563eb"/>
<text x="525" y="300" text-anchor="middle" class="node-title-w">date_histogram</text>
<text x="525" y="320" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">time-series buckets</text>
<rect x="630" y="274" width="170" height="60" rx="8" fill="#1e40af"/>
<text x="715" y="300" text-anchor="middle" class="node-title-w">range</text>
<text x="715" y="320" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">bucket by value range</text>
<rect x="40" y="380" width="800" height="26" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="430" y="398" text-anchor="middle" class="note">Filters are cached + fast; must/should contribute to relevance score (TF-IDF/BM25).</text>
</svg>
