<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" width="860" height="430" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="430" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">Cluster: Nodes, Shards, Replicas, Routing</text>
<rect x="330" y="70" width="200" height="46" rx="8" fill="#1e40af"/>
<text x="430" y="100" text-anchor="middle" class="node-title-w">Cluster</text>
<rect x="60" y="130" width="220" height="160" rx="8" fill="#2563eb"/>
<text x="170" y="156" text-anchor="middle" class="node-title-w">Node 1</text>
<rect x="80" y="170" width="180" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="170" y="190" text-anchor="middle" class="item">P0 (primary)</text>
<text x="170" y="206" text-anchor="middle" class="item-sub">R1 (replica)</text>
<rect x="80" y="220" width="180" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="170" y="240" text-anchor="middle" class="item">P1 (primary)</text>
<text x="170" y="256" text-anchor="middle" class="item-sub">R2 (replica)</text>
<rect x="300" y="130" width="220" height="160" rx="8" fill="#1e40af"/>
<text x="410" y="156" text-anchor="middle" class="node-title-w">Node 2</text>
<rect x="320" y="170" width="180" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="410" y="190" text-anchor="middle" class="item">P0 (primary)</text>
<text x="410" y="206" text-anchor="middle" class="item-sub">R1 (replica)</text>
<rect x="320" y="220" width="180" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="410" y="240" text-anchor="middle" class="item">P1 (primary)</text>
<text x="410" y="256" text-anchor="middle" class="item-sub">R2 (replica)</text>
<rect x="540" y="130" width="220" height="160" rx="8" fill="#2563eb"/>
<text x="650" y="156" text-anchor="middle" class="node-title-w">Node 3</text>
<rect x="560" y="170" width="180" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="650" y="190" text-anchor="middle" class="item">P0 (primary)</text>
<text x="650" y="206" text-anchor="middle" class="item-sub">R1 (replica)</text>
<rect x="560" y="220" width="180" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="650" y="240" text-anchor="middle" class="item">P1 (primary)</text>
<text x="650" y="256" text-anchor="middle" class="item-sub">R2 (replica)</text>
<line x1="430" y1="116" x2="110" y2="130" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="430" y1="116" x2="350" y2="130" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="430" y1="116" x2="590" y2="130" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="40" y="310" width="800" height="70" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="336" text-anchor="middle" class="band-label">Sharding + routing</text>
<text x="430" y="362" text-anchor="middle" class="item">shards = number_of_primary_shards (fixed at index creation)</text>
<text x="430" y="380" text-anchor="middle" class="item-sub">routing: hash(_id) % num_shards -&gt; which shard a doc lives on</text>
<rect x="40" y="398" width="800" height="26" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="430" y="416" text-anchor="middle" class="note">Primaries + replicas are never on the same node (survive node failure).</text>
</svg>
