<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" width="860" height="430" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="430" fill="#ffffff"/>
<text x="330" y="38" text-anchor="middle" class="title">React Hooks</text>
<rect x="40" y="68" width="190" height="80" rx="8" fill="#2563eb"/>
<text x="135.0" y="92" text-anchor="middle" class="node-title-w">useState</text>
<text x="135.0" y="112" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">local state</text>
<text x="135.0" y="132" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">const [n, setN] = useState(0)</text>
<rect x="242" y="68" width="190" height="80" rx="8" fill="#1e40af"/>
<text x="337.0" y="92" text-anchor="middle" class="node-title-w">useEffect</text>
<text x="337.0" y="112" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">side effects</text>
<text x="337.0" y="132" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">useEffect(() =&gt; {...}, [deps])</text>
<rect x="444" y="68" width="190" height="80" rx="8" fill="#2563eb"/>
<text x="539.0" y="92" text-anchor="middle" class="node-title-w">useRef</text>
<text x="539.0" y="112" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">mutable, no rerender</text>
<text x="539.0" y="132" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">const r = useRef(null)</text>
<rect x="646" y="68" width="190" height="80" rx="8" fill="#1e40af"/>
<text x="741.0" y="92" text-anchor="middle" class="node-title-w">useMemo</text>
<text x="741.0" y="112" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">cache a value</text>
<text x="741.0" y="132" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">useMemo(() =&gt; compute(a), [a])</text>
<rect x="40" y="162" width="190" height="80" rx="8" fill="#1e40af"/>
<text x="135.0" y="186" text-anchor="middle" class="node-title-w">useCallback</text>
<text x="135.0" y="206" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">cache a function</text>
<text x="135.0" y="226" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">useCallback(fn, [deps])</text>
<rect x="242" y="162" width="190" height="80" rx="8" fill="#2563eb"/>
<text x="337.0" y="186" text-anchor="middle" class="node-title-w">useContext</text>
<text x="337.0" y="206" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">read context</text>
<text x="337.0" y="226" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">const theme = useContext(Theme)</text>
<rect x="444" y="162" width="190" height="80" rx="8" fill="#1e40af"/>
<text x="539.0" y="186" text-anchor="middle" class="node-title-w">useReducer</text>
<text x="539.0" y="206" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">complex state</text>
<text x="539.0" y="226" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">useReducer(reducer, init)</text>
<rect x="646" y="162" width="190" height="80" rx="8" fill="#2563eb"/>
<text x="741.0" y="186" text-anchor="middle" class="node-title-w">custom hook</text>
<text x="741.0" y="206" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">reuse logic</text>
<text x="741.0" y="226" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">function useX() { ... }</text>
</svg>
