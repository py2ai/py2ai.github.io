<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" width="860" height="430" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="430" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">Component Tree: Props Down, Events Up</text>
<rect x="330" y="80" width="200" height="50" rx="8" fill="#1e40af"/>
<text x="430" y="112" text-anchor="middle" class="node-title-w">App</text>
<line x1="430" y1="130" x2="250" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="430" y1="130" x2="430" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="430" y1="130" x2="610" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="160" y="172" width="180" height="50" rx="8" fill="#2563eb"/>
<text x="250" y="204" text-anchor="middle" class="node-title-w">Header</text>
<rect x="340" y="172" width="180" height="50" rx="8" fill="#2563eb"/>
<text x="430" y="204" text-anchor="middle" class="node-title-w">TodoList</text>
<rect x="520" y="172" width="180" height="50" rx="8" fill="#2563eb"/>
<text x="610" y="204" text-anchor="middle" class="node-title-w">Footer</text>
<line x1="430" y1="222" x2="430" y2="260" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="350" y="262" width="160" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="430" y="290" text-anchor="middle" class="item">TodoItem</text>
<text x="560" y="150" text-anchor="start" class="item-sub">props flow DOWN</text>
<line x1="690" y1="150" x2="690" y2="120" stroke="#2563eb" stroke-width="1" marker-end="url(#arrow-accent)"/>
<text x="560" y="300" text-anchor="start" class="item-sub">events/callbacks flow UP</text>
<line x1="690" y1="300" x2="690" y2="330" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="40" y="360" width="780" height="40" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="430" y="385" text-anchor="middle" class="note">Parent passes data via props; child calls a passed-in callback to notify the parent. One-way data flow.</text>
</svg>
