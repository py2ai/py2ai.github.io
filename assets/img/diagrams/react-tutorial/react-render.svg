<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" width="860" height="380" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="380" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">Render -&gt; Reconcile -&gt; Commit Cycle</text>
<rect x="60" y="120" width="180" height="90" rx="8" fill="#1e40af"/>
<text x="150.0" y="154" text-anchor="middle" class="node-title-w">1. Render</text>
<text x="150.0" y="178" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">run components -&gt; virtual DOM</text>
<line x1="240" y1="165" x2="258" y2="165" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="258" y="120" width="180" height="90" rx="8" fill="#2563eb"/>
<text x="348.0" y="154" text-anchor="middle" class="node-title-w">2. Reconcile</text>
<text x="348.0" y="178" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">diff new vs old (fiber)</text>
<line x1="438" y1="165" x2="456" y2="165" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="456" y="120" width="180" height="90" rx="8" fill="#1e40af"/>
<text x="546.0" y="154" text-anchor="middle" class="node-title-w">3. Commit</text>
<text x="546.0" y="178" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">apply changes to real DOM</text>
<line x1="636" y1="165" x2="654" y2="165" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="654" y="120" width="180" height="90" rx="8" fill="#2563eb"/>
<text x="744.0" y="154" text-anchor="middle" class="node-title-w">4. Browser paints</text>
<text x="744.0" y="178" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">pixels on screen</text>
<rect x="40" y="250" width="780" height="90" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="276" text-anchor="middle" class="band-label">What triggers a render</text>
<rect x="80" y="292" width="170" height="36" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="165" y="314" text-anchor="middle" class="item">setState / dispatch</text>
<rect x="265" y="292" width="170" height="36" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="350" y="314" text-anchor="middle" class="item">parent re-rendered</text>
<rect x="450" y="292" width="170" height="36" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="535" y="314" text-anchor="middle" class="item">context value changed</text>
<rect x="635" y="292" width="170" height="36" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="720" y="314" text-anchor="middle" class="item">useReducer dispatch</text>
</svg>
