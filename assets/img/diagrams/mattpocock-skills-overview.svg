<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1400" viewBox="0 0 1200 1400">
  <title>MattPocock Skills Overview</title>
  <desc>A hierarchical diagram showing the MattPocock skills organization with AI Agent at top, Skills Hub in middle, four skill categories, and output at bottom.</desc>
  
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
    .title { font-size: 28px; font-weight: bold; fill: #1a1a2e; }
    .subtitle { font-size: 14px; fill: #4a4a6a; }
    .box-title { font-size: 16px; font-weight: bold; fill: #ffffff; }
    .box-subtitle { font-size: 12px; fill: #e0e0e0; }
    .skill-text { font-size: 13px; fill: #2d3748; }
    .category-title { font-size: 15px; font-weight: bold; fill: #ffffff; }
    .output-text { font-size: 16px; font-weight: bold; fill: #ffffff; }
  </style>
  
  <!-- Background -->
  <rect width="1200" height="1400" fill="#f8fafc"/>
  
  <!-- AI Agent Box (Top) -->
  <rect x="450" y="40" width="300" height="80" rx="12" fill="#4f46e5" stroke="#3730a3" stroke-width="2"/>
  <text x="600" y="75" text-anchor="middle" class="box-title">AI Agent</text>
  <text x="600" y="100" text-anchor="middle" class="box-subtitle">Intelligent Assistant</text>
  
  <!-- Arrow from AI Agent to Skills Hub -->
  <line x1="600" y1="120" x2="600" y2="180" stroke="#6366f1" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <!-- Skills Hub Box (Middle) -->
  <rect x="400" y="180" width="400" height="80" rx="12" fill="#7c3aed" stroke="#5b21b6" stroke-width="2"/>
  <text x="600" y="215" text-anchor="middle" class="box-title">Skills Hub</text>
  <text x="600" y="240" text-anchor="middle" class="box-subtitle">Central Skill Registry</text>
  
  <!-- Arrows from Skills Hub to Categories -->
  <line x1="450" y1="260" x2="150" y2="340" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="500" y1="260" x2="450" y2="340" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="700" y1="260" x2="750" y2="340" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="750" y1="260" x2="1050" y2="340" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Category 1: Planning & Design -->
  <rect x="50" y="340" width="200" height="60" rx="10" fill="#0891b2" stroke="#0e7490" stroke-width="2"/>
  <text x="150" y="365" text-anchor="middle" class="category-title">Planning & Design</text>
  <text x="150" y="385" text-anchor="middle" class="box-subtitle">6 Skills</text>
  
  <!-- Planning & Design Skills -->
  <rect x="50" y="420" width="200" height="35" rx="6" fill="#e0f2fe" stroke="#0891b2" stroke-width="1"/>
  <text x="150" y="443" text-anchor="middle" class="skill-text">write-a-prd</text>
  
  <rect x="50" y="460" width="200" height="35" rx="6" fill="#e0f2fe" stroke="#0891b2" stroke-width="1"/>
  <text x="150" y="483" text-anchor="middle" class="skill-text">prd-to-plan</text>
  
  <rect x="50" y="500" width="200" height="35" rx="6" fill="#e0f2fe" stroke="#0891b2" stroke-width="1"/>
  <text x="150" y="523" text-anchor="middle" class="skill-text">prd-to-issues</text>
  
  <rect x="50" y="540" width="200" height="35" rx="6" fill="#e0f2fe" stroke="#0891b2" stroke-width="1"/>
  <text x="150" y="563" text-anchor="middle" class="skill-text">grill-me</text>
  
  <rect x="50" y="580" width="200" height="35" rx="6" fill="#e0f2fe" stroke="#0891b2" stroke-width="1"/>
  <text x="150" y="603" text-anchor="middle" class="skill-text">design-an-interface</text>
  
  <rect x="50" y="620" width="200" height="35" rx="6" fill="#e0f2fe" stroke="#0891b2" stroke-width="1"/>
  <text x="150" y="643" text-anchor="middle" class="skill-text">request-refactor-plan</text>
  
  <!-- Connecting lines from category to skills -->
  <line x1="150" y1="400" x2="150" y2="420" stroke="#0891b2" stroke-width="1.5"/>
  <line x1="150" y1="455" x2="150" y2="460" stroke="#0891b2" stroke-width="1"/>
  <line x1="150" y1="495" x2="150" y2="500" stroke="#0891b2" stroke-width="1"/>
  <line x1="150" y1="535" x2="150" y2="540" stroke="#0891b2" stroke-width="1"/>
  <line x1="150" y1="575" x2="150" y2="580" stroke="#0891b2" stroke-width="1"/>
  
  <!-- Category 2: Development -->
  <rect x="350" y="340" width="200" height="60" rx="10" fill="#059669" stroke="#047857" stroke-width="2"/>
  <text x="450" y="365" text-anchor="middle" class="category-title">Development</text>
  <text x="450" y="385" text-anchor="middle" class="box-subtitle">5 Skills</text>
  
  <!-- Development Skills -->
  <rect x="350" y="420" width="200" height="35" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="450" y="443" text-anchor="middle" class="skill-text">tdd</text>
  
  <rect x="350" y="460" width="200" height="35" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="450" y="483" text-anchor="middle" class="skill-text">triage-issue</text>
  
  <rect x="350" y="500" width="200" height="35" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="450" y="523" text-anchor="middle" class="skill-text">improve-codebase-arch</text>
  
  <rect x="350" y="540" width="200" height="35" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="450" y="563" text-anchor="middle" class="skill-text">migrate-to-shoehorn</text>
  
  <rect x="350" y="580" width="200" height="35" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="450" y="603" text-anchor="middle" class="skill-text">scaffold-exercises</text>
  
  <!-- Connecting lines from category to skills -->
  <line x1="450" y1="400" x2="450" y2="420" stroke="#059669" stroke-width="1.5"/>
  <line x1="450" y1="455" x2="450" y2="460" stroke="#059669" stroke-width="1"/>
  <line x1="450" y1="495" x2="450" y2="500" stroke="#059669" stroke-width="1"/>
  <line x1="450" y1="535" x2="450" y2="540" stroke="#059669" stroke-width="1"/>
  
  <!-- Category 3: Tooling & Setup -->
  <rect x="650" y="340" width="200" height="60" rx="10" fill="#dc2626" stroke="#b91c1c" stroke-width="2"/>
  <text x="750" y="365" text-anchor="middle" class="category-title">Tooling & Setup</text>
  <text x="750" y="385" text-anchor="middle" class="box-subtitle">2 Skills</text>
  
  <!-- Tooling & Setup Skills -->
  <rect x="650" y="420" width="200" height="35" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="750" y="443" text-anchor="middle" class="skill-text">setup-pre-commit</text>
  
  <rect x="650" y="460" width="200" height="35" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="750" y="483" text-anchor="middle" class="skill-text">git-guardrails-claude-code</text>
  
  <!-- Connecting lines from category to skills -->
  <line x1="750" y1="400" x2="750" y2="420" stroke="#dc2626" stroke-width="1.5"/>
  <line x1="750" y1="455" x2="750" y2="460" stroke="#dc2626" stroke-width="1"/>
  
  <!-- Category 4: Writing & Knowledge -->
  <rect x="950" y="340" width="200" height="60" rx="10" fill="#ea580c" stroke="#c2410c" stroke-width="2"/>
  <text x="1050" y="365" text-anchor="middle" class="category-title">Writing & Knowledge</text>
  <text x="1050" y="385" text-anchor="middle" class="box-subtitle">4 Skills</text>
  
  <!-- Writing & Knowledge Skills -->
  <rect x="950" y="420" width="200" height="35" rx="6" fill="#ffedd5" stroke="#ea580c" stroke-width="1"/>
  <text x="1050" y="443" text-anchor="middle" class="skill-text">write-a-skill</text>
  
  <rect x="950" y="460" width="200" height="35" rx="6" fill="#ffedd5" stroke="#ea580c" stroke-width="1"/>
  <text x="1050" y="483" text-anchor="middle" class="skill-text">edit-article</text>
  
  <rect x="950" y="500" width="200" height="35" rx="6" fill="#ffedd5" stroke="#ea580c" stroke-width="1"/>
  <text x="1050" y="523" text-anchor="middle" class="skill-text">ubiquitous-language</text>
  
  <rect x="950" y="540" width="200" height="35" rx="6" fill="#ffedd5" stroke="#ea580c" stroke-width="1"/>
  <text x="1050" y="563" text-anchor="middle" class="skill-text">obsidian-vault</text>
  
  <!-- Connecting lines from category to skills -->
  <line x1="1050" y1="400" x2="1050" y2="420" stroke="#ea580c" stroke-width="1.5"/>
  <line x1="1050" y1="455" x2="1050" y2="460" stroke="#ea580c" stroke-width="1"/>
  <line x1="1050" y1="495" x2="1050" y2="500" stroke="#ea580c" stroke-width="1"/>
  
  <!-- Arrows from skills to Output -->
  <line x1="150" y1="655" x2="150" y2="720" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="450" y1="615" x2="450" y2="720" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="750" y1="495" x2="750" y2="720" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="1050" y1="575" x2="1050" y2="720" stroke="#6366f1" stroke-width="1.5"/>
  
  <!-- Horizontal connector line -->
  <line x1="150" y1="720" x2="1050" y2="720" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="600" y1="720" x2="600" y2="760" stroke="#6366f1" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <!-- Output Box (Bottom) -->
  <rect x="400" y="760" width="400" height="80" rx="12" fill="#10b981" stroke="#059669" stroke-width="2"/>
  <text x="600" y="795" text-anchor="middle" class="box-title">Output</text>
  <text x="600" y="820" text-anchor="middle" class="box-subtitle">Enhanced AI Capabilities</text>
  
  <!-- Arrowhead marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>
  
  <!-- Legend -->
  <rect x="50" y="880" width="1100" height="100" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="100" y="910" font-size="16" font-weight="bold" fill="#1e293b">Legend</text>
  
  <rect x="100" y="930" width="20" height="20" rx="4" fill="#4f46e5"/>
  <text x="130" y="945" font-size="13" fill="#475569">AI Agent - The intelligent assistant that invokes skills</text>
  
  <rect x="400" y="930" width="20" height="20" rx="4" fill="#7c3aed"/>
  <text x="430" y="945" font-size="13" fill="#475569">Skills Hub - Central registry of all skills</text>
  
  <rect x="700" y="930" width="20" height="20" rx="4" fill="#10b981"/>
  <text x="730" y="945" font-size="13" fill="#475569">Output - Enhanced AI capabilities</text>
  
  <rect x="100" y="960" width="20" height="20" rx="4" fill="#0891b2"/>
  <text x="130" y="975" font-size="13" fill="#475569">Planning & Design</text>
  
  <rect x="300" y="960" width="20" height="20" rx="4" fill="#059669"/>
  <text x="330" y="975" font-size="13" fill="#475569">Development</text>
  
  <rect x="470" y="960" width="20" height="20" rx="4" fill="#dc2626"/>
  <text x="500" y="975" font-size="13" fill="#475569">Tooling & Setup</text>
  
  <rect x="640" y="960" width="20" height="20" rx="4" fill="#ea580c"/>
  <text x="670" y="975" font-size="13" fill="#475569">Writing & Knowledge</text>
</svg>
