<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1100" viewBox="0 0 900 1100">
  <title>MattPocock Skills Overview</title>
  <desc>Hierarchical diagram showing MattPocock skills organization with AI Agent, Skills Hub, four skill categories, and output.</desc>
  
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
    .box-title { font-size: 16px; font-weight: bold; fill: #ffffff; }
    .box-subtitle { font-size: 11px; fill: #e0e0e0; }
    .skill-text { font-size: 12px; fill: #2d3748; }
    .category-title { font-size: 14px; font-weight: bold; fill: #ffffff; }
    .legend-text { font-size: 12px; fill: #475569; }
    .legend-title { font-size: 14px; font-weight: bold; fill: #1e293b; }
  </style>
  
  <!-- Background -->
  <rect width="900" height="1100" fill="#f8fafc"/>
  
  <!-- AI Agent Box (Top) -->
  <rect x="300" y="30" width="300" height="70" rx="10" fill="#4f46e5" stroke="#3730a3" stroke-width="2"/>
  <text x="450" y="60" text-anchor="middle" class="box-title">AI Agent</text>
  <text x="450" y="82" text-anchor="middle" class="box-subtitle">Claude, GPT, etc.</text>
  
  <!-- Arrow from AI Agent to Skills Hub -->
  <line x1="450" y1="100" x2="450" y2="150" stroke="#6366f1" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <!-- Skills Hub Box -->
  <rect x="275" y="150" width="350" height="70" rx="10" fill="#7c3aed" stroke="#5b21b6" stroke-width="2"/>
  <text x="450" y="180" text-anchor="middle" class="box-title">Skills Hub</text>
  <text x="450" y="202" text-anchor="middle" class="box-subtitle">npx skills@latest</text>
  
  <!-- Arrows from Skills Hub to Categories -->
  <line x1="350" y1="220" x2="225" y2="280" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="550" y1="220" x2="675" y2="280" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Category 1: Planning and Design (Top Left) -->
  <rect x="50" y="280" width="350" height="50" rx="8" fill="#0891b2" stroke="#0e7490" stroke-width="2"/>
  <text x="225" y="302" text-anchor="middle" class="category-title">Planning and Design</text>
  <text x="225" y="320" text-anchor="middle" class="box-subtitle">6 Skills</text>
  
  <!-- Planning Skills (2x3 grid) -->
  <rect x="50" y="340" width="110" height="40" rx="6" fill="#e0f2fe" stroke="#0891b2" stroke-width="1"/>
  <text x="105" y="365" text-anchor="middle" class="skill-text">write-a-prd</text>
  
  <rect x="170" y="340" width="110" height="40" rx="6" fill="#e0f2fe" stroke="#0891b2" stroke-width="1"/>
  <text x="225" y="365" text-anchor="middle" class="skill-text">prd-to-plan</text>
  
  <rect x="290" y="340" width="110" height="40" rx="6" fill="#e0f2fe" stroke="#0891b2" stroke-width="1"/>
  <text x="345" y="365" text-anchor="middle" class="skill-text">prd-to-issues</text>
  
  <rect x="50" y="390" width="110" height="40" rx="6" fill="#e0f2fe" stroke="#0891b2" stroke-width="1"/>
  <text x="105" y="415" text-anchor="middle" class="skill-text">grill-me</text>
  
  <rect x="170" y="390" width="110" height="40" rx="6" fill="#e0f2fe" stroke="#0891b2" stroke-width="1"/>
  <text x="225" y="415" text-anchor="middle" class="skill-text">design-interface</text>
  
  <rect x="290" y="390" width="110" height="40" rx="6" fill="#e0f2fe" stroke="#0891b2" stroke-width="1"/>
  <text x="345" y="415" text-anchor="middle" class="skill-text">refactor-plan</text>
  
  <!-- Category 2: Development (Top Right) -->
  <rect x="500" y="280" width="350" height="50" rx="8" fill="#059669" stroke="#047857" stroke-width="2"/>
  <text x="675" y="302" text-anchor="middle" class="category-title">Development</text>
  <text x="675" y="320" text-anchor="middle" class="box-subtitle">5 Skills</text>
  
  <!-- Development Skills (2x3 grid) -->
  <rect x="500" y="340" width="110" height="40" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="555" y="365" text-anchor="middle" class="skill-text">tdd</text>
  
  <rect x="620" y="340" width="110" height="40" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="675" y="365" text-anchor="middle" class="skill-text">triage-issue</text>
  
  <rect x="740" y="340" width="110" height="40" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="795" y="365" text-anchor="middle" class="skill-text">improve-arch</text>
  
  <rect x="500" y="390" width="110" height="40" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="555" y="415" text-anchor="middle" class="skill-text">migrate</text>
  
  <rect x="620" y="390" width="110" height="40" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="675" y="415" text-anchor="middle" class="skill-text">scaffold</text>
  
  <!-- Arrows from top row to bottom row -->
  <line x1="225" y1="430" x2="225" y2="480" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="675" y1="430" x2="675" y2="480" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Category 3: Tooling and Setup (Bottom Left) -->
  <rect x="50" y="480" width="350" height="50" rx="8" fill="#dc2626" stroke="#b91c1c" stroke-width="2"/>
  <text x="225" y="502" text-anchor="middle" class="category-title">Tooling and Setup</text>
  <text x="225" y="520" text-anchor="middle" class="box-subtitle">2 Skills</text>
  
  <!-- Tooling Skills -->
  <rect x="100" y="540" width="130" height="40" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="165" y="565" text-anchor="middle" class="skill-text">setup-pre-commit</text>
  
  <rect x="250" y="540" width="130" height="40" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="315" y="565" text-anchor="middle" class="skill-text">git-guardrails</text>
  
  <!-- Category 4: Writing and Knowledge (Bottom Right) -->
  <rect x="500" y="480" width="350" height="50" rx="8" fill="#ea580c" stroke="#c2410c" stroke-width="2"/>
  <text x="675" y="502" text-anchor="middle" class="category-title">Writing and Knowledge</text>
  <text x="675" y="520" text-anchor="middle" class="box-subtitle">4 Skills</text>
  
  <!-- Writing Skills (2x2 grid) -->
  <rect x="500" y="540" width="110" height="40" rx="6" fill="#ffedd5" stroke="#ea580c" stroke-width="1"/>
  <text x="555" y="565" text-anchor="middle" class="skill-text">write-a-skill</text>
  
  <rect x="620" y="540" width="110" height="40" rx="6" fill="#ffedd5" stroke="#ea580c" stroke-width="1"/>
  <text x="675" y="565" text-anchor="middle" class="skill-text">edit-article</text>
  
  <rect x="740" y="540" width="110" height="40" rx="6" fill="#ffedd5" stroke="#ea580c" stroke-width="1"/>
  <text x="795" y="565" text-anchor="middle" class="skill-text">ubiquitous</text>
  
  <rect x="500" y="590" width="110" height="40" rx="6" fill="#ffedd5" stroke="#ea580c" stroke-width="1"/>
  <text x="555" y="615" text-anchor="middle" class="skill-text">obsidian-vault</text>
  
  <!-- Arrows to Output -->
  <line x1="225" y1="580" x2="225" y2="680" stroke="#6366f1" stroke-width="2"/>
  <line x1="675" y1="630" x2="675" y2="680" stroke="#6366f1" stroke-width="2"/>
  <line x1="225" y1="680" x2="675" y2="680" stroke="#6366f1" stroke-width="2"/>
  <line x1="450" y1="680" x2="450" y2="720" stroke="#6366f1" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <!-- Output Box -->
  <rect x="275" y="720" width="350" height="70" rx="10" fill="#10b981" stroke="#059669" stroke-width="2"/>
  <text x="450" y="750" text-anchor="middle" class="box-title">Output</text>
  <text x="450" y="772" text-anchor="middle" class="box-subtitle">Enhanced Agent Capabilities</text>
  
  <!-- Arrowhead marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>
  
  <!-- Legend -->
  <rect x="50" y="840" width="800" height="90" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="80" y="870" class="legend-title">Legend</text>
  
  <rect x="80" y="885" width="18" height="18" rx="4" fill="#4f46e5"/>
  <text x="105" y="899" class="legend-text">AI Agent - Invokes skills</text>
  
  <rect x="280" y="885" width="18" height="18" rx="4" fill="#7c3aed"/>
  <text x="305" y="899" class="legend-text">Skills Hub - Central registry</text>
  
  <rect x="480" y="885" width="18" height="18" rx="4" fill="#10b981"/>
  <text x="505" y="899" class="legend-text">Output - Enhanced capabilities</text>
  
  <rect x="80" y="910" width="18" height="18" rx="4" fill="#0891b2"/>
  <text x="105" y="924" class="legend-text">Planning</text>
  
  <rect x="200" y="910" width="18" height="18" rx="4" fill="#059669"/>
  <text x="225" y="924" class="legend-text">Development</text>
  
  <rect x="340" y="910" width="18" height="18" rx="4" fill="#dc2626"/>
  <text x="365" y="924" class="legend-text">Tooling</text>
  
  <rect x="460" y="910" width="18" height="18" rx="4" fill="#ea580c"/>
  <text x="485" y="924" class="legend-text">Writing</text>
</svg>
