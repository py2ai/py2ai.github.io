<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" width="860" height="440" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="440" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">Supervised Learning: Regression + Classification</text>
<rect x="40" y="70" width="380" height="150" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="230" y="96" text-anchor="middle" class="band-label">Regression (number)</text>
<text x="230" y="124" text-anchor="middle" class="item">predict a continuous value</text>
<text x="230" y="146" text-anchor="middle" class="item-sub">price, temperature, score</text>
<text x="230" y="178" text-anchor="middle" class="item-sub">loss: MSE, MAE</text>
<text x="230" y="200" text-anchor="middle" class="item-sub">models: linear, trees, NN</text>
<rect x="460" y="70" width="380" height="150" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="650" y="96" text-anchor="middle" class="band-label">Classification (label)</text>
<text x="650" y="124" text-anchor="middle" class="item">predict a discrete class</text>
<text x="650" y="146" text-anchor="middle" class="item-sub">spam/not, dog/cat/bird</text>
<text x="650" y="178" text-anchor="middle" class="item-sub">loss: cross-entropy</text>
<text x="650" y="200" text-anchor="middle" class="item-sub">metrics: accuracy, F1, AUC</text>
<rect x="40" y="236" width="780" height="170" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="262" text-anchor="middle" class="band-label">Train / validation / test + overfitting</text>
<rect x="70" y="288" width="220" height="40" rx="8" fill="#2563eb"/>
<text x="180" y="314" text-anchor="middle" class="node-title-w">train set</text>
<text x="180" y="330" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">fit the model</text>
<rect x="320" y="288" width="220" height="40" rx="8" fill="#1e40af"/>
<text x="430" y="314" text-anchor="middle" class="node-title-w">validation set</text>
<text x="430" y="330" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">tune + early-stop</text>
<rect x="570" y="288" width="220" height="40" rx="8" fill="#7c2d12"/>
<text x="680" y="314" text-anchor="middle" class="node-title-w">test set</text>
<text x="680" y="330" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">final honest eval</text>
<text x="430" y="362" text-anchor="middle" class="item-sub">overfit: train loss down, val loss up -&gt; add regularization, early stop, more data</text>
<text x="430" y="384" text-anchor="middle" class="item-sub">underfit: both high -&gt; more capacity / better features</text>
</svg>
