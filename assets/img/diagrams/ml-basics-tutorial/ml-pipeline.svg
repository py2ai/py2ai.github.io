<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" width="860" height="430" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="430" fill="#ffffff"/>
<text x="310" y="38" text-anchor="middle" class="title">The ML Workflow</text>
<rect x="40" y="70" width="780" height="60" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="78" width="200" height="44" rx="8" fill="#1e40af"/>
<text x="154" y="100" text-anchor="middle" class="node-title-w">1. Data</text>
<text x="154" y="118" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">collect, clean, label, split</text>
<rect x="274" y="78" width="546" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="547" y="106" text-anchor="middle" class="item">garbage in -&gt; garbage out</text>
<line x1="430" y1="130" x2="430" y2="136" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="40" y="138" width="780" height="60" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="146" width="200" height="44" rx="8" fill="#2563eb"/>
<text x="154" y="168" text-anchor="middle" class="node-title-w">2. Features</text>
<text x="154" y="186" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">engineer / extract, scale, encode</text>
<rect x="274" y="146" width="546" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="547" y="174" text-anchor="middle" class="item">the model's input space</text>
<line x1="430" y1="198" x2="430" y2="204" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="40" y="206" width="780" height="60" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="214" width="200" height="44" rx="8" fill="#1e40af"/>
<text x="154" y="236" text-anchor="middle" class="node-title-w">3. Train</text>
<text x="154" y="254" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">fit model to training set</text>
<rect x="274" y="214" width="546" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="547" y="242" text-anchor="middle" class="item">minimize loss via optimization</text>
<line x1="430" y1="266" x2="430" y2="272" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="40" y="274" width="780" height="60" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="282" width="200" height="44" rx="8" fill="#2563eb"/>
<text x="154" y="304" text-anchor="middle" class="node-title-w">4. Evaluate</text>
<text x="154" y="322" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">validate + test, metrics, error analysis</text>
<rect x="274" y="282" width="546" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="547" y="310" text-anchor="middle" class="item">honest estimate of quality</text>
<line x1="430" y1="334" x2="430" y2="340" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="40" y="342" width="780" height="60" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="350" width="200" height="44" rx="8" fill="#1e40af"/>
<text x="154" y="372" text-anchor="middle" class="node-title-w">5. Deploy</text>
<text x="154" y="390" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">serve, monitor, retrain</text>
<rect x="274" y="350" width="546" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="547" y="378" text-anchor="middle" class="item">drift, A/B, shadow, canary</text>
<rect x="40" y="410" width="780" height="0" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
</svg>
