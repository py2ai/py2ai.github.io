<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1000" height="620" fill="#ffffff"/>

  <text x="500" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">ZVec vs Other Vector Databases</text>
  <text x="500" y="56" text-anchor="middle" font-size="13" fill="#64748b">Deployment model · Performance · Features · Best use case</text>

  <!-- Table -->
  <!-- Header row -->
  <rect x="40" y="80" width="180" height="44" fill="#0f172a"/>
  <text x="130" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Feature</text>

  <rect x="220" y="80" width="150" height="44" fill="#0d9488"/>
  <text x="295" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">ZVec</text>
  <text x="295" y="116" text-anchor="middle" font-size="10" fill="#ccfbf1">Alibaba</text>

  <rect x="370" y="80" width="120" height="44" fill="#334155"/>
  <text x="430" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">FAISS</text>
  <text x="430" y="116" text-anchor="middle" font-size="10" fill="#cbd5e1">Meta</text>

  <rect x="490" y="80" width="120" height="44" fill="#334155"/>
  <text x="550" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Milvus</text>
  <text x="550" y="116" text-anchor="middle" font-size="10" fill="#cbd5e1">Zilliz</text>

  <rect x="610" y="80" width="120" height="44" fill="#334155"/>
  <text x="670" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Qdrant</text>
  <text x="670" y="116" text-anchor="middle" font-size="10" fill="#cbd5e1">Qdrant</text>

  <rect x="730" y="80" width="120" height="44" fill="#334155"/>
  <text x="790" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Chroma</text>
  <text x="790" y="116" text-anchor="middle" font-size="10" fill="#cbd5e1">Chroma</text>

  <rect x="850" y="80" width="120" height="44" fill="#334155"/>
  <text x="910" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">LanceDB</text>
  <text x="910" y="116" text-anchor="middle" font-size="10" fill="#cbd5e1">Lance</text>

  <!-- Row data -->
  <g font-size="11" fill="#1e293b">
    <!-- Row 1: Deployment -->
    <rect x="40" y="124" width="180" height="48" fill="#f1f5f9"/>
    <text x="50" y="153" font-weight="600">Deployment Model</text>
    <rect x="220" y="124" width="150" height="48" fill="#f0fdfa"/>
    <text x="295" y="148" text-anchor="middle" fill="#0d9488" font-weight="600">In-process</text>
    <text x="295" y="164" text-anchor="middle" font-size="10" fill="#0f766e">(embedded library)</text>
    <rect x="370" y="124" width="120" height="48" fill="#f8fafc"/>
    <text x="430" y="153" text-anchor="middle">In-process lib</text>
    <rect x="490" y="124" width="120" height="48" fill="#f8fafc"/>
    <text x="550" y="148" text-anchor="middle">Client-server</text>
    <text x="550" y="164" text-anchor="middle" font-size="10" fill="#64748b">(separate server)</text>
    <rect x="610" y="124" width="120" height="48" fill="#f8fafc"/>
    <text x="670" y="148" text-anchor="middle">Client-server</text>
    <text x="670" y="164" text-anchor="middle" font-size="10" fill="#64748b">(separate server)</text>
    <rect x="730" y="124" width="120" height="48" fill="#f8fafc"/>
    <text x="790" y="148" text-anchor="middle">In-process /</text>
    <text x="790" y="164" text-anchor="middle" font-size="10" fill="#64748b">client-server</text>
    <rect x="850" y="124" width="120" height="48" fill="#f8fafc"/>
    <text x="910" y="153" text-anchor="middle">In-process</text>

    <!-- Row 2: Language -->
    <rect x="40" y="172" width="180" height="44" fill="#f1f5f9"/>
    <text x="50" y="200" font-weight="600">Core Language</text>
    <rect x="220" y="172" width="150" height="44" fill="#f0fdfa"/>
    <text x="295" y="200" text-anchor="middle" fill="#0d9488" font-weight="600">C++</text>
    <rect x="370" y="172" width="120" height="44" fill="#f8fafc"/>
    <text x="430" y="200" text-anchor="middle">C++</text>
    <rect x="490" y="172" width="120" height="44" fill="#f8fafc"/>
    <text x="550" y="200" text-anchor="middle">Go</text>
    <rect x="610" y="172" width="120" height="44" fill="#f8fafc"/>
    <text x="670" y="200" text-anchor="middle">Rust</text>
    <rect x="730" y="172" width="120" height="44" fill="#f8fafc"/>
    <text x="790" y="200" text-anchor="middle">Python/Rust</text>
    <rect x="850" y="172" width="120" height="44" fill="#f8fafc"/>
    <text x="910" y="200" text-anchor="middle">Rust</text>

    <!-- Row 3: SIMD -->
    <rect x="40" y="216" width="180" height="44" fill="#f1f5f9"/>
    <text x="50" y="244" font-weight="600">SIMD Optimization</text>
    <rect x="220" y="216" width="150" height="44" fill="#f0fdfa"/>
    <text x="295" y="244" text-anchor="middle" fill="#0d9488" font-weight="600">AVX2/512, NEON</text>
    <rect x="370" y="216" width="120" height="44" fill="#f8fafc"/>
    <text x="430" y="244" text-anchor="middle">Yes (GPU too)</text>
    <rect x="490" y="216" width="120" height="44" fill="#f8fafc"/>
    <text x="550" y="244" text-anchor="middle">Via FAISS</text>
    <rect x="610" y="216" width="120" height="44" fill="#f8fafc"/>
    <text x="670" y="244" text-anchor="middle">Yes</text>
    <rect x="730" y="216" width="120" height="44" fill="#f8fafc"/>
    <text x="790" y="244" text-anchor="middle">Limited</text>
    <rect x="850" y="216" width="120" height="44" fill="#f8fafc"/>
    <text x="910" y="244" text-anchor="middle">Yes</text>

    <!-- Row 4: Index types -->
    <rect x="40" y="260" width="180" height="48" fill="#f1f5f9"/>
    <text x="50" y="289" font-weight="600">Index Types</text>
    <rect x="220" y="260" width="150" height="48" fill="#f0fdfa"/>
    <text x="295" y="284" text-anchor="middle" fill="#0d9488" font-weight="600" font-size="10">HNSW, IVF, Flat,</text>
    <text x="295" y="300" text-anchor="middle" fill="#0d9488" font-weight="600" font-size="10">DiskANN, Vamana</text>
    <rect x="370" y="260" width="120" height="48" fill="#f8fafc"/>
    <text x="430" y="284" text-anchor="middle" font-size="10">IVF, HNSW, PQ,</text>
    <text x="430" y="300" text-anchor="middle" font-size="10">IVF-PQ, Flat</text>
    <rect x="490" y="260" width="120" height="48" fill="#f8fafc"/>
    <text x="550" y="284" text-anchor="middle" font-size="10">HNSW, IVF,</text>
    <text x="550" y="300" text-anchor="middle" font-size="10">DiskANN, SCANN</text>
    <rect x="610" y="260" width="120" height="48" fill="#f8fafc"/>
    <text x="670" y="284" text-anchor="middle" font-size="10">HNSW, IVF,</text>
    <text x="670" y="300" text-anchor="middle" font-size="10">Scalar</text>
    <rect x="730" y="260" width="120" height="48" fill="#f8fafc"/>
    <text x="790" y="284" text-anchor="middle" font-size="10">HNSW, IVF</text>
    <text x="790" y="300" text-anchor="middle" font-size="10">(DuckDB backend)</text>
    <rect x="850" y="260" width="120" height="48" fill="#f8fafc"/>
    <text x="910" y="284" text-anchor="middle" font-size="10">IVF, HNSW,</text>
    <text x="910" y="300" text-anchor="middle" font-size="10">IVF-PQ</text>

    <!-- Row 5: Hybrid search -->
    <rect x="40" y="308" width="180" height="44" fill="#f1f5f9"/>
    <text x="50" y="336" font-weight="600">Hybrid (Vector+FTS)</text>
    <rect x="220" y="308" width="150" height="44" fill="#f0fdfa"/>
    <text x="295" y="336" text-anchor="middle" fill="#0d9488" font-weight="600">Yes (native)</text>
    <rect x="370" y="308" width="120" height="44" fill="#f8fafc"/>
    <text x="430" y="336" text-anchor="middle">No</text>
    <rect x="490" y="308" width="120" height="44" fill="#f8fafc"/>
    <text x="550" y="336" text-anchor="middle">Yes</text>
    <rect x="610" y="308" width="120" height="44" fill="#f8fafc"/>
    <text x="670" y="336" text-anchor="middle">Yes</text>
    <rect x="730" y="308" width="120" height="44" fill="#f8fafc"/>
    <text x="790" y="336" text-anchor="middle">Partial</text>
    <rect x="850" y="308" width="120" height="44" fill="#f8fafc"/>
    <text x="910" y="336" text-anchor="middle">Yes (FTS)</text>

    <!-- Row 6: Durability -->
    <rect x="40" y="352" width="180" height="44" fill="#f1f5f9"/>
    <text x="50" y="380" font-weight="600">WAL Durability</text>
    <rect x="220" y="352" width="150" height="44" fill="#f0fdfa"/>
    <text x="295" y="380" text-anchor="middle" fill="#0d9488" font-weight="600">Yes</text>
    <rect x="370" y="352" width="120" height="44" fill="#f8fafc"/>
    <text x="430" y="380" text-anchor="middle">No (in-mem)</text>
    <rect x="490" y="352" width="120" height="44" fill="#f8fafc"/>
    <text x="550" y="380" text-anchor="middle">Yes</text>
    <rect x="610" y="352" width="120" height="44" fill="#f8fafc"/>
    <text x="670" y="380" text-anchor="middle">Yes</text>
    <rect x="730" y="352" width="120" height="44" fill="#f8fafc"/>
    <text x="790" y="380" text-anchor="middle">Yes</text>
    <rect x="850" y="352" width="120" height="44" fill="#f8fafc"/>
    <text x="910" y="380" text-anchor="middle">Yes</text>

    <!-- Row 7: Best use case -->
    <rect x="40" y="396" width="180" height="56" fill="#f1f5f9"/>
    <text x="50" y="429" font-weight="600">Best Use Case</text>
    <rect x="220" y="396" width="150" height="56" fill="#f0fdfa"/>
    <text x="295" y="418" text-anchor="middle" fill="#0d9488" font-size="10" font-weight="600">Embedded RAG,</text>
    <text x="295" y="433" text-anchor="middle" fill="#0d9488" font-size="10" font-weight="600">edge, low-latency</text>
    <text x="295" y="446" text-anchor="middle" fill="#0d9488" font-size="10" font-weight="600">production search</text>
    <rect x="370" y="396" width="120" height="56" fill="#f8fafc"/>
    <text x="430" y="418" text-anchor="middle" font-size="10">Research, batch</text>
    <text x="430" y="433" text-anchor="middle" font-size="10">similarity, GPU</text>
    <text x="430" y="446" text-anchor="middle" font-size="10">workloads</text>
    <rect x="490" y="396" width="120" height="56" fill="#f8fafc"/>
    <text x="550" y="418" text-anchor="middle" font-size="10">Large-scale</text>
    <text x="550" y="433" text-anchor="middle" font-size="10">distributed cloud</text>
    <text x="550" y="446" text-anchor="middle" font-size="10">vector search</text>
    <rect x="610" y="396" width="120" height="56" fill="#f8fafc"/>
    <text x="670" y="418" text-anchor="middle" font-size="10">Cloud-native</text>
    <text x="670" y="433" text-anchor="middle" font-size="10">filtered search,</text>
    <text x="670" y="446" text-anchor="middle" font-size="10">microservices</text>
    <rect x="730" y="396" width="120" height="56" fill="#f8fafc"/>
    <text x="790" y="418" text-anchor="middle" font-size="10">Prototyping,</text>
    <text x="790" y="433" text-anchor="middle" font-size="10">LLM app dev,</text>
    <text x="790" y="446" text-anchor="middle" font-size="10">notebooks</text>
    <rect x="850" y="396" width="120" height="56" fill="#f8fafc"/>
    <text x="910" y="418" text-anchor="middle" font-size="10">Serverless,</text>
    <text x="910" y="433" text-anchor="middle" font-size="10">embedded analytics,</text>
    <text x="910" y="446" text-anchor="middle" font-size="10">multimodal</text>
  </g>

  <!-- Summary bar -->
  <rect x="40" y="475" width="930" height="120" rx="10" fill="#0f766e"/>
  <text x="500" y="503" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">ZVec Sweet Spot</text>
  <text x="500" y="528" text-anchor="middle" font-size="12" fill="#ccfbf1">When you need FAISS-level speed WITH durability, hybrid search, and zero-infrastructure deployment</text>
  <text x="500" y="548" text-anchor="middle" font-size="12" fill="#ccfbf1">— embedded directly in your application like SQLite, but for vectors.</text>
  <text x="500" y="575" text-anchor="middle" font-size="11" fill="#a7f3d0">Choose Milvus/Qdrant for distributed multi-node clusters · Choose ZVec for in-process low-latency production search</text>
</svg>