<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="wfBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="wfGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/>
    </marker>
    <marker id="wfOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ea580c"/>
    </marker>
  </defs>

  <rect width="960" height="640" fill="#ffffff"/>

  <text x="480" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">ZVec — Vector Operations Workflow</text>
  <text x="480" y="56" text-anchor="middle" font-size="13" fill="#64748b">Insert · Query · Update · Delete — all in-process, zero network hops</text>

  <!-- ===== INSERT FLOW (top) ===== -->
  <text x="60" y="90" font-size="14" font-weight="700" fill="#1e40af">INSERT / UPDATE FLOW</text>
  <rect x="60" y="100" width="150" height="50" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="135" y="130" text-anchor="middle" font-size="12" fill="#1e3a8a">Vector Input (Doc)</text>

  <line x1="210" y1="125" x2="250" y2="125" stroke="#2563eb" stroke-width="2" marker-end="url(#wfBlue)"/>

  <rect x="255" y="100" width="150" height="50" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="330" y="130" text-anchor="middle" font-size="12" fill="#1e3a8a">Schema Validation</text>

  <line x1="405" y1="125" x2="445" y2="125" stroke="#2563eb" stroke-width="2" marker-end="url(#wfBlue)"/>

  <rect x="450" y="100" width="150" height="50" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="525" y="130" text-anchor="middle" font-size="12" fill="#1e3a8a">WAL Append</text>

  <line x1="600" y1="125" x2="640" y2="125" stroke="#2563eb" stroke-width="2" marker-end="url(#wfBlue)"/>

  <rect x="645" y="100" width="150" height="50" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="720" y="130" text-anchor="middle" font-size="12" fill="#1e3a8a">Index Build (HNSW/IVF)</text>

  <line x1="795" y1="125" x2="835" y2="125" stroke="#16a34a" stroke-width="2" marker-end="url(#wfGreen)"/>

  <rect x="840" y="100" width="80" height="50" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="880" y="130" text-anchor="middle" font-size="12" fill="#15803d">Stored</text>

  <!-- ===== QUERY FLOW (middle) ===== -->
  <text x="60" y="200" font-size="14" font-weight="700" fill="#ea580c">QUERY / SEARCH FLOW</text>
  <rect x="60" y="210" width="150" height="50" rx="8" fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
  <text x="135" y="240" text-anchor="middle" font-size="12" fill="#9a3412">Query Vector + Filter</text>

  <line x1="210" y1="235" x2="250" y2="235" stroke="#ea580c" stroke-width="2" marker-end="url(#wfOrange)"/>

  <!-- Decision diamond -->
  <polygon points="330,210 405,235 330,260 255,235" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="330" y="239" text-anchor="middle" font-size="11" fill="#92400e">Index Type?</text>

  <line x1="330" y1="210" x2="330" y2="185" stroke="#ea580c" stroke-width="1.5"/>
  <text x="340" y="200" font-size="10" fill="#9a3412">HNSW</text>
  <line x1="405" y1="235" x2="445" y2="235" stroke="#ea580c" stroke-width="1.5"/>
  <text x="415" y="228" font-size="10" fill="#9a3412">IVF</text>
  <line x1="330" y1="260" x2="330" y2="285" stroke="#ea580c" stroke-width="1.5"/>
  <text x="340" y="278" font-size="10" fill="#9a3412">Flat/DiskANN</text>

  <rect x="255" y="160" width="150" height="22" rx="6" fill="#ffedd5" stroke="#ea580c" stroke-width="1"/>
  <text x="330" y="175" text-anchor="middle" font-size="11" fill="#9a3412">Graph Traversal</text>

  <rect x="450" y="223" width="150" height="24" rx="6" fill="#ffedd5" stroke="#ea580c" stroke-width="1"/>
  <text x="525" y="240" text-anchor="middle" font-size="11" fill="#9a3412">Cluster Probe</text>

  <rect x="255" y="285" width="150" height="22" rx="6" fill="#ffedd5" stroke="#ea580c" stroke-width="1"/>
  <text x="330" y="300" text-anchor="middle" font-size="11" fill="#9a3412">Brute-force / Disk Read</text>

  <!-- converge -->
  <line x1="330" y1="182" x2="600" y2="320" stroke="#ea580c" stroke-width="1.5"/>
  <line x1="525" y1="247" x2="600" y2="320" stroke="#ea580c" stroke-width="1.5"/>
  <line x1="405" y1="307" x2="600" y2="320" stroke="#ea580c" stroke-width="1.5"/>

  <rect x="605" y="305" width="160" height="50" rx="8" fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
  <text x="685" y="328" text-anchor="middle" font-size="12" fill="#9a3412">SIMD Distance Compute</text>
  <text x="685" y="345" text-anchor="middle" font-size="10" fill="#9a3412">AVX2 / AVX-512 / NEON</text>

  <line x1="765" y1="330" x2="805" y2="330" stroke="#ea580c" stroke-width="2" marker-end="url(#wfOrange)"/>

  <rect x="810" y="305" width="110" height="50" rx="8" fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
  <text x="865" y="328" text-anchor="middle" font-size="12" fill="#9a3412">Reranker /</text>
  <text x="865" y="345" text-anchor="middle" font-size="12" fill="#9a3412">Top-K Rank</text>

  <!-- ===== RESULT OUTPUT ===== -->
  <line x1="865" y1="355" x2="865" y2="400" stroke="#16a34a" stroke-width="2.5" marker-end="url(#wfGreen)"/>

  <rect x="780" y="405" width="170" height="50" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="865" y="435" text-anchor="middle" font-size="12" fill="#15803d">Ranked Results → App</text>

  <!-- ===== DELETE FLOW ===== -->
  <text x="60" y="430" font-size="14" font-weight="700" fill="#be123c">DELETE FLOW</text>
  <rect x="60" y="440" width="150" height="45" rx="8" fill="#ffe4e6" stroke="#e11d48" stroke-width="1.5"/>
  <text x="135" y="468" text-anchor="middle" font-size="12" fill="#9f1239">Doc ID / Filter</text>
  <line x1="210" y1="462" x2="250" y2="462" stroke="#e11d48" stroke-width="2" marker-end="url(#wfBlue)"/>
  <rect x="255" y="440" width="150" height="45" rx="8" fill="#ffe4e6" stroke="#e11d48" stroke-width="1.5"/>
  <text x="330" y="468" text-anchor="middle" font-size="12" fill="#9f1239">Tombstone Mark</text>
  <line x1="405" y1="462" x2="445" y2="462" stroke="#e11d48" stroke-width="2" marker-end="url(#wfBlue)"/>
  <rect x="450" y="440" width="150" height="45" rx="8" fill="#ffe4e6" stroke="#e11d48" stroke-width="1.5"/>
  <text x="525" y="468" text-anchor="middle" font-size="12" fill="#9f1239">Index Compaction</text>
  <line x1="600" y1="462" x2="640" y2="462" stroke="#16a34a" stroke-width="2" marker-end="url(#wfGreen)"/>
  <rect x="645" y="440" width="120" height="45" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="705" y="468" text-anchor="middle" font-size="12" fill="#15803d">Removed</text>

  <!-- ===== HYBRID SEARCH NOTE ===== -->
  <rect x="60" y="520" width="840" height="90" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="480" y="545" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">Hybrid MultiQuery (v0.5.0+)</text>
  <text x="480" y="568" text-anchor="middle" font-size="12" fill="#166534">Dense Vector + Sparse Vector + Full-Text Search + Scalar Filter → fused in a single query</text>
  <text x="480" y="588" text-anchor="middle" font-size="12" fill="#166534">Reranker merges recall streams → final Top-K with combined relevance scores</text>

  <!-- Legend -->
  <rect x="60" y="618" width="12" height="12" fill="#2563eb"/><text x="78" y="628" font-size="10" fill="#475569">Insert</text>
  <rect x="130" y="618" width="12" height="12" fill="#ea580c"/><text x="148" y="628" font-size="10" fill="#475569">Query</text>
  <rect x="200" y="618" width="12" height="12" fill="#e11d48"/><text x="218" y="628" font-size="10" fill="#475569">Delete</text>
  <rect x="270" y="618" width="12" height="12" fill="#16a34a"/><text x="288" y="628" font-size="10" fill="#475569">Success</text>
</svg>