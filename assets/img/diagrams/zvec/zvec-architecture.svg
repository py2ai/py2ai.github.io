<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ea580c"/>
    </marker>
    <linearGradient id="gradApp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/><stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="gradEngine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f766e"/><stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
  </defs>

  <rect width="960" height="620" fill="#ffffff"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">ZVec — In-Process Vector Database Architecture</text>
  <text x="480" y="58" text-anchor="middle" font-size="13" fill="#64748b">Embedded engine runs inside the application — no separate server required</text>

  <!-- Application Layer -->
  <rect x="60" y="90" width="840" height="110" rx="12" fill="url(#gradApp)" stroke="#1e3a8a" stroke-width="2"/>
  <text x="480" y="118" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Application Process (Your Code)</text>
  <rect x="90" y="135" width="180" height="50" rx="8" fill="#ffffff" fill-opacity="0.15" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="180" y="166" text-anchor="middle" font-size="13" fill="#dbeafe">Python / Node.js App</text>
  <rect x="300" y="135" width="180" height="50" rx="8" fill="#ffffff" fill-opacity="0.15" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="390" y="166" text-anchor="middle" font-size="13" fill="#dbeafe">C++ / Go / Rust Service</text>
  <rect x="510" y="135" width="180" height="50" rx="8" fill="#ffffff" fill-opacity="0.15" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="600" y="166" text-anchor="middle" font-size="13" fill="#dbeafe">Edge / Mobile Device</text>
  <rect x="720" y="135" width="150" height="50" rx="8" fill="#ffffff" fill-opacity="0.15" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="795" y="166" text-anchor="middle" font-size="13" fill="#dbeafe">Jupyter Notebook</text>

  <!-- Arrow down to engine -->
  <line x1="480" y1="200" x2="480" y2="240" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="500" y="225" font-size="11" fill="#2563eb">in-process link</text>

  <!-- ZVec Embedded Engine -->
  <rect x="120" y="245" width="720" height="200" rx="14" fill="url(#gradEngine)" stroke="#0f766e" stroke-width="2"/>
  <text x="480" y="273" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">ZVec Embedded Engine (C++ Core)</text>

  <!-- SQL Engine -->
  <rect x="150" y="290" width="200" height="60" rx="8" fill="#ffffff" fill-opacity="0.12" stroke="#5eead4" stroke-width="1.5"/>
  <text x="250" y="315" text-anchor="middle" font-size="13" font-weight="600" fill="#ccfbf1">SQL / Query Engine</text>
  <text x="250" y="333" text-anchor="middle" font-size="11" fill="#a7f3d0">Planner · Optimizer · Hybrid</text>

  <!-- Index Engine -->
  <rect x="380" y="290" width="200" height="60" rx="8" fill="#ffffff" fill-opacity="0.12" stroke="#5eead4" stroke-width="1.5"/>
  <text x="480" y="315" text-anchor="middle" font-size="13" font-weight="600" fill="#ccfbf1">Vector Index Engine</text>
  <text x="480" y="333" text-anchor="middle" font-size="11" fill="#a7f3d0">HNSW · IVF · Flat · DiskANN</text>

  <!-- SIMD Math -->
  <rect x="610" y="290" width="200" height="60" rx="8" fill="#ffffff" fill-opacity="0.12" stroke="#5eead4" stroke-width="1.5"/>
  <text x="710" y="315" text-anchor="middle" font-size="13" font-weight="600" fill="#ccfbf1">SIMD Distance Kernels</text>
  <text x="710" y="333" text-anchor="middle" font-size="11" fill="#a7f3d0">AVX2 · AVX-512 · NEON</text>

  <!-- Quantizer -->
  <rect x="150" y="370" width="200" height="55" rx="8" fill="#ffffff" fill-opacity="0.12" stroke="#5eead4" stroke-width="1.5"/>
  <text x="250" y="392" text-anchor="middle" font-size="13" font-weight="600" fill="#ccfbf1">Quantizer</text>
  <text x="250" y="410" text-anchor="middle" font-size="11" fill="#a7f3d0">FP16 · INT8 · INT4 · Binary</text>

  <!-- WAL -->
  <rect x="380" y="370" width="200" height="55" rx="8" fill="#ffffff" fill-opacity="0.12" stroke="#5eead4" stroke-width="1.5"/>
  <text x="480" y="392" text-anchor="middle" font-size="13" font-weight="600" fill="#ccfbf1">WAL & Buffer Pool</text>
  <text x="480" y="410" text-anchor="middle" font-size="11" fill="#a7f3d0">Durability · Crash Recovery</text>

  <!-- Reranker -->
  <rect x="610" y="370" width="200" height="55" rx="8" fill="#ffffff" fill-opacity="0.12" stroke="#5eead4" stroke-width="1.5"/>
  <text x="710" y="392" text-anchor="middle" font-size="13" font-weight="600" fill="#ccfbf1">Reranker / Reducer</text>
  <text x="710" y="410" text-anchor="middle" font-size="11" fill="#a7f3d0">Result fusion · Top-K</text>

  <!-- Arrow down to storage -->
  <line x1="480" y1="445" x2="480" y2="485" stroke="#ea580c" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <text x="500" y="470" font-size="11" fill="#ea580c">persist</text>

  <!-- Storage Layer -->
  <rect x="120" y="490" width="720" height="90" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="480" y="515" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">Local Storage (No Server)</text>
  <rect x="160" y="528" width="200" height="40" rx="6" fill="#e2e8f0" stroke="#cbd5e1"/>
  <text x="260" y="553" text-anchor="middle" font-size="12" fill="#475569">WAL Segment Files</text>
  <rect x="380" y="528" width="200" height="40" rx="6" fill="#e2e8f0" stroke="#cbd5e1"/>
  <text x="480" y="553" text-anchor="middle" font-size="12" fill="#475569">Vector Index Files</text>
  <rect x="600" y="528" width="200" height="40" rx="6" fill="#e2e8f0" stroke="#cbd5e1"/>
  <text x="700" y="553" text-anchor="middle" font-size="12" fill="#475569">Forward Store (Arrow/Parquet)</text>

  <!-- Legend -->
  <rect x="60" y="595" width="14" height="14" fill="#2563eb"/><text x="82" y="607" font-size="11" fill="#475569">Data flow</text>
  <rect x="170" y="595" width="14" height="14" fill="#ea580c"/><text x="192" y="607" font-size="11" fill="#475569">Persistence</text>
  <rect x="290" y="595" width="14" height="14" fill="#16a34a"/><text x="312" y="607" font-size="11" fill="#475569">In-process (no network)</text>
</svg>