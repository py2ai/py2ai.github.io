<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="Segoe UI, Arial, sans-serif">
  <rect width="960" height="560" fill="#ffffff"/>

  <text x="480" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">ZVec — Key Features</text>
  <text x="480" y="58" text-anchor="middle" font-size="13" fill="#64748b">Lightweight · Lightning-fast · In-process — battle-tested at Alibaba</text>

  <!-- 6 feature cards in 2x3 grid -->
  <!-- Card 1: In-Process -->
  <rect x="50" y="85" width="270" height="130" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <circle cx="90" cy="125" r="22" fill="#2563eb"/>
  <text x="90" y="131" text-anchor="middle" font-size="18" fill="#ffffff" font-weight="700">⚙</text>
  <text x="125" y="120" font-size="15" font-weight="700" fill="#1e3a8a">In-Process</text>
  <text x="125" y="138" font-size="11" fill="#3b82f6">No server, no network</text>
  <text x="70" y="165" font-size="11" fill="#475569">Embeds directly into your app.</text>
  <text x="70" y="182" font-size="11" fill="#475569">Zero deployment overhead.</text>
  <text x="70" y="199" font-size="11" fill="#475569">Runs in notebooks, CLI, edge.</text>

  <!-- Card 2: Lightning-Fast -->
  <rect x="345" y="85" width="270" height="130" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <circle cx="385" cy="125" r="22" fill="#ea580c"/>
  <text x="385" y="131" text-anchor="middle" font-size="18" fill="#ffffff" font-weight="700">⚡</text>
  <text x="420" y="120" font-size="15" font-weight="700" fill="#9a3412">Lightning-Fast</text>
  <text x="420" y="138" font-size="11" fill="#f97316">Billions of vectors in ms</text>
  <text x="365" y="165" font-size="11" fill="#475569">SIMD-accelerated distance</text>
  <text x="365" y="182" font-size="11" fill="#475569">computations (AVX-512, NEON).</text>
  <text x="365" y="199" font-size="11" fill="#475569">Sub-millisecond latency.</text>

  <!-- Card 3: Lightweight -->
  <rect x="640" y="85" width="270" height="130" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <circle cx="680" cy="125" r="22" fill="#16a34a"/>
  <text x="680" y="131" text-anchor="middle" font-size="18" fill="#ffffff" font-weight="700">🍃</text>
  <text x="715" y="120" font-size="15" font-weight="700" fill="#15803d">Lightweight</text>
  <text x="715" y="138" font-size="11" fill="#22c55e">Minimal footprint</text>
  <text x="660" y="165" font-size="11" fill="#475569">pip install / npm install —</text>
  <text x="660" y="182" font-size="11" fill="#475569">no config, no infra needed.</text>
  <text x="660" y="199" font-size="11" fill="#475569">Start searching in seconds.</text>

  <!-- Card 4: SIMD Optimized -->
  <rect x="50" y="240" width="270" height="130" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <circle cx="90" cy="280" r="22" fill="#7c3aed"/>
  <text x="90" y="286" text-anchor="middle" font-size="16" fill="#ffffff" font-weight="700">SIMD</text>
  <text x="125" y="275" font-size="15" font-weight="700" fill="#5b21b6">SIMD Optimized</text>
  <text x="125" y="293" font-size="11" fill="#8b5cf6">Vectorized math kernels</text>
  <text x="70" y="320" font-size="11" fill="#475569">FP32, FP16, INT8, INT4, Binary</text>
  <text x="70" y="337" font-size="11" fill="#475569">distance kernels. AVX2, AVX-512,</text>
  <text x="70" y="354" font-size="11" fill="#475569">NEON, SSE auto-dispatch.</text>

  <!-- Card 5: Multiple Index Types -->
  <rect x="345" y="240" width="270" height="130" rx="12" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <circle cx="385" cy="280" r="22" fill="#0891b2"/>
  <text x="385" y="286" text-anchor="middle" font-size="16" fill="#ffffff" font-weight="700">IDX</text>
  <text x="420" y="275" font-size="15" font-weight="700" fill="#155e75">Multiple Index Types</text>
  <text x="420" y="293" font-size="11" fill="#06b6d4">HNSW · IVF · Flat · DiskANN</text>
  <text x="365" y="320" font-size="11" fill="#475569">Memory & on-disk indexes.</text>
  <text x="365" y="337" font-size="11" fill="#475569">Dense + sparse vector support.</text>
  <text x="365" y="354" font-size="11" fill="#475569">Quantization: FP16/INT8/INT4.</text>

  <!-- Card 6: C++ Native -->
  <rect x="640" y="240" width="270" height="130" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <circle cx="680" cy="280" r="22" fill="#dc2626"/>
  <text x="680" y="286" text-anchor="middle" font-size="14" fill="#ffffff" font-weight="700">C++</text>
  <text x="715" y="275" font-size="15" font-weight="700" fill="#991b1b">C++ Native Core</text>
  <text x="715" y="293" font-size="11" fill="#ef4444">Multi-language SDKs</text>
  <text x="660" y="320" font-size="11" fill="#475569">Python, Node.js, Go, Rust,</text>
  <text x="660" y="337" font-size="11" fill="#475569">Dart/Flutter, C bindings.</text>
  <text x="660" y="354" font-size="11" fill="#475569">Apache 2.0 licensed.</text>

  <!-- Bottom highlight bar -->
  <rect x="50" y="400" width="860" height="120" rx="12" fill="#0f172a"/>
  <text x="480" y="430" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Production-Grade Reliability</text>
  <g font-size="12" fill="#cbd5e1">
    <text x="90" y="460">✓ Write-Ahead Logging (WAL) — crash-safe durability</text>
    <text x="90" y="482">✓ Concurrent multi-process reads, exclusive writes</text>
    <text x="90" y="504">✓ Full-Text Search + Hybrid Retrieval (v0.5.0)</text>
    <text x="510" y="460">✓ DiskANN — on-disk index for billion-scale</text>
    <text x="510" y="482">✓ Battle-tested inside Alibaba Group</text>
    <text x="510" y="504">✓ Linux · macOS · Windows · RISC-V</text>
  </g>
</svg>