<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="720" viewBox="0 0 900 720">
  <title>Penpot System Architecture</title>
  <desc>Layered architecture diagram showing browser, static server, backend, data layer, exporter, and MCP server components.</desc>

  <!-- Background -->
  <rect x="0" y="0" width="900" height="720" fill="#f8f9fb" rx="8"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#1a1a2e">Penpot System Architecture</text>

  <!-- Layer 1: Browser Layer (blue) -->
  <rect x="40" y="60" width="560" height="120" fill="#dbeafe" stroke="#2563eb" stroke-width="2" rx="8"/>
  <text x="60" y="84" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#1e3a8a">Browser Layer</text>
  <rect x="60" y="96" width="240" height="70" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5" rx="6"/>
  <text x="180" y="124" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#1e3a8a">Frontend SPA</text>
  <text x="180" y="144" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1e40af">ClojureScript + React (rumext)</text>
  <rect x="320" y="96" width="260" height="70" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5" rx="6"/>
  <text x="450" y="124" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#1e3a8a">WASM Renderer</text>
  <text x="450" y="144" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1e40af">Rust + Skia + OpenGL</text>

  <!-- Static Web Server -->
  <rect x="40" y="200" width="560" height="50" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2" rx="6"/>
  <text x="320" y="231" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#3730a3">Static Web Server (serves frontend assets)</text>

  <!-- Layer 2: Backend Layer (green) -->
  <rect x="40" y="270" width="560" height="160" fill="#d1fae5" stroke="#059669" stroke-width="2" rx="8"/>
  <text x="60" y="294" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#065f46">Backend Layer (Clojure / JVM)</text>
  <rect x="60" y="306" width="120" height="50" fill="#a7f3d0" stroke="#059669" stroke-width="1.5" rx="5"/>
  <text x="120" y="336" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#065f46">HTTP Server</text>
  <rect x="190" y="306" width="120" height="50" fill="#a7f3d0" stroke="#059669" stroke-width="1.5" rx="5"/>
  <text x="250" y="336" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#065f46">RPC API</text>
  <rect x="320" y="306" width="130" height="50" fill="#a7f3d0" stroke="#059669" stroke-width="1.5" rx="5"/>
  <text x="385" y="336" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#065f46">WebSocket Notif.</text>
  <rect x="460" y="306" width="120" height="50" fill="#a7f3d0" stroke="#059669" stroke-width="1.5" rx="5"/>
  <text x="520" y="336" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#065f46">Async Tasks</text>
  <rect x="60" y="366" width="250" height="50" fill="#a7f3d0" stroke="#059669" stroke-width="1.5" rx="5"/>
  <text x="185" y="396" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#065f46">Migrations (SQL Schema)</text>
  <rect x="320" y="366" width="260" height="50" fill="#a7f3d0" stroke="#059669" stroke-width="1.5" rx="5"/>
  <text x="450" y="396" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#065f46">Transit-encoded RPC (query / mutation)</text>

  <!-- Layer 3: Data Layer (orange) -->
  <rect x="40" y="450" width="560" height="110" fill="#fed7aa" stroke="#ea580c" stroke-width="2" rx="8"/>
  <text x="60" y="474" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#9a3412">Data Layer</text>
  <rect x="60" y="486" width="160" height="60" fill="#fdba74" stroke="#ea580c" stroke-width="1.5" rx="5"/>
  <text x="140" y="516" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#9a3412">PostgreSQL</text>
  <text x="140" y="534" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#c2410c">Primary Database</text>
  <rect x="230" y="486" width="160" height="60" fill="#fdba74" stroke="#ea580c" stroke-width="1.5" rx="5"/>
  <text x="310" y="516" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#9a3412">Redis</text>
  <text x="310" y="534" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#c2410c">PubSub Broker</text>
  <rect x="400" y="486" width="180" height="60" fill="#fdba74" stroke="#ea580c" stroke-width="1.5" rx="5"/>
  <text x="490" y="516" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#9a3412">File Storage</text>
  <text x="490" y="534" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#c2410c">Media Attachments</text>

  <!-- Exporter (purple, side) -->
  <rect x="630" y="60" width="240" height="130" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" rx="8"/>
  <text x="750" y="84" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#5b21b6">Exporter</text>
  <rect x="650" y="96" width="200" height="36" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1.5" rx="5"/>
  <text x="750" y="119" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#5b21b6">Node.js + Puppeteer</text>
  <rect x="650" y="140" width="200" height="36" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1.5" rx="5"/>
  <text x="750" y="163" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#5b21b6">Headless Chromium</text>

  <!-- MCP Server (teal, side) -->
  <rect x="630" y="210" width="240" height="110" fill="#ccfbf1" stroke="#0d9488" stroke-width="2" rx="8"/>
  <text x="750" y="234" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#115e59">MCP Server</text>
  <rect x="650" y="246" width="200" height="36" fill="#99f6e4" stroke="#0d9488" stroke-width="1.5" rx="5"/>
  <text x="750" y="269" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#115e59">Node.js / TypeScript</text>
  <rect x="650" y="290" width="200" height="20" fill="#99f6e4" stroke="#0d9488" stroke-width="1.5" rx="5"/>
  <text x="750" y="305" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#115e59">@penpot/mcp v2.16.0</text>

  <!-- GPU (side) -->
  <rect x="630" y="340" width="240" height="60" fill="#fce7f3" stroke="#db2777" stroke-width="2" rx="8"/>
  <text x="750" y="368" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#9d174d">GPU (OpenGL)</text>
  <text x="750" y="388" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#be185d">WASM canvas rendering</text>

  <!-- Connection arrows -->
  <!-- Browser to Static Server -->
  <line x1="320" y1="180" x2="320" y2="200" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Frontend to Backend (RPC) -->
  <line x1="180" y1="250" x2="180" y2="270" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="190" y="263" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">HTTP RPC</text>
  <!-- Frontend to Backend (WebSocket) -->
  <line x1="450" y1="250" x2="450" y2="270" stroke="#374151" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
  <text x="460" y="263" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">WebSocket</text>
  <!-- Backend to Data Layer -->
  <line x1="140" y1="430" x2="140" y2="450" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="310" y1="430" x2="310" y2="450" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="490" y1="430" x2="490" y2="450" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Exporter to Frontend -->
  <line x1="630" y1="125" x2="600" y2="125" stroke="#7c3aed" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrowhead)"/>
  <text x="605" y="118" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#7c3aed">render</text>
  <!-- MCP to Backend -->
  <line x1="630" y1="265" x2="600" y2="320" stroke="#0d9488" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrowhead)"/>
  <text x="605" y="290" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#0d9488">API</text>
  <!-- WASM to GPU -->
  <line x1="580" y1="131" x2="630" y2="360" stroke="#db2777" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrowhead)"/>
  <text x="600" y="240" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#db2777">GPU draw</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <!-- Legend -->
  <rect x="40" y="580" width="820" height="120" fill="#ffffff" stroke="#d1d5db" stroke-width="1" rx="6"/>
  <text x="60" y="604" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#1a1a2e">Legend</text>
  <rect x="60" y="616" width="16" height="16" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" rx="3"/>
  <text x="84" y="629" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#374151">Frontend (ClojureScript + React)</text>
  <rect x="300" y="616" width="16" height="16" fill="#d1fae5" stroke="#059669" stroke-width="1.5" rx="3"/>
  <text x="324" y="629" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#374151">Backend (Clojure / JVM)</text>
  <rect x="540" y="616" width="16" height="16" fill="#fed7aa" stroke="#ea580c" stroke-width="1.5" rx="3"/>
  <text x="564" y="629" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#374151">Data Layer (PostgreSQL + Redis)</text>
  <rect x="60" y="646" width="16" height="16" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" rx="3"/>
  <text x="84" y="659" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#374151">Exporter (Puppeteer)</text>
  <rect x="300" y="646" width="16" height="16" fill="#ccfbf1" stroke="#0d9488" stroke-width="1.5" rx="3"/>
  <text x="324" y="659" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#374151">MCP Server (AI Integration)</text>
  <rect x="540" y="646" width="16" height="16" fill="#fce7f3" stroke="#db2777" stroke-width="1.5" rx="3"/>
  <text x="564" y="659" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#374151">GPU Rendering (OpenGL)</text>
  <line x1="60" y1="680" x2="100" y2="680" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="110" y="684" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#374151">Solid = HTTP/RPC</text>
  <line x1="280" y1="680" x2="320" y2="680" stroke="#374151" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
  <text x="330" y="684" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#374151">Dashed = WebSocket / Side channel</text>
</svg>