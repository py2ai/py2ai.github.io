<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560">
  <title>Design and Code Collaboration Workflow</title>
  <desc>Horizontal flow diagram showing how designers and developers collaborate through Penpot using design tokens, inspect mode, MCP server, and CI/CD automation.</desc>

  <!-- Background -->
  <rect x="0" y="0" width="960" height="560" fill="#f8f9fb" rx="8"/>

  <!-- Title -->
  <text x="480" y="34" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#1a1a2e">Design and Code Collaboration Workflow</text>

  <!-- Designer (pink, left) -->
  <rect x="30" y="80" width="150" height="80" fill="#fce7f3" stroke="#db2777" stroke-width="2" rx="8"/>
  <text x="105" y="110" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#9d174d">Designer</text>
  <text x="105" y="132" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#be185d">Visual editor</text>
  <text x="105" y="148" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#be185d">creates designs</text>

  <!-- Penpot Design Canvas (pink) -->
  <rect x="220" y="80" width="180" height="80" fill="#fbcfe8" stroke="#db2777" stroke-width="2" rx="8"/>
  <text x="310" y="108" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#9d174d">Penpot Design Canvas</text>
  <text x="310" y="128" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#be185d">SVG-native shapes</text>
  <text x="310" y="144" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#be185d">CSS Grid / Flex layouts</text>

  <!-- Design Tokens (pink) -->
  <rect x="220" y="190" width="180" height="70" fill="#fce7f3" stroke="#db2777" stroke-width="2" rx="8"/>
  <text x="310" y="216" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#9d174d">Design Tokens</text>
  <text x="310" y="236" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#be185d">Colors, typography,</text>
  <text x="310" y="250" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#be185d">spacing (single source of truth)</text>

  <!-- Real-Time Sync (green) -->
  <rect x="220" y="290" width="180" height="60" fill="#d1fae5" stroke="#059669" stroke-width="2" rx="8"/>
  <text x="310" y="316" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#065f46">Real-Time Sync</text>
  <text x="310" y="336" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#047857">WebSocket + Redis PubSub</text>

  <!-- Inspect Mode (blue) -->
  <rect x="440" y="80" width="170" height="80" fill="#dbeafe" stroke="#2563eb" stroke-width="2" rx="8"/>
  <text x="525" y="108" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a">Inspect Mode</text>
  <text x="525" y="128" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1e40af">Ready-to-use code</text>
  <text x="525" y="144" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1e40af">SVG / CSS / HTML</text>

  <!-- Developer (blue, right) -->
  <rect x="660" y="80" width="150" height="80" fill="#bfdbfe" stroke="#2563eb" stroke-width="2" rx="8"/>
  <text x="735" y="110" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#1e3a8a">Developer</text>
  <text x="735" y="132" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1e40af">Uses generated code</text>
  <text x="735" y="148" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1e40af">in application</text>

  <!-- Code Repository (blue) -->
  <rect x="440" y="190" width="170" height="70" fill="#dbeafe" stroke="#2563eb" stroke-width="2" rx="8"/>
  <text x="525" y="216" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a">Code Repository</text>
  <text x="525" y="236" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1e40af">Design tokens sync</text>
  <text x="525" y="250" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1e40af">Webhook triggers</text>

  <!-- CI/CD Pipeline (green) -->
  <rect x="660" y="190" width="150" height="70" fill="#d1fae5" stroke="#059669" stroke-width="2" rx="8"/>
  <text x="735" y="216" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#065f46">CI/CD Pipeline</text>
  <text x="735" y="236" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#047857">Automated</text>
  <text x="735" y="250" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#047857">design-to-code</text>

  <!-- MCP Server (teal, center bottom) -->
  <rect x="350" y="400" width="260" height="80" fill="#ccfbf1" stroke="#0d9488" stroke-width="2" rx="8"/>
  <text x="480" y="428" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#115e59">MCP Server (Bidirectional Bridge)</text>
  <text x="480" y="450" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#0f766e">AI tools read and modify designs</text>
  <text x="480" y="466" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#0f766e">Design to code and code to design</text>

  <!-- AI Tools (teal) -->
  <rect x="660" y="400" width="150" height="80" fill="#99f6e4" stroke="#0d9488" stroke-width="2" rx="8"/>
  <text x="735" y="430" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#115e59">AI Tools</text>
  <text x="735" y="452" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#0f766e">LLM-driven design</text>
  <text x="735" y="468" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#0f766e">automation</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <marker id="arrow2pink" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#db2777"/>
    </marker>
    <marker id="arrow2blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow2green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrow2teal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0d9488"/>
    </marker>
  </defs>

  <!-- Flow arrows -->
  <!-- Designer to Canvas -->
  <line x1="180" y1="120" x2="220" y2="120" stroke="#db2777" stroke-width="2.5" marker-end="url(#arrow2pink)"/>
  <text x="200" y="112" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#9d174d">create</text>
  <!-- Canvas to Inspect Mode -->
  <line x1="400" y1="120" x2="440" y2="120" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow2)"/>
  <text x="420" y="112" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">export</text>
  <!-- Inspect Mode to Developer -->
  <line x1="610" y1="120" x2="660" y2="120" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow2blue)"/>
  <text x="635" y="112" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#1e3a8a">use code</text>
  <!-- Canvas to Design Tokens -->
  <line x1="310" y1="160" x2="310" y2="190" stroke="#db2777" stroke-width="2.5" marker-end="url(#arrow2pink)"/>
  <text x="320" y="178" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#9d174d">define</text>
  <!-- Design Tokens to Code Repository -->
  <line x1="400" y1="225" x2="440" y2="225" stroke="#059669" stroke-width="2.5" marker-end="url(#arrow2green)"/>
  <text x="420" y="217" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#065f46">sync</text>
  <!-- Code Repository to CI/CD -->
  <line x1="610" y1="225" x2="660" y2="225" stroke="#059669" stroke-width="2.5" marker-end="url(#arrow2green)"/>
  <text x="635" y="217" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#065f46">webhook</text>
  <!-- Canvas to Real-Time Sync -->
  <line x1="310" y1="260" x2="310" y2="290" stroke="#059669" stroke-width="2.5" marker-end="url(#arrow2green)"/>
  <text x="320" y="278" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#065f46">propagate</text>
  <!-- Real-Time Sync to MCP (dashed) -->
  <line x1="400" y1="320" x2="470" y2="400" stroke="#0d9488" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow2teal)"/>
  <!-- MCP to AI Tools (bidirectional) -->
  <line x1="610" y1="440" x2="660" y2="440" stroke="#0d9488" stroke-width="2.5" marker-end="url(#arrow2teal)"/>
  <line x1="660" y1="450" x2="610" y2="450" stroke="#0d9488" stroke-width="2.5" marker-end="url(#arrow2teal)"/>
  <text x="635" y="432" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#115e59">bridge</text>
  <!-- MCP to Canvas (bidirectional, dashed) -->
  <line x1="400" y1="400" x2="350" y2="160" stroke="#0d9488" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow2teal)"/>
  <text x="360" y="380" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#115e59">AI read/write</text>

  <!-- Legend -->
  <rect x="30" y="500" width="900" height="44" fill="#ffffff" stroke="#d1d5db" stroke-width="1" rx="6"/>
  <rect x="50" y="514" width="14" height="14" fill="#fce7f3" stroke="#db2777" stroke-width="1.5" rx="3"/>
  <text x="72" y="525" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#374151">Design (pink)</text>
  <rect x="200" y="514" width="14" height="14" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" rx="3"/>
  <text x="222" y="525" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#374151">Code (blue)</text>
  <rect x="340" y="514" width="14" height="14" fill="#d1fae5" stroke="#059669" stroke-width="1.5" rx="3"/>
  <text x="362" y="525" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#374151">Sync / Automation (green)</text>
  <rect x="540" y="514" width="14" height="14" fill="#ccfbf1" stroke="#0d9488" stroke-width="1.5" rx="3"/>
  <text x="562" y="525" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#374151">MCP / AI Bridge (teal)</text>
  <line x1="720" y1="521" x2="760" y2="521" stroke="#374151" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow2)"/>
  <text x="770" y="525" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#374151">Bidirectional</text>
</svg>