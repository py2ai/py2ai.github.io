<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="680" viewBox="0 0 900 680">
  <title>Penpot Technology Stack</title>
  <desc>Layered technology stack diagram showing frontend, rendering, backend, data, deployment, and standards layers with all technologies and their roles.</desc>

  <!-- Background -->
  <rect x="0" y="0" width="900" height="680" fill="#f8f9fb" rx="8"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#1a1a2e">Penpot Technology Stack</text>

  <!-- Layer 1: Frontend (blue) -->
  <rect x="40" y="60" width="820" height="90" fill="#dbeafe" stroke="#2563eb" stroke-width="2" rx="8"/>
  <text x="60" y="84" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#1e3a8a">Frontend</text>
  <rect x="60" y="96" width="180" height="44" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5" rx="5"/>
  <text x="150" y="116" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#1e3a8a">ClojureScript</text>
  <text x="150" y="132" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#1e40af">Compiles to JavaScript</text>
  <rect x="250" y="96" width="160" height="44" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5" rx="5"/>
  <text x="330" y="116" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#1e3a8a">React (rumext)</text>
  <text x="330" y="132" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#1e40af">UI framework wrapper</text>
  <rect x="420" y="96" width="160" height="44" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5" rx="5"/>
  <text x="500" y="116" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#1e3a8a">potok</text>
  <text x="500" y="132" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#1e40af">State management (Redux-like)</text>
  <rect x="590" y="96" width="250" height="44" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5" rx="5"/>
  <text x="715" y="116" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#1e3a8a">Web Worker</text>
  <text x="715" y="132" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#1e40af">Background calculations</text>

  <!-- Layer 2: Rendering (purple) -->
  <rect x="40" y="160" width="820" height="90" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" rx="8"/>
  <text x="60" y="184" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#5b21b6">Rendering</text>
  <rect x="60" y="196" width="140" height="44" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1.5" rx="5"/>
  <text x="130" y="216" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#5b21b6">Rust</text>
  <text x="130" y="232" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6d28d9">Systems language</text>
  <rect x="210" y="196" width="150" height="44" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1.5" rx="5"/>
  <text x="285" y="216" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#5b21b6">WebAssembly</text>
  <text x="285" y="232" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6d28d9">Browser execution</text>
  <rect x="370" y="196" width="150" height="44" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1.5" rx="5"/>
  <text x="445" y="216" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#5b21b6">Skia (skia-safe)</text>
  <text x="445" y="232" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6d28d9">Graphics engine</text>
  <rect x="530" y="196" width="140" height="44" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1.5" rx="5"/>
  <text x="600" y="216" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#5b21b6">OpenGL</text>
  <text x="600" y="232" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6d28d9">GPU acceleration</text>
  <rect x="680" y="196" width="160" height="44" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1.5" rx="5"/>
  <text x="760" y="216" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#5b21b6">glam + bezier-rs</text>
  <text x="760" y="232" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6d28d9">Math and curves</text>

  <!-- Layer 3: Backend (green) -->
  <rect x="40" y="260" width="820" height="90" fill="#d1fae5" stroke="#059669" stroke-width="2" rx="8"/>
  <text x="60" y="284" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#065f46">Backend</text>
  <rect x="60" y="296" width="160" height="44" fill="#a7f3d0" stroke="#059669" stroke-width="1.5" rx="5"/>
  <text x="140" y="316" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#065f46">Clojure</text>
  <text x="140" y="332" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#047857">JVM-compiled backend</text>
  <rect x="230" y="296" width="140" height="44" fill="#a7f3d0" stroke="#059669" stroke-width="1.5" rx="5"/>
  <text x="300" y="316" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#065f46">JVM</text>
  <text x="300" y="332" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#047857">Runtime platform</text>
  <rect x="380" y="296" width="170" height="44" fill="#a7f3d0" stroke="#059669" stroke-width="1.5" rx="5"/>
  <text x="465" y="316" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#065f46">Transit</text>
  <text x="465" y="332" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#047857">RPC data encoding</text>
  <rect x="560" y="296" width="280" height="44" fill="#a7f3d0" stroke="#059669" stroke-width="1.5" rx="5"/>
  <text x="700" y="316" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#065f46">Puppeteer</text>
  <text x="700" y="332" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#047857">Headless Chromium export automation</text>

  <!-- Layer 4: Data (orange) -->
  <rect x="40" y="360" width="820" height="90" fill="#fed7aa" stroke="#ea580c" stroke-width="2" rx="8"/>
  <text x="60" y="384" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#9a3412">Data</text>
  <rect x="60" y="396" width="380" height="44" fill="#fdba74" stroke="#ea580c" stroke-width="1.5" rx="5"/>
  <text x="250" y="416" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#9a3412">PostgreSQL</text>
  <text x="250" y="432" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#c2410c">Primary database for all persistent data</text>
  <rect x="450" y="396" width="390" height="44" fill="#fdba74" stroke="#ea580c" stroke-width="1.5" rx="5"/>
  <text x="645" y="416" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#9a3412">Redis</text>
  <text x="645" y="432" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#c2410c">PubSub broker for real-time collaboration</text>

  <!-- Layer 5: Deployment (teal) -->
  <rect x="40" y="460" width="820" height="90" fill="#ccfbf1" stroke="#0d9488" stroke-width="2" rx="8"/>
  <text x="60" y="484" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#115e59">Deployment</text>
  <rect x="60" y="496" width="160" height="44" fill="#99f6e4" stroke="#0d9488" stroke-width="1.5" rx="5"/>
  <text x="140" y="516" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#115e59">Docker</text>
  <text x="140" y="532" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#0f766e">Container deployment</text>
  <rect x="230" y="496" width="180" height="44" fill="#99f6e4" stroke="#0d9488" stroke-width="1.5" rx="5"/>
  <text x="320" y="516" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#115e59">Kubernetes (Helm)</text>
  <text x="320" y="532" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#0f766e">Orchestration + Helm Chart</text>
  <rect x="420" y="496" width="180" height="44" fill="#99f6e4" stroke="#0d9488" stroke-width="1.5" rx="5"/>
  <text x="510" y="516" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#115e59">Node.js</text>
  <text x="510" y="532" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#0f766e">MCP server + Exporter runtime</text>
  <rect x="610" y="496" width="230" height="44" fill="#99f6e4" stroke="#0d9488" stroke-width="1.5" rx="5"/>
  <text x="725" y="516" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#115e59">pnpm</text>
  <text x="725" y="532" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#0f766e">Monorepo workspace management</text>

  <!-- Layer 6: Standards (gray) -->
  <rect x="40" y="560" width="820" height="90" fill="#f3f4f6" stroke="#6b7280" stroke-width="2" rx="8"/>
  <text x="60" y="584" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#374151">Open Standards</text>
  <rect x="60" y="596" width="180" height="44" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.5" rx="5"/>
  <text x="150" y="616" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#374151">SVG</text>
  <text x="150" y="632" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#4b5563">Native shape format</text>
  <rect x="250" y="596" width="160" height="44" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.5" rx="5"/>
  <text x="330" y="616" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#374151">CSS</text>
  <text x="330" y="632" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#4b5563">Grid and Flex layouts</text>
  <rect x="420" y="596" width="160" height="44" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.5" rx="5"/>
  <text x="500" y="616" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#374151">HTML</text>
  <text x="500" y="632" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#4b5563">Inspect mode output</text>
  <rect x="590" y="596" width="250" height="44" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.5" rx="5"/>
  <text x="715" y="616" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#374151">JSON</text>
  <text x="715" y="632" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#4b5563">Design tokens and API data</text>
</svg>