<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="680" viewBox="0 0 900 680">
  <title>Penpot Key Features and Capabilities</title>
  <desc>Hub diagram with central Penpot node and four feature quadrants: design tools, collaboration, code integration, and platform.</desc>

  <!-- Background -->
  <rect x="0" y="0" width="900" height="680" fill="#f8f9fb" rx="8"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#1a1a2e">Penpot Key Features and Capabilities</text>

  <!-- Central node (brand purple) -->
  <circle cx="450" cy="360" r="80" fill="#7c3aed" stroke="#5b21b6" stroke-width="3"/>
  <text x="450" y="352" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">Penpot</text>
  <text x="450" y="376" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#e9d5ff">Open-Source</text>
  <text x="450" y="392" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#e9d5ff">Design Platform</text>

  <!-- Quadrant 1: Design Tools (top-left, blue) -->
  <rect x="40" y="70" width="360" height="200" fill="#dbeafe" stroke="#2563eb" stroke-width="2" rx="10"/>
  <text x="220" y="98" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#1e3a8a">Design Tools</text>
  <rect x="60" y="112" width="150" height="34" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5" rx="5"/>
  <text x="135" y="134" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#1e3a8a">Vector Editing</text>
  <rect x="220" y="112" width="160" height="34" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5" rx="5"/>
  <text x="300" y="134" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#1e3a8a">Prototyping</text>
  <rect x="60" y="154" width="150" height="34" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5" rx="5"/>
  <text x="135" y="176" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#1e3a8a">Components</text>
  <rect x="220" y="154" width="160" height="34" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5" rx="5"/>
  <text x="300" y="176" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#1e3a8a">Variants</text>
  <rect x="60" y="196" width="320" height="34" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5" rx="5"/>
  <text x="220" y="218" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#1e3a8a">CSS Grid and Flex Layout</text>
  <rect x="60" y="238" width="320" height="24" fill="#eff6ff" stroke="#2563eb" stroke-width="1" rx="4"/>
  <text x="220" y="255" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1e40af">SVG-native shapes, responsive layouts</text>

  <!-- Quadrant 2: Collaboration (top-right, green) -->
  <rect x="500" y="70" width="360" height="200" fill="#d1fae5" stroke="#059669" stroke-width="2" rx="10"/>
  <text x="680" y="98" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#065f46">Collaboration</text>
  <rect x="520" y="112" width="150" height="34" fill="#a7f3d0" stroke="#059669" stroke-width="1.5" rx="5"/>
  <text x="595" y="134" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#065f46">Real-Time Editing</text>
  <rect x="680" y="112" width="160" height="34" fill="#a7f3d0" stroke="#059669" stroke-width="1.5" rx="5"/>
  <text x="760" y="134" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#065f46">Live Presence</text>
  <rect x="520" y="154" width="150" height="34" fill="#a7f3d0" stroke="#059669" stroke-width="1.5" rx="5"/>
  <text x="595" y="176" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#065f46">Comments</text>
  <rect x="680" y="154" width="160" height="34" fill="#a7f3d0" stroke="#059669" stroke-width="1.5" rx="5"/>
  <text x="760" y="176" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#065f46">Cursor Tracking</text>
  <rect x="520" y="196" width="320" height="34" fill="#a7f3d0" stroke="#059669" stroke-width="1.5" rx="5"/>
  <text x="680" y="218" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#065f46">Shared Libraries</text>
  <rect x="520" y="238" width="320" height="24" fill="#ecfdf5" stroke="#059669" stroke-width="1" rx="4"/>
  <text x="680" y="255" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#047857">WebSocket + Redis PubSub sync</text>

  <!-- Quadrant 3: Code Integration (bottom-left, orange) -->
  <rect x="40" y="450" width="360" height="200" fill="#fed7aa" stroke="#ea580c" stroke-width="2" rx="10"/>
  <text x="220" y="478" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#9a3412">Code Integration</text>
  <rect x="60" y="492" width="150" height="34" fill="#fdba74" stroke="#ea580c" stroke-width="1.5" rx="5"/>
  <text x="135" y="514" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#9a3412">Inspect Mode</text>
  <rect x="220" y="492" width="160" height="34" fill="#fdba74" stroke="#ea580c" stroke-width="1.5" rx="5"/>
  <text x="300" y="514" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#9a3412">Design Tokens</text>
  <rect x="60" y="534" width="150" height="34" fill="#fdba74" stroke="#ea580c" stroke-width="1.5" rx="5"/>
  <text x="135" y="556" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#9a3412">Open API</text>
  <rect x="220" y="534" width="160" height="34" fill="#fdba74" stroke="#ea580c" stroke-width="1.5" rx="5"/>
  <text x="300" y="556" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#9a3412">Webhooks</text>
  <rect x="60" y="576" width="320" height="34" fill="#fdba74" stroke="#ea580c" stroke-width="1.5" rx="5"/>
  <text x="220" y="598" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#9a3412">MCP Server (AI Bridge)</text>
  <rect x="60" y="618" width="320" height="24" fill="#fff7ed" stroke="#ea580c" stroke-width="1" rx="4"/>
  <text x="220" y="635" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#c2410c">SVG / CSS / HTML code output</text>

  <!-- Quadrant 4: Platform (bottom-right, teal) -->
  <rect x="500" y="450" width="360" height="200" fill="#ccfbf1" stroke="#0d9488" stroke-width="2" rx="10"/>
  <text x="680" y="478" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#115e59">Platform</text>
  <rect x="520" y="492" width="150" height="34" fill="#99f6e4" stroke="#0d9488" stroke-width="1.5" rx="5"/>
  <text x="595" y="514" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#115e59">Self-Hosting</text>
  <rect x="680" y="492" width="160" height="34" fill="#99f6e4" stroke="#0d9488" stroke-width="1.5" rx="5"/>
  <text x="760" y="514" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#115e59">Open Source (MPL-2.0)</text>
  <rect x="520" y="534" width="150" height="34" fill="#99f6e4" stroke="#0d9488" stroke-width="1.5" rx="5"/>
  <text x="595" y="556" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#115e59">Plugin System</text>
  <rect x="680" y="534" width="160" height="34" fill="#99f6e4" stroke="#0d9488" stroke-width="1.5" rx="5"/>
  <text x="760" y="556" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#115e59">Docker / K8s</text>
  <rect x="520" y="576" width="320" height="34" fill="#99f6e4" stroke="#0d9488" stroke-width="1.5" rx="5"/>
  <text x="680" y="598" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#115e59">Open Standards (SVG / CSS / HTML)</text>
  <rect x="520" y="618" width="320" height="24" fill="#f0fdfa" stroke="#0d9488" stroke-width="1" rx="4"/>
  <text x="680" y="635" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#0f766e">Verified Digital Public Good</text>

  <!-- Connector lines from center to quadrants -->
  <line x1="400" y1="300" x2="310" y2="270" stroke="#7c3aed" stroke-width="2.5" stroke-dasharray="6,3"/>
  <line x1="500" y1="300" x2="590" y2="270" stroke="#7c3aed" stroke-width="2.5" stroke-dasharray="6,3"/>
  <line x1="400" y1="420" x2="310" y2="450" stroke="#7c3aed" stroke-width="2.5" stroke-dasharray="6,3"/>
  <line x1="500" y1="420" x2="590" y2="450" stroke="#7c3aed" stroke-width="2.5" stroke-dasharray="6,3"/>

  <!-- WASM badge (center top) -->
  <rect x="380" y="290" width="140" height="24" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" rx="4"/>
  <text x="450" y="307" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#5b21b6">WASM-Powered Rendering</text>

  <!-- Legend -->
  <rect x="40" y="300" width="120" height="130" fill="#ffffff" stroke="#d1d5db" stroke-width="1" rx="6" opacity="0.9"/>
  <text x="100" y="320" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#1a1a2e">Categories</text>
  <rect x="52" y="330" width="12" height="12" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" rx="2"/>
  <text x="70" y="340" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">Design Tools</text>
  <rect x="52" y="350" width="12" height="12" fill="#d1fae5" stroke="#059669" stroke-width="1.5" rx="2"/>
  <text x="70" y="360" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">Collaboration</text>
  <rect x="52" y="370" width="12" height="12" fill="#fed7aa" stroke="#ea580c" stroke-width="1.5" rx="2"/>
  <text x="70" y="380" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">Code Integration</text>
  <rect x="52" y="390" width="12" height="12" fill="#ccfbf1" stroke="#0d9488" stroke-width="1.5" rx="2"/>
  <text x="70" y="400" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">Platform</text>
  <circle cx="58" cy="416" r="6" fill="#7c3aed" stroke="#5b21b6" stroke-width="1.5"/>
  <text x="70" y="420" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#374151">Penpot Core</text>
</svg>