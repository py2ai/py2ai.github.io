<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow-blue2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrow-orange2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#EA580C"/>
    </marker>
    <marker id="arrow-green2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#16A34A"/>
    </marker>
    <marker id="arrow-red2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#DC2626"/>
    </marker>
  </defs>

  <rect width="960" height="640" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0F172A">OmniRoute — Provider Routing Flow</text>
  <text x="480" y="54" text-anchor="middle" font-size="12" fill="#64748B">Request → Parse → Route → Select → Execute → Aggregate</text>

  <!-- Step 1: Incoming Request -->
  <rect x="360" y="74" width="240" height="50" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="480" y="97" text-anchor="middle" font-size="13" font-weight="600" fill="#1E3A8A">Incoming Request</text>
  <text x="480" y="114" text-anchor="middle" font-size="10" fill="#64748B">POST /v1/chat/completions</text>

  <line x1="480" y1="124" x2="480" y2="148" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue2)"/>

  <!-- Step 2: Parse & Normalize -->
  <rect x="340" y="152" width="280" height="50" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="480" y="175" text-anchor="middle" font-size="13" font-weight="600" fill="#1E3A8A">Parse & Normalize</text>
  <text x="480" y="192" text-anchor="middle" font-size="10" fill="#64748B">Translate OpenAI ↔ Claude ↔ Gemini format</text>

  <line x1="480" y1="202" x2="480" y2="226" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue2)"/>

  <!-- Step 3: Compression -->
  <rect x="340" y="230" width="280" height="50" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="480" y="253" text-anchor="middle" font-size="13" font-weight="600" fill="#92400E">Compression Pipeline</text>
  <text x="480" y="270" text-anchor="middle" font-size="10" fill="#64748B">10 engines · RTK → Caveman · 15–95% saved</text>

  <line x1="480" y1="280" x2="480" y2="304" stroke="#EA580C" stroke-width="1.5" marker-end="url(#arrow-orange2)"/>

  <!-- Step 4: Routing Decision (diamond) -->
  <polygon points="480,308 600,360 480,412 360,360" fill="#FFFBEB" stroke="#EA580C" stroke-width="2"/>
  <text x="480" y="356" text-anchor="middle" font-size="13" font-weight="700" fill="#9A3412">Route Decision</text>
  <text x="480" y="374" text-anchor="middle" font-size="10" fill="#64748B">17 strategies · auto-combo</text>

  <!-- Routing strategy labels on left -->
  <g transform="translate(40, 320)">
    <text x="0" y="0" font-size="11" font-weight="600" fill="#475569">Routing Strategies:</text>
    <text x="0" y="18" font-size="10" fill="#64748B">• priority — drain each in order</text>
    <text x="0" y="34" font-size="10" fill="#64748B">• cost-optimized — cheapest viable</text>
    <text x="0" y="50" font-size="10" fill="#64748B">• lkgp — last-known-good path</text>
    <text x="0" y="66" font-size="10" fill="#64748B">• weighted / round-robin / p2c</text>
    <text x="0" y="82" font-size="10" fill="#64748B">• fusion — panel + judge</text>
    <text x="0" y="98" font-size="10" fill="#64748B">• headroom / reset-aware / auto</text>
  </g>

  <!-- 9-factor scoring on right -->
  <g transform="translate(660, 320)">
    <text x="0" y="0" font-size="11" font-weight="600" fill="#475569">Auto-Combo 9 Factors:</text>
    <text x="0" y="18" font-size="10" fill="#64748B">1. Provider health</text>
    <text x="0" y="34" font-size="10" fill="#64748B">2. Remaining quota</text>
    <text x="0" y="50" font-size="10" fill="#64748B">3. Cost per token</text>
    <text x="0" y="66" font-size="10" fill="#64748B">4. Latency (p50/p95)</text>
    <text x="0" y="82" font-size="10" fill="#64748B">5. Success rate</text>
    <text x="0" y="98" font-size="10" fill="#64748B">6–9. Freshness, context fit…</text>
  </g>

  <!-- Arrows to 4 tiers -->
  <line x1="400" y1="360" x2="180" y2="430" stroke="#EA580C" stroke-width="1.5" marker-end="url(#arrow-orange2)"/>
  <line x1="440" y1="412" x2="380" y2="430" stroke="#EA580C" stroke-width="1.5" marker-end="url(#arrow-orange2)"/>
  <line x1="520" y1="412" x2="580" y2="430" stroke="#EA580C" stroke-width="1.5" marker-end="url(#arrow-orange2)"/>
  <line x1="560" y1="360" x2="780" y2="430" stroke="#EA580C" stroke-width="1.5" marker-end="url(#arrow-orange2)"/>

  <!-- Tier boxes -->
  <rect x="60" y="434" width="200" height="56" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="160" y="458" text-anchor="middle" font-size="12" font-weight="600" fill="#1E3A8A">Tier 1: Subscription</text>
  <text x="160" y="476" text-anchor="middle" font-size="10" fill="#64748B">Claude Code, Codex, Copilot</text>

  <rect x="280" y="434" width="200" height="56" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="380" y="458" text-anchor="middle" font-size="12" font-weight="600" fill="#1E3A8A">Tier 2: API Key</text>
  <text x="380" y="476" text-anchor="middle" font-size="10" fill="#64748B">DeepSeek, Groq, xAI</text>

  <rect x="500" y="434" width="200" height="56" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="600" y="458" text-anchor="middle" font-size="12" font-weight="600" fill="#92400E">Tier 3: Cheap</text>
  <text x="600" y="476" text-anchor="middle" font-size="10" fill="#64748B">GLM $0.5, MiniMax $0.3</text>

  <rect x="720" y="434" width="200" height="56" rx="8" fill="#ECFDF5" stroke="#16A34A" stroke-width="1.5"/>
  <text x="820" y="458" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">Tier 4: Free</text>
  <text x="820" y="476" text-anchor="middle" font-size="10" fill="#64748B">Kiro, Qoder, Pollinations</text>

  <!-- Execute arrows down -->
  <line x1="160" y1="490" x2="160" y2="520" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue2)"/>
  <line x1="380" y1="490" x2="380" y2="520" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue2)"/>
  <line x1="600" y1="490" x2="600" y2="520" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue2)"/>
  <line x1="820" y1="490" x2="820" y2="520" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue2)"/>

  <!-- Failover decision -->
  <polygon points="160,524 220,548 160,572 100,548" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="160" y="552" text-anchor="middle" font-size="10" font-weight="600" fill="#991B1B">OK?</text>

  <polygon points="380,524 440,548 380,572 320,548" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="380" y="552" text-anchor="middle" font-size="10" font-weight="600" fill="#991B1B">OK?</text>

  <polygon points="600,524 660,548 600,572 540,548" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="600" y="552" text-anchor="middle" font-size="10" font-weight="600" fill="#991B1B">OK?</text>

  <polygon points="820,524 880,548 820,572 760,548" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="820" y="552" text-anchor="middle" font-size="10" font-weight="600" fill="#991B1B">OK?</text>

  <!-- Success arrow to aggregation -->
  <line x1="160" y1="572" x2="160" y2="600" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arrow-green2)"/>
  <line x1="380" y1="572" x2="380" y2="600" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arrow-green2)"/>
  <line x1="600" y1="572" x2="600" y2="600" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arrow-green2)"/>
  <line x1="820" y1="572" x2="820" y2="600" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arrow-green2)"/>

  <!-- Failover arrows (red, to next tier) -->
  <path d="M 220 548 Q 280 548 320 548" fill="none" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-red2)"/>
  <path d="M 440 548 Q 500 548 540 548" fill="none" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-red2)"/>
  <path d="M 660 548 Q 720 548 760 548" fill="none" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-red2)"/>
  <text x="480" y="540" text-anchor="middle" font-size="9" fill="#DC2626" font-weight="600">failover (circuit breaker / cooldown)</text>

  <!-- Aggregation -->
  <rect x="300" y="604" width="360" height="30" rx="6" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
  <text x="480" y="624" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">Response Aggregation → Stream to Client (SSE)</text>

  <!-- Legend -->
  <g transform="translate(40, 604)">
    <line x1="0" y1="0" x2="24" y2="0" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow-blue2)"/>
    <text x="30" y="4" font-size="9" fill="#475569">request</text>
    <line x1="0" y1="14" x2="24" y2="14" stroke="#EA580C" stroke-width="2" marker-end="url(#arrow-orange2)"/>
    <text x="30" y="18" font-size="9" fill="#475569">routing</text>
  </g>
  <g transform="translate(660, 604)">
    <line x1="0" y1="0" x2="24" y2="0" stroke="#16A34A" stroke-width="2" marker-end="url(#arrow-green2)"/>
    <text x="30" y="4" font-size="9" fill="#475569">success</text>
    <line x1="0" y1="14" x2="24" y2="14" stroke="#DC2626" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow-red2)"/>
    <text x="30" y="18" font-size="9" fill="#475569">failover</text>
  </g>
</svg>