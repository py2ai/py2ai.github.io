<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#16A34A"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#EA580C"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#64748B"/>
    </marker>
  </defs>

  <rect width="960" height="620" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0F172A">OmniRoute — System Architecture</text>
  <text x="480" y="54" text-anchor="middle" font-size="12" fill="#64748B">One endpoint · 237 providers · 90+ free tiers</text>

  <!-- Layer 1: Clients -->
  <text x="480" y="86" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">CLIENTS (24+ coding agents)</text>
  <g>
    <rect x="60" y="98" width="150" height="56" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
    <text x="135" y="122" text-anchor="middle" font-size="13" font-weight="600" fill="#1E3A8A">Claude Code</text>
    <text x="135" y="140" text-anchor="middle" font-size="10" fill="#64748B">Anthropic CLI</text>

    <rect x="230" y="98" width="150" height="56" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
    <text x="305" y="122" text-anchor="middle" font-size="13" font-weight="600" fill="#1E3A8A">Codex CLI</text>
    <text x="305" y="140" text-anchor="middle" font-size="10" fill="#64748B">OpenAI CLI</text>

    <rect x="400" y="98" width="150" height="56" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
    <text x="475" y="122" text-anchor="middle" font-size="13" font-weight="600" fill="#1E3A8A">Cursor</text>
    <text x="475" y="140" text-anchor="middle" font-size="10" fill="#64748B">IDE Agent</text>

    <rect x="570" y="98" width="150" height="56" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
    <text x="645" y="122" text-anchor="middle" font-size="13" font-weight="600" fill="#1E3A8A">Cline / Copilot</text>
    <text x="645" y="140" text-anchor="middle" font-size="10" fill="#64748B">IDE Plugins</text>

    <rect x="740" y="98" width="160" height="56" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
    <text x="820" y="122" text-anchor="middle" font-size="13" font-weight="600" fill="#1E3A8A">Any OpenAI-compat</text>
    <text x="820" y="140" text-anchor="middle" font-size="10" fill="#64748B">Aider, Continue, Roo…</text>
  </g>

  <!-- Arrows from clients to gateway -->
  <line x1="135" y1="154" x2="135" y2="186" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="305" y1="154" x2="305" y2="186" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="475" y1="154" x2="475" y2="186" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="645" y1="154" x2="645" y2="186" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="820" y1="154" x2="820" y2="186" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Unified endpoint label -->
  <text x="480" y="178" text-anchor="middle" font-size="11" fill="#2563EB" font-weight="600">http://localhost:20128/v1</text>

  <!-- Layer 2: OmniRoute Gateway -->
  <rect x="60" y="190" width="840" height="200" rx="12" fill="#F8FAFC" stroke="#0F172A" stroke-width="2"/>
  <text x="480" y="214" text-anchor="middle" font-size="15" font-weight="700" fill="#0F172A">OmniRoute Gateway (Next.js + TypeScript · local proxy)</text>

  <!-- Gateway sub-components -->
  <rect x="80" y="228" width="180" height="44" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.2"/>
  <text x="170" y="247" text-anchor="middle" font-size="12" font-weight="600" fill="#1E3A8A">API Normalization</text>
  <text x="170" y="262" text-anchor="middle" font-size="10" fill="#64748B">OpenAI↔Claude↔Gemini</text>

  <rect x="280" y="228" width="180" height="44" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.2"/>
  <text x="370" y="247" text-anchor="middle" font-size="12" font-weight="600" fill="#1E3A8A">Compression Pipeline</text>
  <text x="370" y="262" text-anchor="middle" font-size="10" fill="#64748B">10 engines · 15–95% saved</text>

  <rect x="480" y="228" width="180" height="44" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.2"/>
  <text x="570" y="247" text-anchor="middle" font-size="12" font-weight="600" fill="#1E3A8A">Provider Router</text>
  <text x="570" y="262" text-anchor="middle" font-size="10" fill="#64748B">17 strategies · auto-combo</text>

  <rect x="680" y="228" width="200" height="44" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.2"/>
  <text x="780" y="247" text-anchor="middle" font-size="12" font-weight="600" fill="#1E3A8A">Resilience Layer</text>
  <text x="780" y="262" text-anchor="middle" font-size="10" fill="#64748B">Circuit breaker · cooldown</text>

  <!-- Second row of gateway components -->
  <rect x="80" y="284" width="180" height="44" rx="6" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.2"/>
  <text x="170" y="303" text-anchor="middle" font-size="12" font-weight="600" fill="#991B1B">Guardrails</text>
  <text x="170" y="318" text-anchor="middle" font-size="10" fill="#64748B">PII · injection · vision</text>

  <rect x="280" y="284" width="180" height="44" rx="6" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.2"/>
  <text x="370" y="303" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">MCP Server</text>
  <text x="370" y="318" text-anchor="middle" font-size="10" fill="#64748B">95 tools · 3 transports</text>

  <rect x="480" y="284" width="180" height="44" rx="6" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.2"/>
  <text x="570" y="303" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">A2A Protocol</text>
  <text x="570" y="318" text-anchor="middle" font-size="10" fill="#64748B">JSON-RPC 2.0 · 6 skills</text>

  <rect x="680" y="284" width="200" height="44" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.2"/>
  <text x="780" y="303" text-anchor="middle" font-size="12" font-weight="600" fill="#92400E">Memory + Skills</text>
  <text x="780" y="318" text-anchor="middle" font-size="10" fill="#64748B">FTS5 + vector · 43 skills</text>

  <!-- Storage -->
  <rect x="200" y="342" width="560" height="36" rx="6" fill="#F1F5F9" stroke="#64748B" stroke-width="1.2"/>
  <text x="480" y="365" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">SQLite (better-sqlite3) + LowDB — state, usage, pricing, audit, memory</text>

  <!-- Arrows from gateway to providers -->
  <line x1="200" y1="390" x2="200" y2="424" stroke="#EA580C" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="400" y1="390" x2="400" y2="424" stroke="#EA580C" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="560" y1="390" x2="560" y2="424" stroke="#EA580C" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="760" y1="390" x2="760" y2="424" stroke="#EA580C" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- Layer 3: Providers -->
  <text x="480" y="418" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">237 UPSTREAM PROVIDERS (90+ with free tier)</text>

  <g>
    <rect x="60" y="430" width="180" height="56" rx="8" fill="#FFFBEB" stroke="#EA580C" stroke-width="1.5"/>
    <text x="150" y="454" text-anchor="middle" font-size="13" font-weight="600" fill="#9A3412">Tier 1: Subscription</text>
    <text x="150" y="472" text-anchor="middle" font-size="10" fill="#64748B">Claude Code, Codex, Copilot</text>

    <rect x="260" y="430" width="180" height="56" rx="8" fill="#FFFBEB" stroke="#EA580C" stroke-width="1.5"/>
    <text x="350" y="454" text-anchor="middle" font-size="13" font-weight="600" fill="#9A3412">Tier 2: API Key</text>
    <text x="350" y="472" text-anchor="middle" font-size="10" fill="#64748B">DeepSeek, Groq, xAI, Mistral</text>

    <rect x="460" y="430" width="180" height="56" rx="8" fill="#FFFBEB" stroke="#EA580C" stroke-width="1.5"/>
    <text x="550" y="454" text-anchor="middle" font-size="13" font-weight="600" fill="#9A3412">Tier 3: Cheap</text>
    <text x="550" y="472" text-anchor="middle" font-size="10" fill="#64748B">GLM $0.5, MiniMax $0.3/1M</text>

    <rect x="660" y="430" width="220" height="56" rx="8" fill="#ECFDF5" stroke="#16A34A" stroke-width="1.5"/>
    <text x="770" y="454" text-anchor="middle" font-size="13" font-weight="600" fill="#166534">Tier 4: Free Forever</text>
    <text x="770" y="472" text-anchor="middle" font-size="10" fill="#64748B">Kiro, Qoder, Pollinations, LongCat</text>
  </g>

  <!-- Fallback arrows -->
  <path d="M 240 458 Q 260 500 260 458" fill="none" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="250" y="514" text-anchor="middle" font-size="10" fill="#16A34A" font-weight="600">auto-fallback</text>
  <path d="M 440 458 Q 460 500 460 458" fill="none" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <path d="M 640 458 Q 660 500 660 458" fill="none" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Legend -->
  <g transform="translate(60, 540)">
    <text x="0" y="0" font-size="11" font-weight="600" fill="#475569">Legend:</text>
    <line x1="60" y1="-4" x2="90" y2="-4" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <text x="96" y="0" font-size="10" fill="#475569">Data flow (request)</text>
    <line x1="220" y1="-4" x2="250" y2="-4" stroke="#EA580C" stroke-width="2" marker-end="url(#arrow-orange)"/>
    <text x="256" y="0" font-size="10" fill="#475569">Routing to provider</text>
    <line x1="390" y1="-4" x2="420" y2="-4" stroke="#16A34A" stroke-width="2" marker-end="url(#arrow-green)"/>
    <text x="426" y="0" font-size="10" fill="#475569">Failover / fallback</text>
  </g>

  <text x="480" y="580" text-anchor="middle" font-size="10" fill="#94A3B8">OmniRoute v3.8.45 · MIT License · 100% TypeScript · Node.js 22+</text>
</svg>