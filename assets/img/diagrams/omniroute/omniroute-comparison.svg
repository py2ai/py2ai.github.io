  <text x="480" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#0F172A">OmniRoute vs Alternatives — Feature Comparison</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748B">OmniRoute · OpenRouter · LiteLLM · Direct API</text>

