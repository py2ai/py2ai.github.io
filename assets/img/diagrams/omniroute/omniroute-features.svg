<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="Segoe UI, Arial, sans-serif">
  <rect width="960" height="620" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#0F172A">OmniRoute — Key Features</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748B">237 providers · 90+ free · 17 routing strategies · 10 compression engines</text>

  <!-- Central hub -->
  <circle cx="480" cy="320" r="70" fill="#0F172A" stroke="#1E3A8A" stroke-width="3"/>
  <text x="480" y="314" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">OmniRoute</text>
  <text x="480" y="334" text-anchor="middle" font-size="11" fill="#94A3B8">Free AI Gateway</text>

  <!-- Feature cards around hub (6 cards, 2 columns x 3 rows) -->
  <!-- Card 1: 237 Providers (top-left) -->
  <rect x="40" y="90" width="260" height="100" rx="10" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="60" y="116" font-size="22" fill="#2563EB">🌐</text>
  <text x="92" y="116" font-size="14" font-weight="700" fill="#1E3A8A">237 AI Providers</text>
  <text x="60" y="138" font-size="11" fill="#475569">OpenAI, Anthropic, Gemini, Grok,</text>
  <text x="60" y="154" font-size="11" fill="#475569">DeepSeek, Mistral, Qwen, Llama,</text>
  <text x="60" y="170" font-size="11" fill="#475569">Groq, NVIDIA, MiniMax, Cohere…</text>

  <!-- Card 2: 90+ Free (top-right) -->
  <rect x="660" y="90" width="260" height="100" rx="10" fill="#ECFDF5" stroke="#16A34A" stroke-width="1.5"/>
  <text x="680" y="116" font-size="22" fill="#16A34A">🆓</text>
  <text x="712" y="116" font-size="14" font-weight="700" fill="#166534">90+ Free Tiers</text>
  <text x="680" y="138" font-size="11" fill="#475569">11 free forever: Kiro, Qoder,</text>
  <text x="680" y="154" font-size="11" fill="#475569">Pollinations, LongCat, Cloudflare…</text>
  <text x="680" y="170" font-size="11" fill="#475569">~1.6B free tokens/month aggregated</text>

  <!-- Card 3: Unified API (mid-left) -->
  <rect x="40" y="210" width="260" height="100" rx="10" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="60" y="236" font-size="22" fill="#D97706">🧩</text>
  <text x="92" y="236" font-size="14" font-weight="700" fill="#92400E">Unified API</text>
  <text x="60" y="258" font-size="11" fill="#475569">One endpoint: /v1</text>
  <text x="60" y="274" font-size="11" fill="#475569">OpenAI ↔ Claude ↔ Gemini</text>
  <text x="60" y="290" font-size="11" fill="#475569">Responses API translation</text>

  <!-- Card 4: Claude Code + Codex (mid-right) -->
  <rect x="660" y="210" width="260" height="100" rx="10" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="680" y="236" font-size="22" fill="#2563EB">🔌</text>
  <text x="712" y="236" font-size="14" font-weight="700" fill="#1E3A8A">24+ Tool Integrations</text>
  <text x="680" y="258" font-size="11" fill="#475569">Claude Code, Codex, Cursor, Cline,</text>
  <text x="680" y="274" font-size="11" fill="#475569">Copilot, Antigravity, Continue, Roo…</text>
  <text x="680" y="290" font-size="11" fill="#475569">One config: localhost:20128/v1</text>

  <!-- Card 5: Compression (bottom-left) -->
  <rect x="40" y="330" width="260" height="100" rx="10" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="60" y="356" font-size="22" fill="#DC2626">🗜️</text>
  <text x="92" y="356" font-size="14" font-weight="700" fill="#991B1B">Token Compression</text>
  <text x="60" y="378" font-size="11" fill="#475569">10-engine pipeline (RTK + Caveman)</text>
  <text x="60" y="394" font-size="11" fill="#475569">Save 15–95% eligible tokens</text>
  <text x="60" y="410" font-size="11" fill="#475569">Code/JSON/URLs always preserved</text>

  <!-- Card 6: Cost Optimization (bottom-right) -->
  <rect x="660" y="330" width="260" height="100" rx="10" fill="#ECFDF5" stroke="#16A34A" stroke-width="1.5"/>
  <text x="680" y="356" font-size="22" fill="#16A34A">💸</text>
  <text x="712" y="356" font-size="14" font-weight="700" fill="#166534">Cost Optimization</text>
  <text x="680" y="378" font-size="11" fill="#475569">17 routing strategies</text>
  <text x="680" y="394" font-size="11" fill="#475569">Auto-route to cheapest viable model</text>
  <text x="680" y="410" font-size="11" fill="#475569">4-tier fallback: Sub → API → Cheap → Free</text>

  <!-- Card 7: MCP + A2A (bottom-center-left) -->
  <rect x="180" y="450" width="260" height="100" rx="10" fill="#F8FAFC" stroke="#64748B" stroke-width="1.5"/>
  <text x="200" y="476" font-size="22" fill="#64748B">🤝</text>
  <text x="232" y="476" font-size="14" font-weight="700" fill="#334155">MCP + A2A Protocols</text>
  <text x="200" y="498" font-size="11" fill="#475569">MCP: 95 tools, 3 transports</text>
  <text x="200" y="514" font-size="11" fill="#475569">A2A: JSON-RPC 2.0, 6 skills</text>
  <text x="200" y="530" font-size="11" fill="#475569">Agents control OmniRoute itself</text>

  <!-- Card 8: Resilience (bottom-center-right) -->
  <rect x="520" y="450" width="260" height="100" rx="10" fill="#F8FAFC" stroke="#64748B" stroke-width="1.5"/>
  <text x="540" y="476" font-size="22" fill="#64748B">🛡️</text>
  <text x="572" y="476" font-size="14" font-weight="700" fill="#334155">Resilience & Security</text>
  <text x="540" y="498" font-size="11" fill="#475569">Circuit breakers, cooldowns, lockouts</text>
  <text x="540" y="514" font-size="11" fill="#475569">TLS fingerprint stealth, 3-level proxy</text>
  <text x="540" y="530" font-size="11" fill="#475569">Guardrails: PII, injection, vision</text>

  <!-- Connecting lines from hub to cards -->
  <line x1="410" y1="290" x2="300" y2="190" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="550" y1="290" x2="660" y2="190" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="410" y1="320" x2="300" y2="260" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="550" y1="320" x2="660" y2="260" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="410" y1="350" x2="300" y2="380" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="550" y1="350" x2="660" y2="380" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="440" y1="385" x2="310" y2="450" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="520" y1="385" x2="650" y2="450" stroke="#CBD5E1" stroke-width="1.5"/>

  <!-- Footer stats -->
  <rect x="120" y="566" width="720" height="40" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="480" y="582" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">21,000+ tests · 42 locales · MIT licensed · 100% TypeScript · Node.js 22+ · Desktop / Docker / Termux / PWA</text>
  <text x="480" y="598" text-anchor="middle" font-size="10" fill="#64748B">v3.8.45 · github.com/diegosouzapw/OmniRoute</text>
</svg>