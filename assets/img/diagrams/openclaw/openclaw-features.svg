<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="960" height="640" viewBox="0 0 960 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-2196f3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#2196f3"/>
    </marker>
    <marker id="arrow-ff9800" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#ff9800"/>
    </marker>
    <marker id="arrow-9c27b0" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#9c27b0"/>
    </marker>
    <marker id="arrow-e91e63" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#e91e63"/>
    </marker>
    <marker id="arrow-3f51b5" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#3f51b5"/>
    </marker>
    <marker id="arrow-795548" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#795548"/>
    </marker>
    <marker id="arrow-4caf50" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#4caf50"/>
    </marker>
    <marker id="arrow-00bcd4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#00bcd4"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="640" fill="#0d1117"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" font-family="Arial Bold" font-size="16" fill="#e3f2fd">OpenClaw Key Features</text>
  <text x="480" y="56" text-anchor="middle" font-family="Arial" font-size="11" fill="#b0bec5">Eight capabilities that set OpenClaw apart</text>

  <!-- Arrows (drawn first, behind nodes) -->
  <!-- 1. Hub to Local-First Gateway (top) -->
  <line x1="480" y1="350" x2="480" y2="170" stroke="#2196f3" stroke-width="1.5" marker-end="url(#arrow-2196f3)"/>
  <!-- 2. Hub to 20+ Channel Support (top-right) -->
  <line x1="480" y1="350" x2="760" y2="245" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrow-ff9800)"/>
  <!-- 3. Hub to Voice Wake + Talk Mode (right) -->
  <line x1="480" y1="350" x2="710" y2="350" stroke="#9c27b0" stroke-width="1.5" marker-end="url(#arrow-9c27b0)"/>
  <!-- 4. Hub to Live Canvas (bottom-right) -->
  <line x1="480" y1="350" x2="760" y2="455" stroke="#e91e63" stroke-width="1.5" marker-end="url(#arrow-e91e63)"/>
  <!-- 5. Hub to Skills & Plugins (bottom) -->
  <line x1="480" y1="350" x2="480" y2="530" stroke="#3f51b5" stroke-width="1.5" marker-end="url(#arrow-3f51b5)"/>
  <!-- 6. Hub to Security Defaults (bottom-left) -->
  <line x1="480" y1="350" x2="200" y2="455" stroke="#795548" stroke-width="1.5" marker-end="url(#arrow-795548)"/>
  <!-- 7. Hub to Multi-Agent Routing (left) -->
  <line x1="480" y1="350" x2="250" y2="350" stroke="#4caf50" stroke-width="1.5" marker-end="url(#arrow-4caf50)"/>
  <!-- 8. Hub to MCP Support (top-left) -->
  <line x1="480" y1="350" x2="200" y2="245" stroke="#00bcd4" stroke-width="1.5" marker-end="url(#arrow-00bcd4)"/>

  <!-- Central Hub (double-border hexagon) -->
  <polygon points="480,268 552,309 552,391 480,432 408,391 408,309" fill="#2196f3" stroke="black" stroke-width="3"/>
  <polygon points="480,278 544,314 544,386 480,422 416,386 416,314" fill="#2196f3" stroke="#64b5f6" stroke-width="1.5"/>
  <text x="480" y="343" text-anchor="middle" font-family="Arial Bold" font-size="14" fill="white">OpenClaw</text>
  <text x="480" y="362" text-anchor="middle" font-family="Arial Bold" font-size="14" fill="white">Gateway</text>

  <!-- Feature 1: Local-First Gateway (top) -->
  <rect x="390" y="80" width="180" height="80" rx="8" fill="#2196f3" stroke="black"/>
  <text x="480" y="108" text-anchor="middle" font-family="Arial Bold" font-size="12" fill="white">Local-First Gateway</text>
  <text x="480" y="124" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Runs on your hardware</text>
  <text x="480" y="138" text-anchor="middle" font-family="Arial" font-size="10" fill="white">No cloud dependency</text>

  <!-- Feature 2: 20+ Channel Support (top-right) -->
  <rect x="670" y="165" width="180" height="80" rx="8" fill="#ff9800" stroke="black"/>
  <text x="760" y="193" text-anchor="middle" font-family="Arial Bold" font-size="12" fill="white">20+ Channel Support</text>
  <text x="760" y="209" text-anchor="middle" font-family="Arial" font-size="10" fill="white">WhatsApp, Telegram,</text>
  <text x="760" y="223" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Slack, Discord, ...</text>

  <!-- Feature 3: Voice Wake + Talk Mode (right) -->
  <rect x="710" y="310" width="180" height="80" rx="8" fill="#9c27b0" stroke="black"/>
  <text x="800" y="338" text-anchor="middle" font-family="Arial Bold" font-size="12" fill="white">Voice Wake + Talk</text>
  <text x="800" y="354" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Wake words + TTS</text>
  <text x="800" y="368" text-anchor="middle" font-family="Arial" font-size="10" fill="white">macOS, iOS, Android</text>

  <!-- Feature 4: Live Canvas (bottom-right) -->
  <rect x="670" y="455" width="180" height="80" rx="8" fill="#e91e63" stroke="black"/>
  <text x="760" y="483" text-anchor="middle" font-family="Arial Bold" font-size="12" fill="white">Live Canvas</text>
  <text x="760" y="499" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Agent-driven visual</text>
  <text x="760" y="513" text-anchor="middle" font-family="Arial" font-size="10" fill="white">workspace (A2UI)</text>

  <!-- Feature 5: Skills & Plugins (bottom) -->
  <rect x="390" y="530" width="180" height="80" rx="8" fill="#3f51b5" stroke="black"/>
  <text x="480" y="558" text-anchor="middle" font-family="Arial Bold" font-size="12" fill="white">Skills & Plugins</text>
  <text x="480" y="574" text-anchor="middle" font-family="Arial" font-size="10" fill="white">ClawHub marketplace</text>
  <text x="480" y="588" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Custom capabilities</text>

  <!-- Feature 6: Security Defaults (bottom-left) -->
  <rect x="110" y="455" width="180" height="80" rx="8" fill="#795548" stroke="black"/>
  <text x="200" y="483" text-anchor="middle" font-family="Arial Bold" font-size="12" fill="white">Security Defaults</text>
  <text x="200" y="499" text-anchor="middle" font-family="Arial" font-size="10" fill="white">DM pairing, allowlists</text>
  <text x="200" y="513" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Docker sandboxing</text>

  <!-- Feature 7: Multi-Agent Routing (left) -->
  <rect x="70" y="310" width="180" height="80" rx="8" fill="#4caf50" stroke="black"/>
  <text x="160" y="338" text-anchor="middle" font-family="Arial Bold" font-size="12" fill="white">Multi-Agent Routing</text>
  <text x="160" y="354" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Isolated workspaces</text>
  <text x="160" y="368" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Per-channel agents</text>

  <!-- Feature 8: MCP Support (top-left) -->
  <rect x="110" y="165" width="180" height="80" rx="8" fill="#00bcd4" stroke="black"/>
  <text x="200" y="193" text-anchor="middle" font-family="Arial Bold" font-size="12" fill="white">MCP Support</text>
  <text x="200" y="209" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Model Context Protocol</text>
  <text x="200" y="223" text-anchor="middle" font-family="Arial" font-size="10" fill="white">mcporter integration</text>
</svg>