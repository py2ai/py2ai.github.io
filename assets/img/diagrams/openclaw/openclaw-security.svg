      <polygon points="0,0 8,3 0,6" fill="#795548"/>
    </marker>
    <marker id="arrow-4caf50" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#4caf50"/>
