    <marker id="arrow-9c27b0" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#9c27b0"/>
    </marker>
    <marker id="arrow-757575" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#757575"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="600" fill="#0d1117"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-family="Arial Bold" font-size="16" fill="#e3f2fd">OpenClaw Security Model</text>
  <text x="480" y="54" text-anchor="middle" font-family="Arial" font-size="11" fill="#b0bec5">Safe by default — powerful when configured</text>

  <!-- Inbound Messages (left) -->
  <ellipse cx="80" cy="200" rx="56" ry="25" fill="#7c4dff" stroke="black"/>
  <text x="80" y="197" text-anchor="middle" font-family="Arial Bold" font-size="11" fill="white">Inbound</text>
  <text x="80" y="211" text-anchor="middle" font-family="Arial Bold" font-size="11" fill="white">Messages</text>

  <!-- Arrow: Inbound → DM Policy -->
  <line x1="136" y1="200" x2="188" y2="200" stroke="#7c4dff" stroke-width="2" marker-end="url(#arrow-795548)"/>

  <!-- DM Policy System (center-left) -->
  <rect x="196" y="160" width="168" height="80" rx="8" fill="#795548" stroke="black"/>
  <text x="280" y="188" text-anchor="middle" font-family="Arial Bold" font-size="12" fill="white">DM Policy System</text>
  <text x="280" y="204" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Pairing Mode (default)</text>
  <text x="280" y="218" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Open Mode (opt-in)</text>

  <!-- Arrow: DM Policy → Allowlist -->
  <line x1="364" y1="200" x2="416" y2="200" stroke="#795548" stroke-width="1.5" marker-end="url(#arrow-795548)"/>

  <!-- Allowlist Check (diamond decision) -->
  <polygon points="480,160 544,200 480,240 416,200" fill="#4caf50" stroke="black"/>
  <text x="480" y="197" text-anchor="middle" font-family="Arial Bold" font-size="10" fill="white">Allowlist</text>
  <text x="480" y="211" text-anchor="middle" font-family="Arial Bold" font-size="10" fill="white">Check</text>

  <!-- Arrow: Allowlist → Rejected (up) -->
  <line x1="480" y1="160" x2="480" y2="108" stroke="#f44336" stroke-width="1.5" marker-end="url(#arrow-f44336)"/>

  <!-- Rejected label -->
  <rect x="416" y="80" width="128" height="28" rx="6" fill="#f44336" stroke="black"/>
  <text x="480" y="99" text-anchor="middle" font-family="Arial Bold" font-size="11" fill="white">Pairing Required</text>

  <!-- Arrow: Allowlist → Main Session (right, approved) -->
  <line x1="544" y1="200" x2="616" y2="200" stroke="#4caf50" stroke-width="1.5" marker-end="url(#arrow-4caf50)"/>
  <text x="580" y="193" text-anchor="middle" font-family="Arial" font-size="9" fill="#4caf50">approved</text>

  <!-- Arrow: Allowlist → Sandbox (right-down) -->
  <line x1="544" y1="220" x2="616" y2="340" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrow-ff9800)"/>
  <text x="568" y="285" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">non-main</text>

  <!-- Main Session (center-right) -->
  <rect x="624" y="168" width="168" height="64" rx="8" fill="#4caf50" stroke="black"/>
  <text x="708" y="196" text-anchor="middle" font-family="Arial Bold" font-size="12" fill="white">Main Session</text>
  <text x="708" y="212" text-anchor="middle" font-family="Arial" font-size="10" fill="white">(Full Host Access)</text>

  <!-- Arrow: Main Session → LLM Providers -->
  <line x1="708" y1="232" x2="708" y2="440" stroke="#2196f3" stroke-width="1.5" marker-end="url(#arrow-2196f3)"/>

  <!-- Sandboxed Session (center-right, lower) -->
  <rect x="624" y="328" width="168" height="64" rx="8" fill="#ff9800" stroke="black"/>
  <text x="708" y="356" text-anchor="middle" font-family="Arial Bold" font-size="12" fill="white">Sandboxed Session</text>
  <text x="708" y="372" text-anchor="middle" font-family="Arial" font-size="10" fill="white">(Docker Isolated)</text>

  <!-- Arrow: Sandbox → LLM Providers -->
  <line x1="708" y1="392" x2="708" y2="440" stroke="#2196f3" stroke-width="1.5" marker-end="url(#arrow-2196f3)"/>

  <!-- LLM Providers (bottom center) -->
  <rect x="624" y="448" width="168" height="48" rx="8" fill="#009688" stroke="black"/>
  <text x="708" y="477" text-anchor="middle" font-family="Arial Bold" font-size="11" fill="white">LLM Providers</text>

  <!-- Docker Sandbox detail (right side) -->
  <rect x="816" y="328" width="128" height="64" rx="8" fill="#424242" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="5,2"/>
  <text x="880" y="352" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">Safe Tools Only</text>
  <text x="880" y="366" text-anchor="middle" font-family="Arial" font-size="9" fill="#b0bec5">bash, process,</text>
  <text x="880" y="380" text-anchor="middle" font-family="Arial" font-size="9" fill="#b0bec5">read, write, edit</text>

  <!-- Arrow: Sandboxed Session → Safe Tools -->
  <line x1="792" y1="360" x2="808" y2="360" stroke="#ff9800" stroke-width="1.2" stroke-dasharray="5,2" marker-end="url(#arrow-ff9800)"/>

  <!-- Blocked tools label (right side, below safe tools) -->
  <rect x="816" y="408" width="128" height="48" rx="8" fill="#424242" stroke="#f44336" stroke-width="1.5" stroke-dasharray="5,2"/>
  <text x="880" y="428" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">Blocked Tools</text>
  <text x="880" y="442" text-anchor="middle" font-family="Arial" font-size="9" fill="#b0bec5">browser, canvas,</text>
  <text x="880" y="454" text-anchor="middle" font-family="Arial" font-size="9" fill="#b0bec5">nodes, cron, discord</text>

  <!-- openclaw doctor (bottom-left) -->
  <rect x="96" y="448" width="200" height="80" rx="8" fill="#424242" stroke="#ff9800" stroke-width="1.5"/>
  <text x="196" y="472" text-anchor="middle" font-family="Arial Bold" font-size="12" fill="#ff9800">openclaw doctor</text>
  <text x="196" y="490" text-anchor="middle" font-family="Arial" font-size="10" fill="#b0bec5">Security audit + auto-fix</text>
  <text x="196" y="504" text-anchor="middle" font-family="Arial" font-size="10" fill="#b0bec5">Config validation</text>

  <!-- Arrow: doctor → DM Policy (dashed, audit) -->
  <line x1="196" y1="448" x2="240" y2="240" stroke="#ff9800" stroke-width="1.2" stroke-dasharray="5,2" marker-end="url(#arrow-ff9800)"/>
  <text x="206" y="352" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">audits</text>

  <!-- Arrow: doctor → Allowlist (dashed, audit) -->
  <line x1="296" y1="448" x2="440" y2="248" stroke="#ff9800" stroke-width="1.2" stroke-dasharray="5,2" marker-end="url(#arrow-ff9800)"/>

  <!-- Arrow: doctor → Sandbox (dashed, audit) -->
  <line x1="296" y1="488" x2="616" y2="372" stroke="#ff9800" stroke-width="1.2" stroke-dasharray="5,2" marker-end="url(#arrow-ff9800)"/>

  <!-- Legend -->
  <rect x="32" y="552" width="896" height="36" rx="4" fill="#161b22" stroke="#30363d"/>
  <line x1="56" y1="570" x2="88" y2="570" stroke="#795548" stroke-width="2"/>
  <text x="96" y="574" font-family="Arial" font-size="10" fill="#b0bec5">Policy Flow</text>
  <line x1="176" y1="570" x2="208" y2="570" stroke="#4caf50" stroke-width="2"/>
  <text x="216" y="574" font-family="Arial" font-size="10" fill="#b0bec5">Approved</text>
  <line x1="288" y1="570" x2="320" y2="570" stroke="#f44336" stroke-width="2"/>
  <text x="328" y="574" font-family="Arial" font-size="10" fill="#b0bec5">Rejected</text>
  <line x1="400" y1="570" x2="432" y2="570" stroke="#ff9800" stroke-width="2"/>
  <text x="440" y="574" font-family="Arial" font-size="10" fill="#b0bec5">Sandbox</text>
  <line x1="520" y1="570" x2="552" y2="570" stroke="#2196f3" stroke-width="2"/>
  <text x="560" y="574" font-family="Arial" font-size="10" fill="#b0bec5">Data Flow</text>
  <line x1="640" y1="570" x2="672" y2="570" stroke="#ff9800" stroke-width="1.2" stroke-dasharray="5,2"/>
  <text x="680" y="574" font-family="Arial" font-size="10" fill="#b0bec5">Audit</text>
  <rect x="736" y="564" width="12" height="12" rx="2" fill="#4caf50" stroke="black"/>
  <text x="756" y="574" font-family="Arial" font-size="10" fill="#b0bec5">Allow</text>
  <rect x="800" y="564" width="12" height="12" rx="2" fill="#f44336" stroke="black"/>
  <text x="820" y="574" font-family="Arial" font-size="10" fill="#b0bec5">Deny</text>
</svg>