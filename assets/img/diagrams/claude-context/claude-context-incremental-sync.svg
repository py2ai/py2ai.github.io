<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Incremental Indexing with Merkle Tree Sync</text>

  <!-- Initial Index -->
  <rect x="250" y="60" width="400" height="50" rx="8" fill="#f0f4ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="450" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4338ca">Initial Full Index</text>
  <text x="450" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Full scan → Build Merkle tree → Store snapshot</text>

  <!-- Arrow -->
  <line x1="450" y1="110" x2="450" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Change Detection -->
  <rect x="200" y="145" width="500" height="50" rx="8" fill="#fefce8" stroke="#fde68a" stroke-width="1.5"/>
  <text x="450" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#a16207">Change Detection (on re-index)</text>
  <text x="450" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Compare file hashes against Merkle tree snapshot</text>

  <!-- Three branches -->
  <line x1="250" y1="195" x2="150" y2="230" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="195" x2="450" y2="230" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="650" y1="195" x2="750" y2="230" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Added Files -->
  <rect x="30" y="235" width="240" height="80" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="150" y="257" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#15803d">Added Files</text>
  <text x="150" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#166534">• Chunk code</text>
  <text x="150" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#166534">• Generate embeddings</text>
  <text x="150" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#166534">• Insert to vector DB</text>

  <!-- Modified Files -->
  <rect x="330" y="235" width="240" height="80" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="450" y="257" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#c2410c">Modified Files</text>
  <text x="450" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9a3412">• Delete old chunks</text>
  <text x="450" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9a3412">• Re-chunk & re-embed</text>
  <text x="450" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9a3412">• Insert new vectors</text>

  <!-- Removed Files -->
  <rect x="630" y="235" width="240" height="80" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="750" y="257" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#dc2626">Removed Files</text>
  <text x="750" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#991b1b">• Query chunks by</text>
  <text x="750" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#991b1b">  relative path</text>
  <text x="750" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#991b1b">• Delete from vector DB</text>

  <!-- Arrows to Update -->
  <line x1="150" y1="315" x2="300" y2="370" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="315" x2="450" y2="370" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="750" y1="315" x2="600" y2="370" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Update Snapshot -->
  <rect x="250" y="375" width="400" height="50" rx="8" fill="#f0f4ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="450" y="397" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4338ca">Update Snapshot</text>
  <text x="450" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">New Merkle tree hash → Save state → Ready for next sync</text>

  <!-- Benefit callout -->
  <rect x="150" y="450" width="600" height="45" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="450" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#166534">⚡ Benefit: Only processes changed files — dramatically faster than full re-index</text>
  <text x="450" y="487" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#166534">~40% token reduction vs. loading entire directories into context</text>
</svg>