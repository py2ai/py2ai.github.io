<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#555"/>
    </marker>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Code Indexing Workflow</text>

  <!-- Step 1: Codebase -->
  <rect x="50" y="65" width="800" height="70" rx="8" fill="#f0f4ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="70" y="87" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4338ca">Step 1: Scan Codebase</text>
  <text x="450" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1e293b">Traverse directory tree</text>
  <text x="450" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Filter by supported extensions (.ts, .py, .js, .go, .rs, .java, etc.) | Apply ignore patterns (.gitignore, .contextignore)</text>

  <!-- Arrow -->
  <line x1="450" y1="135" x2="450" y2="160" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Read Files -->
  <rect x="50" y="165" width="800" height="60" rx="8" fill="#fefce8" stroke="#fde68a" stroke-width="1.5"/>
  <text x="70" y="187" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#a16207">Step 2: Read File Content</text>
  <text x="450" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1e293b">Read each supported file as UTF-8 text</text>

  <!-- Arrow -->
  <line x1="450" y1="225" x2="450" y2="250" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: AST Chunking -->
  <rect x="50" y="255" width="800" height="80" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="70" y="277" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#15803d">Step 3: AST-Based Code Chunking</text>
  <text x="450" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1e293b">Parse code into Abstract Syntax Tree (tree-sitter)</text>
  <text x="450" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Split by functions, classes, and logical blocks | Automatic fallback to LangChain character-based splitter</text>

  <!-- Arrow -->
  <line x1="450" y1="335" x2="450" y2="360" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Generate Embeddings -->
  <rect x="50" y="365" width="800" height="60" rx="8" fill="#f0f4ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="70" y="387" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4338ca">Step 4: Generate Embeddings</text>
  <text x="450" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1e293b">Batch process chunks through embedding model (OpenAI text-embedding-3-small, VoyageAI, etc.)</text>

  <!-- Arrow -->
  <line x1="450" y1="425" x2="450" y2="450" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5: Hybrid Indexing -->
  <rect x="50" y="455" width="800" height="60" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="70" y="477" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#c2410c">Step 5: Hybrid Indexing</text>
  <text x="450" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1e293b">Store dense vectors + BM25 sparse index in Milvus/Zilliz Cloud</text>

  <!-- Arrow -->
  <line x1="450" y1="515" x2="450" y2="540" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 6: Complete -->
  <rect x="50" y="545" width="800" height="45" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="450" y="573" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#166534">✓ Indexing Complete — Snapshot saved with Merkle tree hash</text>
</svg>