<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Semantic Code Search Flow</text>

  <!-- Step 1: User Query -->
  <rect x="50" y="65" width="800" height="70" rx="8" fill="#f0f4ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="70" y="87" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4338ca">Step 1: User Query</text>
  <text x="450" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1e293b">"Find functions that handle user authentication"</text>

  <!-- Arrow -->
  <line x1="450" y1="135" x2="450" y2="160" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Embed Query -->
  <rect x="50" y="165" width="800" height="60" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="70" y="187" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#15803d">Step 2: Embed Query</text>
  <text x="450" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1e293b">Generate dense vector embedding + prepare BM25 text query</text>

  <!-- Arrow -->
  <line x1="450" y1="225" x2="450" y2="250" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Hybrid Search -->
  <rect x="50" y="255" width="800" height="80" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="70" y="277" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#c2410c">Step 3: Hybrid Search</text>

  <!-- Dense search box -->
  <rect x="80" y="288" width="350" height="35" rx="4" fill="#ffedd5" stroke="#fdba74" stroke-width="1"/>
  <text x="255" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#9a3412">Dense Vector Search (semantic similarity)</text>

  <!-- Sparse search box -->
  <rect x="470" y="288" width="350" height="35" rx="4" fill="#ffedd5" stroke="#fdba74" stroke-width="1"/>
  <text x="645" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#9a3412">BM25 Sparse Search (keyword matching)</text>

  <!-- RRF label -->
  <text x="450" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#c2410c" font-style="italic">↓ RRF (Reciprocal Rank Fusion) Reranking ↓</text>

  <!-- Arrow -->
  <line x1="450" y1="335" x2="450" y2="360" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Results -->
  <rect x="50" y="365" width="800" height="60" rx="8" fill="#f0f4ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="70" y="387" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4338ca">Step 4: Ranked Results</text>
  <text x="450" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1e293b">Top-K results with relevance scores, code snippets, file locations, and line numbers</text>

  <!-- Arrow -->
  <line x1="450" y1="425" x2="450" y2="450" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5: AI Agent -->
  <rect x="50" y="455" width="800" height="40" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="450" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#166534">✓ AI Agent receives context — understands code, makes changes, answers questions</text>
</svg>