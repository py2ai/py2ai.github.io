<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 750" width="900" height="750">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#555"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#888"/>
    </marker>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Claude Context Architecture</text>

  <!-- Layer 1: MCP Clients -->
  <rect x="50" y="60" width="800" height="100" rx="8" fill="#f0f4ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="70" y="82" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4338ca">MCP Clients</text>

  <rect x="70" y="92" width="130" height="50" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="135" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e40af">Claude Code</text>

  <rect x="220" y="92" width="130" height="50" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="285" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e40af">Codex CLI</text>

  <rect x="370" y="92" width="130" height="50" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="435" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e40af">Cursor</text>

  <rect x="520" y="92" width="130" height="50" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="585" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e40af">VS Code</text>

  <rect x="670" y="92" width="150" height="50" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="745" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e40af">Other MCP Clients</text>

  <!-- Dashed arrows from clients to MCP Server -->
  <line x1="135" y1="142" x2="135" y2="175" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-dashed)"/>
  <line x1="285" y1="142" x2="285" y2="175" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-dashed)"/>
  <line x1="435" y1="142" x2="435" y2="175" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-dashed)"/>
  <line x1="585" y1="142" x2="585" y2="175" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-dashed)"/>
  <line x1="745" y1="142" x2="745" y2="175" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-dashed)"/>

  <!-- MCP Protocol label -->
  <text x="450" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888" font-style="italic">MCP Protocol (stdio)</text>

  <!-- Layer 2: MCP Server -->
  <rect x="50" y="180" width="800" height="110" rx="8" fill="#fefce8" stroke="#fde68a" stroke-width="1.5"/>
  <text x="70" y="202" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#a16207">@zilliz/claude-context-mcp</text>

  <rect x="70" y="212" width="760" height="65" rx="6" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="450" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#92400e">MCP Server (Stdio Transport)</text>
  <text x="450" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#92400e">Tools: index_codebase | search_code | clear_index | get_indexing_status</text>
  <text x="450" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a16207" font-style="italic">Background indexing | Snapshot management | Cloud sync</text>

  <!-- Arrow from MCP Server to Core -->
  <line x1="450" y1="290" x2="450" y2="315" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="460" y="307" font-family="Arial, sans-serif" font-size="10" fill="#555" font-style="italic">orchestrates</text>

  <!-- Layer 3: Core Engine -->
  <rect x="50" y="320" width="800" height="200" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="70" y="342" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#15803d">@zilliz/claude-context-core</text>

  <!-- Context Engine -->
  <rect x="70" y="355" width="180" height="70" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="160" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#166534">Context Engine</text>
  <text x="160" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#166534">(Orchestrator)</text>
  <text x="160" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#166534">indexCodebase()</text>

  <!-- Code Splitter -->
  <rect x="280" y="355" width="180" height="70" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="370" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#166534">Code Splitter</text>
  <text x="370" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#166534">AST Splitter (tree-sitter)</text>
  <text x="370" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#166534">LangChain Fallback</text>

  <!-- Embedding Provider -->
  <rect x="490" y="355" width="170" height="70" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="575" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#166534">Embedding Provider</text>
  <text x="575" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#166534">OpenAI | VoyageAI</text>
  <text x="575" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#166534">Ollama | Gemini</text>

  <!-- File Synchronizer -->
  <rect x="690" y="355" width="140" height="70" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="760" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#166534">File Sync</text>
  <text x="760" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#166534">Merkle Tree</text>
  <text x="760" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#166534">Incremental</text>

  <!-- Core internal arrows -->
  <line x1="250" y1="390" x2="278" y2="390" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="460" y1="390" x2="488" y2="390" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="660" y1="390" x2="688" y2="390" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Labels on internal arrows -->
  <text x="264" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">chunks</text>
  <text x="474" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">embeds</text>
  <text x="674" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">tracks</text>

  <!-- Arrow from Core to Vector DB -->
  <line x1="450" y1="520" x2="450" y2="545" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="460" y="537" font-family="Arial, sans-serif" font-size="10" fill="#555" font-style="italic">stores / retrieves vectors</text>

  <!-- Layer 4: Vector Database -->
  <rect x="50" y="550" width="800" height="100" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="70" y="572" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#c2410c">Vector Database</text>

  <rect x="150" y="582" width="250" height="50" rx="6" fill="#ffedd5" stroke="#fdba74" stroke-width="1.5"/>
  <text x="275" y="608" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#9a3412">Milvus (Open Source)</text>
  <text x="275" y="624" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9a3412">Self-hosted vector database</text>

  <rect x="500" y="582" width="250" height="50" rx="6" fill="#ffedd5" stroke="#fdba74" stroke-width="1.5"/>
  <text x="625" y="608" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#9a3412">Zilliz Cloud (Fully Managed)</text>
  <text x="625" y="624" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9a3412">Serverless vector DB service</text>

  <!-- VS Code Extension -->
  <rect x="50" y="670" width="800" height="55" rx="8" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="70" y="692" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#6d28d9">VS Code Extension</text>
  <rect x="70" y="700" width="760" height="18" rx="4" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="450" y="713" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6d28d9">Semantic Code Search extension for Visual Studio Code — search your codebase directly from the IDE</text>
</svg>