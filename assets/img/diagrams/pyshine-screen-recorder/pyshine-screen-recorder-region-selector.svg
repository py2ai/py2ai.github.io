<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow-orange" viewBox="0 0 8 6" refX="8" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ea580c"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 8 6" refX="8" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L8,3 L0,6 Z" fill="#059669"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 8 6" refX="8" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f44336"/>
    </marker>
  </defs>
  <rect width="960" height="600" fill="#ffffff"/>
  <text x="480" y="24" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#1e293b">Region Selector State Machine</text>
  <g filter="url(#shadow)">
    <rect x="352" y="56" width="256" height="64" rx="12" fill="#4caf50"/>
    <text x="480" y="84" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">IDLE</text>
    <text x="480" y="104" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#ffffff">Waiting for selection</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="352" y="200" width="256" height="64" rx="12" fill="#2196f3"/>
    <text x="480" y="228" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">DRAWING</text>
    <text x="480" y="248" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#ffffff">Drag to define region</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="336" y="344" width="288" height="96" rx="12" fill="#ff9800"/>
    <text x="480" y="376" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">ADJUSTING</text>
    <text x="480" y="396" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#ffffff">8 resize handles, drag-to-move</text>
    <text x="480" y="416" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#ffffff">live preview</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="352" y="520" width="256" height="64" rx="12" fill="#f44336"/>
    <text x="480" y="548" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">CONFIRMED</text>
    <text x="480" y="568" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#ffffff">Region locked, ready to record</text>
  </g>
  <line x1="480" y1="120" x2="480" y2="200" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="496" y="164" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10" fill="#ea580c">user draws</text>
  <line x1="480" y1="264" x2="480" y2="344" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="496" y="308" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10" fill="#ea580c">release</text>
  <line x1="480" y1="440" x2="480" y2="520" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="496" y="484" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10" fill="#059669">confirm / Enter</text>
  <polyline points="624,392 760,392 760,88 608,88" fill="none" stroke="#f44336" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="776" y="244" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10" fill="#f44336">cancel / Esc</text>
  <g filter="url(#shadow)">
    <rect x="32" y="496" width="208" height="88" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="136" y="516" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1e293b">Arrow Legend</text>
    <line x1="48" y1="536" x2="88" y2="536" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
    <text x="96" y="540" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">User action (trigger)</text>
    <line x1="48" y1="556" x2="88" y2="556" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
    <text x="96" y="560" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">Confirm path (success)</text>
    <line x1="48" y1="576" x2="88" y2="576" stroke="#f44336" stroke-width="2" marker-end="url(#arrow-red)"/>
    <text x="96" y="580" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">Cancel path (abort)</text>
  </g>
</svg>