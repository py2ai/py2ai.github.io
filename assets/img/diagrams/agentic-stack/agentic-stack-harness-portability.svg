<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
<defs>
  <style>
    text { font-family: Inter, Segoe UI, Arial, sans-serif; }
  </style>
</defs>
<rect width="900" height="500" fill="white"/>

<!-- Title -->
<text x="450.0" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#202124">Harness Portability: Swap Anytime, Lose Nothing</text>

<!-- Central brain -->
<rect x="325" y="55" width="250" height="120" rx="16" ry="16" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2.5"/>
<text x="450" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a73e8">.agent/</text>
<text x="450" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a73e8">Portable Brain</text>
<text x="450" y="135" text-anchor="middle" font-size="10" fill="#202124">Memory + Skills + Protocols</text>
<text x="450" y="155" text-anchor="middle" font-size="10" fill="#202124">Same across all harnesses</text>

<!-- Harness boxes - row 1 -->
<rect x="30" y="230" width="190" height="55" rx="8" ry="8" fill="#e0f7fa" stroke="#00bcd4" stroke-width="1.5"/>
<text x="125.0" y="243.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" fill="#202124">Claude Code</text>
<text x="125.0" y="257.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" fill="#202124">CLAUDE.md + settings.json</text>
<text x="125.0" y="271.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" fill="#202124">+ hooks (PostToolUse, Stop)</text>
<rect x="240" y="230" width="190" height="55" rx="8" ry="8" fill="#e0f7fa" stroke="#00bcd4" stroke-width="1.5"/>
<text x="335.0" y="243.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" fill="#202124">Cursor</text>
<text x="335.0" y="257.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" fill="#202124">.cursor/rules/*.mdc</text>
<text x="335.0" y="271.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" fill="#202124">Manual reflect calls</text>
<rect x="450" y="230" width="190" height="55" rx="8" ry="8" fill="#e0f7fa" stroke="#00bcd4" stroke-width="1.5"/>
<text x="545.0" y="243.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" fill="#202124">Windsurf</text>
<text x="545.0" y="257.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" fill="#202124">.windsurfrules</text>
<text x="545.0" y="271.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" fill="#202124">Manual reflect calls</text>
<rect x="660" y="230" width="210" height="55" rx="8" ry="8" fill="#e0f7fa" stroke="#00bcd4" stroke-width="1.5"/>
<text x="765.0" y="243.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" fill="#202124">OpenCode</text>
<text x="765.0" y="257.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" fill="#202124">AGENTS.md + opencode.json</text>
<text x="765.0" y="271.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" fill="#202124">Partial permission rules</text>

<!-- Harness boxes - row 2 -->
<rect x="30" y="310" width="190" height="55" rx="8" ry="8" fill="#e0f7fa" stroke="#00bcd4" stroke-width="1.5"/>
<text x="125.0" y="323.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" fill="#202124">OpenClaw</text>
<text x="125.0" y="337.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" fill="#202124">System prompt include</text>
<text x="125.0" y="351.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" fill="#202124">Varies by fork</text>
<rect x="240" y="310" width="190" height="55" rx="8" ry="8" fill="#e0f7fa" stroke="#00bcd4" stroke-width="1.5"/>
<text x="335.0" y="323.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" fill="#202124">Hermes</text>
<text x="335.0" y="337.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" fill="#202124">AGENTS.md</text>
<text x="335.0" y="351.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" fill="#202124">(agentskills.io compatible)</text>
<rect x="450" y="310" width="190" height="55" rx="8" ry="8" fill="#e0f7fa" stroke="#00bcd4" stroke-width="1.5"/>
<text x="545.0" y="323.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" fill="#202124">Pi Coding Agent</text>
<text x="545.0" y="337.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" fill="#202124">AGENTS.md + .pi/skills/</text>
<text x="545.0" y="351.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" fill="#202124">Extension system</text>
<rect x="660" y="310" width="210" height="55" rx="8" ry="8" fill="#e0f7fa" stroke="#00bcd4" stroke-width="1.5"/>
<text x="765.0" y="323.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" fill="#202124">Standalone Python</text>
<text x="765.0" y="337.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" fill="#202124">run.py (any LLM)</text>
<text x="765.0" y="351.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" fill="#202124">Full hook control</text>

<!-- Arrows from brain to harnesses -->
<line x1="380" y1="175" x2="125" y2="230" stroke="#00bcd4" stroke-width="1.5" stroke-dasharray="4,3"/>
<polygon points="125,230 119,226 119,234" fill="#00bcd4"/>
<text x="257.5" y="199.5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" fill="#00bcd4">adapter</text>
<line x1="410" y1="175" x2="335" y2="230" stroke="#00bcd4" stroke-width="1.5" stroke-dasharray="4,3"/>
<polygon points="335,230 329,226 329,234" fill="#00bcd4"/>
<line x1="450" y1="175" x2="545" y2="230" stroke="#00bcd4" stroke-width="1.5" stroke-dasharray="4,3"/>
<polygon points="545,230 539,226 539,234" fill="#00bcd4"/>
<line x1="490" y1="175" x2="765" y2="230" stroke="#00bcd4" stroke-width="1.5" stroke-dasharray="4,3"/>
<polygon points="765,230 759,226 759,234" fill="#00bcd4"/>
<line x1="380" y1="175" x2="125" y2="310" stroke="#00bcd4" stroke-width="1.5" stroke-dasharray="4,3"/>
<polygon points="125,310 119,306 119,314" fill="#00bcd4"/>
<line x1="410" y1="175" x2="335" y2="310" stroke="#00bcd4" stroke-width="1.5" stroke-dasharray="4,3"/>
<polygon points="335,310 329,306 329,314" fill="#00bcd4"/>
<line x1="450" y1="175" x2="545" y2="310" stroke="#00bcd4" stroke-width="1.5" stroke-dasharray="4,3"/>
<polygon points="545,310 539,306 539,314" fill="#00bcd4"/>
<line x1="490" y1="175" x2="765" y2="310" stroke="#00bcd4" stroke-width="1.5" stroke-dasharray="4,3"/>
<polygon points="765,310 759,306 759,314" fill="#00bcd4"/>

<!-- Key insight -->
<rect x="150" y="400" width="600" height="50" rx="10" ry="10" fill="#fef7e0" stroke="#fbbc04" stroke-width="1.5"/>
<text x="450" y="420" text-anchor="middle" font-size="12" font-weight="bold" fill="#202124">Key: The brain stays the same. Only the adapter (glue) changes.</text>
<text x="450" y="438" text-anchor="middle" font-size="10" fill="#5f6368">Switch harnesses anytime without losing memory, skills, or protocols.</text>

<!-- Install command -->
<rect x="200" y="460" width="500" height="30" rx="6" ry="6" fill="#f1f3f4" stroke="#dadce0" stroke-width="1"/>
<text x="450" y="480" text-anchor="middle" font-size="10" fill="#202124" font-family="monospace">agentic-stack claude-code  # or: cursor | windsurf | opencode | openclaw | hermes | pi</text>

</svg>