<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700">
<defs>
  <style>
    text { font-family: Inter, Segoe UI, Arial, sans-serif; }
  </style>
</defs>
<rect width="900" height="700" fill="white"/>

<!-- Title -->
<text x="450.0" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#202124">Memory Lifecycle & Dream Cycle</text>

<!-- Daytime: Active Session -->
<rect x="30" y="50" width="840" height="150" rx="12" ry="12" fill="#e8f0fe" fill-opacity="0.3" stroke="#1a73e8" stroke-width="1.5"/>
<text x="450" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a73e8">Daytime: Active Session</text>

<rect x="60" y="85" width="170" height="45" rx="8" ry="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
<text x="145.0" y="107.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" fill="#202124">AI Session Starts</text>
<rect x="270" y="85" width="170" height="45" rx="8" ry="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
<text x="355.0" y="100.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#202124">Read PREFERENCES.md</text>
<text x="355.0" y="114.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#202124">+ relevant lessons</text>
<rect x="480" y="85" width="170" height="45" rx="8" ry="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
<text x="565.0" y="100.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#202124">Execute tasks</text>
<text x="565.0" y="114.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#202124">using skills</text>
<rect x="690" y="85" width="170" height="45" rx="8" ry="8" fill="#e6f4ea" stroke="#34a853" stroke-width="1.5"/>
<text x="775.0" y="100.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#202124">Log to episodic/</text>
<text x="775.0" y="114.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#202124">(action + result)</text>

<line x1="230" y1="107" x2="270" y2="107" stroke="#1a73e8" stroke-width="1.5"/>
<polygon points="270,107 264,103 264,111" fill="#1a73e8"/>
<line x1="440" y1="107" x2="480" y2="107" stroke="#1a73e8" stroke-width="1.5"/>
<polygon points="480,107 474,103 474,111" fill="#1a73e8"/>
<line x1="650" y1="107" x2="690" y2="107" stroke="#34a853" stroke-width="1.5"/>
<polygon points="690,107 684,103 684,111" fill="#34a853"/>

<!-- Nighttime: Dream Cycle -->
<rect x="30" y="220" width="840" height="200" rx="12" ry="12" fill="#fef7e0" fill-opacity="0.3" stroke="#fbbc04" stroke-width="1.5"/>
<text x="450" y="242" text-anchor="middle" font-size="13" font-weight="bold" fill="#fbbc04">Nighttime: auto_dream.py (Unattended)</text>

<rect x="60" y="260" width="170" height="45" rx="8" ry="8" fill="#fef7e0" stroke="#fbbc04" stroke-width="1.5"/>
<text x="145.0" y="275.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#202124">auto_dream.py</text>
<text x="145.0" y="289.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#202124">runs at 3 AM</text>
<rect x="270" y="260" width="170" height="45" rx="8" ry="8" fill="#fef7e0" stroke="#fbbc04" stroke-width="1.5"/>
<text x="355.0" y="275.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#202124">cluster.py</text>
<text x="355.0" y="289.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#202124">Jaccard clustering</text>
<rect x="480" y="260" width="170" height="45" rx="8" ry="8" fill="#fef7e0" stroke="#fbbc04" stroke-width="1.5"/>
<text x="565.0" y="275.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#202124">promote.py</text>
<text x="565.0" y="289.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#202124">Stage candidates</text>
<rect x="690" y="260" width="170" height="45" rx="8" ry="8" fill="#fef7e0" stroke="#fbbc04" stroke-width="1.5"/>
<text x="775.0" y="275.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#202124">validate.py</text>
<text x="775.0" y="289.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#202124">Heuristic prefilter</text>

<rect x="350" y="340" width="200" height="45" rx="8" ry="8" fill="#fff9c4" stroke="#fbbc04" stroke-width="1.5"/>
<text x="450.0" y="355.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#202124">Pending Candidates</text>
<text x="450.0" y="369.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#202124">(staged, not accepted)</text>

<line x1="230" y1="282" x2="270" y2="282" stroke="#fbbc04" stroke-width="1.5"/>
<polygon points="270,282 264,278 264,286" fill="#fbbc04"/>
<line x1="440" y1="282" x2="480" y2="282" stroke="#fbbc04" stroke-width="1.5"/>
<polygon points="480,282 474,278 474,286" fill="#fbbc04"/>
<line x1="650" y1="282" x2="690" y2="282" stroke="#fbbc04" stroke-width="1.5"/>
<polygon points="690,282 684,278 684,286" fill="#fbbc04"/>
<line x1="775" y1="305" x2="550" y2="340" stroke="#fbbc04" stroke-width="1.5" stroke-dasharray="4,3"/>
<polygon points="550,340 544,336 544,344" fill="#fbbc04"/>

<!-- Arrow from episodic to dream -->
<line x1="775" y1="130" x2="145" y2="260" stroke="#5f6368" stroke-width="1.5" stroke-dasharray="4,3"/>
<polygon points="145,260 139,256 139,264" fill="#5f6368"/>
<text x="465.0" y="192.0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" fill="#5f6368">nightly</text>

<!-- Host Agent Review -->
<rect x="30" y="440" width="840" height="150" rx="12" ry="12" fill="#e6f4ea" fill-opacity="0.3" stroke="#34a853" stroke-width="1.5"/>
<text x="450" y="462" text-anchor="middle" font-size="13" font-weight="bold" fill="#34a853">Host Agent Review (In-Session)</text>

<rect x="60" y="480" width="200" height="45" rx="8" ry="8" fill="#e6f4ea" stroke="#34a853" stroke-width="1.5"/>
<text x="160.0" y="495.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#202124">list_candidates.py</text>
<text x="160.0" y="509.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#202124">Show pending by priority</text>
<rect x="300" y="480" width="170" height="45" rx="8" ry="8" fill="#e6f4ea" stroke="#34a853" stroke-width="1.5"/>
<text x="385.0" y="495.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#202124">graduate.py</text>
<text x="385.0" y="509.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#202124">Accept + rationale</text>
<rect x="510" y="480" width="170" height="45" rx="8" ry="8" fill="#fce8e6" stroke="#ea4335" stroke-width="1.5"/>
<text x="595.0" y="495.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#202124">reject.py</text>
<text x="595.0" y="509.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#202124">Reject + reason</text>
<rect x="720" y="480" width="170" height="45" rx="8" ry="8" fill="#e6f4ea" stroke="#34a853" stroke-width="1.5"/>
<text x="805.0" y="495.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#202124">reopen.py</text>
<text x="805.0" y="509.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#202124">Requeue candidate</text>

<line x1="260" y1="502" x2="300" y2="502" stroke="#34a853" stroke-width="1.5"/>
<polygon points="300,502 294,498 294,506" fill="#34a853"/>
<text x="285.0" y="499.0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" fill="#34a853">accept</text>
<line x1="260" y1="502" x2="510" y2="502" stroke="#ea4335" stroke-width="1.5"/>
<polygon points="510,502 504,498 504,506" fill="#ea4335"/>
<text x="390.0" y="499.0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" fill="#ea4335">reject</text>
<line x1="680" y1="502" x2="720" y2="502" stroke="#5f6368" stroke-width="1.5" stroke-dasharray="4,3"/>
<polygon points="720,502 714,498 714,506" fill="#5f6368"/>
<text x="705.0" y="499.0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" fill="#5f6368">requeue</text>

<!-- Arrow from candidates to review -->
<line x1="450" y1="385" x2="160" y2="480" stroke="#5f6368" stroke-width="1.5" stroke-dasharray="4,3"/>
<polygon points="160,480 154,476 154,484" fill="#5f6368"/>
<text x="310.0" y="429.5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" fill="#5f6368">review</text>

<!-- Result -->
<rect x="300" y="560" width="300" height="50" rx="8" ry="8" fill="#e6f4ea" stroke="#34a853" stroke-width="1.5"/>
<text x="450.0" y="578.0" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" fill="#202124">lessons.jsonl -> LESSONS.md</text>
<text x="450.0" y="592.0" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" fill="#202124">(Source of truth, auto-rendered)</text>

<!-- Arrow from graduate to result -->
<line x1="385" y1="525" x2="400" y2="560" stroke="#34a853" stroke-width="1.5"/>
<polygon points="400,560 394,556 394,564" fill="#34a853"/>

<!-- Arrow from result back to session -->
<line x1="300" y1="585" x2="145" y2="130" stroke="#34a853" stroke-width="1.5" stroke-dasharray="4,3"/>
<polygon points="145,130 139,126 139,134" fill="#34a853"/>
<text x="227.5" y="354.5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" fill="#34a853">next session loads lessons</text>

