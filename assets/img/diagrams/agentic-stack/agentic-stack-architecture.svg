<!-- Memory Module -->
<rect x="30" y="120" width="260" height="200" rx="12" ry="12" fill="none" stroke="#4285f4" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="160" y="140" text-anchor="middle" font-size="12" font-weight="bold" fill="#4285f4">Memory Module</text>

<rect x="50" y="155" width="220" height="35" rx="8" ry="8" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.5"/>
<text x="160.0" y="172.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#202124">working/ - Live task state</text>
<rect x="50" y="200" width="220" height="35" rx="8" ry="8" fill="#e6f4ea" stroke="#34a853" stroke-width="1.5"/>
