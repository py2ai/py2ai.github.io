<text x="160.0" y="262.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#202124">semantic/ - Distilled patterns</text>
<rect x="50" y="290" width="220" height="35" rx="8" ry="8" fill="#fce8e6" stroke="#ea4335" stroke-width="1.5"/>
<text x="160.0" y="307.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#202124">personal/ - User preferences</text>

