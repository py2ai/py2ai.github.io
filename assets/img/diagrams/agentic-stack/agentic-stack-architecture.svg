</defs>
<rect width="900" height="750" fill="white"/>

<!-- Title -->
<text x="450.0" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#202124">Agentic Stack Architecture</text>
<text x="450.0" y="48" text-anchor="middle" font-size="11" fill="#5f6368">One brain, many harnesses - portable .agent/ folder</text>

<!-- .agent/ folder -->
