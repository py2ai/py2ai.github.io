<rect x="340" y="245" width="220" height="35" rx="8" ry="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
<text x="450.0" y="262.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#202124">memory-manager - Reflection cycles</text>
<rect x="340" y="290" width="220" height="35" rx="8" ry="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
<text x="450.0" y="307.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#202124">git-proxy / debug / deploy</text>

