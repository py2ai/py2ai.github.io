<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" width="860" height="430" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="430" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">Consumer Groups, Rebalance, Delivery Semantics</text>
<rect x="330" y="70" width="200" height="46" rx="8" fill="#1e40af"/>
<text x="430" y="100" text-anchor="middle" class="node-title-w">Consumer Group A</text>
<line x1="430" y1="116" x2="150" y2="140" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="430" y1="116" x2="430" y2="140" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="60" y="142" width="180" height="40" rx="8" fill="#2563eb"/>
<text x="150" y="168" text-anchor="middle" class="node-title-w">C1 -&gt; P0,P1</text>
<rect x="340" y="142" width="180" height="40" rx="8" fill="#2563eb"/>
<text x="430" y="168" text-anchor="middle" class="node-title-w">C2 -&gt; P2</text>
<rect x="330" y="210" width="200" height="46" rx="8" fill="#1e40af"/>
<text x="430" y="240" text-anchor="middle" class="node-title-w">Consumer Group B</text>
<rect x="60" y="252" width="180" height="40" rx="8" fill="#2563eb"/>
<text x="150" y="278" text-anchor="middle" class="node-title-w">C3 -&gt; P0,P1,P2</text>
<line x1="430" y1="256" x2="150" y2="252" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="40" y="320" width="780" height="70" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="346" text-anchor="middle" class="band-label">Delivery semantics</text>
<rect x="60" y="356" width="230" height="28" rx="8" fill="#2563eb"/>
<text x="175" y="374" text-anchor="middle" class="node-title-w">at-most-once: commit before processing</text>
<rect x="310" y="356" width="230" height="28" rx="8" fill="#1e40af"/>
<text x="425" y="374" text-anchor="middle" class="node-title-w">at-least-once: commit after (default)</text>
<rect x="560" y="356" width="230" height="28" rx="8" fill="#2563eb"/>
<text x="675" y="374" text-anchor="middle" class="node-title-w">exactly-once: transactions + idempotent prod</text>
</svg>
