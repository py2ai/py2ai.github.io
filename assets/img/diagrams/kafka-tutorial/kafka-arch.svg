<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" width="860" height="430" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="430" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">Kafka Architecture: Brokers, Partitions, Replication</text>
<rect x="330" y="70" width="200" height="46" rx="8" fill="#1e40af"/>
<text x="430" y="100" text-anchor="middle" class="node-title-w">Kafka Cluster</text>
<rect x="60" y="130" width="220" height="120" rx="8" fill="#2563eb"/>
<text x="170" y="156" text-anchor="middle" class="node-title-w">Broker 1</text>
<rect x="80" y="170" width="180" height="30" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="170" y="190" text-anchor="middle" class="item">Topic: orders, P0</text>
<rect x="80" y="206" width="180" height="30" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="170" y="226" text-anchor="middle" class="item-sub">replica of P1</text>
<rect x="300" y="130" width="220" height="120" rx="8" fill="#1e40af"/>
<text x="410" y="156" text-anchor="middle" class="node-title-w">Broker 2</text>
<rect x="320" y="170" width="180" height="30" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="410" y="190" text-anchor="middle" class="item">Topic: orders, P1</text>
<rect x="320" y="206" width="180" height="30" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="410" y="226" text-anchor="middle" class="item-sub">replica of P1</text>
<rect x="540" y="130" width="220" height="120" rx="8" fill="#2563eb"/>
<text x="650" y="156" text-anchor="middle" class="node-title-w">Broker 3</text>
<rect x="560" y="170" width="180" height="30" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="650" y="190" text-anchor="middle" class="item">Topic: orders, P2</text>
<rect x="560" y="206" width="180" height="30" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="650" y="226" text-anchor="middle" class="item-sub">replica of P1</text>
<line x1="430" y1="116" x2="110" y2="130" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="430" y1="116" x2="350" y2="130" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="430" y1="116" x2="590" y2="130" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="60" y="290" width="150" height="40" rx="8" fill="#2563eb"/>
<text x="135" y="316" text-anchor="middle" class="node-title-w">Producer</text>
<line x1="210" y1="310" x2="280" y2="310" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-accent)"/>
<text x="245" y="302" text-anchor="middle" class="item-sub">write</text>
<rect x="640" y="290" width="150" height="40" rx="8" fill="#1e40af"/>
<text x="715" y="316" text-anchor="middle" class="node-title-w">Consumer</text>
<line x1="580" y1="310" x2="640" y2="310" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-accent)"/>
<text x="610" y="302" text-anchor="middle" class="item-sub">read</text>
<rect x="40" y="350" width="800" height="30" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="430" y="370" text-anchor="middle" class="note">Each partition has a leader + followers; ISR = in-sync replicas; acks=all = wait for all ISR.</text>
</svg>
