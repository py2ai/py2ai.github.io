<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" width="860" height="440" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
  .mono { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 12px; fill: #0f172a; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="440" fill="#ffffff"/>
<text x="320" y="38" text-anchor="middle" class="title">Redis Architecture + HA</text>
<rect x="40" y="70" width="380" height="160" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="230" y="96" text-anchor="middle" class="band-label">Single-threaded command exec</text>
<rect x="120" y="116" width="220" height="40" rx="8" fill="#1e40af"/>
<text x="230" y="142" text-anchor="middle" class="node-title-w">event loop (one thread)</text>
<text x="230" y="178" text-anchor="middle" class="item-sub">commands run atomically, in order</text>
<text x="230" y="198" text-anchor="middle" class="item-sub">no locks needed -&gt; simple + fast</text>
<text x="230" y="218" text-anchor="middle" class="item-sub">I/O multiplexed; slow cmd blocks all</text>
<rect x="460" y="70" width="380" height="75" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="650" y="96" text-anchor="middle" class="band-label">Sentinel (HA + failover)</text>
<rect x="480" y="108" width="100" height="30" rx="8" fill="#2563eb"/>
<text x="530" y="128" text-anchor="middle" class="node-title-w">master</text>
<rect x="610" y="108" width="80" height="30" rx="8" fill="#1e40af"/>
<text x="650" y="128" text-anchor="middle" class="node-title-w">replica</text>
<rect x="720" y="108" width="90" height="30" rx="8" fill="#2563eb"/>
<text x="765" y="128" text-anchor="middle" class="node-title-w">sentinels</text>
<text x="650" y="158" text-anchor="middle" class="item-sub">monitors + promotes replica on master failure</text>
<rect x="460" y="160" width="380" height="150" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="650" y="184" text-anchor="middle" class="band-label">Cluster (shard + scale)</text>
<rect x="475" y="196" width="105" height="44" rx="8" fill="#2563eb"/>
<text x="527" y="215" text-anchor="middle" class="node-title-w">shard 1</text>
<text x="527" y="233" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">0-5460</text>
<rect x="590" y="196" width="105" height="44" rx="8" fill="#1e40af"/>
<text x="642" y="215" text-anchor="middle" class="node-title-w">shard 2</text>
<text x="642" y="233" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">5461-10922</text>
<rect x="705" y="196" width="105" height="44" rx="8" fill="#2563eb"/>
<text x="757" y="215" text-anchor="middle" class="node-title-w">shard 3</text>
<text x="757" y="233" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">10923-16383</text>
<text x="650" y="266" text-anchor="middle" class="item-sub">16384 hash slots; each shard owns a range</text>
<text x="650" y="286" text-anchor="middle" class="item-sub">each shard = master + replica(s)</text>
<rect x="40" y="250" width="380" height="70" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="230" y="274" text-anchor="middle" class="band-label">Pipelining + transactions</text>
<text x="230" y="300" text-anchor="middle" class="item-sub">MULTI/EXEC, Lua scripts (atomic), pipelined batches</text>
<rect x="40" y="340" width="800" height="40" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="430" y="362" text-anchor="middle" class="note">Cache is a feature, not your DB; design for cache misses.</text>
</svg>
