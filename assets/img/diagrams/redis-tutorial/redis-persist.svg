<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" width="860" height="380" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
  .mono { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 12px; fill: #0f172a; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="380" fill="#ffffff"/>
<text x="320" y="38" text-anchor="middle" class="title">Persistence: RDB vs AOF vs Hybrid</text>
<rect x="40" y="70" width="250" height="250" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="165" y="96" text-anchor="middle" class="band-label">RDB snapshot</text>
<text x="165" y="124" text-anchor="middle" class="item">point-in-time dump</text>
<text x="165" y="144" text-anchor="middle" class="item">of the dataset</text>
<text x="165" y="180" text-anchor="middle" class="item-sub">+ compact, fast reload</text>
<text x="165" y="200" text-anchor="middle" class="item-sub">+ good for backups</text>
<text x="165" y="220" text-anchor="middle" class="item-sub">- data loss since last</text>
<text x="165" y="238" text-anchor="middle" class="item-sub">  snapshot</text>
<text x="165" y="272" text-anchor="middle" class="mono">save 60 1000</text>
<rect x="310" y="70" width="250" height="250" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="435" y="96" text-anchor="middle" class="band-label">AOF append log</text>
<text x="435" y="124" text-anchor="middle" class="item">every write command</text>
<text x="435" y="144" text-anchor="middle" class="item">appended to a log</text>
<text x="435" y="180" text-anchor="middle" class="item-sub">+ minimal data loss</text>
<text x="435" y="200" text-anchor="middle" class="item-sub">+ durable</text>
<text x="435" y="220" text-anchor="middle" class="item-sub">- larger files</text>
<text x="435" y="238" text-anchor="middle" class="item-sub">- replay on restart</text>
<text x="435" y="272" text-anchor="middle" class="mono">appendfsync everysec</text>
<rect x="580" y="70" width="250" height="250" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="705" y="96" text-anchor="middle" class="band-label">Hybrid (recommended)</text>
<text x="705" y="124" text-anchor="middle" class="item">AOF for durability</text>
<text x="705" y="144" text-anchor="middle" class="item">+ RDB for fast restart</text>
<text x="705" y="180" text-anchor="middle" class="item-sub">aof-use-rdb-preamble</text>
<text x="705" y="200" text-anchor="middle" class="item-sub">RDB front + AOF tail</text>
<text x="705" y="220" text-anchor="middle" class="item-sub">best of both</text>
<text x="705" y="240" text-anchor="middle" class="item-sub">(Redis 4.0+)</text>
<text x="705" y="272" text-anchor="middle" class="mono">BGREWRITEAOF</text>
</svg>
