<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" width="860" height="440" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
  .mono { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 12px; fill: #0f172a; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="440" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">Redis Data Structures + Use Cases</text>
<rect x="40" y="68" width="190" height="84" rx="8" fill="#2563eb"/>
<text x="135.0" y="92" text-anchor="middle" class="node-title-w">String</text>
<text x="135.0" y="112" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">SET/GET/INCR</text>
<text x="135.0" y="130" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">cache, counters, tokens</text>
<rect x="242" y="68" width="190" height="84" rx="8" fill="#1e40af"/>
<text x="337.0" y="92" text-anchor="middle" class="node-title-w">List</text>
<text x="337.0" y="112" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">LPUSH/RPOP, LRANGE</text>
<text x="337.0" y="130" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">queues, recent activity</text>
<rect x="444" y="68" width="190" height="84" rx="8" fill="#2563eb"/>
<text x="539.0" y="92" text-anchor="middle" class="node-title-w">Set</text>
<text x="539.0" y="112" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">SADD/SMEMBERS, SINTER</text>
<text x="539.0" y="130" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">tags, unique, set ops</text>
<rect x="646" y="68" width="190" height="84" rx="8" fill="#1e40af"/>
<text x="741.0" y="92" text-anchor="middle" class="node-title-w">Hash</text>
<text x="741.0" y="112" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">HSET/HGET (fields)</text>
<text x="741.0" y="130" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">objects, user profiles</text>
<rect x="40" y="166" width="190" height="84" rx="8" fill="#1e40af"/>
<text x="135.0" y="190" text-anchor="middle" class="node-title-w">Sorted Set</text>
<text x="135.0" y="210" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">ZADD/ZRANGE (score)</text>
<text x="135.0" y="228" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">leaderboards, ranking</text>
<rect x="242" y="166" width="190" height="84" rx="8" fill="#2563eb"/>
<text x="337.0" y="190" text-anchor="middle" class="node-title-w">Stream</text>
<text x="337.0" y="210" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">XADD/XREAD (log)</text>
<text x="337.0" y="228" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">event log, pub/sub durable</text>
<rect x="444" y="166" width="190" height="84" rx="8" fill="#1e40af"/>
<text x="539.0" y="190" text-anchor="middle" class="node-title-w">Bitmap</text>
<text x="539.0" y="210" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">SETBIT/BITCOUNT</text>
<text x="539.0" y="228" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">feature flags, analytics</text>
<rect x="646" y="166" width="190" height="84" rx="8" fill="#2563eb"/>
<text x="741.0" y="190" text-anchor="middle" class="node-title-w">HyperLogLog</text>
<text x="741.0" y="210" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">PFADD/PFCOUNT</text>
<text x="741.0" y="228" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">cardinality estimate (uv)</text>
<rect x="40" y="372" width="780" height="30" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="430" y="392" text-anchor="middle" class="note">Each structure is atomic + O(1)-ish; pick the one that fits the access pattern.</text>
</svg>
