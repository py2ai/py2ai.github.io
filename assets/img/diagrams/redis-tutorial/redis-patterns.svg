<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" width="860" height="440" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
  .mono { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 12px; fill: #0f172a; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="440" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">Redis Patterns</text>
<rect x="40" y="68" width="190" height="84" rx="8" fill="#2563eb"/>
<text x="135.0" y="92" text-anchor="middle" class="node-title-w">Cache-aside</text>
<text x="135.0" y="112" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">GET -&gt; miss -&gt; DB -&gt; SET; TTL evicts</text>
<text x="135.0" y="130" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">app checks Redis, falls back to DB</text>
<rect x="242" y="68" width="190" height="84" rx="8" fill="#1e40af"/>
<text x="337.0" y="92" text-anchor="middle" class="node-title-w">Rate limiter</text>
<text x="337.0" y="112" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">INCR + EXPIRE per key/window</text>
<text x="337.0" y="130" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">sliding/fixed window per user</text>
<rect x="444" y="68" width="190" height="84" rx="8" fill="#2563eb"/>
<text x="539.0" y="92" text-anchor="middle" class="node-title-w">Leaderboard</text>
<text x="539.0" y="112" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">ZADD score member; ZREVRANGE top N</text>
<text x="539.0" y="130" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">sorted set, O(log n) inserts</text>
<rect x="646" y="68" width="190" height="84" rx="8" fill="#1e40af"/>
<text x="741.0" y="92" text-anchor="middle" class="node-title-w">Session store</text>
<text x="741.0" y="112" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">SETEX session:id 3600 json</text>
<text x="741.0" y="130" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">centralized sessions, auto-expire</text>
<rect x="40" y="166" width="190" height="84" rx="8" fill="#1e40af"/>
<text x="135.0" y="190" text-anchor="middle" class="node-title-w">Distributed lock</text>
<text x="135.0" y="210" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">SET NX PX + Lua release</text>
<text x="135.0" y="228" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">Redlock for multi-node</text>
<rect x="242" y="166" width="190" height="84" rx="8" fill="#2563eb"/>
<text x="337.0" y="190" text-anchor="middle" class="node-title-w">Queue</text>
<text x="337.0" y="210" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">LPUSH / BRPOP (or streams)</text>
<text x="337.0" y="228" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">reliable jobs, consumer groups</text>
<rect x="444" y="166" width="190" height="84" rx="8" fill="#1e40af"/>
<text x="539.0" y="190" text-anchor="middle" class="node-title-w">Counter</text>
<text x="539.0" y="210" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">INCR / INCRBY (atomic)</text>
<text x="539.0" y="228" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">views, likes, stock</text>
<rect x="646" y="166" width="190" height="84" rx="8" fill="#2563eb"/>
<text x="741.0" y="190" text-anchor="middle" class="node-title-w">Real-time presence</text>
<text x="741.0" y="210" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">SADD online; SREM on disconnect</text>
<text x="741.0" y="228" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">who's online, set ops</text>
</svg>
