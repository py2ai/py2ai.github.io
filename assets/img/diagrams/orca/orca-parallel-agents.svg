<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="pa-arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="pa-arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ea580c"/>
    </marker>
    <marker id="pa-arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="960" height="680" fill="#ffffff"/>

  <text x="480" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Orca — Parallel Agent Execution</text>
  <text x="480" y="56" text-anchor="middle" font-size="13" fill="#64748b">One prompt fanned across N agents, each in its own isolated git worktree</text>

  <!-- Step 1: Task Decomposition -->
  <rect x="60" y="90" width="840" height="70" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="80" y="116" font-size="14" font-weight="700" fill="#1e3a8a">1. Task Decomposition</text>
  <text x="80" y="138" font-size="12" fill="#3b82f6">User submits a single prompt → Orca splits it into independent sub-tasks, each targeting a fresh git worktree branched from the same base.</text>

  <line x1="480" y1="160" x2="480" y2="190" stroke="#2563eb" stroke-width="1.5" marker-end="url(#pa-arrow-blue)"/>

  <!-- Step 2: Agent Assignment -->
  <rect x="60" y="190" width="840" height="70" rx="10" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="80" y="216" font-size="14" font-weight="700" fill="#3730a3">2. Agent Assignment</text>
  <text x="80" y="238" font-size="12" fill="#4f46e5">Fleet Manager assigns each sub-task to an available agent (Claude Code, Codex, Cursor, …) using your own subscriptions and account switcher.</text>

  <line x1="480" y1="260" x2="480" y2="290" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#pa-arrow-blue)"/>

  <!-- Step 3: Parallel Execution -->
  <text x="60" y="312" font-size="14" font-weight="700" fill="#9a3412">3. Parallel Execution</text>

  <rect x="60" y="320" width="190" height="120" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="155" y="346" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">Agent A</text>
  <text x="155" y="366" text-anchor="middle" font-size="11" fill="#c2410c">Claude Code</text>
  <rect x="80" y="378" width="150" height="20" rx="4" fill="#fed7aa"/>
  <text x="155" y="392" text-anchor="middle" font-size="10" fill="#9a3412">worktree-A · running</text>
  <text x="155" y="424" text-anchor="middle" font-size="10" fill="#ea580c">terminal + file edits</text>

  <rect x="270" y="320" width="190" height="120" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="365" y="346" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">Agent B</text>
  <text x="365" y="366" text-anchor="middle" font-size="11" fill="#c2410c">Codex</text>
  <rect x="290" y="378" width="150" height="20" rx="4" fill="#fed7aa"/>
  <text x="365" y="392" text-anchor="middle" font-size="10" fill="#9a3412">worktree-B · running</text>
  <text x="365" y="424" text-anchor="middle" font-size="10" fill="#ea580c">terminal + file edits</text>

  <rect x="480" y="320" width="190" height="120" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="575" y="346" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">Agent C</text>
  <text x="575" y="366" text-anchor="middle" font-size="11" fill="#c2410c">Cursor CLI</text>
  <rect x="500" y="378" width="150" height="20" rx="4" fill="#fed7aa"/>
  <text x="575" y="392" text-anchor="middle" font-size="10" fill="#9a3412">worktree-C · running</text>
  <text x="575" y="424" text-anchor="middle" font-size="10" fill="#ea580c">terminal + file edits</text>

  <rect x="690" y="320" width="190" height="120" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="785" y="346" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">Agent D</text>
  <text x="785" y="366" text-anchor="middle" font-size="11" fill="#c2410c">OpenCode</text>
  <rect x="710" y="378" width="150" height="20" rx="4" fill="#fed7aa"/>
  <text x="785" y="392" text-anchor="middle" font-size="10" fill="#9a3412">worktree-D · running</text>
  <text x="785" y="424" text-anchor="middle" font-size="10" fill="#ea580c">terminal + file edits</text>

  <!-- parallel arrows down -->
  <line x1="155" y1="440" x2="155" y2="470" stroke="#ea580c" stroke-width="1.5" marker-end="url(#pa-arrow-orange)"/>
  <line x1="365" y1="440" x2="365" y2="470" stroke="#ea580c" stroke-width="1.5" marker-end="url(#pa-arrow-orange)"/>
  <line x1="575" y1="440" x2="575" y2="470" stroke="#ea580c" stroke-width="1.5" marker-end="url(#pa-arrow-orange)"/>
  <line x1="785" y1="440" x2="785" y2="470" stroke="#ea580c" stroke-width="1.5" marker-end="url(#pa-arrow-orange)"/>

  <!-- Step 4: Result Collection -->
  <rect x="60" y="470" width="840" height="70" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.5"/>
  <text x="80" y="496" font-size="14" font-weight="700" fill="#15803d">4. Result Collection</text>
  <text x="80" y="518" font-size="12" fill="#16a34a">Each agent commits to its own worktree branch. Orca captures diffs, terminal logs, and annotations — all tracked in one place.</text>

  <line x1="480" y1="540" x2="480" y2="570" stroke="#16a34a" stroke-width="1.5" marker-end="url(#pa-arrow-green)"/>

  <!-- Step 5: Synthesis -->
  <rect x="60" y="570" width="840" height="80" rx="10" fill="#f0fdf4" stroke="#15803d" stroke-width="2"/>
  <text x="80" y="598" font-size="14" font-weight="700" fill="#14532d">5. Synthesis & Merge</text>
  <text x="80" y="620" font-size="12" fill="#15803d">Compare results side-by-side → annotate AI diffs → pick the winner → merge into main. Loser worktrees are cleaned up automatically.</text>
  <text x="80" y="638" font-size="11" fill="#16a34a">Mobile companion notifies you when each agent finishes; send follow-ups from anywhere.</text>
</svg>