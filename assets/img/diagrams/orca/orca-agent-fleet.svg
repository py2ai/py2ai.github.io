<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="af-arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="af-arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
    <marker id="af-arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ea580c"/>
    </marker>
    <marker id="af-arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="960" height="680" fill="#ffffff"/>

  <text x="480" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Orca — Agent Fleet Management</text>
  <text x="480" y="56" text-anchor="middle" font-size="13" fill="#64748b">Fleet Manager → Agent Pool → Health → Load Balancing → Auto-scaling → Distribution</text>

  <!-- Central Fleet Manager -->
  <rect x="360" y="80" width="240" height="60" rx="12" fill="#1e3a8a" stroke="#1e3a8a" stroke-width="2"/>
  <text x="480" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Fleet Manager</text>
  <text x="480" y="128" text-anchor="middle" font-size="11" fill="#bfdbfe">Orchestrates the entire agent pool</text>

  <!-- Arrows from Fleet Manager to 4 pillars -->
  <line x1="420" y1="140" x2="180" y2="180" stroke="#2563eb" stroke-width="1.5" marker-end="url(#af-arrow-blue)"/>
  <line x1="460" y1="140" x2="380" y2="180" stroke="#2563eb" stroke-width="1.5" marker-end="url(#af-arrow-blue)"/>
  <line x1="500" y1="140" x2="580" y2="180" stroke="#2563eb" stroke-width="1.5" marker-end="url(#af-arrow-blue)"/>
  <line x1="540" y1="140" x2="780" y2="180" stroke="#2563eb" stroke-width="1.5" marker-end="url(#af-arrow-blue)"/>

  <!-- Pillar 1: Agent Pool -->
  <rect x="60" y="180" width="240" height="180" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="180" y="206" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Agent Pool</text>
  <rect x="80" y="220" width="200" height="28" rx="6" fill="#dbeafe"/>
  <text x="180" y="238" text-anchor="middle" font-size="11" fill="#1e40af">Claude Code · idle</text>
  <rect x="80" y="252" width="200" height="28" rx="6" fill="#dbeafe"/>
  <text x="180" y="270" text-anchor="middle" font-size="11" fill="#1e40af">Codex · busy</text>
  <rect x="80" y="284" width="200" height="28" rx="6" fill="#dbeafe"/>
  <text x="180" y="302" text-anchor="middle" font-size="11" fill="#1e40af">Cursor CLI · idle</text>
  <rect x="80" y="316" width="200" height="28" rx="6" fill="#dbeafe"/>
  <text x="180" y="334" text-anchor="middle" font-size="11" fill="#1e40af">OpenCode · busy</text>
  <text x="180" y="352" text-anchor="middle" font-size="10" fill="#3b82f6">+ any CLI agent</text>

  <!-- Pillar 2: Health Monitoring -->
  <rect x="320" y="180" width="240" height="180" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.5"/>
  <text x="440" y="206" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">Health Monitoring</text>
  <circle cx="100" cy="234" r="6" fill="#16a34a"/>
  <text x="116" y="238" font-size="11" fill="#15803d">Alive check (heartbeat)</text>
  <circle cx="100" cy="258" r="6" fill="#16a34a"/>
  <text x="116" y="262" font-size="11" fill="#15803d">Rate-limit reset tracking</text>
  <circle cx="100" cy="282" r="6" fill="#ea580c"/>
  <text x="116" y="286" font-size="11" fill="#9a3412">Stalled agent detection</text>
  <circle cx="100" cy="306" r="6" fill="#dc2626"/>
  <text x="116" y="310" font-size="11" fill="#991b1b">Crash recovery & restart</text>
  <circle cx="100" cy="330" r="6" fill="#16a34a"/>
  <text x="116" y="334" font-size="11" fill="#15803d">Auth-restart preservation</text>
  <text x="440" y="352" text-anchor="middle" font-size="10" fill="#16a34a">agent-awake-service</text>

  <!-- Pillar 3: Load Balancing -->
  <rect x="580" y="180" width="240" height="180" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="700" y="206" text-anchor="middle" font-size="14" font-weight="700" fill="#9a3412">Load Balancing</text>
  <text x="600" y="232" font-size="11" fill="#334155">• Round-robin worktree assignment</text>
  <text x="600" y="252" font-size="11" fill="#334155">• Account-aware routing (avoid</text>
  <text x="610" y="268" font-size="11" fill="#334155">rate-limited subscriptions)</text>
  <text x="600" y="288" font-size="11" fill="#334155">• Trust presets per agent</text>
  <text x="600" y="308" font-size="11" fill="#334155">• Local vs SSH target selection</text>
  <text x="600" y="328" font-size="11" fill="#334155">• Worktree-create base prefetch</text>
  <text x="700" y="352" text-anchor="middle" font-size="10" fill="#ea580c">optimal agent utilization</text>

  <!-- Pillar 4: Auto-scaling -->
  <rect x="840" y="180" width="100" height="180" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="890" y="206" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">Auto-</text>
  <text x="890" y="222" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">scaling</text>
  <text x="890" y="250" text-anchor="middle" font-size="10" fill="#dc2626">Spin up</text>
  <text x="890" y="266" text-anchor="middle" font-size="10" fill="#dc2626">new agents</text>
  <text x="890" y="290" text-anchor="middle" font-size="10" fill="#dc2626">Tear down</text>
  <text x="890" y="306" text-anchor="middle" font-size="10" fill="#dc2626">idle ones</text>
  <text x="890" y="330" text-anchor="middle" font-size="10" fill="#dc2626">Ephemeral</text>
  <text x="890" y="346" text-anchor="middle" font-size="10" fill="#dc2626">VM recipes</text>

  <!-- Decision diamond -->
  <polygon points="480,400 560,440 480,480 400,440" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="480" y="436" text-anchor="middle" font-size="12" font-weight="700" fill="#854d0e">Agent</text>
  <text x="480" y="452" text-anchor="middle" font-size="12" font-weight="700" fill="#854d0e">available?</text>

  <line x1="180" y1="360" x2="420" y2="424" stroke="#64748b" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="440" y1="360" x2="460" y2="400" stroke="#16a34a" stroke-width="1.5" marker-end="url(#af-arrow-green)"/>
  <line x1="700" y1="360" x2="500" y2="424" stroke="#ea580c" stroke-width="1.5" marker-end="url(#af-arrow-orange)"/>
  <line x1="890" y1="360" x2="540" y2="424" stroke="#dc2626" stroke-width="1.5" marker-end="url(#af-arrow-red)"/>

  <!-- Yes / No branches -->
  <line x1="400" y1="440" x2="200" y2="500" stroke="#16a34a" stroke-width="1.5" marker-end="url(#af-arrow-green)"/>
  <text x="280" y="468" font-size="11" font-weight="600" fill="#15803d">Yes</text>
  <line x1="560" y1="440" x2="760" y2="500" stroke="#dc2626" stroke-width="1.5" marker-end="url(#af-arrow-red)"/>
  <text x="640" y="468" font-size="11" font-weight="600" fill="#991b1b">No → scale up</text>

  <!-- Task Distribution -->
  <rect x="60" y="500" width="280" height="70" rx="10" fill="#f0fdf4" stroke="#15803d" stroke-width="2"/>
  <text x="200" y="526" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">Task Distribution</text>
  <text x="200" y="546" text-anchor="middle" font-size="11" fill="#15803d">Assign sub-task → isolated worktree</text>
  <text x="200" y="562" text-anchor="middle" font-size="11" fill="#15803d">Agent runs in its own terminal + editor</text>

  <!-- Scale up box -->
  <rect x="620" y="500" width="280" height="70" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="760" y="526" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">Provision New Agent</text>
  <text x="760" y="546" text-anchor="middle" font-size="11" fill="#dc2626">Ephemeral VM recipe / SSH worktree</text>
  <text x="760" y="562" text-anchor="middle" font-size="11" fill="#dc2626">Add to pool → re-enter decision</text>

  <!-- Feedback loop -->
  <path d="M 200 570 Q 200 620 480 620 Q 760 620 760 570" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#af-arrow-blue)"/>
  <text x="480" y="644" text-anchor="middle" font-size="11" fill="#2563eb">Continuous feedback loop — results flow back to Fleet Manager for re-assignment</text>
</svg>