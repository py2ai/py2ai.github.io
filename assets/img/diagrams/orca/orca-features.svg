<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="Segoe UI, Arial, sans-serif">
  <rect width="960" height="640" fill="#ffffff"/>

  <text x="480" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Orca — Key Features</text>
  <text x="480" y="58" text-anchor="middle" font-size="13" fill="#64748b">The AI Orchestrator for 100x builders — desktop & mobile</text>

  <!-- Feature cards: 3 columns x 2 rows -->
  <!-- Row 1 -->
  <rect x="40" y="90" width="280" height="150" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <circle cx="80" cy="130" r="18" fill="#2563eb"/>
  <text x="80" y="136" text-anchor="middle" font-size="18" fill="#ffffff" font-weight="700">1</text>
  <text x="110" y="126" font-size="15" font-weight="700" fill="#1e3a8a">Parallel Worktrees</text>
  <text x="110" y="144" font-size="11" fill="#3b82f6">Fan one prompt across N agents</text>
  <text x="60" y="172" font-size="12" fill="#334155">Each agent runs in its own isolated</text>
  <text x="60" y="190" font-size="12" fill="#334155">git worktree. Compare results and</text>
  <text x="60" y="208" font-size="12" fill="#334155">merge the winner — no conflicts.</text>
  <text x="60" y="226" font-size="11" fill="#64748b">Compare → annotate → merge</text>

  <rect x="340" y="90" width="280" height="150" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <circle cx="380" cy="130" r="18" fill="#ea580c"/>
  <text x="380" y="136" text-anchor="middle" font-size="18" fill="#ffffff" font-weight="700">2</text>
  <text x="410" y="126" font-size="15" font-weight="700" fill="#9a3412">Any Coding Agent</text>
  <text x="410" y="144" font-size="11" fill="#c2410c">If it runs in a terminal, it runs in Orca</text>
  <text x="360" y="172" font-size="12" fill="#334155">Claude Code, Codex, Cursor, Grok,</text>
  <text x="360" y="190" font-size="12" fill="#334155">Copilot, Cline, Goose, Amp, OpenCode,</text>
  <text x="360" y="208" font-size="12" fill="#334155">Devin, Droid, Qwen, Kimi, and more.</text>
  <text x="360" y="226" font-size="11" fill="#64748b">25+ supported CLI agents</text>

  <rect x="640" y="90" width="280" height="150" rx="12" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <circle cx="680" cy="130" r="18" fill="#ca8a04"/>
  <text x="680" y="136" text-anchor="middle" font-size="18" fill="#ffffff" font-weight="700">3</text>
  <text x="710" y="126" font-size="15" font-weight="700" fill="#854d0e">Own Subscriptions</text>
  <text x="710" y="144" font-size="11" fill="#a16207">No middleman billing</text>
  <text x="660" y="172" font-size="12" fill="#334155">Use your own API keys and accounts.</text>
  <text x="660" y="190" font-size="12" fill="#334155">Usage tracking & rate-limit resets,</text>
  <text x="660" y="208" font-size="12" fill="#334155">hot-swap accounts without re-login.</text>
  <text x="660" y="226" font-size="11" fill="#64748b">Account switcher built-in</text>

  <!-- Row 2 -->
  <rect x="40" y="260" width="280" height="150" rx="12" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/>
  <circle cx="80" cy="300" r="18" fill="#4f46e5"/>
  <text x="80" y="306" text-anchor="middle" font-size="18" fill="#ffffff" font-weight="700">4</text>
  <text x="110" y="296" font-size="15" font-weight="700" fill="#3730a3">Desktop & Mobile</text>
  <text x="110" y="314" font-size="11" fill="#4f46e5">Monitor from anywhere</text>
  <text x="60" y="342" font-size="12" fill="#334155">macOS, Windows, Linux desktop app</text>
  <text x="60" y="360" font-size="12" fill="#334155">plus iOS & Android companion.</text>
  <text x="60" y="378" font-size="12" fill="#334155">Get notified, send follow-ups</text>
  <text x="60" y="396" font-size="11" fill="#64748b">Steer agents from your phone</text>

  <rect x="340" y="260" width="280" height="150" rx="12" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.5"/>
  <circle cx="380" cy="300" r="18" fill="#16a34a"/>
  <text x="380" y="306" text-anchor="middle" font-size="18" fill="#ffffff" font-weight="700">5</text>
  <text x="410" y="296" font-size="15" font-weight="700" fill="#15803d">Task Management</text>
  <text x="410" y="314" font-size="11" fill="#16a34a">GitHub & Linear, native</text>
  <text x="360" y="342" font-size="12" fill="#334155">Browse PRs, issues, and project</text>
  <text x="360" y="360" font-size="12" fill="#334155">boards in-app. Open a worktree</text>
  <text x="360" y="378" font-size="12" fill="#334155">from any task — no context switch.</text>
  <text x="360" y="396" font-size="11" fill="#64748b">GitLab & Bitbucket supported</text>

  <rect x="640" y="260" width="280" height="150" rx="12" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <circle cx="680" cy="300" r="18" fill="#64748b"/>
  <text x="680" y="306" text-anchor="middle" font-size="18" fill="#ffffff" font-weight="700">6</text>
  <text x="710" y="296" font-size="15" font-weight="700" fill="#334155">Result Aggregation</text>
  <text x="710" y="314" font-size="11" fill="#64748b">Annotate AI diffs</text>
  <text x="660" y="342" font-size="12" fill="#334155">Drop comments on any diff line and</text>
  <text x="660" y="360" font-size="12" fill="#334155">ship them back to the agent. Review,</text>
  <text x="660" y="378" font-size="12" fill="#334155">edit, and commit without leaving Orca.</text>
  <text x="660" y="396" font-size="11" fill="#64748b">Diff review + commit in-app</text>

  <!-- Bonus features bar -->
  <rect x="40" y="440" width="880" height="170" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="480" y="466" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Also in the box</text>

  <rect x="60" y="482" width="200" height="50" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="160" y="504" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">Terminal Splits</text>
  <text x="160" y="520" text-anchor="middle" font-size="10" fill="#3b82f6">WebGL · infinite splits</text>

  <rect x="280" y="482" width="200" height="50" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="380" y="504" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412">Design Mode</text>
  <text x="380" y="520" text-anchor="middle" font-size="10" fill="#c2410c">Click UI → send to agent</text>

  <rect x="500" y="482" width="200" height="50" rx="8" fill="#ecfdf5" stroke="#86efac" stroke-width="1"/>
  <text x="600" y="504" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">SSH Worktrees</text>
  <text x="600" y="520" text-anchor="middle" font-size="10" fill="#16a34a">Remote beefy boxes</text>

  <rect x="720" y="482" width="180" height="50" rx="8" fill="#fefce8" stroke="#fde047" stroke-width="1"/>
  <text x="810" y="504" text-anchor="middle" font-size="12" font-weight="600" fill="#854d0e">Orca CLI</text>
  <text x="810" y="520" text-anchor="middle" font-size="10" fill="#a16207">Script every workflow</text>

  <rect x="60" y="546" width="200" height="50" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1"/>
  <text x="160" y="568" text-anchor="middle" font-size="12" font-weight="600" fill="#3730a3">Quick Open</text>
  <text x="160" y="584" text-anchor="middle" font-size="10" fill="#4f46e5">Search everything</text>

  <rect x="280" y="546" width="200" height="50" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="380" y="568" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">Computer Use</text>
  <text x="380" y="584" text-anchor="middle" font-size="10" fill="#64748b">Agents drive desktop apps</text>

  <rect x="500" y="546" width="200" height="50" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="600" y="568" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">Rich Previews</text>
  <text x="600" y="584" text-anchor="middle" font-size="10" fill="#3b82f6">MD · images · PDFs</text>

  <rect x="720" y="546" width="180" height="50" rx="8" fill="#ecfdf5" stroke="#86efac" stroke-width="1"/>
  <text x="810" y="568" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">Notifications</text>
  <text x="810" y="584" text-anchor="middle" font-size="10" fill="#16a34a">Agent finished? pinged</text>
</svg>