<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ea580c"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="960" height="720" fill="#ffffff"/>

  <text x="480" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Orca — System Architecture</text>
  <text x="480" y="58" text-anchor="middle" font-size="13" fill="#64748b">Agent Development Environment for a Fleet of Parallel AI Coding Agents</text>

  <!-- Clients layer -->
  <text x="40" y="92" font-size="12" font-weight="600" fill="#64748b">CLIENTS</text>
  <rect x="120" y="100" width="180" height="56" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="210" y="124" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a8a">Desktop App</text>
  <text x="210" y="142" text-anchor="middle" font-size="11" fill="#3b82f6">macOS · Windows · Linux</text>

  <rect x="340" y="100" width="180" height="56" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="430" y="124" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a8a">Mobile Companion</text>
  <text x="430" y="142" text-anchor="middle" font-size="11" fill="#3b82f6">iOS · Android</text>

  <rect x="560" y="100" width="180" height="56" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="650" y="124" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a8a">Orca CLI</text>
  <text x="650" y="142" text-anchor="middle" font-size="11" fill="#3b82f6">Scriptable automation</text>

  <!-- Orca core -->
  <text x="40" y="196" font-size="12" font-weight="600" fill="#64748b">ORCA ADE CORE</text>
  <rect x="120" y="204" width="620" height="150" rx="12" fill="#f8fafc" stroke="#334155" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="430" y="226" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Orca Agent Development Environment</text>

  <rect x="140" y="240" width="150" height="50" rx="8" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="215" y="262" text-anchor="middle" font-size="13" font-weight="600" fill="#3730a3">Fleet Manager</text>
  <text x="215" y="278" text-anchor="middle" font-size="10" fill="#4f46e5">Orchestration & scheduling</text>

  <rect x="310" y="240" width="150" height="50" rx="8" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="385" y="262" text-anchor="middle" font-size="13" font-weight="600" fill="#3730a3">Task Queue</text>
  <text x="385" y="278" text-anchor="middle" font-size="10" fill="#4f46e5">Worktree assignment</text>

  <rect x="480" y="240" width="150" height="50" rx="8" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="555" y="262" text-anchor="middle" font-size="13" font-weight="600" fill="#3730a3">Results Aggregator</text>
  <text x="555" y="278" text-anchor="middle" font-size="10" fill="#4f46e5">Diff merge & synthesis</text>

  <rect x="650" y="240" width="80" height="50" rx="8" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="690" y="262" text-anchor="middle" font-size="13" font-weight="600" fill="#3730a3">IPC</text>
  <text x="690" y="278" text-anchor="middle" font-size="10" fill="#4f46e5">Relay bus</text>

  <rect x="140" y="300" width="590" height="40" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.5"/>
  <text x="435" y="325" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">Electron Main Process · node-pty · SSH2 · SQLite Persistence</text>

  <!-- Parallel agents -->
  <text x="40" y="392" font-size="12" font-weight="600" fill="#64748b">PARALLEL AGENT FLEET (isolated git worktrees)</text>

  <rect x="120" y="400" width="130" height="70" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="185" y="424" text-anchor="middle" font-size="13" font-weight="600" fill="#9a3412">Agent 1</text>
  <text x="185" y="442" text-anchor="middle" font-size="11" fill="#c2410c">Claude Code</text>
  <text x="185" y="458" text-anchor="middle" font-size="10" fill="#ea580c">worktree-1</text>

  <rect x="270" y="400" width="130" height="70" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="335" y="424" text-anchor="middle" font-size="13" font-weight="600" fill="#9a3412">Agent 2</text>
  <text x="335" y="442" text-anchor="middle" font-size="11" fill="#c2410c">Codex</text>
  <text x="335" y="458" text-anchor="middle" font-size="10" fill="#ea580c">worktree-2</text>

  <rect x="420" y="400" width="130" height="70" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="485" y="424" text-anchor="middle" font-size="13" font-weight="600" fill="#9a3412">Agent 3</text>
  <text x="485" y="442" text-anchor="middle" font-size="11" fill="#c2410c">Cursor CLI</text>
  <text x="485" y="458" text-anchor="middle" font-size="10" fill="#ea580c">worktree-3</text>

  <rect x="570" y="400" width="130" height="70" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="635" y="424" text-anchor="middle" font-size="13" font-weight="600" fill="#9a3412">Agent N</text>
  <text x="635" y="442" text-anchor="middle" font-size="11" fill="#c2410c">Any CLI agent</text>
  <text x="635" y="458" text-anchor="middle" font-size="10" fill="#ea580c">worktree-N</text>

  <!-- Subscriptions -->
  <text x="40" y="516" font-size="12" font-weight="600" fill="#64748b">YOUR SUBSCRIPTIONS</text>
  <rect x="120" y="524" width="580" height="50" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="410" y="548" text-anchor="middle" font-size="13" font-weight="600" fill="#854d0e">Own API Keys & Accounts — Claude, OpenAI, xAI, GitHub Copilot, Cursor, …</text>
  <text x="410" y="564" text-anchor="middle" font-size="11" fill="#a16207">No middleman billing · usage tracking · rate-limit resets</text>

  <!-- Integrations -->
  <text x="40" y="612" font-size="12" font-weight="600" fill="#64748b">INTEGRATIONS</text>
  <rect x="120" y="620" width="120" height="44" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="180" y="646" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">GitHub</text>

  <rect x="250" y="620" width="120" height="44" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="310" y="646" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">Linear</text>

  <rect x="380" y="620" width="120" height="44" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="440" y="646" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">GitLab</text>

  <rect x="510" y="620" width="120" height="44" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="570" y="646" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">SSH Remote</text>

  <rect x="640" y="620" width="100" height="44" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="690" y="646" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">Chromium</text>

  <!-- Arrows: clients -> core -->
  <line x1="210" y1="156" x2="210" y2="204" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="430" y1="156" x2="430" y2="204" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="650" y1="156" x2="650" y2="204" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Arrows: core -> agents (parallel, orange) -->
  <line x1="185" y1="354" x2="185" y2="400" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="335" y1="354" x2="335" y2="400" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="485" y1="354" x2="485" y2="400" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="635" y1="354" x2="635" y2="400" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- Arrows: agents -> subscriptions (green, results back) -->
  <line x1="185" y1="470" x2="185" y2="524" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="335" y1="470" x2="335" y2="524" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="485" y1="470" x2="485" y2="524" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="635" y1="470" x2="635" y2="524" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Arrows: core -> integrations (gray) -->
  <line x1="215" y1="354" x2="180" y2="620" stroke="#64748b" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-gray)"/>
  <line x1="385" y1="354" x2="310" y2="620" stroke="#64748b" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-gray)"/>
  <line x1="555" y1="354" x2="440" y2="620" stroke="#64748b" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-gray)"/>

  <!-- Legend -->
  <rect x="760" y="100" width="180" height="120" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="850" y="120" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Legend</text>
  <line x1="772" y1="138" x2="802" y2="138" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="810" y="142" font-size="11" fill="#334155">Data / control flow</text>
  <line x1="772" y1="160" x2="802" y2="160" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="810" y="164" font-size="11" fill="#334155">Parallel execution</text>
  <line x1="772" y1="182" x2="802" y2="182" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="810" y="186" font-size="11" fill="#334155">Results / success</text>
  <line x1="772" y1="204" x2="802" y2="204" stroke="#64748b" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-gray)"/>
  <text x="810" y="208" font-size="11" fill="#334155">Integration link</text>
</svg>