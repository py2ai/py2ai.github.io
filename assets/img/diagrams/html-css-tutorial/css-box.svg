<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" width="860" height="400" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="400" fill="#ffffff"/>
<text x="330" y="38" text-anchor="middle" class="title">The CSS Box Model</text>
<rect x="120" y="70" width="620" height="260" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="96" text-anchor="middle" class="band-label">margin (transparent space outside)</text>
<rect x="180" y="120" width="500" height="170" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="430" y="142" text-anchor="middle" class="band-label">border</text>
<rect x="230" y="160" width="400" height="100" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="178" text-anchor="middle" class="band-label">padding</text>
<rect x="290" y="200" width="280" height="40" rx="8" fill="#1e40af"/>
<text x="430" y="226" text-anchor="middle" class="node-title-w">content (text, image, etc.)</text>
<text x="430" y="330" text-anchor="middle" class="item-sub">box-sizing: content-box (default) vs border-box (include padding+border)</text>
<text x="430" y="352" text-anchor="middle" class="note">width/height set the content box by default; border-box is usually what you want.</text>
</svg>
