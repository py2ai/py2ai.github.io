<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" width="860" height="420" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="420" fill="#ffffff"/>
<text x="280" y="38" text-anchor="middle" class="title">HTML -&gt; DOM -&gt; Render</text>
<rect x="40" y="70" width="260" height="180" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="170" y="96" text-anchor="middle" class="band-label">HTML source</text>
<rect x="60" y="110" width="220" height="130" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="170" y="132" text-anchor="middle" class="item">&amp;lt;html&amp;gt;</text>
<text x="170" y="150" text-anchor="middle" class="item">  &amp;lt;body&amp;gt;</text>
<text x="170" y="168" text-anchor="middle" class="item">    &amp;lt;h1&amp;gt;Hi&amp;lt;/h1&amp;gt;</text>
<text x="170" y="186" text-anchor="middle" class="item">    &amp;lt;p&amp;gt;text&amp;lt;/p&amp;gt;</text>
<text x="170" y="204" text-anchor="middle" class="item">  &amp;lt;/body&amp;gt;</text>
<text x="170" y="222" text-anchor="middle" class="item">&amp;lt;/html&amp;gt;</text>
<line x1="300" y1="160" x2="360" y2="160" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-accent)"/>
<text x="330" y="152" text-anchor="middle" class="item-sub">parse</text>
<rect x="370" y="70" width="240" height="260" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="490" y="96" text-anchor="middle" class="band-label">DOM tree</text>
<rect x="440" y="116" width="100" height="40" rx="8" fill="#1e40af"/>
<text x="490" y="141" text-anchor="middle" class="node-title-w">html</text>
<rect x="440" y="170" width="100" height="40" rx="8" fill="#2563eb"/>
<text x="490" y="195" text-anchor="middle" class="node-title-w">body</text>
<rect x="410" y="224" width="70" height="36" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="445" y="247" text-anchor="middle" class="item">h1</text>
<rect x="500" y="224" width="70" height="36" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="535" y="247" text-anchor="middle" class="item">p</text>
<line x1="490" y1="156" x2="490" y2="170" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="470" y1="210" x2="445" y2="224" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="510" y1="210" x2="535" y2="224" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="610" y1="200" x2="670" y2="200" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-accent)"/>
<text x="640" y="192" text-anchor="middle" class="item-sub">render</text>
<rect x="670" y="160" width="170" height="80" rx="8" fill="#1e40af"/>
<text x="755" y="195" text-anchor="middle" class="node-title-w">Rendered page</text>
<text x="755" y="215" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">pixels on screen</text>
<rect x="40" y="360" width="780" height="30" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="430" y="380" text-anchor="middle" class="note">The browser parses HTML into a tree (DOM), applies CSS, lays out boxes, paints pixels.</text>
</svg>
