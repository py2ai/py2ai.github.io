<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" width="860" height="440" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="440" fill="#ffffff"/>
<text x="330" y="38" text-anchor="middle" class="title">Layout: Flexbox vs Grid + Positioning</text>
<rect x="40" y="70" width="390" height="170" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="235" y="96" text-anchor="middle" class="band-label">Flexbox (1D)</text>
<rect x="60" y="116" width="360" height="34" rx="8" fill="#1e40af"/>
<text x="240" y="138" text-anchor="middle" class="node-title-w">display: flex</text>
<rect x="70" y="160" width="100" height="60" rx="8" fill="#2563eb"/>
<text x="120" y="195" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">item</text>
<rect x="180" y="160" width="100" height="60" rx="8" fill="#2563eb"/>
<text x="230" y="195" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">item</text>
<rect x="290" y="160" width="100" height="60" rx="8" fill="#2563eb"/>
<text x="340" y="195" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">item</text>
<text x="235" y="246" text-anchor="middle" class="item-sub">row or column; justify-content / align-items</text>
<text x="235" y="266" text-anchor="middle" class="item-sub">use for: navbars, rows, centering</text>
<rect x="450" y="70" width="390" height="170" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="645" y="96" text-anchor="middle" class="band-label">Grid (2D)</text>
<rect x="470" y="116" width="360" height="34" rx="8" fill="#1e40af"/>
<text x="650" y="138" text-anchor="middle" class="node-title-w">display: grid</text>
<rect x="480" y="160" width="105" height="28" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="532" y="179" text-anchor="middle" class="item">cell</text>
<rect x="595" y="160" width="105" height="28" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="647" y="179" text-anchor="middle" class="item">cell</text>
<rect x="710" y="160" width="105" height="28" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="762" y="179" text-anchor="middle" class="item">cell</text>
<rect x="480" y="194" width="105" height="28" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="532" y="213" text-anchor="middle" class="item">cell</text>
<rect x="595" y="194" width="105" height="28" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="647" y="213" text-anchor="middle" class="item">cell</text>
<rect x="710" y="194" width="105" height="28" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="762" y="213" text-anchor="middle" class="item">cell</text>
<text x="645" y="246" text-anchor="middle" class="item-sub">rows + columns; grid-template, gap</text>
<text x="645" y="266" text-anchor="middle" class="item-sub">use for: page layouts, dashboards</text>
<rect x="40" y="260" width="800" height="120" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="286" text-anchor="middle" class="band-label">Positioning (position: ...)</text>
<rect x="60" y="300" width="138" height="40" rx="8" fill="#2563eb"/>
<text x="129" y="318" text-anchor="middle" class="node-title-w">static</text>
<text x="129" y="336" text-anchor="middle" font-size="10" fill="#e0e7ff" font-family="inherit">normal flow (default)</text>
<rect x="208" y="300" width="138" height="40" rx="8" fill="#1e40af"/>
<text x="277" y="318" text-anchor="middle" class="node-title-w">relative</text>
<text x="277" y="336" text-anchor="middle" font-size="10" fill="#e0e7ff" font-family="inherit">offset from normal pos</text>
<rect x="356" y="300" width="138" height="40" rx="8" fill="#2563eb"/>
<text x="425" y="318" text-anchor="middle" class="node-title-w">absolute</text>
<text x="425" y="336" text-anchor="middle" font-size="10" fill="#e0e7ff" font-family="inherit">nearest positioned ancestor</text>
<rect x="504" y="300" width="138" height="40" rx="8" fill="#1e40af"/>
<text x="573" y="318" text-anchor="middle" class="node-title-w">fixed</text>
<text x="573" y="336" text-anchor="middle" font-size="10" fill="#e0e7ff" font-family="inherit">viewport</text>
<rect x="652" y="300" width="138" height="40" rx="8" fill="#2563eb"/>
<text x="721" y="318" text-anchor="middle" class="node-title-w">sticky</text>
<text x="721" y="336" text-anchor="middle" font-size="10" fill="#e0e7ff" font-family="inherit">scrolls then sticks</text>
</svg>
