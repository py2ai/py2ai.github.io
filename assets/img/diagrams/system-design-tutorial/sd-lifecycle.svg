<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" width="860" height="360" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="360" fill="#ffffff"/>
<text x="320" y="38" text-anchor="middle" class="title">The Design Interview Process</text>
<rect x="40" y="70" width="780" height="46" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="76" width="250" height="34" rx="8" fill="#2563eb"/>
<text x="179" y="98" text-anchor="middle" class="node-title-w">1. Clarify requirements</text>
<rect x="324" y="76" width="496" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="572" y="98" text-anchor="middle" class="item">functional + non-functional, scale, who uses it</text>
<line x1="430" y1="116" x2="430" y2="122" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="40" y="124" width="780" height="46" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="130" width="250" height="34" rx="8" fill="#1e40af"/>
<text x="179" y="152" text-anchor="middle" class="node-title-w">2. Back-of-envelope</text>
<rect x="324" y="130" width="496" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="572" y="152" text-anchor="middle" class="item">QPS, storage, bandwidth, cache hit rate</text>
<line x1="430" y1="170" x2="430" y2="176" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="40" y="178" width="780" height="46" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="184" width="250" height="34" rx="8" fill="#2563eb"/>
<text x="179" y="206" text-anchor="middle" class="node-title-w">3. Sketch architecture</text>
<rect x="324" y="184" width="496" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="572" y="206" text-anchor="middle" class="item">LB -&gt; app -&gt; cache -&gt; DB -&gt; queue, draw boxes</text>
<line x1="430" y1="224" x2="430" y2="230" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="40" y="232" width="780" height="46" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="238" width="250" height="34" rx="8" fill="#1e40af"/>
<text x="179" y="260" text-anchor="middle" class="node-title-w">4. Deep-dive a component</text>
<rect x="324" y="238" width="496" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="572" y="260" text-anchor="middle" class="item">the bottleneck: DB schema, sharding, cache eviction</text>
<line x1="430" y1="278" x2="430" y2="284" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="40" y="286" width="780" height="46" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="292" width="250" height="34" rx="8" fill="#2563eb"/>
<text x="179" y="314" text-anchor="middle" class="node-title-w">5. Tradeoffs + bottlenecks</text>
<rect x="324" y="292" width="496" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="572" y="314" text-anchor="middle" class="item">CAP choice, single points of failure, scaling plan</text>
</svg>
