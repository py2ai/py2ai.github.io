<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" width="860" height="360" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="360" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">Vertical vs Horizontal Scaling</text>
<rect x="40" y="70" width="390" height="250" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="235" y="96" text-anchor="middle" class="band-label">Vertical (scale up)</text>
<rect x="135" y="120" width="200" height="90" rx="8" fill="#1e40af"/>
<text x="235" y="160" text-anchor="middle" class="node-title-w">one bigger box</text>
<text x="235" y="182" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">more CPU / RAM / disk</text>
<text x="235" y="230" text-anchor="middle" class="item-sub">+ simple, no code change</text>
<text x="235" y="250" text-anchor="middle" class="item-sub">- hardware ceiling, SPOF</text>
<text x="235" y="272" text-anchor="middle" class="item-sub">- downtime to resize</text>
<rect x="450" y="70" width="390" height="250" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="645" y="96" text-anchor="middle" class="band-label">Horizontal (scale out)</text>
<rect x="500" y="120" width="90" height="70" rx="8" fill="#2563eb"/>
<text x="545" y="158" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">node</text>
<rect x="600" y="120" width="90" height="70" rx="8" fill="#2563eb"/>
<text x="645" y="158" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">node</text>
<rect x="700" y="120" width="90" height="70" rx="8" fill="#2563eb"/>
<text x="745" y="158" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">node</text>
<text x="645" y="230" text-anchor="middle" class="item-sub">+ no hard ceiling, elastic</text>
<text x="645" y="250" text-anchor="middle" class="item-sub">+ fault-tolerant (no SPOF)</text>
<text x="645" y="272" text-anchor="middle" class="item-sub">- state must be shared (cache/DB)</text>
</svg>
