<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" width="860" height="440" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="440" fill="#ffffff"/>
<text x="330" y="38" text-anchor="middle" class="title">System Design Building Blocks</text>
<rect x="40" y="68" width="190" height="84" rx="8" fill="#2563eb"/>
<text x="135.0" y="92" text-anchor="middle" class="node-title-w">Load balancer</text>
<text x="135.0" y="112" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">distribute traffic across nodes</text>
<text x="135.0" y="130" text-anchor="middle" font-size="10" fill="#e0e7ff" font-family="inherit">L4/L7, health checks</text>
<rect x="242" y="68" width="190" height="84" rx="8" fill="#1e40af"/>
<text x="337.0" y="92" text-anchor="middle" class="node-title-w">Cache (Redis/Memcached)</text>
<text x="337.0" y="112" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">fast key-value reads</text>
<text x="337.0" y="130" text-anchor="middle" font-size="10" fill="#e0e7ff" font-family="inherit">write-through, eviction</text>
<rect x="444" y="68" width="190" height="84" rx="8" fill="#2563eb"/>
<text x="539.0" y="92" text-anchor="middle" class="node-title-w">CDN</text>
<text x="539.0" y="112" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">static assets at the edge</text>
<text x="539.0" y="130" text-anchor="middle" font-size="10" fill="#e0e7ff" font-family="inherit">cache by URL, invalidation</text>
<rect x="646" y="68" width="190" height="84" rx="8" fill="#1e40af"/>
<text x="741.0" y="92" text-anchor="middle" class="node-title-w">Message queue</text>
<text x="741.0" y="112" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">decouple producers/consumers</text>
<text x="741.0" y="130" text-anchor="middle" font-size="10" fill="#e0e7ff" font-family="inherit">Kafka, RabbitMQ, SQS</text>
<rect x="40" y="166" width="190" height="84" rx="8" fill="#1e40af"/>
<text x="135.0" y="190" text-anchor="middle" class="node-title-w">Database (SQL/NoSQL)</text>
<text x="135.0" y="210" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">durable storage</text>
<text x="135.0" y="228" text-anchor="middle" font-size="10" fill="#e0e7ff" font-family="inherit">primary-replica, sharding</text>
<rect x="242" y="166" width="190" height="84" rx="8" fill="#2563eb"/>
<text x="337.0" y="190" text-anchor="middle" class="node-title-w">Search index</text>
<text x="337.0" y="210" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">full-text / faceted search</text>
<text x="337.0" y="228" text-anchor="middle" font-size="10" fill="#e0e7ff" font-family="inherit">Elasticsearch, OpenSearch</text>
<rect x="444" y="166" width="190" height="84" rx="8" fill="#1e40af"/>
<text x="539.0" y="190" text-anchor="middle" class="node-title-w">Object storage</text>
<text x="539.0" y="210" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">files, images, backups</text>
<text x="539.0" y="228" text-anchor="middle" font-size="10" fill="#e0e7ff" font-family="inherit">S3, GCS, immutable blobs</text>
<rect x="646" y="166" width="190" height="84" rx="8" fill="#2563eb"/>
<text x="741.0" y="190" text-anchor="middle" class="node-title-w">API gateway</text>
<text x="741.0" y="210" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">auth, rate limit, routing</text>
<text x="741.0" y="228" text-anchor="middle" font-size="10" fill="#e0e7ff" font-family="inherit">single entry, offload cross-cutting</text>
</svg>
