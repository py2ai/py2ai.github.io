<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460" width="860" height="460" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="460" fill="#ffffff"/>
<text x="320" y="38" text-anchor="middle" class="title">Tradeoffs: CAP, Consistency, Latency</text>
<rect x="40" y="70" width="400" height="330" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="240" y="96" text-anchor="middle" class="band-label">CAP Theorem (pick 2 of 3)</text>
<rect x="170" y="130" width="140" height="44" rx="8" fill="#2563eb"/>
<text x="240" y="158" text-anchor="middle" class="node-title-w">Consistency</text>
<rect x="300" y="300" width="140" height="44" rx="8" fill="#1e40af"/>
<text x="370" y="328" text-anchor="middle" class="node-title-w">Availability</text>
<rect x="40" y="300" width="140" height="44" rx="8" fill="#2563eb"/>
<text x="110" y="328" text-anchor="middle" class="node-title-w">Partition tolerance</text>
<line x1="240" y1="174" x2="330" y2="300" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="330" y1="322" x2="180" y2="322" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="180" y1="300" x2="235" y2="174" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<text x="240" y="372" text-anchor="middle" class="item-sub">Network partition is unavoidable.</text>
<text x="240" y="392" text-anchor="middle" class="item-sub">So choose: CP (consistent) or AP (available).</text>
<rect x="460" y="70" width="380" height="150" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="650" y="96" text-anchor="middle" class="band-label">Consistency models</text>
<rect x="480" y="120" width="160" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="560" y="145" text-anchor="middle" class="item">Strong</text>
<text x="560" y="200" text-anchor="middle" class="item-sub">linearizable</text>
<rect x="660" y="120" width="160" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="740" y="145" text-anchor="middle" class="item">Eventual</text>
<text x="740" y="200" text-anchor="middle" class="item-sub">reads converge over time</text>
<line x1="640" y1="140" x2="660" y2="140" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-accent)"/>
<text x="650" y="235" text-anchor="middle" class="note">stronger  -&gt;  weaker (faster, more available)</text>
<rect x="460" y="236" width="380" height="164" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="650" y="262" text-anchor="middle" class="band-label">Latency vs Throughput</text>
<text x="650" y="296" text-anchor="middle" class="item">Latency: time for one request (ms)</text>
<text x="650" y="316" text-anchor="middle" class="item">Throughput: requests/sec</text>
<text x="650" y="346" text-anchor="middle" class="item-sub">batching + parallelism raise throughput,</text>
<text x="650" y="364" text-anchor="middle" class="item-sub">but can worsen p99 latency.</text>
<text x="650" y="388" text-anchor="middle" class="note">design for the tail (p99), not the mean.</text>
</svg>
