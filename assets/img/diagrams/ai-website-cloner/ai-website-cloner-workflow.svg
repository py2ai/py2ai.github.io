<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 640" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="wf-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="wf-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ea580c"/>
    </marker>
    <marker id="wf-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="1100" height="640" fill="#ffffff"/>

  <text x="550" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">AI Website Cloner — Cloning Workflow</text>
  <text x="550" y="62" text-anchor="middle" font-size="13" fill="#64748b">From a single URL to a pixel-perfect Next.js codebase</text>

  <!-- Phase labels -->
  <text x="130" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#2563eb">INPUT</text>
  <text x="330" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#ea580c">RECONNAISSANCE</text>
  <text x="560" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#ea580c">FOUNDATION</text>
  <text x="790" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#ea580c">GENERATION</text>
  <text x="990" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">OUTPUT</text>

  <!-- Step 1: URL Input -->
  <rect x="40" y="120" width="180" height="90" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="130" y="150" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">1. URL Input</text>
  <text x="130" y="172" text-anchor="middle" font-size="11" fill="#1e40af">/clone-website</text>
  <text x="130" y="190" text-anchor="middle" font-size="11" fill="#1e40af">https://example.com</text>

  <!-- Step 2: Page Analysis -->
  <rect x="240" y="120" width="180" height="90" rx="12" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
  <text x="330" y="150" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">2. Page Analysis</text>
  <text x="330" y="172" text-anchor="middle" font-size="11" fill="#9a3412">Screenshots (desktop/mobile)</text>
  <text x="330" y="190" text-anchor="middle" font-size="11" fill="#9a3412">Interaction sweep</text>

  <!-- Step 3: Asset Extraction -->
  <rect x="470" y="120" width="180" height="90" rx="12" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
  <text x="560" y="150" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">3. Asset Extraction</text>
  <text x="560" y="172" text-anchor="middle" font-size="11" fill="#9a3412">Images, videos, fonts</text>
  <text x="560" y="190" text-anchor="middle" font-size="11" fill="#9a3412">Design tokens, SVG icons</text>

  <!-- Step 4: AI Code Generation -->
  <rect x="700" y="120" width="180" height="90" rx="12" fill="#ffedd5" stroke="#ea580c" stroke-width="2.5"/>
  <text x="790" y="150" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">4. AI Code Gen</text>
  <text x="790" y="172" text-anchor="middle" font-size="11" fill="#9a3412">Component specs written</text>
  <text x="790" y="190" text-anchor="middle" font-size="11" fill="#9a3412">Parallel builder agents</text>

  <!-- Step 5: Template Assembly -->
  <rect x="900" y="120" width="180" height="90" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="990" y="150" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">5. Template Assembly</text>
  <text x="990" y="172" text-anchor="middle" font-size="11" fill="#166534">Merge worktrees</text>
  <text x="990" y="190" text-anchor="middle" font-size="11" fill="#166534">Wire page.tsx</text>

  <!-- Arrows top row -->
  <line x1="220" y1="165" x2="235" y2="165" stroke="#2563eb" stroke-width="2.5" marker-end="url(#wf-blue)"/>
  <line x1="420" y1="165" x2="465" y2="165" stroke="#ea580c" stroke-width="2.5" marker-end="url(#wf-orange)"/>
  <line x1="650" y1="165" x2="695" y2="165" stroke="#ea580c" stroke-width="2.5" marker-end="url(#wf-orange)"/>
  <line x1="880" y1="165" x2="895" y2="165" stroke="#16a34a" stroke-width="2.5" marker-end="url(#wf-green)"/>

  <!-- Decision diamond: Visual QA pass? -->
  <polygon points="990,250 1080,310 990,370 900,310" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="990" y="305" text-anchor="middle" font-size="13" font-weight="700" fill="#713f12">Visual QA</text>
  <text x="990" y="323" text-anchor="middle" font-size="13" font-weight="700" fill="#713f12">pass?</text>

  <line x1="990" y1="210" x2="990" y2="245" stroke="#16a34a" stroke-width="2.5" marker-end="url(#wf-green)"/>

  <!-- Yes -> Output -->
  <rect x="880" y="420" width="220" height="80" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
  <text x="990" y="450" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">6. Output</text>
  <text x="990" y="472" text-anchor="middle" font-size="11" fill="#166534">Pixel-perfect Next.js</text>
  <text x="990" y="490" text-anchor="middle" font-size="11" fill="#166534">codebase (deploy to Vercel)</text>

  <line x1="990" y1="370" x2="990" y2="415" stroke="#16a34a" stroke-width="2.5" marker-end="url(#wf-green)"/>
  <text x="1000" y="395" font-size="12" font-weight="700" fill="#16a34a">YES</text>

  <!-- No -> re-extract feedback loop -->
  <path d="M 900 310 Q 760 310 760 250 Q 760 215 790 215" fill="none" stroke="#ea580c" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#wf-orange)"/>
  <text x="820" y="300" font-size="12" font-weight="700" fill="#ea580c">NO — re-extract & fix</text>

  <!-- Detail boxes for each phase -->
  <rect x="40" y="420" width="780" height="180" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="60" y="448" font-size="14" font-weight="700" fill="#0f172a">Phase Detail</text>

  <text x="60" y="475" font-size="12" font-weight="700" fill="#2563eb">Reconnaissance</text>
  <text x="60" y="493" font-size="11" fill="#334155">- Full-page screenshots at 1440px & 390px</text>
  <text x="60" y="510" font-size="11" fill="#334155">- Scroll / click / hover / responsive sweeps</text>
  <text x="60" y="527" font-size="11" fill="#334155">- Page topology + behavior bible (BEHAVIORS.md)</text>

  <text x="300" y="475" font-size="12" font-weight="700" fill="#ea580c">Foundation</text>
  <text x="300" y="493" font-size="11" fill="#334155">- Fonts via next/font, colors in globals.css</text>
  <text x="300" y="510" font-size="11" fill="#334155">- TypeScript interfaces, SVG icon components</text>
  <text x="300" y="527" font-size="11" fill="#334155">- Download all images/videos to public/</text>

  <text x="540" y="475" font-size="12" font-weight="700" fill="#ea580c">Generation</text>
  <text x="540" y="493" font-size="11" fill="#334155">- Per-component spec files (exact getComputedStyle)</text>
  <text x="540" y="510" font-size="11" fill="#334155">- Builder agents in git worktrees (parallel)</text>
  <text x="540" y="527" font-size="11" fill="#334155">- Each builder verifies npx tsc --noEmit</text>

  <text x="60" y="560" font-size="12" font-weight="700" fill="#16a34a">Assembly & QA</text>
  <text x="60" y="578" font-size="11" fill="#334155">- Merge worktrees, wire page.tsx, run npm run build</text>
  <text x="60" y="595" font-size="11" fill="#334155">- Side-by-side visual diff at desktop & mobile; fix discrepancies</text>
</svg>