<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 680" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="feat-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="feat-orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffedd5"/>
      <stop offset="100%" stop-color="#fed7aa"/>
    </linearGradient>
    <linearGradient id="feat-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="feat-purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="feat-pink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#fbcfe8"/>
    </linearGradient>
    <linearGradient id="feat-cyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cffafe"/>
      <stop offset="100%" stop-color="#a5f3fc"/>
    </linearGradient>
  </defs>

  <rect width="1100" height="680" fill="#ffffff"/>

  <text x="550" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">AI Website Cloner — Key Features</text>
  <text x="550" y="64" text-anchor="middle" font-size="13" fill="#64748b">Six capabilities that make one-command website cloning possible</text>

  <!-- Feature 1: One-Command Cloning -->
  <rect x="50" y="100" width="320" height="150" rx="14" fill="url(#feat-blue)" stroke="#2563eb" stroke-width="2"/>
  <circle cx="90" cy="135" r="20" fill="#2563eb"/>
  <text x="90" y="141" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">1</text>
  <text x="125" y="141" font-size="16" font-weight="700" fill="#1e3a8a">One-Command Cloning</text>
  <text x="70" y="175" font-size="12" fill="#1e40af">Run /clone-website <url> and the</text>
  <text x="70" y="193" font-size="12" fill="#1e40af">entire pipeline runs autonomously.</text>
  <text x="70" y="211" font-size="12" fill="#1e40af">No manual inspection, no hand-copying</text>
  <text x="70" y="229" font-size="12" fill="#1e40af">of CSS — one command, full clone.</text>

  <!-- Feature 2: Multi-Agent System -->
  <rect x="410" y="100" width="320" height="150" rx="14" fill="url(#feat-orange)" stroke="#ea580c" stroke-width="2"/>
  <circle cx="450" cy="135" r="20" fill="#ea580c"/>
  <text x="450" y="141" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">2</text>
  <text x="485" y="141" font-size="16" font-weight="700" fill="#7c2d12">Multi-Agent System</text>
  <text x="430" y="175" font-size="12" fill="#9a3412">A foreman orchestrator dispatches</text>
  <text x="430" y="193" font-size="12" fill="#9a3412">parallel builder agents in git worktrees.</text>
  <text x="430" y="211" font-size="12" fill="#9a3412">Each agent owns one section and</text>
  <text x="430" y="229" font-size="12" fill="#9a3412">verifies its own build before merge.</text>

  <!-- Feature 3: Template Generation -->
  <rect x="770" y="100" width="320" height="150" rx="14" fill="url(#feat-green)" stroke="#16a34a" stroke-width="2"/>
  <circle cx="810" cy="135" r="20" fill="#16a34a"/>
  <text x="810" y="141" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">3</text>
  <text x="845" y="141" font-size="16" font-weight="700" fill="#14532d">Template Generation</text>
  <text x="790" y="175" font-size="12" fill="#166534">Outputs a clean Next.js 16 codebase</text>
  <text x="790" y="193" font-size="12" fill="#166534">with React 19, shadcn/ui, and Tailwind v4.</text>
  <text x="790" y="211" font-size="12" fill="#166534">Reusable, customizable, and ready</text>
  <text x="790" y="229" font-size="12" fill="#166534">to deploy to Vercel.</text>

  <!-- Feature 4: Asset Extraction -->
  <rect x="50" y="290" width="320" height="150" rx="14" fill="url(#feat-purple)" stroke="#7c3aed" stroke-width="2"/>
  <circle cx="90" cy="325" r="20" fill="#7c3aed"/>
  <text x="90" y="331" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">4</text>
  <text x="125" y="331" font-size="16" font-weight="700" fill="#4c1d95">Asset Extraction</text>
  <text x="70" y="365" font-size="12" fill="#5b21b6">Downloads images, videos, fonts,</text>
  <text x="70" y="383" font-size="12" fill="#5b21b6">favicons, and inline SVGs. Detects</text>
  <text x="70" y="401" font-size="12" fill="#5b21b6">layered/overlay compositions and</text>
  <text x="70" y="419" font-size="12" fill="#5b21b6">preserves meaningful directory structure.</text>

  <!-- Feature 5: Responsive Output -->
  <rect x="410" y="290" width="320" height="150" rx="14" fill="url(#feat-pink)" stroke="#db2777" stroke-width="2"/>
  <circle cx="450" cy="325" r="20" fill="#db2777"/>
  <text x="450" y="331" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">5</text>
  <text x="485" y="331" font-size="16" font-weight="700" fill="#831843">Responsive Output</text>
  <text x="430" y="365" font-size="12" fill="#9d174d">Inspects at 1440px, 768px, and 390px.</text>
  <text x="430" y="383" font-size="12" fill="#9d174d">Captures breakpoint shifts and</text>
  <text x="430" y="401" font-size="12" fill="#9d174d">mobile-first Tailwind utilities so the</text>
  <text x="430" y="419" font-size="12" fill="#9d174d">clone adapts like the original.</text>

  <!-- Feature 6: Customization -->
  <rect x="770" y="290" width="320" height="150" rx="14" fill="url(#feat-cyan)" stroke="#0891b2" stroke-width="2"/>
  <circle cx="810" cy="325" r="20" fill="#0891b2"/>
  <text x="810" y="331" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">6</text>
  <text x="845" y="331" font-size="16" font-weight="700" fill="#155e75">Customization</text>
  <text x="790" y="365" font-size="12" fill="#0e7490">Clone first (pixel-perfect 1:1), then</text>
  <text x="790" y="383" font-size="12" fill="#0e7490">customize. The generated codebase is</text>
  <text x="790" y="401" font-size="12" fill="#0e7490">standard Next.js — edit freely with any</text>
  <text x="790" y="419" font-size="12" fill="#0e7490">AI agent or by hand after the build.</text>

  <!-- Bottom summary band -->
  <rect x="50" y="480" width="1040" height="170" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="70" y="510" font-size="15" font-weight="700" fill="#0f172a">Why these features matter</text>
  <text x="70" y="538" font-size="12" fill="#334155">Traditional website cloning is a manual grind: open DevTools, copy CSS values one at a time, screenshot</text>
  <text x="70" y="556" font-size="12" fill="#334155">references, hand-build components, and hope the result looks close. AI Website Cloner automates the entire</text>
  <text x="70" y="574" font-size="12" fill="#334155">process with a multi-agent pipeline that extracts exact computed styles, dispatches parallel builders, and</text>
  <text x="70" y="592" font-size="12" fill="#334155">assembles a verified, deployable Next.js codebase — turning days of tedious work into a single command.</text>
  <text x="70" y="624" font-size="12" font-weight="700" fill="#0f172a">Supported agents: Claude Code (recommended), Codex CLI, Cursor, Windsurf, Gemini CLI, Cline, and more.</text>
</svg>