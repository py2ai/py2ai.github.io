<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ea580c"/>
    </marker>
    <linearGradient id="grad-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <linearGradient id="grad-orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffedd5"/>
      <stop offset="100%" stop-color="#fdba74"/>
    </linearGradient>
    <linearGradient id="grad-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
  </defs>

  <rect width="1100" height="720" fill="#ffffff"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">AI Website Cloner — System Architecture</text>
  <text x="550" y="62" text-anchor="middle" font-size="13" fill="#64748b">One command dispatches AI agents that inspect, extract, and rebuild any website</text>

  <!-- User Input -->
  <rect x="40" y="110" width="180" height="70" rx="12" fill="url(#grad-blue)" stroke="#2563eb" stroke-width="2"/>
  <text x="130" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">User Input</text>
  <text x="130" y="160" text-anchor="middle" font-size="12" fill="#1e40af">/clone-website <url></text>

  <!-- AI Agent Orchestrator -->
  <rect x="300" y="100" width="220" height="90" rx="14" fill="url(#grad-orange)" stroke="#ea580c" stroke-width="2.5"/>
  <text x="410" y="132" text-anchor="middle" font-size="15" font-weight="700" fill="#7c2d12">AI Agent Orchestrator</text>
  <text x="410" y="152" text-anchor="middle" font-size="11" fill="#9a3412">Foreman / Coordinator</text>
  <text x="410" y="170" text-anchor="middle" font-size="11" fill="#9a3412">Claude Code (Opus 4.8)</text>

  <!-- Browser MCP -->
  <rect x="600" y="110" width="180" height="70" rx="12" fill="url(#grad-blue)" stroke="#2563eb" stroke-width="2"/>
  <text x="690" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Browser MCP</text>
  <text x="690" y="160" text-anchor="middle" font-size="11" fill="#1e40af">Chrome / Playwright</text>

  <!-- Web Scraper / Reconnaissance -->
  <rect x="840" y="110" width="220" height="70" rx="12" fill="url(#grad-blue)" stroke="#2563eb" stroke-width="2"/>
  <text x="950" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Web Scraper</text>
  <text x="950" y="160" text-anchor="middle" font-size="11" fill="#1e40af">Screenshots + getComputedStyle</text>

  <!-- Foundation Build -->
  <rect x="300" y="250" width="220" height="80" rx="12" fill="url(#grad-orange)" stroke="#ea580c" stroke-width="2"/>
  <text x="410" y="278" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">Foundation Builder</text>
  <text x="410" y="298" text-anchor="middle" font-size="11" fill="#9a3412">Fonts, Colors, globals.css</text>
  <text x="410" y="316" text-anchor="middle" font-size="11" fill="#9a3412">Types, Icons, Asset Download</text>

  <!-- Component Spec Writer -->
  <rect x="600" y="250" width="180" height="80" rx="12" fill="url(#grad-orange)" stroke="#ea580c" stroke-width="2"/>
  <text x="690" y="278" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">Spec Writer</text>
  <text x="690" y="298" text-anchor="middle" font-size="11" fill="#9a3412">docs/research/components/</text>
  <text x="690" y="316" text-anchor="middle" font-size="11" fill="#9a3412">Exact CSS + behaviors</text>

  <!-- Parallel Builder Agents -->
  <rect x="840" y="250" width="220" height="80" rx="12" fill="url(#grad-orange)" stroke="#ea580c" stroke-width="2.5"/>
  <text x="950" y="278" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">Parallel Builders</text>
  <text x="950" y="298" text-anchor="middle" font-size="11" fill="#9a3412">Git worktrees</text>
  <text x="950" y="316" text-anchor="middle" font-size="11" fill="#9a3412">One agent per section</text>

  <!-- Code Generator / Next.js -->
  <rect x="300" y="400" width="220" height="80" rx="12" fill="url(#grad-green)" stroke="#16a34a" stroke-width="2"/>
  <text x="410" y="428" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">Code Generator</text>
  <text x="410" y="448" text-anchor="middle" font-size="11" fill="#166534">Next.js 16 + React 19</text>
  <text x="410" y="466" text-anchor="middle" font-size="11" fill="#166534">shadcn/ui + Tailwind v4</text>

  <!-- Assembly & QA -->
  <rect x="600" y="400" width="180" height="80" rx="12" fill="url(#grad-green)" stroke="#16a34a" stroke-width="2"/>
  <text x="690" y="428" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">Assembly & QA</text>
  <text x="690" y="448" text-anchor="middle" font-size="11" fill="#166534">Merge worktrees</text>
  <text x="690" y="466" text-anchor="middle" font-size="11" fill="#166534">Visual diff QA</text>

  <!-- Template Output -->
  <rect x="840" y="400" width="220" height="80" rx="12" fill="url(#grad-green)" stroke="#16a34a" stroke-width="2.5"/>
  <text x="950" y="428" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">Template Output</text>
  <text x="950" y="448" text-anchor="middle" font-size="11" fill="#166534">Pixel-perfect Next.js</text>
  <text x="950" y="466" text-anchor="middle" font-size="11" fill="#166534">codebase ready to deploy</text>

  <!-- Arrows: data flow (blue) -->
  <line x1="220" y1="145" x2="295" y2="145" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <line x1="520" y1="145" x2="595" y2="145" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <line x1="780" y1="145" x2="835" y2="145" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>

  <!-- Arrows: AI processing (orange) -->
  <line x1="410" y1="190" x2="410" y2="245" stroke="#ea580c" stroke-width="2.5" marker-end="url(#arrow-orange)"/>
  <line x1="520" y1="290" x2="595" y2="290" stroke="#ea580c" stroke-width="2.5" marker-end="url(#arrow-orange)"/>
  <line x1="780" y1="290" x2="835" y2="290" stroke="#ea580c" stroke-width="2.5" marker-end="url(#arrow-orange)"/>

  <!-- Arrows: success/output (green) -->
  <line x1="950" y1="330" x2="950" y2="395" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <line x1="840" y1="440" x2="775" y2="440" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <line x1="600" y1="440" x2="525" y2="440" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrow-green)"/>

  <!-- Feedback loop: QA back to orchestrator -->
  <path d="M 690 400 Q 690 360 410 360 Q 410 340 410 190" fill="none" stroke="#ea580c" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-orange)"/>
  <text x="540" y="355" text-anchor="middle" font-size="11" fill="#9a3412" font-style="italic">re-extract on mismatch</text>

  <!-- Legend -->
  <rect x="40" y="540" width="1020" height="150" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="60" y="568" font-size="14" font-weight="700" fill="#0f172a">Legend & Layer Descriptions</text>

  <rect x="60" y="585" width="22" height="14" rx="3" fill="url(#grad-blue)" stroke="#2563eb"/>
  <text x="92" y="597" font-size="12" fill="#334155">Blue = Data flow (URL, screenshots, computed CSS)</text>

  <rect x="60" y="610" width="22" height="14" rx="3" fill="url(#grad-orange)" stroke="#ea580c"/>
  <text x="92" y="622" font-size="12" fill="#334155">Orange = AI processing (orchestration, spec writing, parallel building)</text>

  <rect x="60" y="635" width="22" height="14" rx="3" fill="url(#grad-green)" stroke="#16a34a"/>
  <text x="92" y="647" font-size="12" fill="#334155">Green = Success / output (generated code, assembled template, deployable site)</text>

  <text x="560" y="597" font-size="12" fill="#334155">Orchestrator acts as a "foreman" — extracts, writes specs, dispatches builders in parallel.</text>
  <text x="560" y="622" font-size="12" fill="#334155">Each builder works in its own git worktree; merges are resolved by the orchestrator.</text>
  <text x="560" y="647" font-size="12" fill="#334155">Visual QA diff feeds back into re-extraction when discrepancies are found.</text>
</svg>