<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 660" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ap-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ea580c"/>
    </marker>
    <marker id="ap-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
    <marker id="ap-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect width="1100" height="660" fill="#ffffff"/>

  <text x="550" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">AI Website Cloner — Agent Pipeline</text>
  <text x="550" y="62" text-anchor="middle" font-size="13" fill="#64748b">Specialized agents collaborate: scrape, analyze, generate, review, output</text>

  <!-- Pipeline header -->
  <text x="550" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#ea580c">ORCHESTRATOR (Foreman) coordinates all agents</text>

  <!-- Agent 1: Scrape Agent -->
  <rect x="40" y="120" width="190" height="120" rx="14" fill="#ffedd5" stroke="#ea580c" stroke-width="2.5"/>
  <text x="135" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#7c2d12">Scrape Agent</text>
  <text x="135" y="172" text-anchor="middle" font-size="11" fill="#9a3412">Browser MCP navigation</text>
  <text x="135" y="190" text-anchor="middle" font-size="11" fill="#9a3412">Full-page screenshots</text>
  <text x="135" y="208" text-anchor="middle" font-size="11" fill="#9a3412">Asset enumeration</text>
  <text x="135" y="226" text-anchor="middle" font-size="11" fill="#9a3412">getComputedStyle dump</text>

  <!-- Agent 2: Analyze Agent -->
  <rect x="270" y="120" width="190" height="120" rx="14" fill="#ffedd5" stroke="#ea580c" stroke-width="2.5"/>
  <text x="365" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#7c2d12">Analyze Agent</text>
  <text x="365" y="172" text-anchor="middle" font-size="11" fill="#9a3412">Interaction sweep</text>
  <text x="365" y="190" text-anchor="middle" font-size="11" fill="#9a3412">(scroll/click/hover)</text>
  <text x="365" y="208" text-anchor="middle" font-size="11" fill="#9a3412">Page topology map</text>
  <text x="365" y="226" text-anchor="middle" font-size="11" fill="#9a3412">Behavior bible</text>

  <!-- Agent 3: Generate Agent (parallel builders) -->
  <rect x="500" y="120" width="190" height="120" rx="14" fill="#ffedd5" stroke="#ea580c" stroke-width="2.5"/>
  <text x="595" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#7c2d12">Generate Agent(s)</text>
  <text x="595" y="172" text-anchor="middle" font-size="11" fill="#9a3412">Parallel builders</text>
  <text x="595" y="190" text-anchor="middle" font-size="11" fill="#9a3412">in git worktrees</text>
  <text x="595" y="208" text-anchor="middle" font-size="11" fill="#9a3412">One per section</text>
  <text x="595" y="226" text-anchor="middle" font-size="11" fill="#9a3412">tsc --noEmit check</text>

  <!-- Agent 4: Review Agent -->
  <rect x="730" y="120" width="190" height="120" rx="14" fill="#ffedd5" stroke="#ea580c" stroke-width="2.5"/>
  <text x="825" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#7c2d12">Review Agent</text>
  <text x="825" y="172" text-anchor="middle" font-size="11" fill="#9a3412">Merge worktrees</text>
  <text x="825" y="190" text-anchor="middle" font-size="11" fill="#9a3412">Visual diff QA</text>
  <text x="825" y="208" text-anchor="middle" font-size="11" fill="#9a3412">npm run build</text>
  <text x="825" y="226" text-anchor="middle" font-size="11" fill="#9a3412">Conflict resolution</text>

  <!-- Output -->
  <rect x="960" y="120" width="120" height="120" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
  <text x="1020" y="160" text-anchor="middle" font-size="15" font-weight="700" fill="#14532d">Output</text>
  <text x="1020" y="185" text-anchor="middle" font-size="11" fill="#166534">Pixel-perfect</text>
  <text x="1020" y="203" text-anchor="middle" font-size="11" fill="#166534">Next.js</text>
  <text x="1020" y="221" text-anchor="middle" font-size="11" fill="#166534">codebase</text>

  <!-- Arrows between agents -->
  <line x1="230" y1="180" x2="265" y2="180" stroke="#ea580c" stroke-width="2.5" marker-end="url(#ap-orange)"/>
  <line x1="460" y1="180" x2="495" y2="180" stroke="#ea580c" stroke-width="2.5" marker-end="url(#ap-orange)"/>
  <line x1="690" y1="180" x2="725" y2="180" stroke="#ea580c" stroke-width="2.5" marker-end="url(#ap-orange)"/>
  <line x1="920" y1="180" x2="955" y2="180" stroke="#16a34a" stroke-width="2.5" marker-end="url(#ap-green)"/>

  <!-- Spec files artifact (shared) -->
  <rect x="270" y="290" width="420" height="70" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="480" y="318" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Component Spec Files (docs/research/components/)</text>
  <text x="480" y="340" text-anchor="middle" font-size="11" fill="#1e40af">Exact CSS, states, behaviors, assets, verbatim content — the contract between extraction and building</text>

  <!-- Arrows: analyze -> spec, spec -> generate -->
  <line x1="365" y1="240" x2="365" y2="285" stroke="#2563eb" stroke-width="2" marker-end="url(#ap-blue)"/>
  <line x1="595" y1="290" x2="595" y2="245" stroke="#2563eb" stroke-width="2" marker-end="url(#ap-blue)"/>

  <!-- Feedback loop: review -> analyze (re-extract) -->
  <path d="M 825 240 Q 825 400 365 400 Q 365 360 365 245" fill="none" stroke="#ea580c" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#ap-orange)"/>
  <text x="595" y="395" text-anchor="middle" font-size="12" font-style="italic" fill="#9a3412">discrepancy found — re-extract & rebuild</text>

  <!-- Collaboration detail -->
  <rect x="40" y="440" width="1040" height="200" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="60" y="470" font-size="15" font-weight="700" fill="#0f172a">How the Agents Collaborate</text>

  <text x="60" y="498" font-size="12" font-weight="700" fill="#ea580c">Scrape -> Analyze:</text>
  <text x="180" y="498" font-size="12" fill="#334155">Raw screenshots and computed-style dumps flow to the analyzer, which maps page topology and documents behaviors.</text>

  <text x="60" y="524" font-size="12" font-weight="700" fill="#ea580c">Analyze -> Spec:</text>
  <text x="180" y="524" font-size="12" fill="#334155">The analyzer writes a spec file per component — the single source of truth with exact values, not estimates.</text>

  <text x="60" y="550" font-size="12" font-weight="700" fill="#ea580c">Spec -> Generate:</text>
  <text x="180" y="550" font-size="12" fill="#334155">Each builder receives its full spec inline and works in an isolated git worktree; builders run in parallel.</text>

  <text x="60" y="576" font-size="12" font-weight="700" fill="#ea580c">Generate -> Review:</text>
  <text x="180" y="576" font-size="12" fill="#334155">The review agent merges branches, resolves conflicts with full context, and runs a side-by-side visual diff.</text>

  <text x="60" y="602" font-size="12" font-weight="700" fill="#16a34a">Review -> Output:</text>
  <text x="180" y="602" font-size="12" fill="#334155">On a passing QA, the assembled Next.js codebase is ready. On failure, the loop returns to re-extraction.</text>

  <text x="60" y="628" font-size="12" font-weight="700" fill="#2563eb">Key principle:</text>
  <text x="180" y="628" font-size="12" fill="#334155">Completeness beats speed — every builder gets everything it needs so it never has to guess.</text>
</svg>