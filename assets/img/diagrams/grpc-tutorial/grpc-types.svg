<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" width="860" height="430" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
  .mono { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 11px; fill: #0f172a; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="430" fill="#ffffff"/>
<text x="320" y="38" text-anchor="middle" class="title">RPC Types + HTTP/2</text>
<rect x="40" y="70" width="780" height="70" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="82" width="200" height="46" rx="8" fill="#1e40af"/>
<text x="154" y="104" text-anchor="middle" class="node-title-w">Unary</text>
<text x="154" y="122" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">one req, one resp</text>
<rect x="274" y="82" width="546" height="46" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="547" y="110" text-anchor="middle" class="item">Get(id) -&gt; Order</text>
<rect x="40" y="150" width="780" height="70" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="162" width="200" height="46" rx="8" fill="#2563eb"/>
<text x="154" y="184" text-anchor="middle" class="node-title-w">Server stream</text>
<text x="154" y="202" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">one req, stream of resp</text>
<rect x="274" y="162" width="546" height="46" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="547" y="190" text-anchor="middle" class="item">Subscribe() -&gt; stream Event</text>
<rect x="40" y="230" width="780" height="70" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="242" width="200" height="46" rx="8" fill="#1e40af"/>
<text x="154" y="264" text-anchor="middle" class="node-title-w">Client stream</text>
<text x="154" y="282" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">stream req, one resp</text>
<rect x="274" y="242" width="546" height="46" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="547" y="270" text-anchor="middle" class="item">Upload(stream Chunk) -&gt; Summary</text>
<rect x="40" y="310" width="780" height="70" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="322" width="200" height="46" rx="8" fill="#2563eb"/>
<text x="154" y="344" text-anchor="middle" class="node-title-w">Bidi stream</text>
<text x="154" y="362" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">stream req, stream resp</text>
<rect x="274" y="322" width="546" height="46" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="547" y="350" text-anchor="middle" class="item">Chat(stream Msg) -&gt; stream Msg</text>
<rect x="40" y="400" width="780" height="26" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="430" y="418" text-anchor="middle" class="note">All over HTTP/2: multiplexed, binary-framed, one TCP connection, header compression (HPACK).</text>
</svg>
