<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" width="860" height="420" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
  .mono { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 11px; fill: #0f172a; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="420" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">.proto -&gt; Codegen -&gt; Stubs in N Languages</text>
<rect x="40" y="70" width="280" height="280" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="180" y="96" text-anchor="middle" class="band-label">.proto (contract)</text>
<rect x="60" y="112" width="240" height="230" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="180" y="136" text-anchor="middle" class="mono">syntax = proto3;</text>
<text x="180" y="158" text-anchor="middle" class="mono">package shop;</text>
<text x="180" y="184" text-anchor="middle" class="mono">message Order {</text>
<text x="180" y="180" text-anchor="middle" class="mono">  int64 id = 1;</text>
<text x="180" y="202" text-anchor="middle" class="mono">  string item = 2;</text>
<text x="180" y="224" text-anchor="middle" class="mono">  float total = 3;</text>
<text x="180" y="246" text-anchor="middle" class="mono">}</text>
<text x="180" y="272" text-anchor="middle" class="mono">service Shop {</text>
<text x="180" y="294" text-anchor="middle" class="mono">  rpc Get(OrderReq)</text>
<text x="180" y="316" text-anchor="middle" class="mono">   returns (Order);</text>
<text x="180" y="338" text-anchor="middle" class="mono">}</text>
<line x1="320" y1="210" x2="360" y2="210" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<text x="340" y="202" text-anchor="middle" class="item-sub">protoc</text>
<rect x="380" y="70" width="480" height="280" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="620" y="96" text-anchor="middle" class="band-label">generated stubs (one set per language)</text>
<rect x="400" y="118" width="210" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="505" y="138" text-anchor="middle" class="item">Go</text>
<text x="505" y="154" text-anchor="middle" class="item-sub">shop.pb.go + grpc</text>
<rect x="630" y="118" width="210" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="735" y="138" text-anchor="middle" class="item">Python</text>
<text x="735" y="154" text-anchor="middle" class="item-sub">shop_pb2.py + grpc</text>
<rect x="400" y="170" width="210" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="505" y="190" text-anchor="middle" class="item">Java</text>
<text x="505" y="206" text-anchor="middle" class="item-sub">ShopGrpc.java</text>
<rect x="630" y="170" width="210" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="735" y="190" text-anchor="middle" class="item">TypeScript</text>
<text x="735" y="206" text-anchor="middle" class="item-sub">shop.ts + grpc-web</text>
<rect x="400" y="222" width="210" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="505" y="242" text-anchor="middle" class="item">Rust</text>
<text x="505" y="258" text-anchor="middle" class="item-sub">shop.rs + tonic</text>
<rect x="630" y="222" width="210" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="735" y="242" text-anchor="middle" class="item">C++</text>
<text x="735" y="258" text-anchor="middle" class="item-sub">shop.pb.h/.cc</text>
<rect x="40" y="366" width="780" height="30" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="430" y="386" text-anchor="middle" class="note">One .proto is the single source of truth; every language gets matching, typed stubs.</text>
</svg>
