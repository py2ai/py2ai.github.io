<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" width="860" height="430" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
  .mono { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 11px; fill: #0f172a; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="430" fill="#ffffff"/>
<text x="320" y="38" text-anchor="middle" class="title">gRPC vs REST vs GraphQL</text>
<rect x="40" y="70" width="780" height="34" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="154" y="90" text-anchor="middle" class="band-label"> </text>
<text x="274" y="90" text-anchor="middle" class="band-label">wire format</text>
<text x="420" y="90" text-anchor="middle" class="band-label">transport</text>
<text x="560" y="90" text-anchor="middle" class="band-label">contract</text>
<text x="710" y="90" text-anchor="middle" class="band-label">best for</text>
<rect x="40" y="110" width="780" height="64" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="120" width="200" height="44" rx="8" fill="#1e40af"/>
<text x="154" y="140" text-anchor="middle" class="node-title-w">gRPC</text>
<rect x="274" y="120" width="140" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="344" y="140" text-anchor="middle" class="item">binary (protobuf)</text>
<text x="344" y="158" text-anchor="middle" class="item-sub">format</text>
<rect x="420" y="120" width="136" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="488" y="140" text-anchor="middle" class="item">HTTP/2</text>
<rect x="560" y="120" width="140" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="630" y="140" text-anchor="middle" class="item-sub">strict, codegen</text>
<rect x="706" y="120" width="100" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="756" y="140" text-anchor="middle" class="item-sub">service-to-service</text>
<rect x="40" y="184" width="780" height="64" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="194" width="200" height="44" rx="8" fill="#2563eb"/>
<text x="154" y="214" text-anchor="middle" class="node-title-w">REST</text>
<rect x="274" y="194" width="140" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="344" y="214" text-anchor="middle" class="item">text (JSON)</text>
<text x="344" y="232" text-anchor="middle" class="item-sub">format</text>
<rect x="420" y="194" width="136" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="488" y="214" text-anchor="middle" class="item">HTTP/1.1</text>
<rect x="560" y="194" width="140" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="630" y="214" text-anchor="middle" class="item-sub">loose, by hand</text>
<rect x="706" y="194" width="100" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="756" y="214" text-anchor="middle" class="item-sub">public APIs, web</text>
<rect x="40" y="258" width="780" height="64" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="268" width="200" height="44" rx="8" fill="#1e40af"/>
<text x="154" y="288" text-anchor="middle" class="node-title-w">GraphQL</text>
<rect x="274" y="268" width="140" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="344" y="288" text-anchor="middle" class="item">text (JSON)</text>
<text x="344" y="306" text-anchor="middle" class="item-sub">format</text>
<rect x="420" y="268" width="136" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="488" y="288" text-anchor="middle" class="item">HTTP/1.1</text>
<rect x="560" y="268" width="140" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="630" y="288" text-anchor="middle" class="item-sub">schema, query-driven</text>
<rect x="706" y="268" width="100" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="756" y="288" text-anchor="middle" class="item-sub">flexible client queries</text>
<rect x="40" y="338" width="780" height="30" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="430" y="358" text-anchor="middle" class="note">gRPC for internal perf; REST for public/edges; GraphQL for flexible client needs.</text>
</svg>
