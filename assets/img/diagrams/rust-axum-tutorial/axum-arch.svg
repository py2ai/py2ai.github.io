<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" width="860" height="400" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="400" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">Axum Architecture: Tokio + Tower + Hyper</text>
<rect x="250" y="70" width="360" height="40" rx="8" fill="#1e40af"/>
<text x="430" y="96" text-anchor="middle" class="node-title-w">Axum (routing + extractors)</text>
<line x1="430" y1="110" x2="430" y2="130" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="250" y="132" width="360" height="40" rx="8" fill="#2563eb"/>
<text x="430" y="158" text-anchor="middle" class="node-title-w">Tower (middleware + Service trait)</text>
<line x1="430" y1="172" x2="430" y2="192" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="250" y="194" width="360" height="40" rx="8" fill="#1e40af"/>
<text x="430" y="220" text-anchor="middle" class="node-title-w">Hyper (HTTP/1 + HTTP/2)</text>
<line x1="430" y1="234" x2="430" y2="254" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="250" y="256" width="360" height="40" rx="8" fill="#2563eb"/>
<text x="430" y="282" text-anchor="middle" class="node-title-w">Tokio (async runtime, I/O)</text>
<rect x="40" y="320" width="800" height="40" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="430" y="342" text-anchor="middle" class="note">Axum = thin routing layer on Tower, on Hyper, on Tokio. Each layer is composable.</text>
</svg>
