<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" width="860" height="400" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="400" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">Middleware: Tower Layers + from_fn</text>
<rect x="40" y="80" width="190" height="50" rx="8" fill="#1e40af"/>
<text x="135.0" y="110" text-anchor="middle" class="node-title-w">tracing</text>
<line x1="230" y1="105" x2="242" y2="105" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="242" y="80" width="190" height="50" rx="8" fill="#2563eb"/>
<text x="337.0" y="110" text-anchor="middle" class="node-title-w">auth</text>
<line x1="432" y1="105" x2="444" y2="105" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="444" y="80" width="190" height="50" rx="8" fill="#1e40af"/>
<text x="539.0" y="110" text-anchor="middle" class="node-title-w">rate limit</text>
<line x1="634" y1="105" x2="646" y2="105" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="646" y="80" width="190" height="50" rx="8" fill="#2563eb"/>
<text x="741.0" y="110" text-anchor="middle" class="node-title-w">handler</text>
<rect x="40" y="160" width="800" height="100" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="186" text-anchor="middle" class="band-label">from_fn: write middleware as a closure</text>
<rect x="60" y="206" width="740" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="430" y="232" text-anchor="middle" class="item-sub">.layer(from_fn(|req, next| async { auth check; next.run(req).await }))</text>
<rect x="40" y="280" width="800" height="80" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="306" text-anchor="middle" class="band-label">Common middleware</text>
<rect x="60" y="318" width="170" height="36" rx="8" fill="#2563eb"/>
<text x="145" y="340" text-anchor="middle" class="node-title-w">tracing-subscriber</text>
<text x="145" y="356" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">structured logs</text>
<rect x="250" y="318" width="170" height="36" rx="8" fill="#1e40af"/>
<text x="335" y="340" text-anchor="middle" class="node-title-w">tower-http</text>
<text x="335" y="356" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">CORS, compression, timeout</text>
<rect x="440" y="318" width="170" height="36" rx="8" fill="#2563eb"/>
<text x="525" y="340" text-anchor="middle" class="node-title-w">tower::limit</text>
<text x="525" y="356" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">rate limit + concurrency</text>
<rect x="630" y="318" width="170" height="36" rx="8" fill="#1e40af"/>
<text x="715" y="340" text-anchor="middle" class="node-title-w">tonic</text>
<text x="715" y="356" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">gRPC (if needed)</text>
</svg>
