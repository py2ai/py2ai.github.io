<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" width="860" height="440" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
  .mono { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 11px; fill: #0f172a; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="440" fill="#ffffff"/>
<text x="320" y="38" text-anchor="middle" class="title">Grammar -&gt; Parse Tree -&gt; AST</text>
<rect x="40" y="70" width="280" height="250" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="180" y="96" text-anchor="middle" class="band-label">Grammar (BNF)</text>
<rect x="60" y="112" width="240" height="200" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="180" y="136" text-anchor="middle" class="mono">expr := term + expr</text>
<text x="180" y="156" text-anchor="middle" class="mono">      | term</text>
<text x="180" y="184" text-anchor="middle" class="mono">term := factor * term</text>
<text x="180" y="204" text-anchor="middle" class="mono">      | factor</text>
<text x="180" y="232" text-anchor="middle" class="mono">factor := NUM</text>
<text x="180" y="252" text-anchor="middle" class="mono">        | ( expr )</text>
<text x="180" y="290" text-anchor="middle" class="mono">recursive descent: one</text>
<text x="180" y="300" text-anchor="middle" class="mono">fn per non-terminal</text>
<line x1="320" y1="195" x2="360" y2="195" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="380" y="70" width="220" height="250" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="490" y="96" text-anchor="middle" class="band-label">Parse tree</text>
<rect x="470" y="120" width="60" height="30" rx="8" fill="#1e40af"/>
<text x="500" y="140" text-anchor="middle" class="node-title-w">expr</text>
<rect x="400" y="170" width="60" height="30" rx="8" fill="#2563eb"/>
<text x="430" y="190" text-anchor="middle" class="node-title-w">term</text>
<rect x="540" y="170" width="60" height="30" rx="8" fill="#2563eb"/>
<text x="570" y="190" text-anchor="middle" class="node-title-w">+</text>
<rect x="400" y="220" width="60" height="30" rx="8" fill="#1e40af"/>
<text x="430" y="240" text-anchor="middle" class="node-title-w">2</text>
<line x1="490" y1="150" x2="430" y2="170" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="490" y1="150" x2="570" y2="170" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="430" y1="200" x2="430" y2="220" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="600" y1="195" x2="640" y2="195" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="620" y="70" width="220" height="250" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="730" y="96" text-anchor="middle" class="band-label">AST (compact)</text>
<rect x="680" y="120" width="100" height="30" rx="8" fill="#1e40af"/>
<text x="730" y="140" text-anchor="middle" class="node-title-w">Add</text>
<rect x="640" y="180" width="60" height="30" rx="8" fill="#2563eb"/>
<text x="670" y="200" text-anchor="middle" class="node-title-w">Num</text>
<text x="670" y="218" text-anchor="middle" class="item-sub">2</text>
<rect x="720" y="180" width="60" height="30" rx="8" fill="#1e40af"/>
<text x="750" y="200" text-anchor="middle" class="node-title-w">y</text>
<line x1="710" y1="150" x2="670" y2="180" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="730" y1="150" x2="750" y2="180" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="40" y="340" width="780" height="40" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="430" y="362" text-anchor="middle" class="note">Parse tree keeps every grammar step; AST drops syntax sugar, keeps meaning.</text>
</svg>
