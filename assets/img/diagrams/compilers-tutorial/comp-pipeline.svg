<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" width="860" height="380" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
  .mono { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 11px; fill: #0f172a; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="380" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">The Compiler Pipeline</text>
<rect x="30" y="90" width="160" height="120" rx="8" fill="#1e40af"/>
<text x="110.0" y="120" text-anchor="middle" class="node-title-w">Source</text>
<text x="110.0" y="150" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">x + 2 * y</text>
<line x1="190" y1="150" x2="202" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="202" y="90" width="160" height="120" rx="8" fill="#2563eb"/>
<text x="282.0" y="120" text-anchor="middle" class="node-title-w">Tokens</text>
<text x="282.0" y="150" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">ID(x) PLUS NUM(2) STAR ID(y)</text>
<line x1="362" y1="150" x2="374" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="374" y="90" width="160" height="120" rx="8" fill="#1e40af"/>
<text x="454.0" y="120" text-anchor="middle" class="node-title-w">AST</text>
<text x="454.0" y="150" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">Add(Mul(Num2, Var y), Var x)</text>
<line x1="534" y1="150" x2="546" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="546" y="90" width="160" height="120" rx="8" fill="#2563eb"/>
<text x="626.0" y="120" text-anchor="middle" class="node-title-w">IR</text>
<text x="626.0" y="150" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">t0 = 2 * y; t1 = x + t0</text>
<line x1="706" y1="150" x2="718" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="718" y="90" width="160" height="120" rx="8" fill="#1e40af"/>
<text x="798.0" y="120" text-anchor="middle" class="node-title-w">Target</text>
<text x="798.0" y="150" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">mov r1, 2; mul r1, [y]; add r1, [x]</text>
<rect x="40" y="236" width="780" height="60" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="262" text-anchor="middle" class="band-label">front-end (lex+parse+sema)  -&gt;  middle (IR + optim)  -&gt;  back-end (codegen)</text>
<text x="430" y="286" text-anchor="middle" class="item-sub">front-end is source-specific; back-end is target-specific; IR is the shared middle</text>
</svg>
