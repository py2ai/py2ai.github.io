<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" width="860" height="420" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
  .mono { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 11px; fill: #0f172a; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="420" fill="#ffffff"/>
<text x="320" y="38" text-anchor="middle" class="title">IR + Optimization Passes</text>
<rect x="40" y="68" width="190" height="80" rx="8" fill="#1e40af"/>
<text x="135.0" y="94" text-anchor="middle" class="node-title-w">constant folding</text>
<text x="135.0" y="116" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">2 + 3 -&gt; 5 (at compile time)</text>
<rect x="242" y="68" width="190" height="80" rx="8" fill="#2563eb"/>
<text x="337.0" y="94" text-anchor="middle" class="node-title-w">dead code elimination</text>
<text x="337.0" y="116" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">remove unused results</text>
<rect x="444" y="68" width="190" height="80" rx="8" fill="#1e40af"/>
<text x="539.0" y="94" text-anchor="middle" class="node-title-w">common subexpr elim</text>
<text x="539.0" y="116" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">x=(a+b); y=(a+b) -&gt; x=y</text>
<rect x="646" y="68" width="190" height="80" rx="8" fill="#2563eb"/>
<text x="741.0" y="94" text-anchor="middle" class="node-title-w">inlining</text>
<text x="741.0" y="116" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">replace call with body</text>
<rect x="40" y="162" width="190" height="80" rx="8" fill="#1e40af"/>
<text x="135.0" y="188" text-anchor="middle" class="node-title-w">loop unrolling</text>
<text x="135.0" y="210" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">repeat body N times</text>
<rect x="242" y="162" width="190" height="80" rx="8" fill="#2563eb"/>
<text x="337.0" y="188" text-anchor="middle" class="node-title-w">strength reduction</text>
<text x="337.0" y="210" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">x*2 -&gt; x+x (or x&lt;&lt;1)</text>
<rect x="444" y="162" width="190" height="80" rx="8" fill="#1e40af"/>
<text x="539.0" y="188" text-anchor="middle" class="node-title-w">copy propagation</text>
<text x="539.0" y="210" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">use the source, drop the copy</text>
<rect x="646" y="162" width="190" height="80" rx="8" fill="#2563eb"/>
<text x="741.0" y="188" text-anchor="middle" class="node-title-w">SSA form</text>
<text x="741.0" y="210" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">each var assigned once</text>
<rect x="40" y="360" width="780" height="30" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="430" y="380" text-anchor="middle" class="note">Passes run on IR, repeatedly, until a fixed point; IR (esp. SSA) makes them simple.</text>
</svg>
