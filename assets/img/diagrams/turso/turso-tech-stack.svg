  <text x="60" y="458" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#AD1457" text-anchor="start">Browser Runtime</text>
  <text x="60" y="482" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" fill="#AD1457" text-anchor="start">WebAssembly | OPFS</text>
