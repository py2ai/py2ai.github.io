  <text x="60" y="400" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" fill="#F57F17" text-anchor="start">io_uring (Linux) | Platform Async Backends</text>
  <text x="780" y="387.0" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#78909C" text-anchor="middle">^</text>
