<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <title>Turso Use Cases</title>
  <rect x="340" y="265" width="220" height="70" rx="14" ry="14" fill="#37474F" stroke="#263238" stroke-width="1.5"/>
  <text x="450" y="295" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Turso Use Cases</text>
  <text x="450" y="318" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" fill="#CFD8DC" text-anchor="middle">Edge + AI + Local-First</text>
  <rect x="80" y="60" width="200" height="70" rx="8" ry="8" fill="#E1BEE7" stroke="#6A1B9A" stroke-width="1.5"/>
  <text x="180.0" y="88" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#6A1B9A" text-anchor="middle">AI Agents</text>
  <text x="180.0" y="110" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="normal" fill="#6A1B9A" text-anchor="middle">On-device RAG, vector search, zero latency</text>
  <line x1="450" y1="300" x2="180.0" y2="95.0" stroke="#90A4AE" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="680" y="60" width="200" height="70" rx="8" ry="8" fill="#B3E5FC" stroke="#01579B" stroke-width="1.5"/>
  <text x="780.0" y="88" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#01579B" text-anchor="middle">Mobile and IoT</text>
  <text x="780.0" y="110" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="normal" fill="#01579B" text-anchor="middle">Offline-first, WASM, OPFS, small footprint</text>
  <line x1="450" y1="300" x2="780.0" y2="95.0" stroke="#90A4AE" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="80" y="470" width="200" height="70" rx="8" ry="8" fill="#C8E6C9" stroke="#1B5E20" stroke-width="1.5"/>
  <text x="180.0" y="498" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Multi-tenant SaaS</text>
  <text x="180.0" y="520" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="normal" fill="#1B5E20" text-anchor="middle">One DB per tenant, branching, unlimited DBs</text>
  <line x1="450" y1="300" x2="180.0" y2="505.0" stroke="#90A4AE" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="680" y="470" width="200" height="70" rx="8" ry="8" fill="#FFE0B2" stroke="#E65100" stroke-width="1.5"/>
  <text x="780.0" y="498" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#E65100" text-anchor="middle">Edge Computing</text>
  <text x="780.0" y="520" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="normal" fill="#E65100" text-anchor="middle">In-process at edge, no network round-trips</text>
  <line x1="450" y1="300" x2="780.0" y2="505.0" stroke="#90A4AE" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="80" y="270" width="200" height="70" rx="8" ry="8" fill="#FFCDD2" stroke="#B71C1C" stroke-width="1.5"/>
  <text x="180.0" y="298" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#B71C1C" text-anchor="middle">Local-First Apps</text>
  <text x="180.0" y="320" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="normal" fill="#B71C1C" text-anchor="middle">Embedded DB with optional cloud sync</text>
  <line x1="450" y1="300" x2="180.0" y2="305.0" stroke="#90A4AE" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="680" y="270" width="200" height="70" rx="8" ry="8" fill="#D1C4E9" stroke="#4527A0" stroke-width="1.5"/>
  <text x="780.0" y="298" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#4527A0" text-anchor="middle">Private by Design</text>
  <text x="780.0" y="320" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="normal" fill="#4527A0" text-anchor="middle">Data isolation, per-DB encryption</text>
  <line x1="450" y1="300" x2="780.0" y2="305.0" stroke="#90A4AE" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>
