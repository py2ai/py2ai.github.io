<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <title>Turso Key Features</title>
  <rect x="360" y="215" width="180" height="70" rx="12" ry="12" fill="#1565C0" stroke="#0D47A1" stroke-width="1.5"/>
  <text x="450" y="245" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Turso Core</text>
  <text x="450" y="268" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" fill="#BBDEFB" text-anchor="middle">Rust Engine</text>
  <rect x="80" y="60" width="200" height="70" rx="8" ry="8" fill="#E1BEE7" stroke="#6A1B9A" stroke-width="1.5"/>
  <text x="180.0" y="88" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#6A1B9A" text-anchor="middle">Vector Search</text>
  <text x="180.0" y="110" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6A1B9A" text-anchor="middle">Native, no extensions</text>
  <line x1="450" y1="250" x2="180.0" y2="95.0" stroke="#90A4AE" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="680" y="60" width="200" height="70" rx="8" ry="8" fill="#B3E5FC" stroke="#01579B" stroke-width="1.5"/>
  <text x="780.0" y="88" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#01579B" text-anchor="middle">Async Design</text>
  <text x="780.0" y="110" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#01579B" text-anchor="middle">Linux io_uring</text>
  <line x1="450" y1="250" x2="780.0" y2="95.0" stroke="#90A4AE" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="80" y="380" width="200" height="70" rx="8" ry="8" fill="#C8E6C9" stroke="#1B5E20" stroke-width="1.5"/>
  <text x="180.0" y="408" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Concurrent Writes</text>
  <text x="180.0" y="430" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#1B5E20" text-anchor="middle">Multiple writers, zero conflicts</text>
  <line x1="450" y1="250" x2="180.0" y2="415.0" stroke="#90A4AE" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="680" y="380" width="200" height="70" rx="8" ry="8" fill="#FFE0B2" stroke="#E65100" stroke-width="1.5"/>
  <text x="780.0" y="408" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#E65100" text-anchor="middle">Browser + WASM</text>
  <text x="780.0" y="430" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#E65100" text-anchor="middle">OPFS persistence</text>
  <line x1="450" y1="250" x2="780.0" y2="415.0" stroke="#90A4AE" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="360" y="420" width="200" height="70" rx="8" ry="8" fill="#FFCDD2" stroke="#B71C1C" stroke-width="1.5"/>
  <text x="460.0" y="448" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#B71C1C" text-anchor="middle">SQLite Compatible</text>
  <text x="460.0" y="470" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#B71C1C" text-anchor="middle">Drop-in SQL compatibility</text>
  <line x1="450" y1="250" x2="460.0" y2="455.0" stroke="#90A4AE" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>
