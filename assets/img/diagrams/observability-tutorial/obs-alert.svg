<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" width="860" height="430" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="430" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">SLOs, Error Budgets, Alerting, On-call</text>
<rect x="40" y="70" width="780" height="130" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="96" text-anchor="middle" class="band-label">SLI -&gt; SLO -&gt; Error Budget</text>
<rect x="60" y="114" width="220" height="70" rx="8" fill="#1e40af"/>
<text x="170" y="140" text-anchor="middle" class="node-title-w">SLI</text>
<text x="170" y="158" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">measured indicator (e.g. 99.5% of reqs &lt; 200ms)</text>
<line x1="280" y1="149" x2="300" y2="149" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="300" y="114" width="220" height="70" rx="8" fill="#2563eb"/>
<text x="410" y="140" text-anchor="middle" class="node-title-w">SLO</text>
<text x="410" y="158" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">target for the SLI (e.g. 99% over 30 days)</text>
<line x1="520" y1="149" x2="540" y2="149" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="540" y="114" width="240" height="70" rx="8" fill="#1e40af"/>
<text x="660" y="140" text-anchor="middle" class="node-title-w">Error budget</text>
<text x="660" y="158" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">1% - room for downtime / risk</text>
<rect x="40" y="216" width="780" height="130" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="242" text-anchor="middle" class="band-label">Alerting + on-call</text>
<rect x="60" y="260" width="170" height="66" rx="8" fill="#2563eb"/>
<text x="145" y="286" text-anchor="middle" class="node-title-w">symptom-based</text>
<text x="145" y="304" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">alert on user impact, not CPU</text>
<rect x="250" y="260" width="170" height="66" rx="8" fill="#1e40af"/>
<text x="335" y="286" text-anchor="middle" class="node-title-w">multi-window</text>
<text x="335" y="304" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">1h + 5m burn rate</text>
<rect x="440" y="260" width="170" height="66" rx="8" fill="#2563eb"/>
<text x="525" y="286" text-anchor="middle" class="node-title-w">avoid noise</text>
<text x="525" y="304" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">page only if SLO at risk</text>
<rect x="630" y="260" width="170" height="66" rx="8" fill="#1e40af"/>
<text x="715" y="286" text-anchor="middle" class="node-title-w">runbook</text>
<text x="715" y="304" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">what to do when it fires</text>
<rect x="40" y="360" width="780" height="30" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="430" y="380" text-anchor="middle" class="note">Alert on burn rate (how fast you spend the error budget), not raw thresholds.</text>
</svg>
