<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" width="860" height="430" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="430" fill="#ffffff"/>
<text x="320" y="38" text-anchor="middle" class="title">The Three Pillars of Observability</text>
<rect x="40" y="70" width="780" height="100" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="88" width="200" height="64" rx="8" fill="#1e40af"/>
<text x="154" y="114" text-anchor="middle" class="node-title-w">Metrics</text>
<text x="154" y="132" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">numbers over time</text>
<rect x="274" y="88" width="320" height="64" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="434" y="114" text-anchor="middle" class="item">counters, gauges, histograms; Prometheus</text>
<text x="434" y="134" text-anchor="middle" class="item-sub">example tools</text>
<rect x="610" y="88" width="210" height="64" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="715" y="114" text-anchor="middle" class="item">what + how much</text>
<text x="715" y="134" text-anchor="middle" class="item-sub">answers</text>
<rect x="40" y="180" width="780" height="100" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="198" width="200" height="64" rx="8" fill="#2563eb"/>
<text x="154" y="224" text-anchor="middle" class="node-title-w">Logs</text>
<text x="154" y="242" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">discrete events</text>
<rect x="274" y="198" width="320" height="64" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="434" y="224" text-anchor="middle" class="item">structured JSON, levels, context; Loki/ELK</text>
<text x="434" y="244" text-anchor="middle" class="item-sub">example tools</text>
<rect x="610" y="198" width="210" height="64" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="715" y="224" text-anchor="middle" class="item">why it happened</text>
<text x="715" y="244" text-anchor="middle" class="item-sub">answers</text>
<rect x="40" y="290" width="780" height="100" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="54" y="308" width="200" height="64" rx="8" fill="#1e40af"/>
<text x="154" y="334" text-anchor="middle" class="node-title-w">Traces</text>
<text x="154" y="352" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">request journey</text>
<rect x="274" y="308" width="320" height="64" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="434" y="334" text-anchor="middle" class="item">spans + trace ID; OpenTelemetry, Jaeger</text>
<text x="434" y="354" text-anchor="middle" class="item-sub">example tools</text>
<rect x="610" y="308" width="210" height="64" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="715" y="334" text-anchor="middle" class="item">where time went</text>
<text x="715" y="354" text-anchor="middle" class="item-sub">answers</text>
<rect x="40" y="398" width="780" height="26" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="430" y="416" text-anchor="middle" class="note">Together they answer what, why, and where - correlated by trace/labels.</text>
</svg>
