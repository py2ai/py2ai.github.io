<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" width="860" height="430" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="430" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">OpenTelemetry: Instrument -&gt; SDK -&gt; Collector</text>
<rect x="40" y="90" width="150" height="60" rx="8" fill="#1e40af"/>
<text x="115" y="120" text-anchor="middle" class="node-title-w">Your app</text>
<text x="115" y="138" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">auto + manual instr.</text>
<line x1="190" y1="120" x2="230" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="230" y="90" width="150" height="60" rx="8" fill="#2563eb"/>
<text x="305" y="120" text-anchor="middle" class="node-title-w">OTel SDK</text>
<text x="305" y="138" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">export spans/metrics/logs</text>
<line x1="380" y1="120" x2="420" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="420" y="90" width="170" height="60" rx="8" fill="#1e40af"/>
<text x="505" y="120" text-anchor="middle" class="node-title-w">OTel Collector</text>
<text x="505" y="138" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">process + batch + route</text>
<line x1="590" y1="120" x2="630" y2="90" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="590" y1="120" x2="630" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="590" y1="120" x2="630" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="630" y="74" width="200" height="36" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="730" y="97" text-anchor="middle" class="item">Prometheus (metrics)</text>
<rect x="630" y="116" width="200" height="36" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="730" y="139" text-anchor="middle" class="item">Jaeger/Tempo (traces)</text>
<rect x="630" y="158" width="200" height="36" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="730" y="181" text-anchor="middle" class="item">Loki (logs)</text>
<rect x="40" y="220" width="780" height="140" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="246" text-anchor="middle" class="band-label">Collector capabilities</text>
<rect x="60" y="264" width="170" height="70" rx="8" fill="#2563eb"/>
<text x="145" y="290" text-anchor="middle" class="node-title-w">processors</text>
<text x="145" y="310" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">batch, attribute, filter</text>
<rect x="250" y="264" width="170" height="70" rx="8" fill="#1e40af"/>
<text x="335" y="290" text-anchor="middle" class="node-title-w">receivers</text>
<text x="335" y="310" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">OTLP, prometheus, jaeger</text>
<rect x="440" y="264" width="170" height="70" rx="8" fill="#2563eb"/>
<text x="525" y="290" text-anchor="middle" class="node-title-w">exporters</text>
<text x="525" y="310" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">to any backend</text>
<rect x="630" y="264" width="170" height="70" rx="8" fill="#1e40af"/>
<text x="715" y="290" text-anchor="middle" class="node-title-w">extensions</text>
<text x="715" y="310" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">health, retry</text>
<rect x="40" y="372" width="780" height="30" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="430" y="392" text-anchor="middle" class="note">One standard, vendor-neutral: switch backends without re-instrumenting.</text>
</svg>
