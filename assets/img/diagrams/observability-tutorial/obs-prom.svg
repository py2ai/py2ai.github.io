<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" width="860" height="430" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="430" fill="#ffffff"/>
<text x="320" y="38" text-anchor="middle" class="title">Prometheus Pull Model + PromQL + Grafana</text>
<rect x="330" y="70" width="200" height="46" rx="8" fill="#1e40af"/>
<text x="430" y="100" text-anchor="middle" class="node-title-w">Prometheus</text>
<line x1="330" y1="93" x2="180" y2="93" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-accent)"/>
<text x="255" y="85" text-anchor="middle" class="item-sub">scrape /metrics</text>
<line x1="430" y1="116" x2="180" y2="140" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="460" y1="116" x2="460" y2="140" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="530" y1="116" x2="760" y2="140" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="80" y="142" width="200" height="46" rx="8" fill="#2563eb"/>
<text x="180" y="172" text-anchor="middle" class="node-title-w">app A /metrics</text>
<rect x="370" y="142" width="180" height="46" rx="8" fill="#1e40af"/>
<text x="460" y="172" text-anchor="middle" class="node-title-w">app B</text>
<rect x="680" y="142" width="180" height="46" rx="8" fill="#2563eb"/>
<text x="770" y="172" text-anchor="middle" class="node-title-w">node exporter</text>
<rect x="40" y="210" width="390" height="150" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="235" y="236" text-anchor="middle" class="band-label">TSDB + PromQL</text>
<text x="235" y="264" text-anchor="middle" class="item-sub">rate(http_requests_total[5m])</text>
<text x="235" y="284" text-anchor="middle" class="item-sub">histogram_quantile(0.99, ...)</text>
<text x="235" y="304" text-anchor="middle" class="item-sub">sum by (route) (rate(...))</text>
<text x="235" y="334" text-anchor="middle" class="item-sub">labels = dimensions to slice by</text>
<rect x="460" y="210" width="380" height="150" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="650" y="236" text-anchor="middle" class="band-label">Grafana (visualize)</text>
<text x="650" y="264" text-anchor="middle" class="item-sub">dashboards from PromQL</text>
<text x="650" y="284" text-anchor="middle" class="item-sub">alert rules -&gt; Alertmanager</text>
<text x="650" y="304" text-anchor="middle" class="item-sub">alerts -&gt; PagerDuty/Slack</text>
<text x="650" y="334" text-anchor="middle" class="item-sub">also: Loki logs, Tempo traces</text>
</svg>
