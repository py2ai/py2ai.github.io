<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" width="860" height="380" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
  .mono { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 12px; fill: #0f172a; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="380" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">Responsive Prefixes (mobile-first)</text>
<rect x="40" y="90" width="125" height="60" rx="8" fill="#2563eb"/>
<text x="102.5" y="118" text-anchor="middle" class="node-title-w">base</text>
<text x="102.5" y="138" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">&lt; 640px</text>
<line x1="165" y1="110" x2="173" y2="110" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="173" y="90" width="125" height="60" rx="8" fill="#1e40af"/>
<text x="235.5" y="118" text-anchor="middle" class="node-title-w">sm:</text>
<text x="235.5" y="138" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">640+px</text>
<line x1="298" y1="110" x2="306" y2="110" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="306" y="90" width="125" height="60" rx="8" fill="#2563eb"/>
<text x="368.5" y="118" text-anchor="middle" class="node-title-w">md:</text>
<text x="368.5" y="138" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">768+px</text>
<line x1="431" y1="110" x2="439" y2="110" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="439" y="90" width="125" height="60" rx="8" fill="#1e40af"/>
<text x="501.5" y="118" text-anchor="middle" class="node-title-w">lg:</text>
<text x="501.5" y="138" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">1024+px</text>
<line x1="564" y1="110" x2="572" y2="110" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="572" y="90" width="125" height="60" rx="8" fill="#2563eb"/>
<text x="634.5" y="118" text-anchor="middle" class="node-title-w">xl:</text>
<text x="634.5" y="138" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">1280+px</text>
<line x1="697" y1="110" x2="705" y2="110" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="705" y="90" width="125" height="60" rx="8" fill="#1e40af"/>
<text x="767.5" y="118" text-anchor="middle" class="node-title-w">2xl:</text>
<text x="767.5" y="138" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">1536+px</text>
<text x="430" y="180" text-anchor="middle" class="item-sub">Each prefix applies at that breakpoint AND UP (min-width).</text>
<rect x="40" y="210" width="780" height="120" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="236" text-anchor="middle" class="band-label">Example: one element, many widths</text>
<rect x="60" y="250" width="740" height="60" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="430" y="288" text-anchor="middle" class="mono">&lt;div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4"&gt;</text>
<text x="430" y="312" text-anchor="middle" class="item-sub">1 col on mobile -&gt; 2 at sm -&gt; 3 at lg -&gt; 4 at xl</text>
</svg>
