<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" width="860" height="420" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
  .mono { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 12px; fill: #0f172a; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="420" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">Design System + Theme Tokens</text>
<rect x="330" y="70" width="200" height="46" rx="8" fill="#1e40af"/>
<text x="430" y="100" text-anchor="middle" class="node-title-w">tailwind.config.js</text>
<rect x="40" y="134" width="190" height="70" rx="8" fill="#2563eb"/>
<text x="135.0" y="160" text-anchor="middle" class="node-title-w">colors</text>
<text x="135.0" y="182" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">blue-600, gray-100, ...</text>
<rect x="242" y="134" width="190" height="70" rx="8" fill="#1e40af"/>
<text x="337.0" y="160" text-anchor="middle" class="node-title-w">spacing</text>
<text x="337.0" y="182" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">0,1,2,...,px (0.25rem scale)</text>
<rect x="444" y="134" width="190" height="70" rx="8" fill="#2563eb"/>
<text x="539.0" y="160" text-anchor="middle" class="node-title-w">fontSize</text>
<text x="539.0" y="182" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">text-sm/base/lg/xl</text>
<rect x="646" y="134" width="190" height="70" rx="8" fill="#1e40af"/>
<text x="741.0" y="160" text-anchor="middle" class="node-title-w">borderRadius</text>
<text x="741.0" y="182" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">rounded-md/lg/full</text>
<rect x="40" y="218" width="190" height="70" rx="8" fill="#2563eb"/>
<text x="135.0" y="244" text-anchor="middle" class="node-title-w">screens</text>
<text x="135.0" y="266" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">sm 640, md 768, lg 1024</text>
<rect x="242" y="218" width="190" height="70" rx="8" fill="#1e40af"/>
<text x="337.0" y="244" text-anchor="middle" class="node-title-w">boxShadow</text>
<text x="337.0" y="266" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">shadow-sm/md/lg</text>
<rect x="444" y="218" width="190" height="70" rx="8" fill="#2563eb"/>
<text x="539.0" y="244" text-anchor="middle" class="node-title-w">fontFamily</text>
<text x="539.0" y="266" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">font-sans/mono</text>
<rect x="646" y="218" width="190" height="70" rx="8" fill="#1e40af"/>
<text x="741.0" y="244" text-anchor="middle" class="node-title-w">animation</text>
<text x="741.0" y="266" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">animate-spin/pulse</text>
<rect x="40" y="326" width="780" height="40" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<text x="430" y="350" text-anchor="middle" class="note">Override tokens in config -&gt; your whole app restyles consistently.</text>
</svg>
