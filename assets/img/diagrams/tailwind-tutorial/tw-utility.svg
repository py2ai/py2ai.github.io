<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" width="860" height="400" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
  .mono { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 12px; fill: #0f172a; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="400" fill="#ffffff"/>
<text x="280" y="38" text-anchor="middle" class="title">Utility Classes -&gt; CSS</text>
<rect x="40" y="70" width="360" height="260" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="220" y="96" text-anchor="middle" class="band-label">In your markup</text>
<rect x="60" y="110" width="320" height="210" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="220" y="140" text-anchor="start" class="mono">&lt;button class="</text>
<text x="80" y="162" text-anchor="start" class="mono">bg-blue-600 text-white</text>
<text x="80" y="180" text-anchor="start" class="mono">px-4 py-2 rounded-md</text>
<text x="80" y="198" text-anchor="start" class="mono">hover:bg-blue-700</text>
<text x="80" y="216" text-anchor="start" class="mono">transition-colors"&gt;</text>
<text x="220" y="244" text-anchor="middle" class="mono">Click me</text>
<text x="220" y="266" text-anchor="start" class="mono">&lt;/button&gt;</text>
<line x1="400" y1="200" x2="460" y2="200" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-accent)"/>
<text x="430" y="192" text-anchor="middle" class="item-sub">JIT</text>
<rect x="460" y="70" width="380" height="260" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="650" y="96" text-anchor="middle" class="band-label">Generated CSS (tiny)</text>
<rect x="480" y="110" width="340" height="210" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="495" y="138" text-anchor="start" class="mono">.bg-blue-600 {</text>
<text x="510" y="156" text-anchor="start" class="mono">background:#2563eb}</text>
<text x="495" y="178" text-anchor="start" class="mono">.px-4 { padding-x:1rem }</text>
<text x="495" y="200" text-anchor="start" class="mono">.rounded-md { r:0.375rem }</text>
<text x="495" y="222" text-anchor="start" class="mono">.hover\:bg-blue-700:hover</text>
<text x="510" y="240" text-anchor="start" class="mono">{ background:#1d4ed8 }</text>
<text x="495" y="268" text-anchor="start" class="item-sub"># only classes you use</text>
<text x="495" y="286" text-anchor="start" class="item-sub"># are emitted</text>
</svg>
