<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" width="860" height="430" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
  .mono { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 12px; fill: #0f172a; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="430" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">Pydantic: Validation + Serialization + Settings</text>
<rect x="40" y="68" width="190" height="84" rx="8" fill="#2563eb"/>
<text x="135.0" y="92" text-anchor="middle" class="node-title-w">Typed models</text>
<text x="135.0" y="112" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">BaseModel + fields</text>
<text x="135.0" y="132" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">class User(BaseModel): ...</text>
<rect x="242" y="68" width="190" height="84" rx="8" fill="#1e40af"/>
<text x="337.0" y="92" text-anchor="middle" class="node-title-w">Validation</text>
<text x="337.0" y="112" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">coerce + reject bad types</text>
<text x="337.0" y="132" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">str -&gt; int? error; date parse</text>
<rect x="444" y="68" width="190" height="84" rx="8" fill="#2563eb"/>
<text x="539.0" y="92" text-anchor="middle" class="node-title-w">Serialization</text>
<text x="539.0" y="112" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">.model_dump() / .json()</text>
<text x="539.0" y="132" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">dict + JSON, filters extras</text>
<rect x="646" y="68" width="190" height="84" rx="8" fill="#1e40af"/>
<text x="741.0" y="92" text-anchor="middle" class="node-title-w">Nested + collections</text>
<text x="741.0" y="112" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">list[User], dict[str,int]</text>
<text x="741.0" y="132" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">arbitrary nesting</text>
<rect x="40" y="166" width="190" height="84" rx="8" fill="#1e40af"/>
<text x="135.0" y="190" text-anchor="middle" class="node-title-w">Custom validators</text>
<text x="135.0" y="210" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">@field_validator</text>
<text x="135.0" y="230" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">reusable checks on a field</text>
<rect x="242" y="166" width="190" height="84" rx="8" fill="#2563eb"/>
<text x="337.0" y="190" text-anchor="middle" class="node-title-w">Settings config</text>
<text x="337.0" y="210" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">BaseSettings</text>
<text x="337.0" y="230" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">env vars -&gt; typed config</text>
<rect x="444" y="166" width="190" height="84" rx="8" fill="#1e40af"/>
<text x="539.0" y="190" text-anchor="middle" class="node-title-w">Strict + optional</text>
<text x="539.0" y="210" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">Strict, Optional[T]</text>
<text x="539.0" y="230" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">exactness control</text>
<rect x="646" y="166" width="190" height="84" rx="8" fill="#2563eb"/>
<text x="741.0" y="190" text-anchor="middle" class="node-title-w">V2 performance</text>
<text x="741.0" y="210" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">rust core</text>
<text x="741.0" y="230" text-anchor="middle" font-size="9" fill="#e0e7ff" font-family="inherit">10x faster than v1</text>
</svg>
