<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" width="860" height="420" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
  .mono { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 12px; fill: #0f172a; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="420" fill="#ffffff"/>
<text x="280" y="38" text-anchor="middle" class="title">Request -&gt; Validate -&gt; Handler -&gt; Response + Auto Docs</text>
<rect x="40" y="80" width="130" height="50" rx="8" fill="#1e40af"/>
<text x="105" y="110" text-anchor="middle" class="node-title-w">Request</text>
<line x1="170" y1="105" x2="210" y2="105" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-accent)"/>
<rect x="210" y="80" width="170" height="50" rx="8" fill="#2563eb"/>
<text x="295" y="110" text-anchor="middle" class="node-title-w">Pydantic validate</text>
<line x1="380" y1="105" x2="420" y2="105" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-accent)"/>
<text x="400" y="97" text-anchor="middle" class="item-sub">or 422</text>
<rect x="420" y="80" width="150" height="50" rx="8" fill="#1e40af"/>
<text x="495" y="110" text-anchor="middle" class="node-title-w">handler</text>
<line x1="570" y1="105" x2="610" y2="105" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-accent)"/>
<rect x="610" y="80" width="170" height="50" rx="8" fill="#2563eb"/>
<text x="695" y="110" text-anchor="middle" class="node-title-w">response_model</text>
<line x1="780" y1="105" x2="810" y2="105" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-accent)"/>
<rect x="810" y="80" width="50" height="50" rx="8" fill="#16a34a"/>
<text x="835" y="110" text-anchor="middle" class="node-title-w">ok</text>
<line x1="295" y1="130" x2="295" y2="200" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow)"/>
<text x="310" y="172" text-anchor="start" class="item-sub">invalid -&gt; 422</text>
<rect x="40" y="250" width="400" height="120" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="240" y="276" text-anchor="middle" class="band-label">Automatic docs</text>
<rect x="60" y="294" width="360" height="30" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="240" y="314" text-anchor="middle" class="item">/docs - Swagger UI (interactive)</text>
<rect x="60" y="330" width="360" height="30" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="240" y="350" text-anchor="middle" class="item">/redoc - ReDoc (reference)</text>
<rect x="460" y="250" width="400" height="120" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="660" y="276" text-anchor="middle" class="band-label">What response_model does</text>
<rect x="480" y="294" width="360" height="66" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="660" y="314" text-anchor="start" class="item-sub">- filters output fields</text>
<text x="660" y="330" text-anchor="start" class="item-sub">- validates/serializes</text>
<text x="660" y="346" text-anchor="start" class="item-sub">- generates the OpenAPI schema</text>
</svg>
