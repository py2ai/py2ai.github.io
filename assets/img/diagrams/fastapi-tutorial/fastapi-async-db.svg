<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" width="860" height="430" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
<style>
  .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
  .band-label { font-size: 13px; font-weight: 700; fill: #1e40af; letter-spacing:0.3px; }
  .node-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
  .node-title-w { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .item { font-size: 12px; font-weight: 400; fill: #0f172a; }
  .item-sub { font-size: 11px; font-weight: 400; fill: #475569; }
  .stage { font-size: 15px; font-weight: 700; fill: #ffffff; }
  .stage-sub { font-size: 11px; font-weight: 400; fill: #e0e7ff; }
  .note { font-size: 12px; font-weight: 400; fill: #1e40af; }
  .mono { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 12px; fill: #0f172a; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#475569"/>
  </marker>
  <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" markerUnits="strokeWidth" orient="auto">
    <path d="M0,1 L8,5 L0,9 z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="860" height="430" fill="#ffffff"/>
<text x="300" y="38" text-anchor="middle" class="title">Async + Database + Dependency Injection</text>
<rect x="40" y="80" width="140" height="50" rx="8" fill="#1e40af"/>
<text x="110" y="110" text-anchor="middle" class="node-title-w">Request</text>
<line x1="180" y1="105" x2="220" y2="105" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="220" y="80" width="170" height="50" rx="8" fill="#2563eb"/>
<text x="305" y="110" text-anchor="middle" class="node-title-w">Depends(get_db)</text>
<line x1="390" y1="105" x2="430" y2="105" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<text x="410" y="97" text-anchor="middle" class="item-sub">inject</text>
<rect x="430" y="80" width="170" height="50" rx="8" fill="#1e40af"/>
<text x="515" y="110" text-anchor="middle" class="node-title-w">async handler</text>
<line x1="600" y1="105" x2="640" y2="105" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<text x="620" y="97" text-anchor="middle" class="item-sub">await</text>
<rect x="640" y="80" width="180" height="50" rx="8" fill="#2563eb"/>
<text x="730" y="110" text-anchor="middle" class="node-title-w">async DB session</text>
<rect x="40" y="180" width="780" height="120" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="206" text-anchor="middle" class="band-label">Why async here</text>
<rect x="60" y="222" width="360" height="60" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="240" y="242" text-anchor="middle" class="item">DB I/O is the bottleneck</text>
<text x="240" y="260" text-anchor="middle" class="item-sub">await releases the worker to serve other requests</text>
<rect x="460" y="222" width="360" height="60" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="640" y="242" text-anchor="middle" class="item">One event loop, many in-flight queries</text>
<text x="640" y="260" text-anchor="middle" class="item-sub">(vs sync: one thread blocked per query)</text>
<rect x="40" y="316" width="780" height="90" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="342" text-anchor="middle" class="band-label">Pools + deps</text>
<rect x="60" y="356" width="170" height="40" rx="8" fill="#2563eb"/>
<text x="145" y="376" text-anchor="middle" class="node-title-w">DB pool</text>
<text x="145" y="392" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">asyncpg / SQLAlchemy</text>
<rect x="250" y="356" width="170" height="40" rx="8" fill="#1e40af"/>
<text x="335" y="376" text-anchor="middle" class="node-title-w">Redis</text>
<text x="335" y="392" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">aioredis</text>
<rect x="440" y="356" width="170" height="40" rx="8" fill="#2563eb"/>
<text x="525" y="376" text-anchor="middle" class="node-title-w">HTTP client</text>
<text x="525" y="392" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">httpx AsyncClient</text>
<rect x="630" y="356" width="170" height="40" rx="8" fill="#1e40af"/>
<text x="715" y="376" text-anchor="middle" class="node-title-w">lifespan</text>
<text x="715" y="392" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="inherit">startup/shutdown</text>
</svg>
