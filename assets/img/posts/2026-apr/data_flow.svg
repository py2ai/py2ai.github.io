<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
<title>Data Flow Diagram</title>
<text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold">Data Flow Diagram</text>
<rect x="50" y="80" width="120" height="80" fill="#e8f5e9" stroke="#333" stroke-width="1" rx="5" ry="5"/>
<text x="110" y="105" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold">1. Input Processing</text>
<text x="110" y="125" text-anchor="middle" font-family="Arial" font-size="8">Requirements → Tasks</text>
<rect x="200" y="80" width="120" height="80" fill="#e3f2fd" stroke="#333" stroke-width="1" rx="5" ry="5"/>
<text x="260" y="105" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold">2. Agent Selection</text>
<text x="260" y="125" text-anchor="middle" font-family="Arial" font-size="8">Task Routing</text>
<rect x="350" y="80" width="120" height="80" fill="#fff3e0" stroke="#333" stroke-width="1" rx="5" ry="5"/>
<text x="410" y="105" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold">3. Execution</text>
<text x="410" y="125" text-anchor="middle" font-family="Arial" font-size="8">Tool Usage</text>
<rect x="500" y="80" width="120" height="80" fill="#fce4ec" stroke="#333" stroke-width="1" rx="5" ry="5"/>
<text x="560" y="105" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold">4. Output Generation</text>
<text x="560" y="125" text-anchor="middle" font-family="Arial" font-size="8">Deliverables</text>
<rect x="650" y="80" width="120" height="80" fill="#f3e5f5" stroke="#333" stroke-width="1" rx="5" ry="5"/>
<text x="710" y="105" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold">5. Feedback</text>
<text x="710" y="125" text-anchor="middle" font-family="Arial" font-size="8">Memory → Improvement</text>
<line x1="170" y1="120" x2="200" y2="120" stroke="#666" stroke-width="2"/>
<rect x="195" y="115" width="10" height="10" fill="#666"/>
<line x1="320" y1="120" x2="350" y2="120" stroke="#666" stroke-width="2"/>
<rect x="345" y="115" width="10" height="10" fill="#666"/>
<line x1="470" y1="120" x2="500" y2="120" stroke="#666" stroke-width="2"/>
<rect x="495" y="115" width="10" height="10" fill="#666"/>
<line x1="620" y1="120" x2="650" y2="120" stroke="#666" stroke-width="2"/>
<rect x="645" y="115" width="10" height="10" fill="#666"/>
<line x1="710" y1="160" x2="710" y2="250" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>
<line x1="710" y1="250" x2="110" y2="250" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>
<line x1="110" y1="250" x2="110" y2="160" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>
<text x="400" y="240" text-anchor="middle" font-family="Arial" font-size="8">Feedback Loop</text>
<text x="50" y="180" text-anchor="left" font-family="Arial" font-size="10" font-weight="bold">Input Sources:</text>
<text x="70" y="200" text-anchor="left" font-family="Arial" font-size="8">• User Requests</text>
<text x="70" y="215" text-anchor="left" font-family="Arial" font-size="8">• Context Data</text>
<text x="70" y="230" text-anchor="left" font-family="Arial" font-size="8">• Memory</text>
<text x="70" y="245" text-anchor="left" font-family="Arial" font-size="8">• Tools</text>
<text x="500" y="180" text-anchor="left" font-family="Arial" font-size="10" font-weight="bold">Output Types:</text>
<text x="520" y="200" text-anchor="left" font-family="Arial" font-size="8">• Code</text>
<text x="520" y="215" text-anchor="left" font-family="Arial" font-size="8">• Documentation</text>
<text x="520" y="230" text-anchor="left" font-family="Arial" font-size="8">• Designs</text>
<text x="520" y="245" text-anchor="left" font-family="Arial" font-size="8">• Strategies</text>
<text x="520" y="260" text-anchor="left" font-family="Arial" font-size="8">• Metrics</text>
<text x="400" y="380" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Sequential data flow stages with clear connections</text>
</svg>