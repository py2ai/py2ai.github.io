<svg width="900" height="500" xmlns="http://www.w3.org/2000/svg">
<title>Tool Integration Architecture</title>
<text x="450" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold">Tool Integration Architecture</text>

<!-- Central Agency Core -->
<rect x="370" y="120" width="160" height="160" fill="#bbdefb" stroke="#1976d2" stroke-width="3" rx="10" ry="10"/>
<text x="450" y="160" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold">Agency Core</text>
<text x="450" y="185" text-anchor="middle" font-family="Arial" font-size="12">157 Agents</text>
<text x="450" y="205" text-anchor="middle" font-family="Arial" font-size="12">17 Divisions</text>

<!-- Integration layer -->
<rect x="330" y="80" width="240" height="240" fill="none" stroke="#666" stroke-width="2" stroke-dasharray="5,5" rx="10" ry="10"/>
<text x="450" y="340" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">Integration Layer</text>

<!-- Tool boxes arranged around the core without overlapping connections -->
<!-- Top tool -->
<rect x="390" y="30" width="120" height="60" fill="#009688" stroke="#333" stroke-width="1" rx="5" ry="5"/>
<text x="450" y="55" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Gemini CLI</text>
<line x1="450" y1="90" x2="450" y2="120" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>

<!-- Left tools (stacked vertically) -->
<rect x="150" y="100" width="120" height="60" fill="#4CAF50" stroke="#333" stroke-width="1" rx="5" ry="5"/>
<text x="210" y="125" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Claude Code</text>
<line x1="270" y1="130" x2="370" y2="130" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>

<rect x="150" y="180" width="120" height="60" fill="#2196F3" stroke="#333" stroke-width="1" rx="5" ry="5"/>
<text x="210" y="205" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Cursor</text>
<line x1="270" y1="210" x2="370" y2="210" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>

<!-- Right tools (stacked vertically) -->
<rect x="630" y="100" width="120" height="60" fill="#9C27B0" stroke="#333" stroke-width="1" rx="5" ry="5"/>
<text x="690" y="125" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Windsurf</text>
<line x1="630" y1="130" x2="530" y2="130" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>

<rect x="630" y="180" width="120" height="60" fill="#F44336" stroke="#333" stroke-width="1" rx="5" ry="5"/>
<text x="690" y="205" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Copilot</text>
<line x1="630" y1="210" x2="530" y2="210" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>

<!-- Bottom tool -->
<rect x="390" y="320" width="120" height="60" fill="#FF9800" stroke="#333" stroke-width="1" rx="5" ry="5"/>
<text x="450" y="345" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Aider</text>
<line x1="450" y1="320" x2="450" y2="240" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>

<!-- Legend -->
<text x="450" y="380" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">AI Tools Integration with Agency Core</text>
<text x="450" y="400" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Dashed lines show integration connections</text>

</svg>