<svg width="900" height="550" xmlns="http://www.w3.org/2000/svg">
<title>Tool Integration Architecture</title>
<text x="100" y="70.0" text-anchor="start" font-family="Arial" font-size="20" font-weight="bold">Tool Integration Architecture</text>

<!-- Central Agency Core -->
<rect x="370" y="160.0" width="160" height="160" fill="#bbdefb" stroke="#1976d2" stroke-width="3" rx="10" ry="10"/>
<text x="450" y="200.0" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold">Agency Core</text>
<text x="450" y="225.0" text-anchor="middle" font-family="Arial" font-size="12">157 Agents</text>
<text x="450" y="245.0" text-anchor="middle" font-family="Arial" font-size="12">17 Divisions</text>

<!-- Integration layer -->
<rect x="330" y="120.0" width="240" height="240" fill="none" stroke="#666" stroke-width="2" stroke-dasharray="5,5" rx="10" ry="10"/>
<text x="100" y="380.0" text-anchor="start" font-family="Arial" font-size="12" fill="#666">Integration Layer</text>

<!-- Tool boxes arranged around the core without overlapping connections -->
<!-- Top tool -->
<rect x="390" y="70.0" width="120" height="60" fill="#009688" stroke="#333" stroke-width="1" rx="5" ry="5"/>
<text x="450" y="95.0" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Gemini CLI</text>
<line x1="450" y1="130.0" x2="450" y2="160.0" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>

<!-- Left tools (stacked vertically) -->
<rect x="150" y="140.0" width="120" height="60" fill="#4CAF50" stroke="#333" stroke-width="1" rx="5" ry="5"/>
<text x="210" y="165.0" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Claude Code</text>
<line x1="270" y1="170.0" x2="370" y2="170.0" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>

<rect x="150" y="220.0" width="120" height="60" fill="#2196F3" stroke="#333" stroke-width="1" rx="5" ry="5"/>
<text x="210" y="245.0" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Cursor</text>
<line x1="270" y1="250.0" x2="370" y2="250.0" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>

<!-- Right tools (stacked vertically) -->
<rect x="630" y="140.0" width="120" height="60" fill="#9C27B0" stroke="#333" stroke-width="1" rx="5" ry="5"/>
<text x="690" y="165.0" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Windsurf</text>
<line x1="630" y1="170.0" x2="530" y2="170.0" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>

<rect x="630" y="220.0" width="120" height="60" fill="#F44336" stroke="#333" stroke-width="1" rx="5" ry="5"/>
<text x="690" y="245.0" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Copilot</text>
<line x1="630" y1="250.0" x2="530" y2="250.0" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>

<!-- Bottom tool -->
<rect x="390" y="390.0" width="120" height="60" fill="#FF9800" stroke="#333" stroke-width="1" rx="5" ry="5"/>
<text x="450" y="415.0" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Aider</text>
<line x1="450" y1="390.0" x2="450" y2="310.0" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>

<!-- Legend -->
<text x="100" y="450.0" text-anchor="start" font-family="Arial" font-size="10" fill="#666">AI Tools Integration with Agency Core</text>
<text x="100" y="470.0" text-anchor="start" font-family="Arial" font-size="10" fill="#666">Dashed lines show integration connections</text>

</svg>