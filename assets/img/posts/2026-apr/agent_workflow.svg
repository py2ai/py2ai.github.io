<text x="150" y="110" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold">Inputs</text>
<text x="70" y="140" font-family="Arial" font-size="12">• User Request/Query</text>
<text x="70" y="170" font-family="Arial" font-size="12">• Context/Memory</text>
<text x="70" y="200" font-family="Arial" font-size="12">• Domain Knowledge</text>
<text x="70" y="230" font-family="Arial" font-size="12">• Tool Specifications</text>
<text x="70" y="260" font-family="Arial" font-size="12">• Success Criteria</text>
<rect x="300" y="80" width="200" height="240" fill="#e3f2fd" stroke="#2196f3" stroke-width="2" rx="10" ry="10"/>
<text x="400" y="110" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold">Process</text>
<text x="320" y="140" font-family="Arial" font-size="12">• Identity Activation</text>
<text x="320" y="170" font-family="Arial" font-size="12">• Mission Analysis</text>
<text x="320" y="200" font-family="Arial" font-size="12">• Workflow Execution</text>
<text x="320" y="230" font-family="Arial" font-size="12">• Rule Application</text>
<text x="320" y="260" font-family="Arial" font-size="12">• Quality Validation</text>
<rect x="550" y="80" width="200" height="240" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="10" ry="10"/>
<text x="650" y="110" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold">Outputs</text>
<text x="570" y="140" font-family="Arial" font-size="12">• Code Implementation</text>
<text x="570" y="170" font-family="Arial" font-size="12">• Documentation</text>
<text x="570" y="200" font-family="Arial" font-size="12">• Process Guidelines</text>
<text x="570" y="230" font-family="Arial" font-size="12">• Success Metrics</text>
<text x="570" y="260" font-family="Arial" font-size="12">• Next Steps</text>
<line x1="250" y1="200" x2="300" y2="200" stroke="#666" stroke-width="2"/>
<rect x="295" y="195" width="10" height="10" fill="#666"/>
<line x1="500" y1="200" x2="550" y2="200" stroke="#666" stroke-width="2"/>
<rect x="545" y="195" width="10" height="10" fill="#666"/>
<text x="275" y="190" text-anchor="middle" font-family="Arial" font-size="10">Process</text>
<text x="525" y="190" text-anchor="middle" font-family="Arial" font-size="10">Deliver</text>
