<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
<title>Agent Workflow: Inputs and Outputs</title>
<text x="400" y="20" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold">Agent Workflow: Inputs and Outputs</text>
