<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Live Translator - PyShine</title>
    <link rel="canonical" href="https://pyshine.com/translator.html" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/js/translation-dictionary.js"></script>
    <script src="/js/chinese-dictionary.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .controls {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .language-selector {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .lang-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .lang-group label {
            font-weight: 600;
            color: #555;
            font-size: 0.9em;
        }

        .lang-group select {
            padding: 12px 20px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            background: white;
            min-width: 200px;
        }

        .swap-btn {
            background: #667eea;
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2em;
            transition: all 0.3s;
        }

        .swap-btn:hover {
            background: #764ba2;
            transform: rotate(180deg);
        }

        .video-container {
            max-width: 800px;
            margin: 0 auto 20px;
        }

        @media (max-width: 900px) {
            .video-container {
                max-width: 100%;
            }
        }

        .video-box {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .video-box-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .video-box-header .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff4444;
            animation: pulse 2s infinite;
        }

        .status-dot.active {
            background: #00ff00;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .video-wrapper {
            position: relative;
            background: #000;
            min-height: 400px;
        }

        #video {
            display: none;
        }

        #canvas {
            width: 100%;
            height: auto;
            display: block;
        }

        .target-rectangle {
            display: none;
        }

        .translation-box {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .translation-box h3 {
            color: #667eea;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .translation-content {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            min-height: 100px;
            font-size: 1.2em;
            line-height: 1.8;
        }

        .character-info {
            display: inline-block;
            margin: 5px;
            padding: 10px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
            min-width: 80px;
        }

        .character-info .char {
            font-size: 2em;
            color: #333;
            display: block;
        }

        .character-info .pinyin {
            font-size: 0.9em;
            color: #667eea;
            font-weight: 600;
            margin-top: 5px;
        }

        .character-info .meaning {
            font-size: 0.8em;
            color: #666;
            margin-top: 3px;
        }

        .full-translation {
            margin-top: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .full-translation h4 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .full-translation p {
            font-size: 1.1em;
            color: #333;
            line-height: 1.6;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        
        .btn {
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        
        .btn-secondary:hover {
            background: linear-gradient(135deg, #38ef7d 0%, #11998e 100%);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .loading i {
            font-size: 2em;
            color: #667eea;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            overflow: auto;
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 900px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #667eea;
        }

        .modal-header h2 {
            color: #667eea;
            margin: 0;
        }

        .close-btn {
            background: #ff4444;
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            background: #cc0000;
        }

        .preview-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .preview-box {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }

        .preview-box h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .preview-box canvas {
            max-width: 100%;
            height: auto;
            border: 2px solid #667eea;
            border-radius: 8px;
            background: white;
        }

        @media (max-width: 768px) {
            .preview-container {
                grid-template-columns: 1fr;
            }
        }

        .settings-panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .settings-row:last-child {
            border-bottom: none;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.4s;
            border-radius: 26px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #667eea;
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        .detected-text-overlay {
            position: absolute;
            background: rgba(102, 126, 234, 0.9);
            color: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 12px;
            pointer-events: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-language"></i> Live OCR Translator</h1>
            <p>Real-time camera translation with character-by-character analysis</p>
        </div>

        <div class="controls">
            <div class="language-selector">
                <div class="lang-group">
                    <label>Input Language</label>
                    <select id="inputLang">
                        <option value="chi_sim" selected>Chinese (Simplified)</option>
                        <option value="chi_tra">Chinese (Traditional)</option>
                        <option value="jpn">Japanese</option>
                        <option value="kor">Korean</option>
                        <option value="eng">English</option>
                        <option value="fra">French</option>
                        <option value="deu">German</option>
                        <option value="spa">Spanish</option>
                        <option value="rus">Russian</option>
                        <option value="ara">Arabic</option>
                    </select>
                </div>

                <button class="swap-btn" onclick="swapLanguages()">
                    <i class="fas fa-exchange-alt"></i>
                </button>

                <div class="lang-group">
                    <label>Output Language</label>
                    <select id="outputLang">
                        <option value="en" selected>English</option>
                        <option value="zh">Chinese</option>
                        <option value="ja">Japanese</option>
                        <option value="ko">Korean</option>
                        <option value="fr">French</option>
                        <option value="de">German</option>
                        <option value="es">Spanish</option>
                        <option value="ru">Russian</option>
                        <option value="ar">Arabic</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="video-container">
            <div class="video-box">
                <div class="video-wrapper">
                    <video id="video" autoplay playsinline></video>
                    <canvas id="canvas"></canvas>
                </div>
            </div>
        </div>

        <div class="translation-box">
            <h3><i class="fas fa-language"></i> Character Analysis</h3>
            <div class="translation-content" id="characterAnalysis">
                <div class="loading">
                    <i class="fas fa-spinner"></i>
                    <p>Initializing camera and OCR...</p>
                </div>
            </div>
        </div>

        <div class="controls" style="text-align: center; padding: 20px; position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); box-shadow: 0 -4px 15px rgba(0,0,0,0.1); z-index: 1000;">
            <button id="scanBtn" class="btn btn-secondary" style="padding: 15px 40px; font-size: 16px;">
                <i class="fas fa-search"></i> Scan
            </button>
        </div>
        
        <div style="height: 80px;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let stream = null;
        let isProcessing = false;
        let worker = null;
        let workerReady = false;
        let lastDetectedText = '';
        let processingInterval = null;
        let lastWords = [];
        let ocrQueue = [];

        const chineseDictionary = typeof ChineseDictionary !== 'undefined' ? ChineseDictionary : {};

        async function initTesseract() {
            const inputLang = document.getElementById('inputLang').value;
            workerReady = false;
            
            try {
                if (worker) {
                    await worker.terminate();
                    worker = null;
                }
                
                worker = await Tesseract.createWorker(inputLang, 1, {
                    logger: m => {
                        if (m.status === 'loading tesseract core') {
                            console.log('Loading Tesseract...');
                        } else if (m.status === 'initializing tesseract') {
                            console.log('Initializing...');
                        } else if (m.status === 'loading language traineddata') {
                            console.log('Loading language...');
                        } else if (m.status === 'initializing api') {
                            console.log('Preparing OCR...');
                        } else if (m.status === 'recognizing text') {
                            console.log('Recognizing text...');
                        }
                    }
                });
                
                await worker.loadLanguage(inputLang);
                await worker.initialize(inputLang, 1);
                
                await worker.setParameters({
                    tessedit_pageseg_mode: '3',
                    preserve_interword_spaces: '1',
                    classify_bln_numeric_mode: '0',
                    textord_force_make_prop_words: '1',
                    load_system_dawg: '1',
                    load_freq_dawg: '1',
                    load_punc_dawg: '1',
                    load_number_dawg: '1',
                    tessedit_do_invert: '0',
                    tessedit_create_hocr: '0',
                    tessedit_create_tsv: '0',
                    textord_debug_tabfind: '0'
                });
                
                workerReady = true;
                console.log('Tesseract worker initialized successfully');
                return true;
            } catch (error) {
                console.error('Failed to initialize Tesseract:', error);
                workerReady = false;
                worker = null;
                return false;
            }
        }

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });
                
                video.srcObject = stream;
                await video.play();
                
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                await initTesseract();
                
                requestAnimationFrame(renderLoop);
                
            } catch (error) {
                console.error('Camera error:', error);
                alert('Unable to access camera. Please ensure camera permissions are granted.');
            }
        }

        async function testWorker() {
            if (!worker || typeof worker.recognize !== 'function') {
                console.log('Worker not ready for test');
                return false;
            }
            
            try {
                const testCanvas = document.createElement('canvas');
                testCanvas.width = 100;
                testCanvas.height = 100;
                const testCtx = testCanvas.getContext('2d');
                testCtx.fillStyle = 'white';
                testCtx.fillRect(0, 0, 100, 100);
                testCtx.fillStyle = 'black';
                testCtx.font = '20px Arial';
                testCtx.fillText('Test', 10, 50);
                
                await worker.recognize(testCanvas);
                console.log('Worker test successful');
                return true;
            } catch (error) {
                console.error('Worker test failed:', error);
                return false;
            }
        }

        function renderLoop() {
            if (!stream) return;
            
            ctx.drawImage(video, 0, 0);
            
            const targetWidth = Math.floor(video.videoWidth * 0.6);
            const targetHeight = Math.floor(video.videoHeight * 0.35);
            const targetX = Math.floor((video.videoWidth - targetWidth) / 2);
            const gap = 30;
            const totalHeight = targetHeight * 2 + gap;
            const targetY = Math.floor((video.videoHeight - totalHeight) / 2);
            
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 4;
            ctx.setLineDash([10, 5]);
            ctx.strokeRect(targetX, targetY, targetWidth, targetHeight);
            ctx.setLineDash([]);
            
            ctx.fillStyle = 'rgba(102, 126, 234, 0.9)';
            ctx.fillRect(targetX, targetY - 30, 120, 25);
            ctx.fillStyle = 'white';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('SCAN AREA', targetX + 10, targetY - 12);
            
            const resultRectY = targetY + targetHeight + gap;
            const resultRectHeight = targetHeight;
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
            ctx.fillRect(targetX, resultRectY, targetWidth, resultRectHeight);
            
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 3;
            ctx.strokeRect(targetX, resultRectY, targetWidth, resultRectHeight);
            
            ctx.fillStyle = 'rgba(102, 126, 234, 0.9)';
            ctx.fillRect(targetX, resultRectY - 25, 150, 20);
            ctx.fillStyle = 'white';
            ctx.font = 'bold 12px Arial';
            ctx.fillText('TRANSLATION', targetX + 10, resultRectY - 10);
            
            drawOverlays(targetX, targetY, targetWidth, targetHeight, resultRectY, resultRectHeight);
            
            requestAnimationFrame(renderLoop);
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            
            if (processingInterval) {
                clearInterval(processingInterval);
                processingInterval = null;
            }
            
            video.srcObject = null;
            document.getElementById('startBtn').disabled = false;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            lastWords = [];
            workerReady = false;
        }

        function startRealTimeProcessing() {
            if (processingInterval) {
                clearInterval(processingInterval);
            }
            
            processingInterval = setInterval(() => {
                if (!isProcessing && stream) {
                    captureFrameWithPreview();
                }
            }, 3000);
        }

        async function captureFrameWithPreview() {
            if (!stream) return null;
            
            if (!worker || typeof worker.recognize !== 'function') {
                console.log('Worker not ready or invalid, skipping frame capture');
                return null;
            }
            
            if (isProcessing) {
                return null;
            }
            
            isProcessing = true;
            
            try {
                const targetWidth = Math.floor(video.videoWidth * 0.6);
                const targetHeight = Math.floor(video.videoHeight * 0.35);
                const targetX = Math.floor((video.videoWidth - targetWidth) / 2);
                const gap = 30;
                const totalHeight = targetHeight * 2 + gap;
                const targetY = Math.floor((video.videoHeight - totalHeight) / 2);
                
                const scale = 3;
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = targetWidth * scale;
                tempCanvas.height = targetHeight * scale;
                const tempCtx = tempCanvas.getContext('2d');
                
                tempCtx.fillStyle = 'white';
                tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
                
                tempCtx.imageSmoothingEnabled = true;
                tempCtx.imageSmoothingQuality = 'high';
                
                tempCtx.drawImage(
                    video,
                    targetX, targetY, targetWidth, targetHeight,
                    0, 0, targetWidth * scale, targetHeight * scale
                );
                
                const imageData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
                const data = imageData.data;
                const width = tempCanvas.width;
                const height = tempCanvas.height;
                
                for (let i = 0; i < data.length; i += 4) {
                    const gray = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
                    
                    const contrast = ((gray - 128) * 1.2) + 128;
                    
                    const value = Math.max(0, Math.min(255, contrast));
                    
                    data[i] = value;
                    data[i + 1] = value;
                    data[i + 2] = value;
                }
                
                tempCtx.putImageData(imageData, 0, 0);
                
                const sharpenedImageData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
                const sharpenData = sharpenedImageData.data;
                
                for (let y = 1; y < height - 1; y++) {
                    for (let x = 1; x < width - 1; x++) {
                        const idx = (y * width + x) * 4;
                        
                        const center = data[idx];
                        const top = data[((y - 1) * width + x) * 4];
                        const bottom = data[((y + 1) * width + x) * 4];
                        const left = data[(y * width + (x - 1)) * 4];
                        const right = data[(y * width + (x + 1)) * 4];
                        
                        const sharpened = center * 5 - top - bottom - left - right;
                        
                        sharpenData[idx] = Math.max(0, Math.min(255, sharpened));
                        sharpenData[idx + 1] = sharpenData[idx];
                        sharpenData[idx + 2] = sharpenData[idx];
                    }
                }
                
                tempCtx.putImageData(sharpenedImageData, 0, 0);
                
                const scales = [1.0, 1.5, 0.75];
                let bestResult = null;
                let bestConfidence = 0;
                
                for (const scale of scales) {
                    const scaledCanvas = document.createElement('canvas');
                    const scaledWidth = Math.floor(tempCanvas.width * scale);
                    const scaledHeight = Math.floor(tempCanvas.height * scale);
                    scaledCanvas.width = scaledWidth;
                    scaledCanvas.height = scaledHeight;
                    const scaledCtx = scaledCanvas.getContext('2d');
                    scaledCtx.drawImage(tempCanvas, 0, 0, scaledWidth, scaledHeight);
                    
                    const result = await worker.recognize(scaledCanvas);
                    
                    const { data: { text, words, confidence } } = result;
                    
                    console.log(`Scale ${scale}: Detected text:`, text, 'Confidence:', confidence, 'Words:', words.length);
                    
                    if (confidence > bestConfidence) {
                        bestConfidence = confidence;
                        bestResult = { text, words, confidence };
                    }
                }
                
                const { text, words, confidence } = bestResult;
                
                console.log('Best result:', text, 'Confidence:', confidence, 'Words:', words.length);
                
                if (confidence < 55) {
                    console.log('Low confidence, skipping...');
                    await new Promise(resolve => setTimeout(resolve, 500));
                    isProcessing = false;
                    return null;
                }
                
                const cleanText = text.replace(/[^\u4e00-\u9fa5a-zA-Z0-9\s]/g, '').trim();
                
                if (!cleanText || cleanText.length < 1) {
                    console.log('No valid text detected');
                    await new Promise(resolve => setTimeout(resolve, 500));
                    isProcessing = false;
                    return null;
                }
                
                const chineseChars = cleanText.match(/[\u4e00-\u9fa5]/g) || [];
                if (chineseChars.length < 1) {
                    console.log('No Chinese characters detected');
                    await new Promise(resolve => setTimeout(resolve, 500));
                    isProcessing = false;
                    return null;
                }
                
                lastDetectedText = cleanText;
                lastWords = words
                    .filter(word => {
                        const cleanWord = word.text.replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, '');
                        return cleanWord.length > 0 && word.confidence >= 50;
                    })
                    .map(word => ({
                        ...word,
                        bbox: {
                            x0: (word.bbox.x0 / scale) + targetX,
                            y0: (word.bbox.y0 / scale) + targetY,
                            x1: (word.bbox.x1 / scale) + targetX,
                            y1: (word.bbox.y1 / scale) + targetY
                        }
                    }));
                
                if (lastWords.length > 0) {
                    displayTranslation(cleanText, lastWords);
                }
                
                isProcessing = false;
                
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                return true;
                
            } catch (error) {
                console.error('OCR error:', error);
                workerReady = false;
                worker = null;
                
                if (processingInterval) {
                    clearInterval(processingInterval);
                    processingInterval = null;
                }
                
                setTimeout(async () => {
                    await initTesseract();
                }, 2000);
                
                isProcessing = false;
                return false;
            }
        }

        async function captureFrame() {
            await captureFrameWithPreview();
        }

        function drawOverlays(targetX, targetY, targetWidth, targetHeight, resultRectY, resultRectHeight) {
            if (!lastWords || lastWords.length === 0) return;
            
            const allChars = [];
            lastWords.forEach(word => {
                const chars = word.text.split('');
                chars.forEach(char => {
                    if (/[\u4e00-\u9fa5]/.test(char)) {
                        allChars.push(char);
                    }
                });
            });
            
            if (allChars.length === 0) return;
            
            const charCount = allChars.length;
            const charSpacing = targetWidth / charCount;
            
            const baseFontSize = Math.min(36, Math.floor(targetHeight * 0.3));
            const fontSize = Math.max(18, baseFontSize);
            
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            allChars.forEach((char, index) => {
                const charX = targetX + charSpacing * (index + 0.5);
                const charY = resultRectY + resultRectHeight * 0.18;
                
                ctx.font = `bold ${fontSize}px Arial`;
                ctx.fillStyle = '#667eea';
                ctx.fillText(char, charX, charY);
                
                const info = chineseDictionary[char];
                let infoY = charY + fontSize * 0.7;
                
                const pinyinFontSize = Math.floor(fontSize * 0.4);
                ctx.font = `bold ${pinyinFontSize}px Arial`;
                ctx.fillStyle = '#ffd700';
                ctx.fillText(info ? info.pinyin : '-', charX, infoY);
                infoY += pinyinFontSize * 1.4;
                
                const meaningFontSize = Math.floor(fontSize * 0.32);
                ctx.font = `${meaningFontSize}px Arial`;
                ctx.fillStyle = 'white';
                const meaning = info ? info.meaning : 'Unknown';
                const maxWidth = charSpacing - 8;
                
                const foldedLines = foldText(meaning, maxWidth, meaningFontSize);
                foldedLines.forEach((line, lineIndex) => {
                    ctx.fillText(line, charX, infoY + lineIndex * meaningFontSize * 1.2);
                });
            });
        }
        
        function foldText(text, maxWidth, fontSize) {
            const words = text.split(' ');
            const lines = [];
            let currentLine = '';
            
            words.forEach(word => {
                if (!word) return;
                const testLine = currentLine ? currentLine + ' ' + word : word;
                const width = ctx.measureText(testLine).width;
                
                if (width > maxWidth && currentLine) {
                    lines.push(currentLine);
                    currentLine = word;
                } else {
                    currentLine = testLine;
                }
            });
            
            if (currentLine) {
                lines.push(currentLine);
            }
            
            return lines.slice(0, 3);
        }
        
        function buildFullTranslation(chars) {
            const translations = [];
            let currentPhrase = '';
            
            chars.forEach(char => {
                const info = chineseDictionary[char];
                if (info) {
                    if (['的', '了', '吗', '呢', '吧', '啊'].includes(char)) {
                        if (currentPhrase) {
                            translations.push(currentPhrase);
                            currentPhrase = '';
                        }
                        translations.push(info.meaning);
                    } else {
                        currentPhrase += (currentPhrase ? ' ' : '') + info.meaning.split(',')[0];
                    }
                }
            });
            
            if (currentPhrase) {
                translations.push(currentPhrase);
            }
            
            return translations.join('. ');
        }

        function displayTranslation(text, words) {
            const analysisDiv = document.getElementById('characterAnalysis');
            
            const chars = text.split('').filter(c => c.trim());
            
            if (chars.length === 0) {
                analysisDiv.innerHTML = '<p style="color: #999;">No text detected...</p>';
                return;
            }
            
            let html = '';
            chars.forEach(char => {
                const info = chineseDictionary[char];
                
                if (info) {
                    html += `
                        <div class="character-info">
                            <span class="char">${char}</span>
                            <span class="pinyin">${info.pinyin}</span>
                            <span class="meaning">${info.meaning}</span>
                        </div>
                    `;
                } else if (/[\u4e00-\u9fff]/.test(char)) {
                    html += `
                        <div class="character-info">
                            <span class="char">${char}</span>
                            <span class="pinyin">-</span>
                            <span class="meaning">Unknown</span>
                        </div>
                    `;
                }
            });
            
            analysisDiv.innerHTML = html || '<p style="color: #999;">No Chinese characters detected...</p>';
            
            translateText(text);
        }

        async function translateText(text) {
            const outputLang = document.getElementById('outputLang').value;
            const inputLang = document.getElementById('inputLang').value;
            
            const langMap = {
                'chi_sim': 'zh',
                'chi_tra': 'zh',
                'jpn': 'ja',
                'kor': 'ko',
                'eng': 'en',
                'fra': 'fr',
                'deu': 'de',
                'spa': 'es',
                'rus': 'ru',
                'ara': 'ar'
            };
            
            const sourceLang = langMap[inputLang] || 'auto';
            const langPair = `${sourceLang}-${outputLang}`;
            
            if (TranslationDictionary && TranslationDictionary[langPair]) {
                const dict = TranslationDictionary[langPair];
                const translatedWords = [];
                
                const chars = text.split('');
                chars.forEach(char => {
                    if (dict[char]) {
                        translatedWords.push(dict[char]);
                    } else {
                        translatedWords.push(char);
                    }
                });
                
                const translatedText = translatedWords.join(' ');
            } else {
                console.log('Translation dictionary not available for this language pair.');
            }
        }

        function swapLanguages() {
            const inputLang = document.getElementById('inputLang');
            const outputLang = document.getElementById('outputLang');
            
            const temp = inputLang.value;
            inputLang.value = outputLang.value;
            outputLang.value = temp;
        }

        document.getElementById('inputLang').addEventListener('change', async () => {
            workerReady = false;
            if (worker) {
                await worker.terminate();
                worker = null;
            }
            if (stream) {
                await initTesseract();
            }
        });

        document.getElementById('scanBtn').addEventListener('click', async () => {
            if (!stream) {
                alert('Camera not started. Please wait...');
                return;
            }
            
            if (!workerReady || !worker) {
                alert('OCR not ready. Please wait for initialization...');
                return;
            }
            
            const btn = document.getElementById('scanBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Scanning...';
            
            const result = await captureFrameWithPreview();
            
            if (result) {
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-search"></i> Scan';
                }, 500);
            } else {
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-search"></i> Scan';
                }, 500);
            }
        });

        window.addEventListener('load', () => {
            startCamera();
        });

        window.addEventListener('beforeunload', () => {
            if (worker) {
                worker.terminate();
            }
            stopCamera();
        });
    </script>
</body>
</html>
