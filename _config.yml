# ==============================
# 🔧 SITE CONFIGURATION
# ==============================
title: "PyShine"
author: "PyShine Team"
description: "Learn Python with free tutorials, AI guides, and coding projects. Master machine learning, game development, and more with step-by-step lessons."
url: "https://pyshine.com"
baseurl: "" # leave empty unless deploying under subpath

tagline: "Free Python Tutorials, AI Guides & Coding Projects"
email: "python2ai@gmail.com"
hero_img: posts/sk.jpg
github_username: pyshine-labs

# ==============================
# 🔌 PLUGINS
# ==============================
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - link_preview

# ==============================
# 📝 POST SETTINGS
# ==============================
future: true
published: true

# ==============================
# 🔗 SOCIAL & SEO
# ==============================
social:
  name: "PyShine Team"
  links:
    # - https://www.facebook.com/PyShineOffical
    - https://github.com/pyshine-labs
    # - https://twitter.com/pyshine_
    # - https://www.linkedin.com/company/pyshine/

# Schema.org metadata (Google rich results)
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      seo:
        type: BlogPosting
        name: "{{ page.title | escape }}"
        description: "{{ page.excerpt | strip_html | truncate: 160 }}"
        image: "{{ page.image | default: '/assets/img/posts/pyshines.jpg' | absolute_url }}"
  -
    scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
      seo:
        type: WebPage
        name: "{{ page.title | escape }}"
        description: "{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}"

# ==============================
# 🧭 NAVIGATION
# ==============================


navigation:
  - name: "Home"
    link: "/"

  - name: "Posts"
    link: "/categories"

  - name: "Applications"
    children:
      - name: "Solar Helper"
        link: "/solar-map/"
      - name: "Clipboard App"
        link: "/Clipboard-App-for-Two-PCs/"
      - name: "Online Photo Correction"
        link: "/photo_correction"
      - name: "Online Passport Photo 20KB"
        link: "/photo"
      - name: "Online Fingers Scanner"
        link: "/finger.html"
      - name: "Online Make Avatars"
        link: "/avatars"
      - name: "Online Reminder App"
        link: "/kanban/debounce.html"
      - name: "Online Image Resize"
        link: "/converter.html"
      - name: "Online Live Translator"
        link: "/translator.html"
      - name: "Procreate Swatch Viewer"
        link: "/procreate-sv.html"

  - name: "Games"
    children:
      - name: "Snake Game"
        link: "/games/snake/"
      - name: "Flappy Bird"
        link: "/games/flappy-bird/"
      - name: "Tetris"
        link: "/games/tetris/"
      - name: "Memory Match"
        link: "/games/memory-match/"
      - name: "Pong"
        link: "/games/pong/"
      - name: "2048"
        link: "/games/2048/"
      - name: "Battleship"
        link: "/games/battleship/"
      - name: "GO Game"
        link: "/games/go/"
      - name: "Chess Game"
        link: "/games/chess/"
      - name: "Copter Game"
        link: "/games/copter/"

  - name: "About"
    link: "/about"

  - name: "Contact"
    link: "/contact"

  - name: "Privacy Policy"
    link: "/privacy"

  - name: "Disclaimer"
    link: "/disclaimer"

# ==============================
# 📊 ANALYTICS
# ==============================
google_analytics: "UA-123748855-1"
google_tag_manager: "GTM-TCVFBKF"

# ==============================
# 💬 COMMENTS
# ==============================
comments: true

# ==============================
# ⚙️ BUILD SETTINGS
# ==============================
markdown: kramdown
highlighter: rouge

kramdown:
  math_engine: mathjax
  input: GFM
  syntax_highlighter: rouge
  css_class: "highlight"
  span:
    line_numbers: false
  block:
    line_numbers: true
    start_line: 1

# ==============================
# 🚫 EXCLUDES
# ==============================
exclude:
  - README.md
  - node_modules
  - script
  - package.json
  - package-lock.json
  - Gemfile
  - Gemfile.lock
  - vendor
  - npm-debug.log
  - gulpfile.js
  - sleek.jpg

include: ["_pages", "blog"]
permalink: /:title/

# ==============================
# 🚀 PERFORMANCE + MINIFY
# ==============================
compress_html:
  clippings: "html"
  comments: ["<!-- ", " -->"]
  endings: all
  startings: []
  blanklines: false
  profile: false
  ignore:
    envs: [development]

# ==============================
# 🔌 PLUGINS
# ==============================
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-minifier
  - jekyll-paginate-v2
  - jekyll-redirect-from


# ==============================
# 📡 FEED + SITEMAP SETTINGS
# ==============================
feed:
  path: atom.xml
sitemap:
  filename: sitemap.xml
  exclude:
    - /assets/
    - /script/
    - /node_modules/

# ==============================
# 🧠 SEO EXTRAS
# ==============================
robots: "index, follow"
lang: "en"

collections:
  zh_posts:
    output: true
    permalink: /zh/:title/
  ja_posts:
    output: true
    permalink: /ja/:title/
  ko_posts:
    output: true
    permalink: /ko/:title/

# ==============================
# 🔒 SERVICE WORKER (offline support)
# ==============================
service_worker: true

