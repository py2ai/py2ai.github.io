{% if page.comments != false %}
<section class="feedback-section mt-5" aria-label="Feedback Section">
  <div class="feedback-container">
    <h3 class="feedback-title">💬 Feedback & Questions</h3>
    <p class="feedback-text">Have questions or suggestions? I'd love to hear from you!</p>
    <a class="feedback-button" href="mailto:python2ai@gmail.com?subject=Feedback on: {{ page.title | uri_escape }}">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
        <polyline points="22,6 12,13 2,6"></polyline>
      </svg>
      Send Feedback via Email
    </a>
    <p class="feedback-note">Your email will be kept private and used only to respond to your inquiry.</p>
  </div>
</section>

<style>
.feedback-section {
  background-color: #f8f9fa;
  padding: 40px 20px;
  border-top: 1px solid #e0e0e0;
}
.feedback-container {
  max-width: 600px;
  margin: 0 auto;
  text-align: center;
}
.feedback-title {
  font-size: 1.5rem;
  color: #333;
  margin-bottom: 10px;
}
.feedback-text {
  color: #666;
  margin-bottom: 20px;
}
.feedback-button {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, #277cea, #1a5fb8);
  color: #ffffff;
  padding: 14px 28px;
  border-radius: 8px;
  text-decoration: none;
  font-weight: 600;
  font-size: 1rem;
  transition: all 0.3s ease;
  box-shadow: 0 4px 12px rgba(39, 124, 234, 0.3);
}
.feedback-button:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(39, 124, 234, 0.4);
  color: #ffffff;
}
.feedback-note {
  margin-top: 15px;
  font-size: 0.85rem;
  color: #888;
}
</style>
{% endif %}
