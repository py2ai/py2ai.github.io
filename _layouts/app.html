---
layout: compress
---
<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en-US' }}" itemscope itemtype="https://schema.org/WebPage">

  {% include head.html %}

  <body class="site">

    <!-- Google Tag Manager (noscript) -->
    {% if site.google_tag_manager %}
      <noscript>
        <iframe src="https://www.googletagmanager.com/ns.html?id={{ site.google_tag_manager }}"
                height="0" width="0" style="display:none;visibility:hidden"></iframe>
      </noscript>
    {% endif %}

    <!-- Google Analytics 4 -->
    {% if site.google_analytics %}
      <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
      <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', '{{ site.google_analytics }}');
      </script>
    {% endif %}

    <!-- ===============================
         REUSE HEADER
         No extra CSS or JS needed here
    ================================ -->
    {% include header.html %}

    <!-- ===============================
         PAGE CONTENT
         Just show the content below header
    ================================ -->
    <main class="site__content">
      {{ content }}
    </main>

    <!-- AdSense Ads -->
    <section aria-label="Advertisements" class="ads mt-4" style="text-align:center; padding:20px;">
      <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2976211678184829"
              crossorigin="anonymous"></script>
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-2976211678184829"
           data-ad-slot="7658460605"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </section>

  </body>
</html>
